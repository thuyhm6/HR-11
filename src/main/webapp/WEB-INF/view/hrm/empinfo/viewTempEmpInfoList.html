<div th:fragment="content">
    <div class="row">
        <div class="col-12">
            <!-- Data Table with DataTables -->
            <div class="card">
                <!-- Search Form -->
                <div class="card-body">
                    <div class="row">
                        <div class="col-12">
                            <div class="card">
                                <div class="card-body p-1">
                                    <form class="searchForm" id="employeeSearchForm">
                                        <div class="row g-3">
                                            <div class="col-md-2">
                                                <label for="searchLocalName" class="form-label"
                                                    th:text="#{alert.pa.pasalarycanshu.xingming}">Tên nhân viên</label>
                                                <input type="text" class="form-control" id="searchLocalName"
                                                    name="localName"
                                                    th:placeholder="#{alert.pa.pasalarycanshu.xingming}">
                                            </div>
                                            <div class="col-md-2">
                                                <label for="searchEmpId" class="form-label"
                                                    th:text="#{hr.enpinfo.title.EMP.EMPNUMBER}">Mã nhân viên</label>
                                                <input type="text" class="form-control" id="searchEmpId" name="empId"
                                                    th:placeholder="#{hr.enpinfo.title.EMP.EMPNUMBER}">
                                            </div>
                                            <div class="col-md-2">
                                                <label for="searchDeptNo" class="form-label"
                                                    th:text="#{ar.addempshift.title.bydept}">Mã phòng ban</label>
                                                <input type="text" class="form-control" id="searchDeptNo" name="deptNo"
                                                    th:placeholder="#{ar.addempshift.title.bydept}">
                                            </div>
                                            <div class="col-md-2">
                                                <label for="searchPosition" class="form-label"
                                                    th:text="#{ess.trans.title.postGradeName}">Chức vụ</label>
                                                <input type="text" class="form-control" id="searchPosition"
                                                    name="position" th:placeholder="#{ess.trans.title.postGradeName}">
                                            </div>
                                            <div class="col-md-2">
                                                <label for="searchCreateDateFrom" class="form-label"
                                                    th:text="#{ess.empInfo.start_date}">Ngày
                                                    tạo từ</label>
                                                <input type="date" class="form-control" id="searchCreateDateFrom"
                                                    name="createDateFrom">
                                            </div>
                                            <div class="col-md-2">
                                                <label for="searchCreateDateTo" class="form-label"
                                                    th:text="#{ess.empInfo.end_date}">Ngày
                                                    tạo đến</label>
                                                <input type="date" class="form-control" id="searchCreateDateTo"
                                                    name="createDateTo">
                                            </div>
                                            <div class="col-md-2">
                                                <label for="searchActivity" class="form-label"
                                                    th:text="#{common.active}">Hoạt động</label>
                                                <select class="form-select" id="searchActivity" name="activity">
                                                    <option value="" th:text="#{ar.viewarcardrecord.title.quanbu}">Tất
                                                        cả</option>
                                                    <option value="ACTIVE" th:text="#{common.active}">Hoạt động</option>
                                                    <option value="INACTIVE" th:text="#{common.inactive}">Không hoạt
                                                        động</option>
                                                </select>
                                            </div>
                                            <div class="col-md-2">
                                                <label for="searchOtFlag" class="form-label"
                                                    th:text="#{common.status} + ' OT'">Trạng thái OT</label>
                                                <select class="form-select" id="searchOtFlag" name="otFlag">
                                                    <option value="" th:text="#{ar.viewarcardrecord.title.quanbu}">Tất
                                                        cả</option>
                                                    <option value="Y" th:text="#{common.yes} + ' OT'">Có OT</option>
                                                    <option value="N" th:text="#{common.no} + ' OT'">Không OT</option>
                                                </select>
                                            </div>
                                        </div>
                                        <div class="row mt-3">
                                            <div class="col-12">
                                                <button type="button" class="btn btn-success"
                                                    onclick="addNewEmployee()">
                                                    <i class="bx bx-plus me-1"></i> <span
                                                        th:text="#{common.create}">Thêm mới</span>
                                                </button>
                                                <button type="button" class="btn btn-primary ms-2"
                                                    onclick="performSearch()">
                                                    <i class="bx bx-search me-1"></i> <span
                                                        th:text="#{common.search}">Tìm kiếm</span>
                                                </button>
                                                <button type="button" class="btn btn-secondary ms-2"
                                                    onclick="clearSearch()">
                                                    <i class="bx bx-x me-1"></i> <span th:text="#{common.clear}">Xóa bộ
                                                        lọc</span>
                                                </button>
                                                <button type="button" class="btn btn-outline-info ms-2"
                                                    onclick="exportSearchResults()">
                                                    <i class="bx bx-download me-1"></i> <span
                                                        th:text="#{common.export}">Xuất kết quả</span>
                                                </button>
                                            </div>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Include Edit Employee Modal -->
                <div th:replace="~{hrm/empinfo/editEmployee :: content}"></div>
                <div class="card-body">
                    <!-- Error Message -->
                    <div id="error-message" class="alert alert-danger d-none" role="alert">
                        <i class="bx bx-error"></i>
                        <span id="error-text"></span>
                    </div>

                    <!-- DataTables Table -->
                    <div class="table-responsive">
                        <table id="femaleEmployeesTable" class="table table-striped table-hover">
                            <thead class="table-dark">
                                <tr>
                                    <th th:text="#{ar.viewcycle.title.xuhao}">STT</th>
                                    <th th:text="#{hr.enpinfo.title.EMP.EMPNUMBER}">Mã nhân viên</th>
                                    <th th:text="#{alert.pa.pasalarycanshu.xingming}">Họ tên</th>
                                    <th th:text="#{ar.addempshift.title.bydept}">Phòng ban</th>
                                    <th th:text="#{ess.trans.title.postGradeName}">Chức vụ</th>
                                    <th>Số đặc biệt</th>
                                    <th th:text="#{common.active}">Hoạt động</th>
                                    <th th:text="#{ar.excelexport.title.createdate}">Ngày tạo</th>
                                    <th th:text="#{ess.empInfo.start_date}">Ngày bắt đầu</th>
                                    <th th:text="#{ess.empInfo.end_date}">Ngày kết thúc</th>
                                    <th th:text="#{common.status} + ' OT'">Trạng thái OT</th>
                                    <th th:text="#{common.action}">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Data will be loaded by DataTables -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>


</div>

<!-- DataTables JavaScript -->
<template id="fragmentScripts">
    <script th:inline="javascript">
        var messageResources = {
            hasOt: /*[[#{common.yes} + ' OT']]*/ 'Có OT',
            noOt: /*[[#{common.no} + ' OT']]*/ 'Không OT',
            processing: /*[[#{common.loading}]]*/ 'Đang xử lý...',
            search: /*[[#{common.search}]]*/ 'Tìm kiếm:',
            paginate: {
                next: /*[[#{common.next}]]*/ 'Tiếp',
                previous: /*[[#{common.previous}]]*/ 'Trước'
            },
            all: /*[[#{ar.viewarcardrecord.title.quanbu}]]*/ 'Tất cả',
            updateSuccess: /*[[#{alert.message.update_success}]]*/ 'Cập nhật thành công!',
            updateFail: /*[[#{alert.message.update_fail}]]*/ 'Cập nhật thất bại!',
            deleteSuccess: /*[[#{alert.message.delete_success}]]*/ 'Xóa thành công!',
            addSuccess: /*[[#{alert.message.add_success}]]*/ 'Thêm thành công!',
            dtLengthMenu: /*[[#{datatable.lengthMenu}]]*/ 'Hiển thị _MENU_ bản ghi',
            dtZeroRecords: /*[[#{datatable.zeroRecords}]]*/ 'Không tìm thấy dữ liệu',
            dtInfo: /*[[#{datatable.info}]]*/ 'Hiển thị _START_ đến _END_ của _TOTAL_ bản ghi',
            dtInfoEmpty: /*[[#{datatable.infoEmpty}]]*/ 'Hiển thị 0 đến 0 của 0 bản ghi',
            dtInfoFiltered: /*[[#{datatable.infoFiltered}]]*/ '(được lọc từ _MAX_ tổng số bản ghi)'
        };
    </script>
    <script th:inline="none">

        $(document).ready(function () {

            // Get CSRF token
            var csrfToken = $('meta[name="_csrf"]').attr('content');
            var csrfHeader = $('meta[name="_csrf_header"]').attr('content');
            // Initialize DataTable

            try {
                // Check if DataTable already exists and destroy it
                if ($.fn.DataTable.isDataTable('#femaleEmployeesTable')) {
                    $('#femaleEmployeesTable').DataTable().destroy();
                }
                var table = $('#femaleEmployeesTable').DataTable({
                    processing: true,
                    serverSide: true,
                    ajax: {
                        url: '/hrm/empinfo/female-employees',
                        type: 'POST',
                        contentType: 'application/json',
                        beforeSend: function (xhr) {
                            console.log('Sending DataTables request to:', '/hrm/empinfo/female-employees');
                        },
                        headers: (function () {
                            var headers = {
                                'X-Requested-With': 'XMLHttpRequest',
                                'Content-Type': 'application/json'
                            };
                            if (csrfToken && csrfHeader) {
                                headers[csrfHeader] = csrfToken;
                            }
                            return headers;
                        })(),
                        data: function (d) {
                            console.log('DataTables request data before adding search params:', d);

                            // Add search form parameters to searchParams object
                            if (!d.searchParams) {
                                d.searchParams = {};
                            }

                            // Add search form parameters
                            d.searchParams.localName = document.getElementById('searchLocalName').value;
                            d.searchParams.empId = document.getElementById('searchEmpId').value;
                            d.searchParams.deptNo = document.getElementById('searchDeptNo').value;
                            d.searchParams.position = document.getElementById('searchPosition').value;
                            d.searchParams.createDateFrom = document.getElementById('searchCreateDateFrom').value;
                            d.searchParams.createDateTo = document.getElementById('searchCreateDateTo').value;
                            d.searchParams.activity = document.getElementById('searchActivity').value;
                            d.searchParams.otFlag = document.getElementById('searchOtFlag').value;

                            console.log('DataTables request data after adding search params:', d);
                            console.log('Search params:', d.searchParams);

                            var data = JSON.stringify(d);
                            if (csrfToken && csrfHeader) {
                                // Add CSRF token if available
                                var jsonData = JSON.parse(data);
                                jsonData._csrf = csrfToken;
                                data = JSON.stringify(jsonData);
                            }
                            return data;
                        },
                        dataSrc: function (json) {
                            if (json.error) {
                                showError(json.error);
                                return [];
                            }
                            return json.data;
                        },
                        error: function (xhr, error, thrown) {
                            console.error('DataTables AJAX error:', error);
                            console.error('Response text:', xhr.responseText);
                            console.error('Status:', xhr.status);
                            console.error('Status text:', xhr.statusText);
                            showError('Lỗi khi tải dữ liệu: ' + (xhr.responseJSON?.error || thrown));
                        }
                    },
                    columns: [
                        {
                            data: null,
                            orderable: false,
                            searchable: false,
                            render: function (data, type, row, meta) {
                                return meta.row + meta.settings._iDisplayStart + 1;
                            }
                        },
                        {
                            data: 'empId',
                            render: function (data, type, row) {
                                return '<span class="badge bg-info">' + (data || '') + '</span>';
                            }
                        },
                        { data: 'localName', },
                        { data: 'deptNo' },
                        { data: 'position' },
                        {
                            data: 'specialNo',
                            render: function (data, type, row) {
                                return '<span class="badge bg-secondary">' + (data || '') + '</span>';
                            }
                        },
                        {
                            data: 'activity',
                            render: function (data, type, row) {
                                return '<span class="badge bg-success">' + (data || '') + '</span>';
                            }
                        },
                        {
                            data: 'createDate',
                            render: function (data, type, row) {
                                if (data) {
                                    var date = new Date(data);
                                    return '<small>' + date.toLocaleDateString('vi-VN') + ' ' +
                                        date.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' }) + '</small>';
                                }
                                return '<small class="text-muted">-</small>';
                            }
                        },
                        {
                            data: 'startDate',
                            render: function (data, type, row) {
                                if (data) {
                                    var date = new Date(data);
                                    return '<small>' + date.toLocaleDateString('vi-VN') + '</small>';
                                }
                                return '<small class="text-muted">-</small>';
                            }
                        },
                        {
                            data: 'endDate',
                            render: function (data, type, row) {
                                if (data) {
                                    var date = new Date(data);
                                    return '<small>' + date.toLocaleDateString('vi-VN') + '</small>';
                                }
                                return '<small class="text-muted">-</small>';
                            }
                        },
                        {
                            data: 'otFlag',
                            render: function (data, type, row) {
                                if (data === 'Y') {
                                    return '<span class="badge bg-warning">' + messageResources.hasOt + '</span>';
                                } else {
                                    return '<span class="badge bg-light text-dark">' + messageResources.noOt + '</span>';
                                }
                            }
                        },
                        {
                            data: null,
                            orderable: false,
                            searchable: false,
                            render: function (data, type, row) {
                                return '<div class="btn-group btn-group-sm">' +
                                    '<button type="button" class="btn btn-outline-primary" title="Xem chi tiết" onclick="viewEmployee(\'' + row.specialNo + '\')">' +
                                    '<i class="bx bx-show"></i>' +
                                    '</button>' +
                                    '<button type="button" class="btn btn-outline-warning" title="Chỉnh sửa" onclick="editEmployee(\'' + row.specialNo + '\')">' +
                                    '<i class="bx bx-edit"></i>' +
                                    '</button>' +
                                    '<button type="button" class="btn btn-outline-danger" title="Xóa" onclick="deleteEmployee(\'' + row.specialNo + '\')">' +
                                    '<i class="bx bx-trash"></i>' +
                                    '</button>' +
                                    '</div>';
                            }
                        }
                    ],
                    pageLength: 10,
                    order: [[2, 'desc']],
                    lengthMenu: [[10, 25, 50, 100, 999999], [10, 25, 50, 100, messageResources.all]],
                    responsive: true,
                    autoWidth: false,
                    scrollY: "calc(100vh - 80px)",
                    scrollCollapse: true,
                    paging: true,
                    fixedHeader: {
                        header: true,
                        headerOffset: 0
                    },
                    language: {
                        processing: messageResources.processing,
                        lengthMenu: messageResources.dtLengthMenu,
                        zeroRecords: messageResources.dtZeroRecords,
                        info: messageResources.dtInfo,
                        infoEmpty: messageResources.dtInfoEmpty,
                        infoFiltered: messageResources.dtInfoFiltered,
                        search: messageResources.search,
                        paginate: {
                            first: "Đầu",
                            last: "Cuối",
                            next: messageResources.paginate.next,
                            previous: messageResources.paginate.previous
                        }
                    },
                    dom: 'lBfrtip',  // B = buttons, f = filter, r = processing, t = table, i = info, p = pagination
                    buttons: [
                        {
                            extend: 'copy',
                            text: 'Sao chép',
                            className: 'btn btn-sm btn-outline-secondary'
                        },
                        {
                            extend: 'csv',
                            text: 'Xuất CSV',
                            className: 'btn btn-sm btn-outline-success'
                        },
                        {
                            extend: 'excel',
                            text: 'Xuất Excel',
                            className: 'btn btn-sm btn-outline-success'
                        },
                        {
                            extend: 'pdf',
                            text: 'Xuất PDF',
                            className: 'btn btn-sm btn-outline-danger'
                        },
                        {
                            extend: 'print',
                            text: 'In',
                            className: 'btn btn-sm btn-outline-info'
                        }
                    ]
                });

                console.log('DataTable initialized successfully');
                console.log('Scroll height recalculated after render:', getOptimalDataTableHeight());

            } catch (error) {
                console.error('Error initializing DataTable:', error);
                showError('Lỗi khởi tạo DataTable: ' + error.message);
            }

            // Function to show error message
            function showError(message) {
                console.error('Showing error:', message);
                $('#error-text').text(message);
                $('#error-message').removeClass('d-none');
                setTimeout(function () {
                    $('#error-message').addClass('d-none');
                }, 5000);
            }


        });
    </script>

    <!-- Test API Functions - Global Scope -->
    <script>
        // Wait for jQuery to be ready
        $(document).ready(function () {
            console.log('Test functions ready');
            // Search form functions - Global scope

            window.performSearch = function () {
                console.log('Performing search...');

                // Collect search parameters
                const searchParams = {
                    localName: document.getElementById('searchLocalName').value,
                    empId: document.getElementById('searchEmpId').value,
                    deptNo: document.getElementById('searchDeptNo').value,
                    position: document.getElementById('searchPosition').value,
                    createDateFrom: document.getElementById('searchCreateDateFrom').value,
                    createDateTo: document.getElementById('searchCreateDateTo').value,
                    activity: document.getElementById('searchActivity').value,
                    otFlag: document.getElementById('searchOtFlag').value
                };

                console.log('Search parameters:', searchParams);

                // Reload DataTable with search parameters
                if ($.fn.DataTable.isDataTable('#femaleEmployeesTable')) {
                    $('#femaleEmployeesTable').DataTable().ajax.reload();
                }
            };

            window.clearSearch = function () {
                console.log('Clearing search...');

                // Clear all form fields
                document.getElementById('searchLocalName').value = '';
                document.getElementById('searchEmpId').value = '';
                document.getElementById('searchDeptNo').value = '';
                document.getElementById('searchPosition').value = '';
                document.getElementById('searchCreateDateFrom').value = '';
                document.getElementById('searchCreateDateTo').value = '';
                document.getElementById('searchActivity').value = '';
                document.getElementById('searchOtFlag').value = '';

                // Reload DataTable without search parameters
                if ($.fn.DataTable.isDataTable('#femaleEmployeesTable')) {
                    $('#femaleEmployeesTable').DataTable().ajax.reload();
                }
            };

            window.exportSearchResults = function () {
                console.log('Exporting search results...');

                // Get current search parameters
                const searchParams = {
                    localName: document.getElementById('searchLocalName').value,
                    empId: document.getElementById('searchEmpId').value,
                    deptNo: document.getElementById('searchDeptNo').value,
                    position: document.getElementById('searchPosition').value,
                    createDateFrom: document.getElementById('searchCreateDateFrom').value,
                    createDateTo: document.getElementById('searchCreateDateTo').value,
                    activity: document.getElementById('searchActivity').value,
                    otFlag: document.getElementById('searchOtFlag').value
                };

                // Create export URL with parameters
                let exportUrl = '/hrm/empinfo/export?';
                const params = new URLSearchParams();

                Object.keys(searchParams).forEach(key => {
                    if (searchParams[key]) {
                        params.append(key, searchParams[key]);
                    }
                });

                exportUrl += params.toString();

                // Open export URL
                window.open(exportUrl, '_blank');
            };

            // Action functions - Global scope
            // Edit Employee Functions - Global scope
            window.editEmployee = function (specialNo) {
                console.log('Edit employee with specialNo:', specialNo);

                // Show modal (form đã có sẵn từ editEmployee.html)
                $('#editEmployeeModal').modal('show');

                // Load employee data
                loadEmployeeData(specialNo);
            };

            window.loadEmployeeData = function (specialNo) {
                $.ajax({
                    url: '/hrm/empinfo/specialMatter/' + specialNo,
                    type: 'GET',
                    success: function (response) {
                        console.log('Employee data loaded:', response);
                        populateEditForm(response);
                    },
                    error: function (xhr, status, error) {
                        console.error('Error loading employee data:', error);
                        // Hiển thị lỗi trong form có sẵn
                        $('#editEmployeeModal .modal-body').html(`
                            <div class="alert alert-danger">
                                <i class="bx bx-error"></i>
                                Lỗi khi tải thông tin nhân viên: ${error}
                                <div class="mt-2">
                                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                                        <i class="bx bx-x me-1"></i> Đóng
                                    </button>
                                </div>
                            </div>
                        `);
                    }
                });
            };

            window.populateEditForm = function (employee) {
                // Form HTML đã có sẵn từ editEmployee.html, chỉ cần populate dữ liệu
                $('#editPersonId').val(employee.personId || '');
                $('#editEmpId').val(employee.empId || '');
                $('#editLocalName').val(employee.localName || '');
                $('#editDeptNo').val(employee.deptNo || '');
                $('#editPosition').val(employee.position || '');
                $('#editSpecialNo').val(employee.specialNo || '');
                $('#editActivity').val(employee.activity || '1');
                $('#editOtFlag').val(employee.otFlag || '0');
                $('#editSpecialContent').val(employee.specialContent || '');

                // Format dates
                if (employee.startDate) {
                    const startDate = new Date(employee.startDate);
                    $('#editStartDate').val(startDate.toISOString().split('T')[0]);
                }
                if (employee.endDate) {
                    const endDate = new Date(employee.endDate);
                    $('#editEndDate').val(endDate.toISOString().split('T')[0]);
                }
                if (employee.createDate) {
                    const createDate = new Date(employee.createDate);
                    $('#editCreateDate').val(createDate.toISOString().slice(0, 16));
                }
                if (employee.updateDate) {
                    const updateDate = new Date(employee.updateDate);
                    $('#editUpdateDate').val(updateDate.toISOString().slice(0, 16));
                }

                $('#editCreatedBy').val(employee.createdBy || '');
                $('#editUpdatedBy').val(employee.updatedBy || '');
            };

            window.saveEmployeeChanges = function () {
                const formData = {
                    personId: $('#editPersonId').val(),
                    empId: $('#editEmpId').val(),
                    localName: $('#editLocalName').val(),
                    deptNo: $('#editDeptNo').val(),
                    position: $('#editPosition').val(),
                    specialNo: $('#editSpecialNo').val(),
                    activity: $('#editActivity').val(),
                    otFlag: $('#editOtFlag').val(),
                    specialContent: $('#editSpecialContent').val(),
                    startDate: $('#editStartDate').val(),
                    endDate: $('#editEndDate').val()
                };

                console.log('Saving employee changes:', formData);

                $.ajax({
                    url: '/hrm/empinfo/specialMatter/update',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(formData),
                    success: function (response) {
                        console.log('Employee updated successfully:', response);
                        $('#editEmployeeModal').modal('hide');

                        // Show success message
                        showSuccessMessage(messageResources.updateSuccess);

                        // Reload DataTable
                        if ($.fn.DataTable.isDataTable('#femaleEmployeesTable')) {
                            $('#femaleEmployeesTable').DataTable().ajax.reload();
                        }
                    },
                    error: function (xhr, status, error) {
                        console.error('Error updating employee:', error);
                        showErrorMessage(messageResources.updateFail + ': ' + error);
                    }
                });
            };

            window.showSuccessMessage = function (message) {
                // Create success alert
                const alertHtml = `
                    <div class="alert alert-success alert-dismissible fade show" role="alert">
                        <i class="bx bx-check-circle me-2"></i>
                        ${message}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                `;

                // Insert at the top of the card body
                $('.card-body').prepend(alertHtml);

                // Auto dismiss after 5 seconds
                setTimeout(function () {
                    $('.alert-success').fadeOut();
                }, 5000);
            };

            window.showErrorMessage = function (message) {
                // Create error alert
                const alertHtml = `
                    <div class="alert alert-danger alert-dismissible fade show" role="alert">
                        <i class="bx bx-error me-2"></i>
                        ${message}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                `;

                // Insert at the top of the card body
                $('.card-body').prepend(alertHtml);

                // Auto dismiss after 5 seconds
                setTimeout(function () {
                    $('.alert-danger').fadeOut();
                }, 5000);
            };

            window.viewEmployee = function (specialNo) {
                alert('Xem chi tiết nhân viên: ' + specialNo);
                // Implement view functionality
            };

            window.deleteEmployee = function (specialNo) {
                if (confirm('Bạn có chắc chắn muốn xóa nhân viên này? Hành động này không thể hoàn tác!')) {
                    console.log('Deleting employee with personId:', specialNo);

                    $.ajax({
                        url: '/hrm/empinfo/specialMatter/delete/' + specialNo,
                        type: 'DELETE',
                        success: function (response) {
                            console.log('Employee deleted successfully:', response);

                            // Show success message
                            showSuccessMessage(messageResources.deleteSuccess);

                            // Reload DataTable
                            if ($.fn.DataTable.isDataTable('#femaleEmployeesTable')) {
                                $('#femaleEmployeesTable').DataTable().ajax.reload();
                            }
                        },
                        error: function (xhr, status, error) {
                            console.error('Error deleting employee:', error);
                            let errorMessage = 'Lỗi khi xóa nhân viên: ' + error;

                            // Try to get more specific error message
                            if (xhr.responseJSON && xhr.responseJSON.message) {
                                errorMessage = xhr.responseJSON.message;
                            }

                            showErrorMessage(errorMessage);
                        }
                    });
                }
            };

            // Add New Employee Functions
            window.addNewEmployee = function () {
                console.log('Opening add new employee modal');

                // Clear form
                clearAddForm();

                // Show modal
                $('#addEmployeeModal').modal('show');
            };

            window.clearAddForm = function () {
                $('#addEmployeeForm')[0].reset();
                // Set default values
                $('#addActivity').val('1');
                $('#addOtFlag').val('0');
            };

            window.saveNewEmployee = function () {
                // Validate form
                if (!validateAddForm()) {
                    return;
                }

                const formData = {
                    empId: $('#addEmpId').val(),
                    localName: $('#addLocalName').val(),
                    deptNo: $('#addDeptNo').val(),
                    position: $('#addPosition').val(),
                    specialNo: $('#addSpecialNo').val(),
                    activity: $('#addActivity').val(),
                    otFlag: $('#addOtFlag').val(),
                    specialContent: $('#addSpecialContent').val(),
                    startDate: $('#addStartDate').val(),
                    endDate: $('#addEndDate').val()
                };

                console.log('Saving new employee:', formData);

                $.ajax({
                    url: '/hrm/empinfo/specialMatter/add',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(formData),
                    success: function (response) {
                        console.log('Employee added successfully:', response);
                        $('#addEmployeeModal').modal('hide');

                        // Show success message
                        showSuccessMessage(messageResources.addSuccess);

                        // Reload DataTable
                        if ($.fn.DataTable.isDataTable('#femaleEmployeesTable')) {
                            $('#femaleEmployeesTable').DataTable().ajax.reload();
                        }
                    },
                    error: function (xhr, status, error) {
                        console.error('Error adding employee:', error);
                        let errorMessage = 'Lỗi khi thêm mới nhân viên: ' + error;

                        // Try to get more specific error message
                        if (xhr.responseJSON && xhr.responseJSON.message) {
                            errorMessage = xhr.responseJSON.message;
                        }

                        showErrorMessage(errorMessage);
                    }
                });
            };

            window.validateAddForm = function () {
                const empId = $('#addEmpId').val().trim();
                const localName = $('#addLocalName').val().trim();

                if (!empId) {
                    showErrorMessage('Vui lòng chọn nhân viên');
                    $('#addEmpId').focus();
                    return false;
                }

                if (!localName) {
                    showErrorMessage('Vui lòng chọn nhân viên');
                    $('#addLocalName').focus();
                    return false;
                }

                return true;
            };

            // Employee Search Functions - Using Reusable Modal
            window.openEmployeeSearchModal = function () {
                console.log('Opening employee search modal');

                // Configure callback for when employee is selected
                EmployeeSearchModal.open(function (employee) {
                    // Fill the add form with selected employee data
                    $('#addEmpId').val(employee.empId);
                    $('#addLocalName').val(employee.localName);
                    $('#addDeptNo').val(employee.deptNo);
                    $('#addPosition').val(employee.position);

                    console.log('Employee selected:', employee);
                });
            };
        });
    </script>
