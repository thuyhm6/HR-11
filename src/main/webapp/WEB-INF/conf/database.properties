# Oracle Database Configuration
# Database Connection Settings
db.driver=oracle.jdbc.driver.OracleDriver
db.url=${DB_URL:jdbc:oracle:thin:@localhost:1521:orcl}
db.username=${DB_USERNAME:CHANGE_ME}
db.password=${DB_PASSWORD:CHANGE_ME}

# Connection Pool Settings
db.initialSize=5
db.maxActive=20
db.maxIdle=10
db.minIdle=5
db.maxWait=60000

# Connection Validation
db.validationQuery=SELECT 1 FROM DUAL
db.testOnBorrow=true
db.testOnReturn=false
db.testWhileIdle=true
db.timeBetweenEvictionRunsMillis=30000
db.numTestsPerEvictionRun=3
db.minEvictableIdleTimeMillis=60000

# Oracle Specific Settings
db.defaultAutoCommit=true
db.defaultTransactionIsolation=READ_COMMITTED
db.defaultReadOnly=false

# Connection Timeout Settings
db.connectionTimeout=30000
db.socketTimeout=60000
db.loginTimeout=10

# Oracle Performance Settings
db.oracle.jdbc.J2EE13Compliant=true
db.oracle.jdbc.autoCommitSpecCompliant=false
db.oracle.jdbc.implicitStatementCacheSize=20
db.oracle.jdbc.explicitStatementCacheSize=20

# Logging Settings
db.logAbandoned=true
db.removeAbandoned=true
db.removeAbandonedTimeout=300
db.logAbandoned=true

# Additional Oracle Settings
db.oracle.net.CONNECT_TIMEOUT=10000
db.oracle.net.READ_TIMEOUT=30000
db.oracle.jdbc.ReadTimeout=30000
