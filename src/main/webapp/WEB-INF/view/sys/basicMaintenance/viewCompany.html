<div th:fragment="content">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-body">
                    <!-- Search Form -->
                    <form id="companySearchForm" class="row g-3 mb-4">
                        <div class="col-md-4">
                            <label for="companySearchKeyword" class="form-label">Từ khóa (ID, Tên)</label>
                            <input type="text" class="form-control" id="companySearchKeyword"
                                placeholder="Nhập mã hoặc tên công ty">
                        </div>
                        <div class="col-md-8 d-flex align-items-end">
                            <button type="button" class="btn btn-primary me-2" onclick="searchData()">
                                <i class="bx bx-search"></i> Tìm kiếm
                            </button>
                            <button type="button" class="btn btn-secondary me-2" onclick="clearSearch()">
                                <i class="bx bx-x"></i> Xóa lọc
                            </button>
                            <button type="button" class="btn btn-success me-2" onclick="openModal()">
                                <i class="bx bx-plus"></i> Thêm mới
                            </button>
                            <button type="button" class="btn btn-info" onclick="exportExcel()">
                                <i class="bx bx-download"></i> Xuất Excel
                            </button>
                        </div>
                    </form>

                    <!-- Data Table -->
                    <div class="table-responsive">
                        <table id="companyTable" class="table table-striped table-bordered table-hover"
                            style="width:100%">
                            <thead class="table-light">
                                <tr>
                                    <th>STT</th>
                                    <th>Mã ID</th>
                                    <th>Tên TV</th>
                                    <th>Tên TA</th>
                                    <th>Địa chỉ</th>
                                    <th>Điện thoại</th>
                                    <th>Website</th>
                                    <th>Thao tác</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Data loaded via AJAX -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Add/Edit -->
    <div class="modal fade" id="companyModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="companyModalTitle">Thông tin Công ty</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="companyForm">
                        <input type="hidden" id="cpnyNo" name="cpnyNo">
                        <input type="hidden" id="isEditMode" value="false">

                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Mã Công ty (ID) <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="cpnyId" name="cpnyId" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Operation ID</label>
                                <input type="text" class="form-control" id="operationId" name="operationId">
                            </div>

                            <!-- Multilingual Names -->
                            <div class="col-md-6">
                                <label class="form-label">Tên Tiếng Việt <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="companyNameVi" name="nameVi" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Tên Tiếng Anh</label>
                                <input type="text" class="form-control" id="companyNameEn" name="nameEn">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Tên Tiếng Trung</label>
                                <input type="text" class="form-control" id="companyNameZh" name="nameZh">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Tên Tiếng Hàn</label>
                                <input type="text" class="form-control" id="companyNameKo" name="nameKo">
                            </div>

                            <!-- Contact Info -->
                            <div class="col-md-12">
                                <label class="form-label">Địa chỉ</label>
                                <input type="text" class="form-control" id="cpnyAddr" name="cpnyAddr">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Mã bưu điện</label>
                                <input type="text" class="form-control" id="cpnyPostalcode" name="cpnyPostalcode">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Vị trí (Location)</label>
                                <input type="text" class="form-control" id="cpnyLocation" name="cpnyLocation">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Số điện thoại</label>
                                <input type="text" class="form-control" id="cpnyTelNo" name="cpnyTelNo">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Số Fax</label>
                                <input type="text" class="form-control" id="cpnyFaxNo" name="cpnyFaxNo">
                            </div>
                            <div class="col-md-12">
                                <label class="form-label">Website</label>
                                <input type="text" class="form-control" id="cpnyWebAddr" name="cpnyWebAddr">
                            </div>

                            <!-- Descriptions -->
                            <div class="col-md-12">
                                <label class="form-label">Giới thiệu</label>
                                <textarea class="form-control" id="cpnyIntro" name="cpnyIntro" rows="2"></textarea>
                            </div>
                            <div class="col-md-12">
                                <label class="form-label">Lịch sử</label>
                                <textarea class="form-control" id="cpnyHistory" name="cpnyHistory" rows="2"></textarea>
                            </div>

                            <!-- Settings -->
                            <div class="col-md-6">
                                <label class="form-label">Thứ tự</label>
                                <input type="number" class="form-control" id="companyOrderNo" name="orderNo" value="0">
                            </div>
                            <div class="col-md-3">
                                <div class="form-check mt-4">
                                    <input class="form-check-input" type="checkbox" id="ggsYn" name="ggsYn">
                                    <label class="form-check-label" for="ggsYn">Sử dụng GGS</label>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="form-check mt-4">
                                    <input class="form-check-input" type="checkbox" id="companyActivity" name="activity"
                                        checked>
                                    <label class="form-check-label" for="companyActivity">Hoạt động</label>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                    <button type="button" class="btn btn-primary" onclick="saveData()">Lưu</button>
                </div>
            </div>
        </div>
    </div>
</div>

<template id="fragmentScripts">
    <script th:inline="none">
        $(document).ready(function () {
            var table = $('#companyTable').DataTable({
                destroy: true,
                paging: true,
                searching: false, // Custom search handling
                lengthChange: true,
                pageLength: 10,
                processing: true,
                language: {
                    url: '//cdn.datatables.net/plug-ins/1.10.25/i18n/Vietnamese.json'
                },
                ajax: {
                    url: '/sys/api/company/list',
                    dataSrc: '',
                    data: function (d) {
                        d.keyword = $('#companySearchKeyword').val();
                    }
                },
                columns: [
                    {
                        data: null,
                        render: function (data, type, row, meta) {
                            return meta.row + 1;
                        }
                    },
                    { data: 'cpnyId' },
                    { data: 'nameVi' },
                    { data: 'nameEn' },
                    { data: 'cpnyAddr' },
                    { data: 'cpnyTelNo' },
                    { data: 'cpnyWebAddr' },
                    {
                        data: null,
                        className: "text-center",
                        render: function (data, type, row) {
                            // Pass single quoted string params to avoid syntax errors if strings contain characters
                            // Using data attributes or storing object is safer but simple escaping works for IDs
                            return '<button class="btn btn-warning btn-sm me-1" onclick="editData(this)"><i class="bx bx-edit"></i></button>' +
                                '<button class="btn btn-danger btn-sm" onclick="deleteData(\'' + row.cpnyNo + '\')"><i class="bx bx-trash"></i></button>';
                        }
                    }
                ]
            });

            window.searchData = function () {
                table.ajax.reload();
            };

            window.clearSearch = function () {
                $('#companySearchForm')[0].reset();
                table.ajax.reload();
            };

            window.exportExcel = function () {
                window.location.href = '/sys/api/company/export';
            };

            window.openModal = function () {
                $('#companyForm')[0].reset();
                $('#cpnyId').prop('readonly', false);
                $('#cpnyNo').val('');
                $('#isEditMode').val('false');
                $('#companyModalTitle').text('Thêm mới Công ty');

                var modal = new bootstrap.Modal(document.getElementById('companyModal'));
                modal.show();
            };

            window.editData = function (btn) {
                var row = table.row($(btn).parents('tr')).data();

                $('#cpnyId').val(row.cpnyId).prop('readonly', true);
                $('#cpnyNo').val(row.cpnyNo);
                $('#operationId').val(row.operationId);

                $('#companyNameVi').val(row.nameVi);
                $('#companyNameEn').val(row.nameEn);
                $('#companyNameZh').val(row.nameZh);
                $('#companyNameKo').val(row.nameKo);

                $('#cpnyAddr').val(row.cpnyAddr);
                $('#cpnyPostalcode').val(row.cpnyPostalcode);
                $('#cpnyLocation').val(row.cpnyLocation);
                $('#cpnyTelNo').val(row.cpnyTelNo);
                $('#cpnyFaxNo').val(row.cpnyFaxNo);
                $('#cpnyWebAddr').val(row.cpnyWebAddr);

                $('#cpnyIntro').val(row.cpnyIntro);
                $('#cpnyHistory').val(row.cpnyHistory);

                $('#companyOrderNo').val(row.orderNo);
                $('#ggsYn').prop('checked', row.ggsYn === 'Y');
                $('#companyActivity').prop('checked', row.activity === '1');

                $('#isEditMode').val('true');
                $('#companyModalTitle').text('Cập nhật Công ty');

                var modal = new bootstrap.Modal(document.getElementById('companyModal'));
                modal.show();
            };

            window.saveData = function () {
                if (!$('#companyForm')[0].checkValidity()) {
                    $('#companyForm')[0].reportValidity();
                    return;
                }

                var data = {
                    cpnyId: $('#cpnyId').val(),
                    cpnyNo: $('#cpnyNo').val(),
                    operationId: $('#operationId').val(),
                    nameVi: $('#companyNameVi').val(),
                    nameEn: $('#companyNameEn').val(),
                    nameZh: $('#companyNameZh').val(),
                    nameKo: $('#companyNameKo').val(),
                    cpnyAddr: $('#cpnyAddr').val(),
                    cpnyPostalcode: $('#cpnyPostalcode').val(),
                    cpnyLocation: $('#cpnyLocation').val(),
                    cpnyTelNo: $('#cpnyTelNo').val(),
                    cpnyFaxNo: $('#cpnyFaxNo').val(),
                    cpnyWebAddr: $('#cpnyWebAddr').val(),
                    cpnyIntro: $('#cpnyIntro').val(),
                    cpnyHistory: $('#cpnyHistory').val(),
                    orderNo: $('#companyOrderNo').val(),
                    ggsYn: $('#ggsYn').is(':checked') ? 'Y' : 'N',
                    activity: $('#companyActivity').is(':checked') ? '1' : '0'
                };

                $.ajax({
                    url: '/sys/api/company/save',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(data),
                    success: function (res) {
                        if (res.success) {
                            if (typeof toastr !== 'undefined') toastr.success(res.message);
                            else alert(res.message);

                            var modalEl = document.getElementById('companyModal');
                            var modal = bootstrap.Modal.getInstance(modalEl);
                            modal.hide();

                            table.ajax.reload();
                        } else {
                            if (typeof toastr !== 'undefined') toastr.error(res.message);
                            else alert(res.message);
                        }
                    },
                    error: function (xhr) {
                        if (typeof toastr !== 'undefined') toastr.error('Lỗi hệ thống');
                        else alert('Lỗi hệ thống');
                    }
                });
            };

            window.deleteData = function (cpnyNo) {
                if (!confirm('Bạn có chắc muốn xóa công ty này?')) return;

                $.ajax({
                    url: '/sys/api/company/delete',
                    type: 'POST',
                    data: { cpnyNo: cpnyNo },
                    success: function (res) {
                        if (res.success) {
                            if (typeof toastr !== 'undefined') toastr.success(res.message);
                            else alert(res.message);
                            table.ajax.reload();
                        } else {
                            if (typeof toastr !== 'undefined') toastr.error(res.message);
                            else alert(res.message);
                        }
                    }
                });
            };
        });
    </script>
</template>
