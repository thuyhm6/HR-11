<div th:fragment="content">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-body">
                    <!-- Search Form -->
                    <form id="searchForm" class="row g-3 mb-4">
                        <div class="col-md-3">
                            <label for="searchEmpId" class="form-label">Mã nhân viên</label>
                            <input type="text" class="form-control" id="searchEmpId" placeholder="Nhập mã nhân viên">
                        </div>
                        <div class="col-md-3">
                            <label for="searchLocalName" class="form-label">Tên nhân viên</label>
                            <input type="text" class="form-control" id="searchLocalName"
                                placeholder="Nhập tên nhân viên">
                        </div>
                        <div class="col-md-3">
                            <label for="searchEmerName" class="form-label">Tên người liên hệ</label>
                            <input type="text" class="form-control" id="searchEmerName"
                                placeholder="Nhập tên người liên hệ">
                        </div>
                        <div class="col-md-3 d-flex align-items-end">
                            <button type="button" class="btn btn-primary me-2" onclick="searchData()">
                                <i class="bx bx-search"></i> Tìm kiếm
                            </button>
                            <button type="button" class="btn btn-secondary" onclick="clearSearch()">
                                <i class="bx bx-x"></i> Xóa lọc
                            </button>
                            <button type="button" class="btn btn-success ms-2" onclick="openModal()">
                                <i class="bx bx-plus"></i> Thêm mới
                            </button>
                        </div>
                    </form>

                    <!-- Data Table -->
                    <div class="table-responsive">
                        <table id="emergencyTable" class="table table-striped table-bordered table-hover"
                            style="width:100%">
                            <thead class="table-light">
                                <tr>
                                    <th>STT</th>
                                    <th>Mã NV</th>
                                    <th>Họ tên</th>
                                    <th>Tên người liên hệ</th>
                                    <th>Quan hệ</th>
                                    <th>SĐT</th>
                                    <th>Di động</th>
                                    <th>Email</th>
                                    <th>Địa chỉ</th>
                                    <th>Quốc gia</th>
                                    <th class="text-center" style="width: 100px;">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Data loaded via AJAX -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal Thêm/Sửa -->
<div class="modal fade" id="emergencyModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Thông tin địa chỉ khẩn cấp</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="emergencyForm">
                    <input type="hidden" id="emergencyNo" name="emergencyNo">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label for="empNameDisplay" class="form-label">Nhân viên <span
                                    class="text-danger">*</span></label>
                            <div class="input-group">
                                <input type="text" class="form-control" id="empNameDisplay"
                                    placeholder="Chọn nhân viên..." readonly required>
                                <input type="hidden" id="personId" name="personId">
                                <button class="btn btn-outline-primary" type="button"
                                    onclick="openEmployeeSearchPopup()">
                                    <i class="bx bx-search"></i>
                                </button>
                            </div>
                        </div>

                        <div class="col-md-4">
                            <label for="emerName" class="form-label">Tên người liên hệ <span
                                    class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="emerName" name="emerName" required>
                        </div>

                        <div class="col-md-4">
                            <label for="emerTypeCode" class="form-label">Quan hệ</label>
                            <input type="text" class="form-control" id="emerTypeCode" name="emerTypeCode">
                        </div>

                        <div class="col-md-3">
                            <label for="emerPhone" class="form-label">Điện thoại</label>
                            <input type="text" class="form-control" id="emerPhone" name="emerPhone">
                        </div>
                        <div class="col-md-3">
                            <label for="emerCellphone" class="form-label">Di động</label>
                            <input type="text" class="form-control" id="emerCellphone" name="emerCellphone">
                        </div>
                        <div class="col-md-3">
                            <label for="emerWorkPhone" class="form-label">Điện thoại công ty</label>
                            <input type="text" class="form-control" id="emerWorkPhone" name="emerWorkPhone">
                        </div>
                        <div class="col-md-3">
                            <label for="emerPhoneSecond" class="form-label">Điện thoại khác</label>
                            <input type="text" class="form-control" id="emerPhoneSecond" name="emerPhoneSecond">
                        </div>

                        <div class="col-md-4">
                            <label for="emerEmail" class="form-label">Email</label>
                            <input type="email" class="form-control" id="emerEmail" name="emerEmail">
                        </div>

                        <div class="col-md-4">
                            <label for="emerAddress" class="form-label">Địa chỉ</label>
                            <input type="text" class="form-control" id="emerAddress" name="emerAddress">
                        </div>
                        <div class="col-md-4">
                            <label for="nationality" class="form-label">Quốc gia</label>
                            <input type="text" class="form-control" id="nationality" name="nationality">
                        </div>

                        <div class="col-md-6">
                            <label for="mainContactAddress" class="form-label">Địa chỉ liên hệ chính</label>
                            <input type="text" class="form-control" id="mainContactAddress" name="mainContactAddress">
                        </div>

                        <div class="col-md-3">
                            <label class="form-label">VP liên lạc chính</label>
                            <select class="form-select" id="mainLiaisonOffice" name="mainLiaisonOffice">
                                <option value="N">Không</option>
                                <option value="Y">Có</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Là ĐC khẩn cấp chính</label>
                            <select class="form-select" id="isEmergencyAddress" name="isEmergencyAddress">
                                <option value="0">Không</option>
                                <option value="1">Có</option>
                            </select>
                        </div>

                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                <button type="button" class="btn btn-primary" onclick="saveData()">Lưu</button>
            </div>
        </div>
    </div>
</div>

<template id="fragmentScripts">
    <script th:inline="javascript">
        $(document).ready(function () {
            var table = $('#emergencyTable').DataTable({
                destroy: true,
                scrollY: "calc(100vh - 280px)",
                scrollCollapse: true,
                paging: true,
                searching: true,
                lengthChange: true,
                pageLength: 20,
                columnDefs: [
                    { "width": "2%", "targets": 0 },
                ],
                processing: true,

                dom: 'Blfrtip',
                buttons: [
                    'copy', 'csv', 'excel', 'pdf', 'print'
                ],
                ajax: {
                    url: '/hrm/empinfo/api/emergency-address',
                    dataSrc: '',
                    data: function (d) {
                        d.empId = $('#searchEmpId').val();
                        d.localName = $('#searchLocalName').val();
                        d.emerName = $('#searchEmerName').val();
                    }
                },
                columns: [
                    {
                        data: null,
                        render: function (data, type, row, meta) {
                            return meta.row + 1;
                        }
                    },
                    { data: 'empId' },
                    { data: 'localName' },
                    { data: 'emerName' },
                    { data: 'emerTypeCode' },
                    { data: 'emerPhone' },
                    { data: 'emerCellphone' },
                    { data: 'emerEmail' },
                    { data: 'emerAddress' },
                    { data: 'nationality' },
                    {
                        data: null,
                        className: "text-center",
                        render: function (data, type, row) {
                            return `
                                <div class="btn-group btn-group-sm">
                                    <button class="btn btn-warning" onclick="editRaw(${row.emergencyNo})">
                                        <i class="bx bx-edit"></i>
                                    </button>
                                    <button class="btn btn-danger" onclick="deleteRaw(${row.emergencyNo})">
                                        <i class="bx bx-trash"></i>
                                    </button>
                                </div>
                            `;
                        }
                    }
                ]
            });

            window.searchData = function () {
                table.ajax.reload();
            };

            window.clearSearch = function () {
                $('#searchForm')[0].reset();
                table.ajax.reload();
            };

            // Mở modal thêm mới
            window.openModal = function () {
                $('#modalTitle').text('Thêm mới ĐC Khẩn cấp');
                $('#emergencyForm')[0].reset();
                $('#emergencyNo').val('');
                $('#personId').val('');
                $('#mainLiaisonOffice').val('N');
                $('#isEmergencyAddress').val('0');
                var modal = new bootstrap.Modal(document.getElementById('emergencyModal'));
                modal.show();
            };

            // Mở popup tìm kiếm nhân viên
            window.openEmployeeSearchPopup = function () {
                if (typeof EmployeeSearchModal !== 'undefined') {
                    EmployeeSearchModal.open(function (employee) {
                        $('#personId').val(employee.personId);
                        $('#empNameDisplay').val(employee.empId + ' - ' + employee.localName);
                    });
                } else {
                    alert('Component tìm kiếm nhân viên chưa được tải!');
                }
            };

            // Sửa
            window.editRaw = function (id) {
                $.ajax({
                    url: '/hrm/empinfo/api/emergency-address/' + id,
                    type: 'GET',
                    success: function (data) {
                        $('#modalTitle').text('Cập nhật ĐC Khẩn cấp');
                        // Populate form fields
                        $('#emergencyNo').val(data.emergencyNo);
                        $('#personId').val(data.personId);
                        $('#empNameDisplay').val((data.empId || '') + ' - ' + (data.localName || ''));

                        $('#emerName').val(data.emerName);
                        $('#emerTypeCode').val(data.emerTypeCode);
                        $('#emerPhone').val(data.emerPhone);
                        $('#emerCellphone').val(data.emerCellphone);
                        $('#emerWorkPhone').val(data.emerWorkPhone);
                        $('#emerPhoneSecond').val(data.emerPhoneSecond);
                        $('#emerEmail').val(data.emerEmail);
                        $('#emerAddress').val(data.emerAddress);
                        $('#nationality').val(data.nationality);
                        $('#mainContactAddress').val(data.mainContactAddress);

                        $('#mainLiaisonOffice').val(data.mainLiaisonOffice || 'N');
                        $('#isEmergencyAddress').val(data.isEmergencyAddress || '0');

                        var modal = new bootstrap.Modal(document.getElementById('emergencyModal'));
                        modal.show();
                    },
                    error: function (err) {
                        if (typeof toastr !== 'undefined') toastr.error('Lỗi khi lấy thông tin: ' + (err.responseJSON ? err.responseJSON.error : err.responseText));
                        else alert('Lỗi khi lấy thông tin: ' + (err.responseJSON ? err.responseJSON.error : err.responseText));
                    }
                });
            };

            // Lưu dữ liệu
            window.saveData = function () {
                // Validate cơ bản
                if (!$('#personId').val() || !$('#emerName').val()) {
                    if (typeof toastr !== 'undefined') toastr.warning('Vui lòng điền đủ: Nhân viên, Tên người liên hệ');
                    else alert('Vui lòng điền đủ: Nhân viên, Tên người liên hệ');
                    return;
                }

                var formData = {
                    emergencyNo: $('#emergencyNo').val() || null,
                    personId: $('#personId').val(),
                    emerName: $('#emerName').val(),
                    emerTypeCode: $('#emerTypeCode').val(),
                    emerPhone: $('#emerPhone').val(),
                    emerCellphone: $('#emerCellphone').val(),
                    emerWorkPhone: $('#emerWorkPhone').val(),
                    emerPhoneSecond: $('#emerPhoneSecond').val(),
                    emerEmail: $('#emerEmail').val(),
                    emerAddress: $('#emerAddress').val(),
                    nationality: $('#nationality').val(),
                    mainContactAddress: $('#mainContactAddress').val(),
                    mainLiaisonOffice: $('#mainLiaisonOffice').val(),
                    isEmergencyAddress: $('#isEmergencyAddress').val()
                };

                $.ajax({
                    url: '/hrm/empinfo/api/emergency-address/save',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(formData),
                    success: function (res) {
                        if (typeof toastr !== 'undefined') toastr.success(res.message || 'Lưu thành công');
                        else alert(res.message || 'Lưu thành công');

                        var modalEl = document.getElementById('emergencyModal');
                        var modal = bootstrap.Modal.getInstance(modalEl);
                        if (modal) {
                            modal.hide();
                        } else {
                            $(modalEl).modal('hide');
                        }

                        table.ajax.reload();
                    },
                    error: function (err) {
                        var errorMsg = (err.responseJSON && err.responseJSON.error) ? err.responseJSON.error : (err.responseText || "Lỗi không xác định");
                        if (typeof toastr !== 'undefined') toastr.error('Lỗi khi lưu: ' + errorMsg);
                        else alert('Lỗi khi lưu: ' + errorMsg);
                    }
                });
            };

            // Xóa
            window.deleteRaw = function (id) {
                if (confirm('Bạn có chắc chắn muốn xóa bản ghi này?')) {
                    $.ajax({
                        url: '/hrm/empinfo/api/emergency-address/delete/' + id,
                        type: 'DELETE',
                        success: function (res) {
                            if (typeof toastr !== 'undefined') toastr.success(res.message || 'Xóa thành công');
                            else alert(res.message || 'Xóa thành công');
                            table.ajax.reload();
                        },
                        error: function (err) {
                            var errorMsg = (err.responseJSON && err.responseJSON.error) ? err.responseJSON.error : (err.responseText || "Lỗi không xác định");
                            if (typeof toastr !== 'undefined') toastr.error('Lỗi khi xóa: ' + errorMsg);
                            else alert('Lỗi khi xóa: ' + errorMsg);
                        }
                    });
                }
            };
        });
    </script>
</template>
