<div th:fragment="content">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-body">
                    <form id="imp_searchForm" class="row g-3 mb-3">
                        <div class="col-md-2 d-flex align-items-end">
                            <div class="form-text fw-bold mb-2">Tổng số hàng: <span id="imp_totalRows">0</span></div>
                        </div>
                        <div class="col-md-2 d-flex align-items-end">
                            <div class="form-text fw-bold mb-2">Số hàng lỗi: <span id="imp_errorRows">0</span></div>
                        </div>
                        <div class="col-md-3">
                            <label for="imp_errorOnly" class="form-label">Gặp lỗi hay không</label>
                            <select id="imp_errorOnly" class="form-select">
                                <option value="">Tất cả</option>
                                <option value="Y">Chỉ hiển thị dòng lỗi</option>
                                <option value="N">Chỉ hiển thị dòng hợp lệ</option>
                            </select>
                        </div>
                        <div class="col-md-3 d-flex align-items-end gap-2">
                            <button type="button" class="btn btn-primary" onclick="impSearch()">
                                <i class="bx bx-search"></i> Tra cứu
                            </button>
                            <button type="button" class="btn btn-success" id="imp_saveBtn" onclick="impSave(this)">
                                <i class="bx bx-save"></i> Lưu
                            </button>
                        </div>
                    </form>

                    <div class="table-responsive">
                        <table id="imp_resultTable" class="table table-striped table-bordered table-hover"
                            style="min-width: 1800px;">
                            <thead class="table-light text-center align-middle">
                                <tr>
                                    <th>Line</th>
                                    <th>Họ tên</th>
                                    <th>Mã nhân viên</th>
                                    <th>Phòng ban</th>
                                    <th>Phân loại</th>
                                    <th>Ngày bắt đầu</th>
                                    <th>Thời gian bắt đầu</th>
                                    <th>Ngày kết thúc</th>
                                    <th>Thời gian kết thúc</th>
                                    <th>Thời lượng</th>
                                    <th>Lý do</th>
                                    <th>Trạng thái duyệt</th>
                                    <th>Kết quả kiểm chứng</th>
                                    <th>Người tải</th>
                                    <th>Thời gian</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<template id="fragmentScripts">
    <script th:inline="javascript">
        var _imp_table = null;
        var _imp_pageBooted = false;

        function impSafeText(value) {
            return value == null ? '' : value;
        }

        function impUpdateCounter(rows) {
            var list = rows || [];
            var errorCount = list.filter(function (item) {
                return item && item.uploadErrorMsg && String(item.uploadErrorMsg).trim() !== '';
            }).length;
            $('#imp_totalRows').text(list.length);
            $('#imp_errorRows').text(errorCount);
        }

        function impInitTable() {
            _imp_table = $('#imp_resultTable').DataTable({
                destroy: true,
                scrollX: true,
                scrollY: "calc(100vh - 290px)",
                scrollCollapse: true,
                paging: true,
                searching: false,
                lengthChange: true,
                pageLength: 25,
                processing: true,
                order: [],
                ajax: {
                    url: '/ar/attendanceMintenance/api/leaveApply/importTemp/list',
                    dataSrc: function (json) {
                        var rows = json || [];
                        impUpdateCounter(rows);
                        return rows;
                    },
                    data: function (d) {
                        d.errorOnly = $('#imp_errorOnly').val();
                    }
                },
                columns: [
                    { data: 'lineId', className: 'text-center' },
                    { data: 'applyName', render: function (data) { return impSafeText(data); } },
                    { data: 'empId', className: 'text-center', render: function (data) { return impSafeText(data); } },
                    { data: 'deptName', className: 'text-center', render: function (data) { return impSafeText(data); } },
                    { data: 'leaveTypeName', className: 'text-center', render: function (data) { return impSafeText(data); } },
                    { data: 'leaveFromDate', className: 'text-center', render: function (data) { return impSafeText(data); } },
                    { data: 'leaveFromTime', className: 'text-center', render: function (data) { return impSafeText(data); } },
                    { data: 'leaveToDate', className: 'text-center', render: function (data) { return impSafeText(data); } },
                    { data: 'leaveToTime', className: 'text-center', render: function (data) { return impSafeText(data); } },
                    { data: 'applyLength', className: 'text-center', render: function (data) { return impSafeText(data); } },
                    { data: 'leaveReason', render: function (data) { return impSafeText(data); } },
                    { data: 'affirmFlagName', className: 'text-center', render: function (data) { return impSafeText(data); } },
                    { data: 'uploadErrorMsg', render: function (data) { return impSafeText(data); } },
                    { data: 'uploadBy', className: 'text-center', render: function (data) { return impSafeText(data); } },
                    { data: 'uploadDate', className: 'text-center', render: function (data) { return impSafeText(data); } }
                ]
            });
        }

        function impBootPage() {
            if (_imp_pageBooted) {
                return;
            }
            if (!document.getElementById('imp_resultTable')) {
                setTimeout(impBootPage, 30);
                return;
            }
            _imp_pageBooted = true;
            impInitTable();
        }

        window.impSearch = function () {
            if (_imp_table) {
                _imp_table.ajax.reload();
            }
        };

        function impGetCurrentTabId() {
            var tableEl = document.getElementById('imp_resultTable');
            if (!tableEl) {
                return '';
            }
            var pane = tableEl.closest('.tab-pane');
            return pane ? pane.id : '';
        }

        function impBackToLeaveManagement() {
            var currentTabId = impGetCurrentTabId();

            if (currentTabId && typeof tabSystem.closeTab === 'function') {
                tabSystem.closeTab(currentTabId);
            }
            return;

        }

        window.impSave = function (btn) {
            var $btn = $(btn || '#imp_saveBtn');
            if ($btn.prop('disabled')) {
                return;
            }

            var originalHtml = $btn.html();
            $btn.prop('disabled', true).html('<i class="bx bx-loader bx-spin"></i> Đang lưu');

            $.ajax({
                url: '/ar/attendanceMintenance/api/leaveApply/importTemp/save',
                type: 'POST',
                success: function (res) {
                    $btn.prop('disabled', false).html(originalHtml);
                    if (res && res.success) {
                        toastr && toastr.success(res.message || 'Lưu thành công');
                        impBackToLeaveManagement();
                        return;
                    }
                    toastr && toastr.error((res && (res.error || res.message)) || 'Lưu thất bại');
                },
                error: function () {
                    $btn.prop('disabled', false).html(originalHtml);
                    toastr && toastr.error('Lỗi kết nối khi lưu dữ liệu');
                }
            });
        };

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', impBootPage);
        }
        if (typeof $ !== 'undefined') {
            $(document).ready(impBootPage);
        } else {
            impBootPage();
        }
    </script>
</template>
