<div th:fragment="content">

    <!-- ===== Toolbar ===== -->
    <div id="esscal_toolbar" class="ccal-toolbar">
        <div class="ccal-nav">
            <button class="ccal-nav-btn" id="esscal_prevMonth"
                    th:title="#{esscal.nav.prevMonth}" title="Tháng trước">
                <i class="bx bx-chevron-left"></i>
            </button>
            <select id="esscal_monthSel" class="ccal-combo">
                <option value="1"  th:text="#{common.month.01}">Tháng 01</option>
                <option value="2"  th:text="#{common.month.02}">Tháng 02</option>
                <option value="3"  th:text="#{common.month.03}">Tháng 03</option>
                <option value="4"  th:text="#{common.month.04}">Tháng 04</option>
                <option value="5"  th:text="#{common.month.05}">Tháng 05</option>
                <option value="6"  th:text="#{common.month.06}">Tháng 06</option>
                <option value="7"  th:text="#{common.month.07}">Tháng 07</option>
                <option value="8"  th:text="#{common.month.08}">Tháng 08</option>
                <option value="9"  th:text="#{common.month.09}">Tháng 09</option>
                <option value="10" th:text="#{common.month.10}">Tháng 10</option>
                <option value="11" th:text="#{common.month.11}">Tháng 11</option>
                <option value="12" th:text="#{common.month.12}">Tháng 12</option>
            </select>
            <select id="esscal_yearSel" class="ccal-combo ccal-year"></select>
            <button class="ccal-nav-btn" id="esscal_nextMonth"
                    th:title="#{esscal.nav.nextMonth}" title="Tháng sau">
                <i class="bx bx-chevron-right"></i>
            </button>
        </div>
        <div class="ccal-actions">
            <button class="ccal-btn ccal-btn-default" onclick="esscalLoad()">
                <i class="bx bx-refresh"></i>
                <span th:text="#{button.search}">Tra cứu</span>
            </button>
        </div>
    </div>

    <!-- ===== Calendar ===== -->
    <div id="esscal_gridWrap" class="ccal-grid-wrap">
        <div class="ccal-hrow">
            <div class="ccal-hcell ccal-col-sun"><i class="bx bxs-sun"></i> <span th:text="#{common.day.sun}">CN</span></div>
            <div class="ccal-hcell" th:text="#{common.day.mon}">T2</div>
            <div class="ccal-hcell" th:text="#{common.day.tue}">T3</div>
            <div class="ccal-hcell" th:text="#{common.day.wed}">T4</div>
            <div class="ccal-hcell" th:text="#{common.day.thu}">T5</div>
            <div class="ccal-hcell" th:text="#{common.day.fri}">T6</div>
            <div class="ccal-hcell ccal-col-sat"><i class="bx bxs-star"></i> <span th:text="#{common.day.sat}">T7</span></div>
        </div>
        <div id="esscal_body"></div>
    </div>

    <!-- ===== Legend ===== -->
    <div class="ccal-legend">
        <span class="ccal-legend-item"><span class="ccal-legend-dot ccal-lg-work"></span> <span th:text="#{esscal.legend.workDay}">Ngày làm việc</span></span>
        <span class="ccal-legend-item"><span class="ccal-legend-dot ccal-lg-rest"></span> <span th:text="#{esscal.legend.restDay}">Ngày nghỉ</span></span>
        <span class="ccal-legend-item"><span class="ccal-legend-dot ccal-lg-holiday"></span> <span th:text="#{esscal.legend.holiday}">Ngày lễ</span></span>
        <span class="ccal-legend-item"><span class="ccal-legend-dot ccal-lg-today"></span> <span th:text="#{esscal.legend.today}">Hôm nay</span></span>
    </div>

    <!-- ===== Modal Chi Tiết Ngày (chỉ hiện khi sysMode != 'ess') ===== -->
    <div class="modal fade" id="esscal_dayModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <div class="modal-header py-2">
                    <h6 class="modal-title mb-0" id="esscal_dayModalTitle" th:text="#{esscal.modal.dayDetail}">Chi tiết ngày</h6>
                    <button class="btn-close btn-sm" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body py-2" id="esscal_dayModalBody"></div>
                <div class="modal-footer py-2">
                    <button class="btn btn-sm btn-secondary" data-bs-dismiss="modal" th:text="#{button.close}">Đóng</button>
                </div>
            </div>
        </div>
    </div>

</div>

<template id="fragmentScripts">
    <script th:inline="javascript">
        /* ===========================
           ESS Lịch làm việc — prefix: esscal
           Tái sử dụng API + CSS ccal-* từ /ar/attendanceSettings/viewEmpCalendar
           =========================== */

        var _esscal_initialized = false;
        var _esscal_personId    = '';
        /* Đọc từ window.sysMode (do topbar set khi load dashboard), fallback 'ess' */
        var _esscal_sysMode     = (typeof sysMode !== 'undefined' && sysMode) ? sysMode : 'ess';
        var _esscal_recordMap   = {};

        /* Chặn click bằng CSS ngay lập tức — không thể bypass dù onclick có trên element */
        (function () {
            if (_esscal_sysMode !== 'hrm') {
                var s = document.getElementById('esscal-no-click-css') || document.createElement('style');
                s.id  = 'esscal-no-click-css';
                s.textContent = '#esscal_gridWrap .ccal-day{pointer-events:none!important;cursor:default!important;}';
                if (!s.parentNode) document.head.appendChild(s);
            } else {
                var old = document.getElementById('esscal-no-click-css');
                if (old) old.parentNode.removeChild(old);
            }
        })();

        var _esscal_i18n = {
            loading:       /*[[#{esscal.msg.loading}]]*/ 'Đang tải...',
            loadError:     /*[[#{esscal.msg.loadError}]]*/ 'Lỗi tải lịch!',
            noCalData:     /*[[#{esscal.msg.noCalData}]]*/ 'Không có dữ liệu lịch trong tháng này.',
            empNotFound:   /*[[#{esscal.msg.empNotFound}]]*/ 'Không tìm thấy thông tin nhân viên.',
            loadEmpFailed: /*[[#{esscal.msg.loadEmpFailed}]]*/ 'Không lấy được thông tin nhân viên!',
            statusHoliday: /*[[#{esscal.status.holiday}]]*/ 'Ngày lễ',
            statusRest:    /*[[#{esscal.status.rest}]]*/ 'Nghỉ',
            statusWork:    /*[[#{esscal.status.work}]]*/ 'Làm việc',
            tagWeekend:    /*[[#{esscal.status.weekend}]]*/ 'Cuối tuần',
            tagWeekday:    /*[[#{esscal.status.weekday}]]*/ 'Ngày thường',
            tagHoliday:    /*[[#{esscal.status.holidayStar}]]*/ '★ Lễ',
            adminShift:    /*[[#{esscal.status.adminShift}]]*/ 'Ca hành chính'
        };

        /* Inject CSS ccal-* nếu chưa có (dùng chung với viewEmpCalendar gốc) */
        (function () {
            if (document.getElementById('ccal-injected-css')
                || document.getElementById('ecal-extra-css')
                || document.getElementById('esscal-css')) return;
            var css = document.createElement('style');
            css.id = 'esscal-css';
            css.textContent =
                '@keyframes ccal-fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}'
                + '@keyframes ccal-pulse{0%,100%{box-shadow:0 0 0 0 rgba(59,130,246,.4)}50%{box-shadow:0 0 0 6px rgba(59,130,246,0)}}'
                + '@keyframes ccal-slideDown{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}'
                + '.ccal-toolbar{display:flex;align-items:center;flex-wrap:wrap;gap:10px;'
                + 'background:linear-gradient(135deg,#f8fafc 0%,#e2e8f0 100%);'
                + 'border:1px solid #cbd5e1;border-radius:8px 8px 0 0;padding:8px 14px;'
                + 'box-shadow:0 1px 3px rgba(0,0,0,.06);}'
                + '.ccal-nav{display:flex;align-items:center;gap:4px;margin:0 auto;}'
                + '.ccal-nav-btn{background:#fff;border:1px solid #cbd5e1;border-radius:6px;padding:4px 10px;'
                + 'font-size:.85rem;cursor:pointer;color:#475569;transition:all .2s;line-height:1;}'
                + '.ccal-nav-btn:hover{background:#3b82f6;color:#fff;border-color:#3b82f6;transform:scale(1.05);}'
                + '.ccal-combo{font-size:.82rem;height:32px;padding:4px 6px;border:1px solid #cbd5e1;'
                + 'border-radius:6px;background:#fff;outline:none;transition:border-color .2s;}'
                + '.ccal-combo:focus{border-color:#3b82f6;}.ccal-year{width:78px;}'
                + '.ccal-actions{display:flex;gap:6px;}'
                + '.ccal-btn{padding:5px 12px;font-size:.78rem;border-radius:6px;border:none;cursor:pointer;'
                + 'font-weight:600;transition:all .2s;display:inline-flex;align-items:center;gap:4px;}'
                + '.ccal-btn:active{transform:scale(.96);}'
                + '.ccal-btn-default{background:#fff;border:1px solid #cbd5e1;color:#475569;}'
                + '.ccal-btn-default:hover{background:#f1f5f9;}'
                + '.ccal-btn-success{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;'
                + 'box-shadow:0 2px 6px rgba(22,163,74,.3);}'
                + '.ccal-btn-success:hover{background:linear-gradient(135deg,#16a34a,#15803d);}'
                + '.ccal-grid-wrap{border:1px solid #cbd5e1;border-top:none;border-radius:0 0 8px 8px;overflow:hidden;box-shadow:0 4px 12px rgba(0,0,0,.06);}'
                + '.ccal-hrow{display:grid;grid-template-columns:repeat(7,1fr);background:linear-gradient(135deg,#1e293b 0%,#334155 100%);}'
                + '.ccal-hcell{padding:8px;text-align:center;font-weight:700;font-size:.82rem;color:#e2e8f0;letter-spacing:.5px;border-right:1px solid rgba(255,255,255,.08);}'
                + '.ccal-hcell:last-child{border-right:none;}'
                + '.ccal-col-sun{color:#fca5a5 !important;}.ccal-col-sat{color:#86efac !important;}'
                + '.ccal-week{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid #e2e8f0;animation:ccal-slideDown .3s ease-out both;}'
                + '.ccal-week:last-child{border-bottom:none;}'
                + '.ccal-day{min-height:90px;padding:6px 8px;border-right:1px solid #e2e8f0;'
                + 'background:#fff;overflow:hidden;transition:all .2s ease;position:relative;}'
                + '.ccal-day:last-child{border-right:none;}'
                + '.ccal-day.is-empty{background:#f8fafc;min-height:0;}'
                + '.ccal-day.is-today{background:linear-gradient(135deg,#eff6ff 0%,#dbeafe 100%);animation:ccal-pulse 2.5s infinite;}'
                + '.ccal-day.is-rest{background:linear-gradient(180deg,#fff 0%,#fef2f2 100%);}'
                + '.ccal-day.is-work{background:linear-gradient(180deg,#fff 0%,#f0fdf4 100%);}'
                + '.ccal-day.is-holiday{background:linear-gradient(180deg,#fff 0%,#fefce8 100%);}'
                + '.ccal-day-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}'
                + '.ccal-day-num{font-size:.95rem;font-weight:800;color:#1e293b;white-space:nowrap;line-height:1.2;}'
                + '.ccal-day-num.is-sun{color:#dc2626;}.ccal-day-num.is-sat{color:#16a34a;}'
                + '.ccal-status{font-size:.62rem;padding:2px 7px;border-radius:10px;font-weight:700;white-space:nowrap;line-height:1.3;letter-spacing:.3px;text-transform:uppercase;}'
                + '.ccal-status.s-rest{background:linear-gradient(135deg,#fecaca,#fca5a5);color:#7f1d1d;}'
                + '.ccal-status.s-holiday{background:linear-gradient(135deg,#fde68a,#fbbf24);color:#78350f;}'
                + '.ccal-status.s-work-text{font-size:.62rem;color:#166534;font-weight:600;padding:2px 7px;border-radius:10px;background:linear-gradient(135deg,#bbf7d0,#86efac);}'
                + '.ccal-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px;}'
                + '.ccal-tag{display:inline-flex;align-items:center;font-size:.58rem;padding:1px 6px;border-radius:8px;line-height:1.6;white-space:nowrap;font-weight:600;}'
                + '.ccal-tag.t-we{background:#fde8e8;color:#991b1b;}.ccal-tag.t-wd{background:#dbeafe;color:#1e3a8a;}'
                + '.ccal-tag.t-hol{background:linear-gradient(135deg,#fef3c7,#fde68a);color:#92400e;border:1px solid #fbbf24;}'
                + '.ccal-tag.t-sh{background:#d1fae5;color:#065f46;}.ccal-tag.t-rest{background:#fde8e8;color:#991b1b;}'
                + '.ccal-tag.t-custom{background:#ede9fe;color:#5b21b6;}'
                + '.ccal-remark{margin-top:3px;font-size:.58rem;color:#94a3b8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-style:italic;}'
                + '.ccal-legend{display:flex;gap:16px;padding:8px 14px;background:#f8fafc;border:1px solid #cbd5e1;border-top:none;border-radius:0 0 8px 8px;margin-top:-1px;flex-wrap:wrap;}'
                + '.ccal-legend-item{display:inline-flex;align-items:center;gap:5px;font-size:.72rem;color:#64748b;font-weight:500;}'
                + '.ccal-legend-dot{width:10px;height:10px;border-radius:50%;border:1px solid rgba(0,0,0,.1);}'
                + '.ccal-lg-work{background:linear-gradient(135deg,#86efac,#4ade80);}'
                + '.ccal-lg-rest{background:linear-gradient(135deg,#fca5a5,#f87171);}'
                + '.ccal-lg-holiday{background:linear-gradient(135deg,#fde68a,#fbbf24);}'
                + '.ccal-lg-today{background:linear-gradient(135deg,#93c5fd,#3b82f6);}'
                + '.ccal-week:nth-child(1){animation-delay:.03s;}.ccal-week:nth-child(2){animation-delay:.06s;}'
                + '.ccal-week:nth-child(3){animation-delay:.09s;}.ccal-week:nth-child(4){animation-delay:.12s;}'
                + '.ccal-week:nth-child(5){animation-delay:.15s;}.ccal-week:nth-child(6){animation-delay:.18s;}';
            document.head.appendChild(css);
        })();

        function esscalEsc(s) {
            return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        window.esscalLoad = function () {
            if (!_esscal_personId) return;
            var year  = parseInt($('#esscal_yearSel').val());
            var month = parseInt($('#esscal_monthSel').val());
            $('#esscal_body').html('<div style="padding:20px;text-align:center;color:#64748b;">' + esscalEsc(_esscal_i18n.loading) + '</div>');
            $.ajax({
                url : '/ar/attendanceSettings/api/calender/emp/month',
                data: { year: year, month: month, personId: _esscal_personId },
                success: function (data) { esscalRender(year, month, data); },
                error: function (err) {
                    var msg = (err.responseJSON && err.responseJSON.error) ? err.responseJSON.error : _esscal_i18n.loadError;
                    $('#esscal_body').html('<div style="padding:20px;text-align:center;color:#dc2626;">' + esscalEsc(msg) + '</div>');
                    toastr && toastr.error(msg);
                }
            });
        };

        function esscalRender(year, month, records) {
            if (!records || !records.length) {
                $('#esscal_body').html('<div style="padding:20px;text-align:center;color:#64748b;">' + esscalEsc(_esscal_i18n.noCalData) + '</div>');
                return;
            }
            _esscal_recordMap = {};
            records.forEach(function (r) {
                var k = (r.ddateStr || r.ddateFormatted || '').replace(/-/g, '/');
                _esscal_recordMap[k] = r;
            });

            var today    = new Date();
            var todayKey = today.getFullYear()
                + '/' + String(today.getMonth() + 1).padStart(2, '0')
                + '/' + String(today.getDate()).padStart(2, '0');

            var firstKey   = (records[0].ddateStr || records[0].ddateFormatted || '').replace(/-/g, '/');
            var firstParts = firstKey.split('/');
            var firstDow   = new Date(+firstParts[0], +firstParts[1] - 1, +firstParts[2]).getDay();

            var html = '<div class="ccal-week">';
            var cellCount = 0;

            for (var i = 0; i < firstDow; i++) {
                html += '<div class="ccal-day is-empty"></div>';
                cellCount++;
            }

            records.forEach(function (rec) {
                if (cellCount > 0 && cellCount % 7 === 0) {
                    html += '</div><div class="ccal-week">';
                }
                var key  = (rec.ddateStr || rec.ddateFormatted || '').replace(/-/g, '/');
                var p    = key.split('/');
                var day  = parseInt(p[2]);
                var dMon = parseInt(p[1]);
                var dow  = cellCount % 7;
                var isSun = dow === 0, isSat = dow === 6, isWE = isSun || isSat;
                var isToday   = key === todayKey;
                var isRest    = rec.workdayflag == 0;
                var isStat    = rec.statutoryFlag == 1;

                var cls    = 'ccal-day' + (isToday ? ' is-today' : isStat ? ' is-holiday' : isRest ? ' is-rest' : ' is-work');
                var numCls = 'ccal-day-num' + (isSun ? ' is-sun' : isSat ? ' is-sat' : '');

                var statusHtml;
                if (isStat)      statusHtml = '<span class="ccal-status s-holiday">' + esscalEsc(_esscal_i18n.statusHoliday) + '</span>';
                else if (isRest) statusHtml = '<span class="ccal-status s-rest">' + esscalEsc(_esscal_i18n.statusRest) + '</span>';
                else             statusHtml = '<span class="ccal-status s-work-text">' + esscalEsc(_esscal_i18n.statusWork) + '</span>';

                var tags = isWE
                    ? '<span class="ccal-tag t-we">' + esscalEsc(_esscal_i18n.tagWeekend) + '</span>'
                    : '<span class="ccal-tag t-wd">' + esscalEsc(_esscal_i18n.tagWeekday) + '</span>';
                if (isStat) tags += '<span class="ccal-tag t-hol">' + esscalEsc(_esscal_i18n.tagHoliday) + '</span>';
                if (rec.shiftName || rec.shiftNo) {
                    tags += '<span class="ccal-tag t-sh">' + esscalEsc(rec.shiftName || rec.shiftNo) + '</span>';
                } else if (!isWE && !isStat) {
                    tags += '<span class="ccal-tag t-sh">' + esscalEsc(_esscal_i18n.adminShift) + '</span>';
                }
                if (rec.typeidName) {
                    tags += '<span class="ccal-tag t-custom">' + esscalEsc(rec.typeidName) + '</span>';
                }
                var remarkHtml = rec.remark
                    ? '<div class="ccal-remark" title="' + esscalEsc(rec.remark) + '">— ' + esscalEsc(rec.remark) + '</div>'
                    : '';

                var clickable = (_esscal_sysMode === 'hrm');
                var dayAttrs = ' data-datestr="' + key + '"'
                    + (clickable ? ' onclick="esscalDayClick(this)" style="cursor:pointer;"' : '');
                html += '<div class="' + cls + '"' + dayAttrs + '>';
                html += '<div class="ccal-day-top"><span class="' + numCls + '">' + day + '-' + dMon + '</span>' + statusHtml + '</div>';
                html += '<div class="ccal-tags">' + tags + '</div>';
                html += remarkHtml;
                html += '</div>';

                cellCount++;
            });

            var remain = cellCount % 7;
            if (remain > 0) {
                for (var j = remain; j < 7; j++) html += '<div class="ccal-day is-empty"></div>';
            }
            html += '</div>';
            $('#esscal_body').html(html);
        }

        /* ===================== DAY CLICK (chỉ khi sysMode != 'ess') ===================== */
        window.esscalDayClick = function (el) {
            if (_esscal_sysMode !== 'hrm') return;
            var dateStr = el.getAttribute('data-datestr');
            var rec     = _esscal_recordMap[dateStr] || {};
            var parts   = (dateStr || '').split('/');
            var display = parts.length === 3 ? (parts[2] + '/' + parts[1] + '/' + parts[0]) : dateStr;

            var isRest = rec.workdayflag == 0;
            var isStat = rec.statutoryFlag == 1;
            var status = isStat ? _esscal_i18n.statusHoliday : isRest ? _esscal_i18n.statusRest : _esscal_i18n.statusWork;
            var shift  = rec.shiftName || rec.shiftNo || _esscal_i18n.adminShift;
            var remark = rec.remark || '';
            var typeid = rec.typeidName || '';

            var body = '<table class="table table-sm table-borderless mb-0" style="font-size:.82rem;">'
                + '<tr><th style="width:90px;color:#64748b;">Ngày</th><td><strong>' + esscalEsc(display) + '</strong></td></tr>'
                + '<tr><th style="color:#64748b;">Trạng thái</th><td>' + esscalEsc(status) + '</td></tr>'
                + '<tr><th style="color:#64748b;">Ca làm việc</th><td>' + esscalEsc(shift) + '</td></tr>'
                + (typeid ? '<tr><th style="color:#64748b;">Loại</th><td>' + esscalEsc(typeid) + '</td></tr>' : '')
                + (remark ? '<tr><th style="color:#64748b;">Ghi chú</th><td><em>' + esscalEsc(remark) + '</em></td></tr>' : '')
                + '</table>';

            $('#esscal_dayModalBody').html(body);
            new bootstrap.Modal(document.getElementById('esscal_dayModal')).show();
        };

        /* ===================== INIT ===================== */
        $(document).ready(function () {
            if (_esscal_initialized) return;
            _esscal_initialized = true;

            var now      = new Date();
            var curYear  = now.getFullYear();
            var curMonth = now.getMonth() + 1;

            // Init year dropdown
            var $ys = $('#esscal_yearSel');
            for (var y = curYear - 5; y <= curYear + 5; y++) $ys.append(new Option(y, y));
            $ys.val(curYear);
            $('#esscal_monthSel').val(curMonth);

            // Nav buttons
            $('#esscal_prevMonth').on('click', function () {
                var m = parseInt($('#esscal_monthSel').val()), y = parseInt($('#esscal_yearSel').val());
                if (--m < 1) { m = 12; y--; }
                $('#esscal_monthSel').val(m); $('#esscal_yearSel').val(y); esscalLoad();
            });
            $('#esscal_nextMonth').on('click', function () {
                var m = parseInt($('#esscal_monthSel').val()), y = parseInt($('#esscal_yearSel').val());
                if (++m > 12) { m = 1; y++; }
                $('#esscal_monthSel').val(m); $('#esscal_yearSel').val(y); esscalLoad();
            });

            // Lấy personId của nhân viên hiện tại rồi load lịch
            $.ajax({
                url    : '/ess/empinfo/api/personalInfo/myInfo',
                type   : 'GET',
                success: function (data) {
                    if (data && data.personId) {
                        _esscal_personId = data.personId;
                        esscalLoad();
                    } else {
                        $('#esscal_body').html('<div style="padding:20px;text-align:center;color:#64748b;">' + esscalEsc(_esscal_i18n.empNotFound) + '</div>');
                    }
                },
                error: function () {
                    toastr && toastr.error(_esscal_i18n.loadEmpFailed);
                }
            });
        });
    </script>
</template>
