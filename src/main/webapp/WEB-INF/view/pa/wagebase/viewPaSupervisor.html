<div th:fragment="content">
    <div class="row h-100">

        <!-- ══ LEFT PANE: Danh sách người phụ trách lương ══════════════════════ -->
        <div class="col-md-4 border-end p-3 bg-white mb-3">
            <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2">
                <h6 class="mb-0 text-primary fw-bold" th:text="#{pa.supervisor.leftPaneTitle}">Danh sách người phụ trách lương</h6>
                <button type="button" class="btn btn-success btn-sm" onclick="vpasOpenAddModal()">
                    <i class="bi bi-person-plus"></i>
                    <span th:text="#{pa.supervisor.addNew}">Thêm mới</span>
                </button>
            </div>
            <div class="input-group mb-3">
                <input type="text" id="vpas_searchInput" class="form-control form-control-sm"
                    th:placeholder="#{pa.supervisor.searchPlaceholder}"
                    placeholder="Tìm kiếm nhân viên..."
                    onkeyup="vpasFilterList()">
                <button class="btn btn-outline-secondary btn-sm" type="button" disabled>
                    <i class="bi bi-search"></i>
                </button>
            </div>
            <div id="vpas_listContainer" class="list-group overflow-auto" style="height: calc(100vh - 280px);">
                <!-- Load bởi AJAX -->
            </div>
        </div>

        <!-- ══ RIGHT PANE: Cây phòng ban phân quyền ════════════════════════════ -->
        <div class="col-md-8 p-3 bg-white">
            <div class="card h-100 border-0 shadow-none">
                <div class="card-header d-flex justify-content-between align-items-center bg-light border">
                    <h6 class="mb-0 fw-bold" id="vpas_selectedLabel" th:text="#{pa.supervisor.rightPaneTitle}">Sơ đồ Tổ chức Phân quyền</h6>
                    <button type="button" class="btn btn-primary btn-sm" id="vpas_btnSaveDepts"
                        onclick="vpasSaveDepts()" disabled>
                        <i class="bi bi-save"></i>
                        <span th:text="#{pa.supervisor.saveDepts}">Lưu phân quyền phòng ban</span>
                    </button>
                </div>
                <div class="card-body border border-top-0 d-flex flex-column p-0">
                    <div class="p-2 bg-light border-bottom text-muted" style="font-size: 0.9rem;"
                        id="vpas_selectedEmpInfo">
                        <i class="bi bi-info-circle"></i>
                        <span th:text="#{pa.supervisor.infoPlaceholder}">Vui lòng chọn một nhân viên bên trái để xem/cấu hình phân quyền phòng ban.</span>
                    </div>
                    <div id="vpas_deptTree" class="overflow-auto mt-2 p-3"
                        style="flex: 1; height: calc(100vh - 330px); display: none;"></div>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- ══ Modal Thêm mới / Chỉnh sửa người phụ trách lương ════════════════════ -->
<div class="modal fade" id="vpas_editModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="vpas_modalTitle" th:text="#{pa.supervisor.addTitle}">Thêm mới người phụ trách lương</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="vpas_isEdit">
                <div class="row g-3">
                    <div class="col-12" id="vpas_empRow">
                        <label class="form-label">
                            <span th:text="#{pa.supervisor.supervisor}">Tên người phụ trách</span>
                            <span class="text-danger">*</span>
                        </label>
                        <div class="input-group">
                            <input type="text" class="form-control" id="vpas_empDisplay"
                                th:placeholder="#{pa.supervisor.empSelectPlaceholder}"
                                placeholder="Chọn nhân viên..." readonly>
                            <input type="hidden" id="vpas_personId">
                            <button class="btn btn-outline-primary" type="button"
                                id="vpas_empSearchBtn" onclick="vpasOpenEmpSearch()">
                                <i class="bi bi-search"></i>
                            </button>
                        </div>
                    </div>
                    <div class="col-6">
                        <label class="form-label" th:text="#{pa.supervisor.activity}">Trạng thái</label>
                        <select class="form-select" id="vpas_activity">
                            <option value="1" th:text="#{pa.supervisor.activity.active}">Hoạt động</option>
                            <option value="0" th:text="#{pa.supervisor.activity.inactive}">Không hoạt động</option>
                        </select>
                    </div>
                    <div class="col-6">
                        <label class="form-label" th:text="#{pa.supervisor.orderNo}">Thứ tự</label>
                        <input type="number" class="form-control" id="vpas_orderNo" min="0" value="0">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal"
                    th:text="#{common.close}">Đóng</button>
                <button type="button" class="btn btn-primary btn-sm" onclick="vpasSave()">
                    <i class="bi bi-save"></i>
                    <span th:text="#{pa.supervisor.save}">Lưu</span>
                </button>
            </div>
        </div>
    </div>
</div>

<!-- ══ Scripts ══════════════════════════════════════════════════════════════ -->
<template id="fragmentScripts">
    <script th:inline="javascript">
        var vpas_currentPersonId  = '';
        var vpas_currentEmpName   = '';
        var vpas_deptTreeData     = [];

        var vpas_titleAdd         = /*[[#{pa.supervisor.addTitle}]]*/ 'Thêm mới người phụ trách lương';
        var vpas_titleEdit        = /*[[#{pa.supervisor.editTitle}]]*/ 'Chỉnh sửa người phụ trách lương';
        var vpas_msgValidate      = /*[[#{pa.supervisor.validateRequired}]]*/ 'Vui lòng chọn người phụ trách!';
        var vpas_msgConfirmDelete = /*[[#{pa.supervisor.confirmDeleteFull}]]*/ 'Bạn có chắc chắn muốn xóa người phụ trách này? Toàn bộ cấu hình phòng ban cũng sẽ bị xóa!';
        var vpas_msgDeptSaved     = /*[[#{pa.supervisor.deptSaved}]]*/ 'Lưu phân quyền phòng ban thành công!';
        var vpas_msgInfoPlaceholder = /*[[#{pa.supervisor.infoPlaceholder}]]*/ 'Vui lòng chọn một nhân viên bên trái để xem/cấu hình phân quyền phòng ban.';

        $(document).ready(function () {

            // ── 1. Tải cây phòng ban một lần khi khởi tạo ─────────────────
            function loadDepartmentTree(callback) {
                $.ajax({
                    url: '/pa/wagebase/api/supervisor/departments',
                    success: function (res) {
                        if (res && res.length > 0) {
                            vpas_deptTreeData = res.map(function (itm) {
                                var nId     = itm.id     || itm.ID     || '';
                                var nParent = itm.parent || itm.PARENT || '#';
                                var nText   = itm.text   || itm.TEXT   || '';
                                if (!nParent || String(nParent) === String(nId) || nParent === '0') {
                                    nParent = '#';
                                }
                                return { id: String(nId), parent: String(nParent), text: nText };
                            });
                        }
                        if (callback) callback();
                    },
                    error: function () {
                        if (callback) callback();
                    }
                });
            }

            // ── 2. Render cây phòng ban dạng HTML với checkbox ─────────────
            function renderDeptTreeHTML(checkedDepts) {
                var $container = $('#vpas_deptTree');
                $container.empty();

                if (!vpas_deptTreeData || vpas_deptTreeData.length === 0) {
                    $container.html('<div class="text-muted p-2">Không có dữ liệu phòng ban.</div>');
                    $container.show();
                    return;
                }

                var map = {};
                var roots = [];
                vpas_deptTreeData.forEach(function (item) {
                    map[item.id] = $.extend({}, item, { children: [] });
                });
                vpas_deptTreeData.forEach(function (item) {
                    var node = map[item.id];
                    if (item.parent && item.parent !== '#' && item.parent !== '0' && map[item.parent]) {
                        map[item.parent].children.push(node);
                    } else {
                        roots.push(node);
                    }
                });

                var $ul = $('<ul>').addClass('list-unstyled');
                roots.forEach(function (root) {
                    $ul.append(createDeptLi(root, checkedDepts));
                });
                $container.append($ul).show();
            }

            function createDeptLi(item, checkedDepts) {
                var $li       = $('<li>').addClass('mb-2');
                var $rowDiv   = $('<div>').addClass('d-flex align-items-center mb-1');
                var hasChildren = item.children && item.children.length > 0;

                var $toggleIcon = $('<i>').addClass('bi me-2');
                if (hasChildren) {
                    $toggleIcon.addClass('bi-dash-square text-primary').css('cursor', 'pointer')
                        .on('click', function (e) {
                            e.preventDefault(); e.stopPropagation();
                            $li.children('ul').slideToggle();
                            $(this).toggleClass('bi-dash-square bi-plus-square');
                        });
                } else {
                    $toggleIcon.addClass('bi-dash-square').css('visibility', 'hidden');
                }
                $rowDiv.append($toggleIcon);

                var $divCheck = $('<div>').addClass('form-check mb-0');
                var isChecked = checkedDepts && checkedDepts.indexOf(item.id) > -1;
                var $inp = $('<input>').addClass('form-check-input vpas_deptChk')
                    .attr({ type: 'checkbox', value: item.id, id: 'vpas_deptChk_' + item.id })
                    .prop('checked', isChecked);

                $inp.on('change', function () {
                    var checked = $(this).is(':checked');
                    $(this).closest('li').find('ul input.vpas_deptChk').prop('checked', checked);
                    if (checked) {
                        $(this).parents('li').each(function () {
                            $(this).children('div').find('input.vpas_deptChk').prop('checked', true);
                        });
                    }
                });

                var $label = $('<label>').addClass('form-check-label').css('cursor', 'pointer')
                    .attr('for', 'vpas_deptChk_' + item.id).text(item.text + ' (' + item.id + ')');

                $divCheck.append($inp).append($label);
                $rowDiv.append($divCheck);
                $li.append($rowDiv);

                if (hasChildren) {
                    var $childUl = $('<ul>').addClass('list-unstyled ms-4');
                    item.children.forEach(function (child) {
                        $childUl.append(createDeptLi(child, checkedDepts));
                    });
                    $li.append($childUl);
                }
                return $li;
            }

            // ── 3. Tải danh sách người phụ trách (cột trái) ───────────────
            window.loadSupervisorList = function () {
                $.ajax({
                    url: '/pa/wagebase/api/supervisor/all',
                    success: function (data) {
                        var $container = $('#vpas_listContainer');
                        $container.empty();

                        if (!data || data.length === 0) {
                            $container.html('<div class="text-muted p-2 text-center mt-3">Chưa có người phụ trách lương nào.</div>');
                            return;
                        }

                        data.forEach(function (itm) {
                            var dispName = itm.empId ? itm.empId + ' - ' + itm.localName : itm.personId;
                            var deptInfo = itm.deptName
                                ? '<div class="small text-muted"><i class="bi bi-building"></i> ' + itm.deptName + '</div>'
                                : '';
                            var html = '<a href="javascript:void(0);"'
                                + ' class="list-group-item list-group-item-action vpas_listItem"'
                                + ' data-id="' + itm.personId + '" data-name="' + dispName + '"'
                                + ' onclick="vpasSelectSupervisor(\'' + itm.personId + '\', \'' + dispName.replace(/'/g, "\\'") + '\')">'
                                + '<div class="d-flex w-100 justify-content-between">'
                                + '<h6 class="mb-1 fw-bold text-dark">' + dispName + '</h6>'
                                + '<span>'
                                + '<button class="btn btn-sm btn-outline-warning py-0 px-1 me-1 rounded-1"'
                                + ' onclick="vpasOpenEditModal(\'' + itm.personId + '\', event)" title="Sửa">'
                                + '<i class="bi bi-pencil"></i></button>'
                                + '<button class="btn btn-sm btn-outline-danger py-0 px-1 rounded-1"'
                                + ' onclick="vpasDeleteSupervisor(\'' + itm.personId + '\', event)" title="Xóa">'
                                + '<i class="bi bi-trash"></i></button>'
                                + '</span></div>'
                                + deptInfo
                                + '</a>';
                            $container.append(html);
                        });

                        vpasResetRightPane();
                    },
                    error: function () {
                        toastr && toastr.error('Lỗi khi tải danh sách người phụ trách lương!');
                    }
                });
            };

            // ── 4. Chọn người phụ trách → tải cây phòng ban bên phải ──────
            window.vpasSelectSupervisor = function (personId, empName) {
                $('.vpas_listItem').removeClass('active bg-light border-primary');
                $(".vpas_listItem[data-id='" + personId + "']").addClass('active bg-light border-primary');

                vpas_currentPersonId = personId;
                vpas_currentEmpName  = empName;
                $('#vpas_selectedLabel').html('Cấu hình phòng ban cho: <span class="text-primary">' + empName + '</span>');
                $('#vpas_btnSaveDepts').prop('disabled', false);
                $('#vpas_selectedEmpInfo').html('<span class="spinner-border spinner-border-sm text-primary" role="status"></span> Đang tải thông tin...');

                $.ajax({
                    url: '/pa/wagebase/api/supervisor/' + encodeURIComponent(personId) + '/departments',
                    success: function (checkedDepts) {
                        $('#vpas_selectedEmpInfo').html('<i class="bi bi-check2-all text-success"></i> Đã tải dữ liệu phòng ban của <b>' + empName + '</b>.');
                        renderDeptTreeHTML(checkedDepts);
                    },
                    error: function () {
                        $('#vpas_selectedEmpInfo').html('<i class="bi bi-exclamation-triangle text-danger"></i> Lỗi khi tải dữ liệu phòng ban.');
                    }
                });
            };

            // ── 5. Reset right pane ─────────────────────────────────────────
            function vpasResetRightPane() {
                vpas_currentPersonId = '';
                vpas_currentEmpName  = '';
                $('#vpas_selectedLabel').text(/*[[#{pa.supervisor.rightPaneTitle}]]*/ 'Sơ đồ Tổ chức Phân quyền');
                $('#vpas_selectedEmpInfo').html('<i class="bi bi-info-circle"></i> ' + vpas_msgInfoPlaceholder);
                $('#vpas_deptTree').hide();
                $('#vpas_btnSaveDepts').prop('disabled', true);
            }

            // ── 6. Lọc danh sách phía client ───────────────────────────────
            window.vpasFilterList = function () {
                var value = $('#vpas_searchInput').val().toLowerCase();
                $('.vpas_listItem').each(function () {
                    $(this).toggle($(this).text().toLowerCase().indexOf(value) > -1);
                });
            };

            // ── 7. Lưu phân quyền phòng ban ────────────────────────────────
            window.vpasSaveDepts = function () {
                if (!vpas_currentPersonId) {
                    toastr && toastr.error('Chưa chọn người phụ trách!');
                    return;
                }
                var selectedDepts = [];
                $('#vpas_deptTree input.vpas_deptChk:checked').each(function () {
                    selectedDepts.push($(this).val());
                });

                $.ajax({
                    url: '/pa/wagebase/api/supervisor/' + encodeURIComponent(vpas_currentPersonId) + '/saveDepartments',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(selectedDepts),
                    success: function (res) {
                        if (res.success) {
                            toastr ? toastr.success(vpas_msgDeptSaved) : alert(vpas_msgDeptSaved);
                        } else {
                            toastr ? toastr.error(res.error || 'Lỗi server') : alert(res.error);
                        }
                    },
                    error: function () {
                        toastr && toastr.error('Lỗi kết nối khi lưu phân quyền!');
                    }
                });
            };

            // ── 8. Mở popup tìm nhân viên ───────────────────────────────────
            window.vpasOpenEmpSearch = function () {
                if (typeof EmployeeSearchModal !== 'undefined') {
                    EmployeeSearchModal.open(function (employee) {
                        $('#vpas_personId').val(employee.personId);
                        $('#vpas_empDisplay').val(employee.empId + ' - ' + employee.localName);
                    });
                } else {
                    alert('Component tìm kiếm nhân viên chưa được tải!');
                }
            };

            // ── 9. Mở modal Thêm mới ────────────────────────────────────────
            window.vpasOpenAddModal = function () {
                $('#vpas_isEdit').val('0');
                $('#vpas_personId').val('');
                $('#vpas_empDisplay').val('');
                $('#vpas_activity').val('1');
                $('#vpas_orderNo').val('0');
                $('#vpas_empRow').show();
                $('#vpas_empSearchBtn').prop('disabled', false);
                $('#vpas_modalTitle').text(vpas_titleAdd);
                new bootstrap.Modal(document.getElementById('vpas_editModal')).show();
            };

            // ── 10. Mở modal Sửa ────────────────────────────────────────────
            window.vpasOpenEditModal = function (personId, event) {
                if (event) event.stopPropagation();
                $.ajax({
                    url: '/pa/wagebase/api/supervisor/' + encodeURIComponent(personId),
                    type: 'GET',
                    success: function (dto) {
                        $('#vpas_isEdit').val('1');
                        $('#vpas_personId').val(dto.personId || '');
                        $('#vpas_empDisplay').val((dto.empId || '') + ' - ' + (dto.localName || ''));
                        $('#vpas_activity').val(dto.activity != null ? dto.activity : 1);
                        $('#vpas_orderNo').val(dto.orderNo != null ? dto.orderNo : 0);
                        // Khi sửa ẩn nút chọn nhân viên vì PERSON_ID không thay đổi
                        $('#vpas_empRow').show();
                        $('#vpas_empSearchBtn').prop('disabled', true).hide();
                        $('#vpas_modalTitle').text(vpas_titleEdit);
                        new bootstrap.Modal(document.getElementById('vpas_editModal')).show();
                    },
                    error: function (err) {
                        var msg = (err.responseJSON && err.responseJSON.error) ? err.responseJSON.error : 'Lỗi không xác định';
                        toastr ? toastr.error(msg) : alert(msg);
                    }
                });
            };

            // Khi đóng modal, hiện lại nút tìm nhân viên
            $('#vpas_editModal').on('hidden.bs.modal', function () {
                $('#vpas_empSearchBtn').prop('disabled', false).show();
            });

            // ── 11. Lưu người phụ trách (Thêm mới / Sửa) ───────────────────
            window.vpasSave = function () {
                var personId = $('#vpas_personId').val().trim();
                if (!personId) {
                    toastr ? toastr.warning(vpas_msgValidate) : alert(vpas_msgValidate);
                    return;
                }
                var payload = {
                    personId: personId,
                    activity: parseInt($('#vpas_activity').val()),
                    orderNo:  parseInt($('#vpas_orderNo').val()) || 0
                };
                $.ajax({
                    url: '/pa/wagebase/api/supervisor/save',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(payload),
                    success: function (res) {
                        toastr ? toastr.success(res.message || 'Lưu thành công') : alert(res.message || 'Lưu thành công');
                        var modal = bootstrap.Modal.getInstance(document.getElementById('vpas_editModal'));
                        if (modal) modal.hide();
                        loadSupervisorList();
                    },
                    error: function (err) {
                        var msg = (err.responseJSON && err.responseJSON.error) ? err.responseJSON.error : 'Lỗi không xác định';
                        toastr ? toastr.error(msg) : alert(msg);
                    }
                });
            };

            // ── 12. Xóa người phụ trách (kèm PA_SUPERVISOR_INFO) ────────────
            window.vpasDeleteSupervisor = function (personId, event) {
                if (event) event.stopPropagation();
                if (!confirm(vpas_msgConfirmDelete)) return;
                $.ajax({
                    url: '/pa/wagebase/api/supervisor/delete/' + encodeURIComponent(personId),
                    type: 'DELETE',
                    success: function (res) {
                        toastr ? toastr.success(res.message || 'Xóa thành công') : alert(res.message || 'Xóa thành công');
                        if (vpas_currentPersonId === personId) vpasResetRightPane();
                        loadSupervisorList();
                    },
                    error: function (err) {
                        var msg = (err.responseJSON && err.responseJSON.error) ? err.responseJSON.error : 'Lỗi không xác định';
                        toastr ? toastr.error(msg) : alert(msg);
                    }
                });
            };

            // ── Khởi tạo: load cây dept trước, rồi load danh sách ──────────
            loadDepartmentTree(function () {
                loadSupervisorList();
            });

        });
    </script>
</template>
