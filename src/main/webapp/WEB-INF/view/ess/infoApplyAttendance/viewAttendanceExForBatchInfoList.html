<div th:fragment="content">
    <style>
        #ex_dataTable tbody tr.ex-row-selected>td {
            background-color: #fff3cd !important;
        }
    </style>
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-body">
                    <form id="ex_searchForm" class="row g-3 mb-4 d-flex align-items-end">
                        <div class="col-md-1">
                            <label for="ex_keyword" class="form-label">Mã NV / Họ tên</label>
                            <input type="text" class="form-control" id="ex_keyword" placeholder="Nhập mã hoặc họ tên">
                        </div>
                        <div class="col-md-1">
                            <label for="ex_deptNo" class="form-label">Phòng ban</label>
                            <input type="text" class="form-control" id="ex_deptNo" placeholder="Chọn phòng ban"
                                readonly>
                        </div>
                        <div class="col-md-1">
                            <label for="ex_fromDate" class="form-label">Ngày bắt đầu</label>
                            <input type="text" class="form-control js-daterangepicker" id="ex_fromDate"
                                data-drp-format="DD/MM/YYYY" autocomplete="off">
                        </div>
                        <div class="col-md-1">
                            <label for="ex_toDate" class="form-label">Ngày kết thúc</label>
                            <input type="text" class="form-control js-daterangepicker" id="ex_toDate"
                                data-drp-format="DD/MM/YYYY" autocomplete="off">
                        </div>
                        <div class="col-md-1">
                            <label for="ex_postFamily" class="form-label">Nhóm nhân viên</label>
                            <select class="form-select" id="ex_postFamily" data-parent-code="14015812"
                                data-default-text="-- Tất cả --"></select>
                        </div>
                        <div class="col-md-1">
                            <label for="ex_shiftNo" class="form-label">Ca làm việc</label>
                            <select class="form-select" id="ex_shiftNo">
                                <option value="">-- Tất cả --</option>
                            </select>
                        </div>
                        <div class="col-md-1">
                            <label for="ex_itemNo" class="form-label">Loại nghỉ phép</label>
                            <select class="form-select" id="ex_itemNo">
                                <option value="">Lựa chọn</option>
                                <option value="141443">Nghỉ không phép</option>
                                <option value="141442">Về sớm</option>
                                <option value="141441">Đến muộn</option>
                                <option value="14015448">Quên quẹt thẻ</option>
                            </select>
                        </div>
                        <div class="col-md-3 d-flex align-items-end gap-2 flex-wrap">
                            <button type="button" class="btn btn-primary" onclick="exSearchData()">
                                <i class="bx bx-search"></i> Tra cứu
                            </button>
                            <button type="button" class="btn btn-warning" onclick="exApplySelected()">
                                <i class="bx bx-send"></i> Xin phép
                            </button>
                            <button type="button" class="btn btn-success" onclick="exExportExcel()">
                                <i class="bx bx-export"></i> Xuất excel
                            </button>
                        </div>
                    </form>

                    <form id="ex_bulkActionForm" class="row g-3 align-items-end mb-3">
                        <div class="col-md-3">
                            <label for="ex_bulkInTime" class="form-label">Thời gian vào</label>
                            <input type="text" class="form-control js-daterangepicker" id="ex_bulkInTime"
                                data-drp-format="DD/MM/YYYY HH:mm" data-drp-time="true" data-drp-24h="true"
                                autocomplete="off">
                        </div>
                        <div class="col-md-3">
                            <label for="ex_bulkOutTime" class="form-label">Thời gian ra</label>
                            <input type="text" class="form-control js-daterangepicker" id="ex_bulkOutTime"
                                data-drp-format="DD/MM/YYYY HH:mm" data-drp-time="true" data-drp-24h="true"
                                autocomplete="off">
                        </div>
                        <div class="col-md-3">
                            <button type="button" class="btn btn-info" onclick="exApplyAllSelected()">
                                <i class="bx bx-check-double"></i> Thực hiện tất cả
                            </button>
                        </div>
                    </form>

                    <div class="table-responsive">
                        <table id="ex_dataTable" class="table table-striped table-bordered table-hover">
                            <thead class="table-light text-center align-middle">
                                <tr>
                                    <th style="width: 15px;">
                                        <input type="checkbox" id="ex_selectAllRows"
                                            class="form-check-input ex-select-all-rows"
                                            onclick="exToggleAllRows(this.checked)">
                                    </th>
                                    <th>No.</th>
                                    <th>Mã nhân viên</th>
                                    <th>Họ tên</th>
                                    <th>Phòng ban</th>
                                    <th>Chức vụ</th>
                                    <th>Ngày công</th>
                                    <th>Phân loại</th>
                                    <th>Thời gian quẹt thẻ</th>
                                    <th>Thời gian thực tế</th>
                                    <th>Lý do</th>
                                    <th>Người duyệt</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<template id="fragmentScripts">
    <script th:inline="javascript">
        var _ex_table = null;
        var _ex_pageBooted = false;
        var _ex_selectedDeptCodes = [];
        var _ex_selectedRowKeys = {};

        function exFormatDate(dateObj) {
            var d = String(dateObj.getDate()).padStart(2, '0');
            var m = String(dateObj.getMonth() + 1).padStart(2, '0');
            var y = dateObj.getFullYear();
            return d + '/' + m + '/' + y;
        }

        function exInitDefaultDateRange() {
            var today = new Date();
            var day = today.getDay() || 7;
            var monday = new Date(today);
            monday.setDate(today.getDate() - day + 1);
            var sunday = new Date(today);
            sunday.setDate(today.getDate() - day + 7);

            var fromValue = exFormatDate(monday);
            var toValue = exFormatDate(sunday);
            $('#ex_fromDate').val(fromValue);
            $('#ex_toDate').val(toValue);

            if ($('#ex_fromDate').data('daterangepicker')) {
                $('#ex_fromDate').data('daterangepicker').setStartDate(fromValue);
            }
            if ($('#ex_toDate').data('daterangepicker')) {
                $('#ex_toDate').data('daterangepicker').setStartDate(toValue);
            }
        }

        function exInitDeptSelector() {
            if (typeof DeptTree === 'undefined') {
                return;
            }
            DeptTree.init('#ex_deptNo', function (selectedCodes) {
                _ex_selectedDeptCodes = selectedCodes || [];
            });
        }

        function exLoadShiftOptions() {
            return $.ajax({
                url: '/ar/attendanceSettings/api/shift',
                type: 'GET',
                success: function (data) {
                    var html = '<option value="">-- Tất cả --</option>';
                    (data || []).forEach(function (item) {
                        var code = item.shiftNo || '';
                        var name = item.nameVi || item.shiftName || code;
                        html += '<option value="' + code + '">' + name + '</option>';
                    });
                    $('#ex_shiftNo').html(html);
                }
            });
        }

        function exMergeDateTime(arDateStr, timeValue, fallback) {
            if (fallback) {
                return fallback;
            }
            var datePart = arDateStr || '';
            var clockPart = timeValue || '';
            if (!datePart || !clockPart) {
                return '';
            }
            if (clockPart.indexOf('/') >= 0 || clockPart.indexOf('-') >= 0) {
                return clockPart;
            }
            return datePart + ' ' + clockPart;
        }

        function exNormalizeDateTimeValue(rawValue) {
            var value = (rawValue || '').trim().replace('T', ' ');
            if (!value) {
                return '';
            }
            var parts = value.split(/\s+/);
            if (parts.length < 2) {
                return '';
            }
            var datePart = parts[0].replace(/\./g, '/');
            var timePart = parts[1];

            if (/^\d{4}-\d{2}-\d{2}$/.test(datePart)) {
                var ymd = datePart.split('-');
                datePart = ymd[2] + '/' + ymd[1] + '/' + ymd[0];
            } else if (/^\d{2}-\d{2}-\d{4}$/.test(datePart)) {
                datePart = datePart.replace(/-/g, '/');
            }

            if (!/^\d{2}\/\d{2}\/\d{4}$/.test(datePart)) {
                return '';
            }

            var timeParts = timePart.split(':');
            if (timeParts.length < 2) {
                return '';
            }
            var hour = String(timeParts[0] || '').padStart(2, '0');
            var minute = String(timeParts[1] || '').padStart(2, '0');
            if (!/^\d{2}$/.test(hour) || !/^\d{2}$/.test(minute)) {
                return '';
            }
            return datePart + ' ' + hour + ':' + minute;
        }

        function exUpdateRowFieldByKey(keyToken, fieldName, value) {
            if (!_ex_table || !keyToken || !fieldName) {
                return;
            }
            _ex_table.rows({ search: 'applied' }).every(function () {
                var rowData = this.data();
                if (exGetRowToken(rowData) === keyToken) {
                    rowData[fieldName] = value;
                    this.data(rowData);
                }
            });
        }

        function exToggleRowHighlight($row, checked) {
            if (!$row || !$row.length) {
                return;
            }
            $row.toggleClass('ex-row-selected', !!checked);
        }

        function exSetRowSelected(keyToken, checked) {
            if (!keyToken) {
                return;
            }
            if (checked) {
                _ex_selectedRowKeys[keyToken] = true;
            } else {
                delete _ex_selectedRowKeys[keyToken];
            }
            exSyncRowCheckboxesByKey(keyToken, checked);
            $('.ex-row-select[data-row-key="' + exEscapeAttr(keyToken) + '"]').each(function () {
                exToggleRowHighlight($(this).closest('tr'), checked);
            });
            exSyncSelectAllCheckbox();
        }

        function exSyncCurrentPageInputToData() {
            if (!_ex_table) {
                return;
            }
            _ex_table.rows({ page: 'current' }).every(function () {
                var rowData = this.data();
                var rowKey = exGetRowToken(rowData);
                var $row = $(this.node());
                var fromVal = exNormalizeDateTimeValue(($row.find('.ex-in-time').val() || ''));
                var toVal = exNormalizeDateTimeValue(($row.find('.ex-out-time').val() || ''));
                var remarkVal = ($row.find('.ex-remark').val() || '').trim();
                rowData.fromDateTime = fromVal;
                rowData.toDateTime = toVal;
                rowData.remark = remarkVal;
                this.data(rowData);
                exUpdateRowFieldByKey(rowKey, 'fromDateTime', fromVal);
                exUpdateRowFieldByKey(rowKey, 'toDateTime', toVal);
                exUpdateRowFieldByKey(rowKey, 'remark', remarkVal);
            });
        }

        function exInitInlineDatePickers() {
            if (typeof initDateRangePickers === 'function') {
                initDateRangePickers('#ex_dataTable_wrapper');
            }
        }

        function exGetRowKey(row) {
            if (!row) {
                return '';
            }
            if (row.applyNo !== null && row.applyNo !== undefined && row.applyNo !== '') {
                return String(row.applyNo);
            }
            return [
                row.personId || '',
                row.arDateStr || '',
                row.empId || '',
                row.itemNo || '',
                row.shiftNo || ''
            ].join('|');
        }

        function exGetRowToken(row) {
            return encodeURIComponent(exGetRowKey(row));
        }

        function exEscapeAttr(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        function exSyncSelectAllCheckbox() {
            if (!_ex_table) {
                return;
            }
            var total = _ex_table.rows({ page: 'current' }).count();
            var selected = 0;
            _ex_table.rows({ page: 'current' }).every(function () {
                var keyToken = exGetRowToken(this.data());
                if (keyToken && _ex_selectedRowKeys[keyToken]) {
                    selected++;
                }
            });
            if (total === 0) {
                total = $('.ex-row-select').length;
                selected = $('.ex-row-select:checked').length;
            }
            $('.ex-select-all-rows').prop('checked', total > 0 && total === selected);
        }

        function exApplySelectionToVisibleRows() {
            $('.ex-row-select').each(function () {
                var key = $(this).attr('data-row-key');
                var checked = !!_ex_selectedRowKeys[key];
                $(this).prop('checked', checked);
                exToggleRowHighlight($(this).closest('tr'), checked);
            });
            exSyncSelectAllCheckbox();
        }

        function exSyncRowCheckboxesByKey(rowKey, checked) {
            $('.ex-row-select').each(function () {
                if ($(this).attr('data-row-key') === rowKey) {
                    $(this).prop('checked', checked);
                    exToggleRowHighlight($(this).closest('tr'), checked);
                }
            });
        }

        function exHandleRowCheckbox(checkboxEl) {
            var $checkbox = $(checkboxEl);
            var keyToken = $checkbox.attr('data-row-key');
            if (!keyToken) {
                return;
            }
            exToggleRowHighlight($checkbox.closest('tr'), $checkbox.is(':checked'));
            exSetRowSelected(keyToken, $checkbox.is(':checked'));
        }

        function exSyncSelectedRowsFromCurrentPage() {
            if (!_ex_table) {
                return;
            }
            _ex_table.rows({ page: 'current' }).every(function () {
                var rowData = this.data();
                var keyToken = exGetRowToken(rowData);
                var isChecked = $(this.node()).find('.ex-row-select').is(':checked');
                if (!keyToken) {
                    return;
                }
                if (isChecked) {
                    _ex_selectedRowKeys[keyToken] = true;
                } else {
                    delete _ex_selectedRowKeys[keyToken];
                }
            });
        }

        function exInitBatchDatePickers() {
            if (typeof initDateRangePickers === 'function') {
                initDateRangePickers('#ex_bulkActionForm');
            }
        }

        function exBindRowSelectionEvents() {
            $(document).off('click.exRowSelect change.exRowSelect', '.ex-row-select');
            $(document).on('click.exRowSelect change.exRowSelect', '.ex-row-select', function () {
                exHandleRowCheckbox(this);
            });

            $(document).off('input.exRowEdit change.exRowEdit', '.ex-in-time, .ex-out-time, .ex-remark');
            $(document).on('input.exRowEdit change.exRowEdit', '.ex-in-time, .ex-out-time, .ex-remark', function () {
                var $input = $(this);
                var keyToken = $input.attr('data-row-key');
                if (!keyToken) {
                    return;
                }
                var rawValue = ($input.val() || '').trim();

                if ($input.hasClass('ex-remark')) {
                    exUpdateRowFieldByKey(keyToken, 'remark', rawValue);
                } else {
                    var normalized = exNormalizeDateTimeValue(rawValue);
                    if (!$input.is(':focus')) {
                        $input.val(normalized || rawValue);
                    }
                    exUpdateRowFieldByKey(
                        keyToken,
                        $input.hasClass('ex-in-time') ? 'fromDateTime' : 'toDateTime',
                        normalized || rawValue
                    );
                }

                if (rawValue) {
                    exSetRowSelected(keyToken, true);
                }
            });
        }

        window.exToggleAllRows = function (checked) {
            if (!_ex_table) {
                return;
            }
            _ex_table.rows({ page: 'current' }).every(function () {
                var keyToken = exGetRowToken(this.data());
                if (!keyToken) {
                    return;
                }
                if (checked) {
                    _ex_selectedRowKeys[keyToken] = true;
                } else {
                    delete _ex_selectedRowKeys[keyToken];
                }
            });
            exApplySelectionToVisibleRows();
        };

        function exInitTable() {
            _ex_table = $('#ex_dataTable').DataTable({
                destroy: true,
                scrollX: true,
                scrollY: "calc(100vh - 360px)",
                scrollCollapse: true,
                paging: true,
                searching: false,
                lengthChange: true,
                pageLength: 25,
                processing: true,
                autoWidth: false,
                dom: 'Blfrtip',
                buttons: [
                    {
                        extend: 'excel',
                        title: 'attendance_ex_for_batch_export'
                    }
                ],
                ajax: {
                    url: '/ess/infoApplyAttendance/api/attendanceEx/list',
                    dataSrc: '',
                    data: function (d) {
                        d.keyword = $('#ex_keyword').val();
                        d.deptNos = (_ex_selectedDeptCodes || []).join(',');
                        d.fromDate = $('#ex_fromDate').val();
                        d.toDate = $('#ex_toDate').val();
                        d.postFamily = $('#ex_postFamily').val();
                        d.shiftNo = $('#ex_shiftNo').val();
                        d.itemNo = $('#ex_itemNo').val();
                    }
                },
                initComplete: function () {
                    $('#ex_dataTable_wrapper').find('.dt-buttons').hide();
                    exInitInlineDatePickers();
                    exBindRowSelectionEvents();
                },
                drawCallback: function () {
                    exInitInlineDatePickers();
                    exApplySelectionToVisibleRows();
                },
                columns: [
                    {
                        data: null,
                        orderable: false,
                        searchable: false,
                        className: 'text-center',
                        width: '35px',
                        render: function (data, type, row) {
                            var keyToken = exGetRowToken(row);
                            var checkedAttr = _ex_selectedRowKeys[keyToken] ? ' checked' : '';
                            return '<input type="checkbox" class="form-check-input ex-row-select" '
                                + 'data-row-key="' + exEscapeAttr(keyToken) + '"'
                                + checkedAttr
                                + ' onclick="exHandleRowCheckbox(this)">';
                        }
                    },
                    {
                        data: null,
                        className: 'text-center',
                        width: '40px',
                        render: function (data, type, row, meta) {
                            return meta.settings._iDisplayStart + meta.row + 1;
                        }
                    },
                    { data: 'empId', width: '80px', className: 'text-center' },
                    { data: 'localName' },
                    { data: 'deptName', width: '150px' },
                    { data: 'postGradeName' },
                    { data: 'arDateStr', width: '80px', className: 'text-center' },
                    { data: 'itemNoName' },
                    {
                        data: null,
                        className: 'text-center',
                        render: function (data, type, row) {
                            var inTime = row.inDoorTime || '';
                            var outTime = row.outDoorTime || '';
                            return 'Vào: ' + inTime + '<br>Ra: ' + outTime;
                        }
                    },
                    {
                        data: null,
                        width: '200px',
                        render: function (data, type, row) {
                            var inVal = exMergeDateTime(row.arDateStr, row.inDoorTime, row.fromDateTime);
                            var outVal = exMergeDateTime(row.arDateStr, row.outDoorTime, row.toDateTime);
                            var keyToken = exGetRowToken(row);
                            return ''
                                + '<div class="input-group input-group-sm mb-1">'
                                + '<span class="input-group-text" style="width: 40px">Vào</span>'
                                + '<input type="text" class="form-control js-daterangepicker ex-in-time" '
                                + 'data-row-key="' + exEscapeAttr(keyToken) + '" '
                                + 'data-drp-format="DD/MM/YYYY HH:mm" data-drp-time="true" data-drp-24h="true" value="' + (inVal || '') + '">'
                                + '</div>'
                                + '<div class="input-group input-group-sm">'
                                + '<span class="input-group-text" style="width: 40px">Ra</span>'
                                + '<input type="text" class="form-control js-daterangepicker ex-out-time" '
                                + 'data-row-key="' + exEscapeAttr(keyToken) + '" '
                                + 'data-drp-format="DD/MM/YYYY HH:mm" data-drp-time="true" data-drp-24h="true" value="' + (outVal || '') + '">'
                                + '</div>';
                        }
                    },
                    {
                        data: 'remark',
                        render: function (data, type, row) {
                            var keyToken = exGetRowToken(row);
                            return '<input type="text" class="form-control form-control-sm ex-remark" '
                                + 'data-row-key="' + exEscapeAttr(keyToken) + '" '
                                + 'value="' + exEscapeAttr(data || '') + '" placeholder="Nhập lý do">';
                        }
                    },
                    { data: 'updatedBy', render: function (data) { return data || ''; } }
                ]
            });
        }

        function exBootPage() {
            if (_ex_pageBooted) {
                return;
            }
            if (!document.getElementById('ex_dataTable')) {
                setTimeout(exBootPage, 30);
                return;
            }
            _ex_pageBooted = true;
            exInitDefaultDateRange();
            exInitDeptSelector();
            exInitBatchDatePickers();
            $.when(exLoadShiftOptions()).always(function () {
                exInitTable();
                if (_ex_table) {
                    _ex_table.ajax.reload();
                }
            });
        }

        window.exSearchData = function () {
            if (_ex_table) {
                _ex_selectedRowKeys = {};
                $('.ex-select-all-rows').prop('checked', false);
                _ex_table.ajax.reload();
            }
        };

        window.exApplySelected = function () {
            if (!_ex_table) {
                return;
            }

            exSyncSelectedRowsFromCurrentPage();
            exSyncCurrentPageInputToData();

            var selectedRows = [];
            _ex_table.rows({ search: 'applied' }).every(function () {
                var rowData = this.data();
                var keyToken = exGetRowToken(rowData);
                if (keyToken && _ex_selectedRowKeys[keyToken]) {
                    rowData.fromDateTime = exNormalizeDateTimeValue(rowData.fromDateTime || '');
                    rowData.toDateTime = exNormalizeDateTimeValue(rowData.toDateTime || '');
                    selectedRows.push({
                        applyNo: rowData.applyNo || '',
                        personId: rowData.personId || '',
                        empId: rowData.empId || '',
                        localName: rowData.localName || '',
                        itemNo: rowData.itemNo || '',
                        arDateStr: rowData.arDateStr || '',
                        fromDateTime: rowData.fromDateTime || '',
                        toDateTime: rowData.toDateTime || '',
                        workHour: rowData.workHour || '',
                        remark: rowData.remark || ''
                    });
                }
            });

            if (selectedRows.length === 0) {
                toastr && toastr.warning('Vui lòng tick chọn ít nhất một dòng.');
                return;
            }

            for (var i = 0; i < selectedRows.length; i++) {
                var row = selectedRows[i];
                if (!row.personId || !row.itemNo || !row.arDateStr) {
                    toastr && toastr.warning('Thiếu dữ liệu bắt buộc ở dòng đã chọn: nhân viên/loại nghỉ/ngày công.');
                    return;
                }
                if (!row.fromDateTime || !row.toDateTime) {
                    toastr && toastr.warning('Vui lòng nhập đầy đủ thời gian vào/ra cho tất cả dòng đã chọn.');
                    return;
                }
            }

            $.ajax({
                url: '/ess/infoApplyAttendance/api/attendanceEx/apply',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify(selectedRows),
                success: function (res) {
                    if (res && res.success) {
                        toastr && toastr.success(res.message || 'Xin phép thành công.');
                        _ex_selectedRowKeys = {};
                        $('.ex-select-all-rows').prop('checked', false);
                        _ex_table.ajax.reload(null, false);
                    } else {
                        toastr && toastr.error((res && res.error) || 'Xin phép thất bại.');
                    }
                },
                error: function () {
                    toastr && toastr.error('Lỗi khi gửi dữ liệu xin phép.');
                }
            });
        };

        window.exApplyAllSelected = function () {
            var batchIn = ($('#ex_bulkInTime').val() || '').trim();
            var batchOut = ($('#ex_bulkOutTime').val() || '').trim();
            var selectedCount = 0;

            if (!_ex_table) {
                return;
            }

            _ex_table.rows({ search: 'applied' }).every(function () {
                var keyToken = exGetRowToken(this.data());
                if (keyToken && _ex_selectedRowKeys[keyToken]) {
                    selectedCount++;
                }
            });

            if (selectedCount === 0) {
                if (typeof toastr !== 'undefined') {
                    toastr.warning('Vui lòng chọn ít nhất một dòng để thực hiện.');
                }
                return;
            }

            if (!batchIn && !batchOut) {
                if (typeof toastr !== 'undefined') {
                    toastr.warning('Vui lòng nhập thời gian vào hoặc thời gian ra.');
                }
                return;
            }

            _ex_table.rows({ search: 'applied' }).every(function () {
                var rowData = this.data();
                var keyToken = exGetRowToken(rowData);
                if (!keyToken || !_ex_selectedRowKeys[keyToken]) {
                    return;
                }
                if (batchIn) {
                    rowData.fromDateTime = batchIn;
                }
                if (batchOut) {
                    rowData.toDateTime = batchOut;
                }
                this.data(rowData);
            });
            _ex_table.draw(false);

            if (typeof toastr !== 'undefined') {
                toastr.success('Đã áp dụng thời gian cho các dòng đã chọn.');
            }
        };

        window.exExportExcel = function () {
            if (_ex_table) {
                _ex_table.button('.buttons-excel').trigger();
            }
        };

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', exBootPage);
        }
        if (typeof $ !== 'undefined') {
            $(document).ready(exBootPage);
        } else {
            exBootPage();
        }
    </script>
</template>
