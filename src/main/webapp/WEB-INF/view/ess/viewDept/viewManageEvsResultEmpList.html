<div th:fragment="content">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-body">
                    <form id="evs_searchForm" class="row g-3 mb-4">
                        <div class="col-md-3">
                            <label for="evs_keyword" class="form-label">Mã nhân viên / Họ tên</label>
                            <input type="text" class="form-control" id="evs_keyword" placeholder="Nhập mã hoặc họ tên">
                        </div>
                        <div class="col-md-3">
                            <label for="evs_deptNo" class="form-label">Phòng ban</label>
                            <input type="text" class="form-control" id="evs_deptNo" placeholder="Chọn phòng ban" readonly>
                        </div>
                        <div class="col-md-2">
                            <label for="evs_fromDate" class="form-label">Ngày vào làm từ</label>
                            <input type="text" class="form-control js-daterangepicker" id="evs_fromDate"
                                data-drp-format="YYYY-MM-DD" data-drp-auto-update-input="false" autocomplete="off">
                        </div>
                        <div class="col-md-2">
                            <label for="evs_toDate" class="form-label">Ngày vào làm đến</label>
                            <input type="text" class="form-control js-daterangepicker" id="evs_toDate"
                                data-drp-format="YYYY-MM-DD" data-drp-auto-update-input="false" autocomplete="off">
                        </div>
                        <div class="col-md-2">
                            <label for="evs_year" class="form-label">Năm đánh giá</label>
                            <input type="number" class="form-control" id="evs_year" min="2000" max="2099">
                        </div>
                        <div class="col-md-2">
                            <label for="evs_postFamily" class="form-label">Nhóm nhân viên</label>
                            <select class="form-select" id="evs_postFamily" data-parent-code="14015812"
                                data-default-text="-- Tất cả --"></select>
                        </div>
                        <div class="col-md-2">
                            <label for="evs_empTypeCode" class="form-label">Loại nhân viên</label>
                            <select class="form-select" id="evs_empTypeCode" data-parent-code="13864"
                                data-default-text="-- Tất cả --"></select>
                        </div>
                        <div class="col-md-2">
                            <label for="evs_empOffice" class="form-label">Trạng thái</label>
                            <select class="form-select" id="evs_empOffice" data-parent-code="15118"
                                data-default-text="-- Tất cả --" data-default-value="15119"></select>
                        </div>
                        <div class="col-md-6 d-flex align-items-end gap-2 flex-wrap">
                            <button type="button" class="btn btn-primary" onclick="evsSearchData()">
                                <i class="bx bx-search"></i> Tra cứu
                            </button>
                            <button type="button" class="btn btn-secondary" onclick="evsClearSearch()">
                                <i class="bx bx-x"></i> Xóa lọc
                            </button>
                            <button type="button" class="btn btn-success" onclick="evsExportExcel()">
                                <i class="bx bx-export"></i> Xuất excel
                            </button>
                        </div>
                    </form>

                    <div class="dt-table-wrapper" style="overflow: auto;">
                        <table id="evs_dataTable" class="table table-striped table-bordered table-hover">
                            <thead class="table-light text-center align-middle">
                                <tr>
                                    <th>STT</th>
                                    <th>Mã NV</th>
                                    <th>Họ tên</th>
                                    <th>Phòng ban</th>
                                    <th>Năm</th>
                                    <th>T1</th>
                                    <th>T2</th>
                                    <th>T3</th>
                                    <th>T4</th>
                                    <th>T5</th>
                                    <th>T6</th>
                                    <th>T7</th>
                                    <th>T8</th>
                                    <th>T9</th>
                                    <th>T10</th>
                                    <th>T11</th>
                                    <th>T12</th>
                                    <th>Năng lực</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<template id="fragmentScripts">
    <style>
        #evs_dataTable td,
        #evs_dataTable th {
            white-space: nowrap;
            vertical-align: middle;
        }
    </style>

    <script th:inline="javascript">
        var _evs_table = null;
        var _evs_pageBooted = false;
        var _evs_selectedDeptCodes = [];

        function evsInitDeptSelector() {
            if (typeof DeptTree === 'undefined') {
                return;
            }
            DeptTree.init('#evs_deptNo', function (selectedCodes) {
                _evs_selectedDeptCodes = selectedCodes || [];
            });
        }

        function evsEscHtml(value) {
            if (value === null || value === undefined) {
                return '';
            }
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function evsDefaultYear() {
            return new Date().getFullYear();
        }

        function evsGradeBadge(value) {
            var grade = evsEscHtml(value || '');
            if (!grade) {
                return '';
            }

            var gradeClass = 'secondary';
            if (grade === 'EX') {
                gradeClass = 'success';
            } else if (grade === 'VG') {
                gradeClass = 'primary';
            } else if (grade === 'GD') {
                gradeClass = 'info';
            } else if (grade === 'NI') {
                gradeClass = 'warning';
            } else if (grade === 'UN') {
                gradeClass = 'danger';
            }

            return '<span class="badge bg-' + gradeClass + '">' + grade + '</span>';
        }

        function evsRenderGrade(data, type) {
            if (type === 'display') {
                return evsGradeBadge(data);
            }
            return data || '';
        }

        function evsInitTable() {
            _evs_table = $('#evs_dataTable').DataTable({
                destroy: true,
                scrollX: true,
                scrollY: 'calc(100vh - 355px)',
                scrollCollapse: true,
                paging: true,
                searching: false,
                lengthChange: true,
                pageLength: 25,
                processing: true,
                autoWidth: false,
                dom: 'Blfrtip',
                buttons: [
                    {
                        extend: 'excel',
                        title: 'view_manage_evs_result_emp_list'
                    }
                ],
                ajax: {
                    url: '/ess/viewDept/api/manageEvsResultEmp/list',
                    dataSrc: '',
                    data: function (d) {
                        d.keyword = $('#evs_keyword').val();
                        d.deptNos = (_evs_selectedDeptCodes || []).join(',');
                        d.fromDate = $('#evs_fromDate').val();
                        d.toDate = $('#evs_toDate').val();
                        d.year = $('#evs_year').val();
                        d.postFamily = $('#evs_postFamily').val();
                        d.empTypeCode = $('#evs_empTypeCode').val();
                        d.empOffice = $('#evs_empOffice').val();
                    }
                },
                initComplete: function () {
                    $('#evs_dataTable_wrapper').find('.dt-buttons').hide();
                },
                columns: [
                    {
                        data: null,
                        className: 'text-center',
                        render: function (data, type, row, meta) {
                            return meta.settings._iDisplayStart + meta.row + 1;
                        }
                    },
                    { data: 'empId', className: 'text-center' },
                    { data: 'localName' },
                    { data: 'deptName' },
                    { data: 'evsYear', className: 'text-center' },
                    { data: 'evsMonth1', className: 'text-center', render: evsRenderGrade },
                    { data: 'evsMonth2', className: 'text-center', render: evsRenderGrade },
                    { data: 'evsMonth3', className: 'text-center', render: evsRenderGrade },
                    { data: 'evsMonth4', className: 'text-center', render: evsRenderGrade },
                    { data: 'evsMonth5', className: 'text-center', render: evsRenderGrade },
                    { data: 'evsMonth6', className: 'text-center', render: evsRenderGrade },
                    { data: 'evsMonth7', className: 'text-center', render: evsRenderGrade },
                    { data: 'evsMonth8', className: 'text-center', render: evsRenderGrade },
                    { data: 'evsMonth9', className: 'text-center', render: evsRenderGrade },
                    { data: 'evsMonth10', className: 'text-center', render: evsRenderGrade },
                    { data: 'evsMonth11', className: 'text-center', render: evsRenderGrade },
                    { data: 'evsMonth12', className: 'text-center', render: evsRenderGrade },
                    { data: 'evsMonth13', className: 'text-center', render: evsRenderGrade }
                ]
            });
        }

        function evsBootPage() {
            if (_evs_pageBooted) {
                return;
            }
            if (!document.getElementById('evs_dataTable')) {
                setTimeout(evsBootPage, 30);
                return;
            }

            _evs_pageBooted = true;
            $('#evs_year').val(evsDefaultYear());
            evsInitDeptSelector();

            $.when(typeof initCodeSelects === 'function' ? initCodeSelects('#evs_searchForm') : null).always(function () {
                evsInitTable();
                if (_evs_table) {
                    _evs_table.ajax.reload();
                }
            });
        }

        window.evsSearchData = function () {
            if (_evs_table) {
                _evs_table.ajax.reload();
            }
        };

        window.evsClearSearch = function () {
            $('#evs_keyword').val('');
            $('#evs_deptNo').val('');
            $('#evs_fromDate').val('');
            $('#evs_toDate').val('');
            $('#evs_year').val(evsDefaultYear());
            _evs_selectedDeptCodes = [];
            $('.auth-dept-chk-global').prop('checked', false).trigger('change');

            if (typeof resetCodeSelectDefaults === 'function') {
                resetCodeSelectDefaults('#evs_searchForm');
            } else {
                $('#evs_postFamily').val('');
                $('#evs_empTypeCode').val('');
                $('#evs_empOffice').val('');
            }

            if (_evs_table) {
                _evs_table.ajax.reload();
            }
        };

        window.evsExportExcel = function () {
            if (_evs_table) {
                _evs_table.button('.buttons-excel').trigger();
            }
        };

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', evsBootPage);
        }
        if (typeof $ !== 'undefined') {
            $(document).ready(evsBootPage);
        } else {
            evsBootPage();
        }
    </script>
</template>
