<div th:fragment="content">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-body">
                    <!-- Search Form -->
                    <form id="qualSearchForm" class="row g-3 mb-4">
                        <div class="col-md-3">
                            <label for="qualSearchEmpId" class="form-label">Mã nhân viên</label>
                            <input type="text" class="form-control" id="qualSearchEmpId"
                                placeholder="Nhập mã nhân viên">
                        </div>
                        <div class="col-md-3">
                            <label for="qualSearchLocalName" class="form-label">Tên nhân viên</label>
                            <input type="text" class="form-control" id="qualSearchLocalName"
                                placeholder="Nhập tên nhân viên">
                        </div>
                        <div class="col-md-3">
                            <label for="qualSearchQualName" class="form-label">Tên chứng chỉ</label>
                            <input type="text" class="form-control" id="qualSearchQualName"
                                placeholder="Nhập tên chứng chỉ">
                        </div>
                        <div class="col-md-3 d-flex align-items-end">
                            <button type="button" class="btn btn-primary me-2" onclick="qualSearchData()">
                                <i class="bx bx-search"></i> Tìm kiếm
                            </button>
                            <button type="button" class="btn btn-secondary" onclick="qualClearSearch()">
                                <i class="bx bx-x"></i> Xóa lọc
                            </button>
                            <button type="button" class="btn btn-success ms-2" onclick="qualOpenModal()">
                                <i class="bx bx-plus"></i> Thêm mới
                            </button>
                        </div>
                    </form>

                    <!-- Data Table -->
                    <div class="table-responsive">
                        <table id="qualificationTable" class="table table-striped table-bordered table-hover"
                            style="width:100%">
                            <thead class="table-light">
                                <tr>
                                    <th>STT</th>
                                    <th>Mã NV</th>
                                    <th>Họ tên</th>
                                    <th>Tên chứng chỉ</th>
                                    <th>Ngày nhận</th>
                                    <th>Số hiệu</th>
                                    <th>Nơi cấp</th>
                                    <th>Ngày hết hạn</th>
                                    <th>Xếp loại</th>
                                    <th class="text-center" style="width: 100px;">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Data loaded via AJAX -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal Thêm/Sửa -->
<div class="modal fade" id="qualModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="qualModalTitle">Thông tin chứng chỉ</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="qualForm">
                    <input type="hidden" id="qualNo" name="qualNo">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="qualEmpNameDisplay" class="form-label">Nhân viên <span
                                    class="text-danger">*</span></label>
                            <div class="input-group">
                                <input type="text" class="form-control" id="qualEmpNameDisplay"
                                    placeholder="Chọn nhân viên..." readonly required>
                                <input type="hidden" id="qualPersonId" name="personId">
                                <button class="btn btn-outline-primary" type="button"
                                    onclick="qualOpenEmployeeSearchPopup()">
                                    <i class="bx bx-search"></i>
                                </button>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label for="qualName" class="form-label">Tên chứng chỉ <span
                                    class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="qualName" name="qualName" required>
                        </div>
                        <div class="col-md-6">
                            <label for="dateObtained" class="form-label">Ngày nhận</label>
                            <input type="text" class="form-control" id="dateObtained" name="dateObtained"
                                placeholder="YYYYMMDD">
                        </div>
                        <div class="col-md-6">
                            <label for="qualCardNo" class="form-label">Số chứng chỉ</label>
                            <input type="text" class="form-control" id="qualCardNo" name="qualCardNo">
                        </div>
                        <div class="col-md-6">
                            <label for="qualInstitute" class="form-label">Nơi cấp</label>
                            <input type="text" class="form-control" id="qualInstitute" name="qualInstitute">
                        </div>
                        <div class="col-md-6">
                            <label for="validityDate" class="form-label">Ngày hết hạn</label>
                            <input type="text" class="form-control" id="validityDate" name="validityDate"
                                placeholder="YYYYMMDD">
                        </div>
                        <div class="col-md-6">
                            <label for="qualLevel" class="form-label">Cấp độ</label>
                            <input type="text" class="form-control" id="qualLevel" name="qualLevel">
                        </div>
                        <div class="col-md-6">
                            <label for="qualGrade" class="form-label">Xếp loại</label>
                            <input type="text" class="form-control" id="qualGrade" name="qualGrade">
                        </div>
                        <div class="col-md-6">
                            <label for="acquisitionModes" class="form-label">Hình thức đạt được</label>
                            <input type="text" class="form-control" id="acquisitionModes" name="acquisitionModes">
                        </div>
                        <div class="col-md-6">
                            <label for="paymentAllowanceYN" class="form-label">Trả phụ cấp</label>
                            <select class="form-select" id="paymentAllowanceYN" name="paymentAllowanceYN">
                                <option value="">-- Chọn --</option>
                                <option value="Y">Có</option>
                                <option value="N">Không</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="qualSubmitDate" class="form-label">Ngày nộp</label>
                            <input type="text" class="form-control" id="qualSubmitDate" name="qualSubmitDate"
                                placeholder="YYYYMMDD">
                        </div>
                        <div class="col-md-12">
                            <label for="qualRemark" class="form-label">Ghi chú</label>
                            <textarea class="form-control" id="qualRemark" name="qualRemark" rows="2"></textarea>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                <button type="button" class="btn btn-primary" onclick="qualSaveData()">Lưu</button>
            </div>
        </div>
    </div>
</div>

<template id="fragmentScripts">
    <script th:inline="javascript">
        $(document).ready(function () {
            var table = $('#qualificationTable').DataTable({
                destroy: true,
                scrollY: "calc(100vh - 280px)",
                scrollCollapse: true,
                paging: true,
                searching: true,
                lengthChange: true,
                pageLength: 20,
                columnDefs: [
                    { "width": "2%", "targets": 0 },   // Cột STT cố định nhỏ
                ],
                processing: true,

                dom: 'Blfrtip',
                buttons: [
                    'copy', 'csv', 'excel', 'pdf', 'print'
                ],
                ajax: {
                    url: '/hrm/empinfo/api/qualification',
                    dataSrc: '',
                    data: function (d) {
                        d.empId = $('#qualSearchEmpId').val();
                        d.localName = $('#qualSearchLocalName').val();
                        d.qualName = $('#qualSearchQualName').val();
                    }
                },
                columns: [
                    {
                        data: null,
                        render: function (data, type, row, meta) {
                            return meta.row + 1;
                        }
                    },
                    { data: 'empId' },
                    { data: 'localName' },
                    { data: 'qualName' },
                    { data: 'dateObtained' },
                    { data: 'qualCardNo' },
                    { data: 'qualInstitute' },
                    { data: 'validityDate' },
                    { data: 'qualGrade' },
                    {
                        data: null,
                        className: "text-center",
                        render: function (data, type, row) {
                            return `
                                <div class="btn-group btn-group-sm">
                                    <button class="btn btn-warning" onclick="qualEditRaw(${row.qualNo})">
                                        <i class="bx bx-edit"></i>
                                    </button>
                                    <button class="btn btn-danger" onclick="qualDeleteRaw(${row.qualNo})">
                                        <i class="bx bx-trash"></i>
                                    </button>
                                </div>
                            `;
                        }
                    }
                ]
            });

            window.qualSearchData = function () {
                table.ajax.reload();
            };

            window.qualClearSearch = function () {
                $('#qualSearchForm')[0].reset();
                table.ajax.reload();
            };

            // Mở modal thêm mới
            window.qualOpenModal = function () {
                $('#qualModalTitle').text('Thêm mới Chứng chỉ');
                $('#qualForm')[0].reset();
                $('#qualNo').val('');
                $('#qualPersonId').val('');
                var modal = new bootstrap.Modal(document.getElementById('qualModal'));
                modal.show();
            };

            // Mở popup tìm kiếm nhân viên
            window.qualOpenEmployeeSearchPopup = function () {
                if (typeof EmployeeSearchModal !== 'undefined') {
                    EmployeeSearchModal.open(function (employee) {
                        $('#qualPersonId').val(employee.personId);
                        $('#qualEmpNameDisplay').val(employee.empId + ' - ' + employee.localName);
                    });
                } else {
                    alert('Component tìm kiếm nhân viên chưa được tải!');
                }
            };

            // Sửa
            window.qualEditRaw = function (id) {
                $.ajax({
                    url: '/hrm/empinfo/api/qualification/' + id,
                    type: 'GET',
                    success: function (data) {
                        $('#qualModalTitle').text('Cập nhật Chứng chỉ');
                        $('#qualNo').val(data.qualNo);
                        $('#qualPersonId').val(data.personId);
                        $('#qualEmpNameDisplay').val((data.empId || '') + ' - ' + (data.localName || ''));
                        $('#qualName').val(data.qualName);
                        $('#dateObtained').val(data.dateObtained);
                        $('#qualCardNo').val(data.qualCardNo);
                        $('#qualInstitute').val(data.qualInstitute);
                        $('#validityDate').val(data.validityDate);
                        $('#qualLevel').val(data.qualLevel);
                        $('#qualGrade').val(data.qualGrade);
                        $('#acquisitionModes').val(data.acquisitionModes);
                        $('#paymentAllowanceYN').val(data.paymentAllowanceYN);
                        $('#qualSubmitDate').val(data.qualSubmitDate);
                        $('#qualRemark').val(data.qualRemark);

                        var modal = new bootstrap.Modal(document.getElementById('qualModal'));
                        modal.show();
                    },
                    error: function (err) {
                        if (typeof toastr !== 'undefined') toastr.error('Lỗi khi lấy thông tin: ' + (err.responseJSON ? err.responseJSON.error : err.responseText));
                        else alert('Lỗi khi lấy thông tin: ' + (err.responseJSON ? err.responseJSON.error : err.responseText));
                    }
                });
            };

            // Lưu dữ liệu
            window.qualSaveData = function () {
                // Validate cơ bản
                if (!$('#qualPersonId').val() || !$('#qualName').val()) {
                    if (typeof toastr !== 'undefined') toastr.warning('Vui lòng chọn Nhân viên và nhập Tên chứng chỉ');
                    else alert('Vui lòng chọn Nhân viên và nhập Tên chứng chỉ');
                    return;
                }

                var formData = {
                    qualNo: $('#qualNo').val() || null,
                    personId: $('#qualPersonId').val(),
                    qualName: $('#qualName').val(),
                    dateObtained: $('#dateObtained').val(),
                    qualCardNo: $('#qualCardNo').val(),
                    qualInstitute: $('#qualInstitute').val(),
                    validityDate: $('#validityDate').val(),
                    qualLevel: $('#qualLevel').val(),
                    qualGrade: $('#qualGrade').val(),
                    acquisitionModes: $('#acquisitionModes').val(),
                    paymentAllowanceYN: $('#paymentAllowanceYN').val(),
                    qualSubmitDate: $('#qualSubmitDate').val(),
                    qualRemark: $('#qualRemark').val()
                };

                $.ajax({
                    url: '/hrm/empinfo/api/qualification/save',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(formData),
                    success: function (res) {
                        if (typeof toastr !== 'undefined') toastr.success(res.message || 'Lưu thành công');
                        else alert(res.message || 'Lưu thành công');

                        var modalEl = document.getElementById('qualModal');
                        var modal = bootstrap.Modal.getInstance(modalEl);
                        if (modal) {
                            modal.hide();
                        } else {
                            $(modalEl).modal('hide');
                        }

                        table.ajax.reload();
                    },
                    error: function (err) {
                        var errorMsg = (err.responseJSON && err.responseJSON.error) ? err.responseJSON.error : (err.responseText || "Lỗi không xác định");
                        if (typeof toastr !== 'undefined') toastr.error('Lỗi khi lưu: ' + errorMsg);
                        else alert('Lỗi khi lưu: ' + errorMsg);
                    }
                });
            };

            // Xóa
            window.qualDeleteRaw = function (id) {
                if (confirm('Bạn có chắc chắn muốn xóa bản ghi này?')) {
                    $.ajax({
                        url: '/hrm/empinfo/api/qualification/delete/' + id,
                        type: 'DELETE',
                        success: function (res) {
                            if (typeof toastr !== 'undefined') toastr.success(res.message || 'Xóa thành công');
                            else alert(res.message || 'Xóa thành công');
                            table.ajax.reload();
                        },
                        error: function (err) {
                            var errorMsg = (err.responseJSON && err.responseJSON.error) ? err.responseJSON.error : (err.responseText || "Lỗi không xác định");
                            if (typeof toastr !== 'undefined') toastr.error('Lỗi khi xóa: ' + errorMsg);
                            else alert('Lỗi khi xóa: ' + errorMsg);
                        }
                    });
                }
            };
        });
    </script>
</template>
