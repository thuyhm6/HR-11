<div th:fragment="content">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-body">
                    <!-- Search Form -->
                    <form id="lv_searchForm" class="row g-3 mb-4">
                        <div class="col-md-2">
                            <label for="lv_searchEmpId" class="form-label">Mã nhân viên</label>
                            <input type="text" class="form-control" id="lv_searchEmpId" placeholder="Nhập mã nhân viên">
                        </div>
                        <div class="col-md-2">
                            <label for="lv_searchEmpName" class="form-label">Tên nhân viên</label>
                            <input type="text" class="form-control" id="lv_searchEmpName"
                                placeholder="Nhập tên nhân viên">
                        </div>
                        <div class="col-md-2">
                            <label for="lv_searchFromDate" class="form-label">Từ ngày</label>
                            <input type="date" class="form-control" id="lv_searchFromDate">
                        </div>
                        <div class="col-md-2">
                            <label for="lv_searchToDate" class="form-label">Đến ngày</label>
                            <input type="date" class="form-control" id="lv_searchToDate">
                        </div>
                        <div class="col-md-4 d-flex align-items-end flex-wrap gap-1">
                            <button type="button" class="btn btn-primary" onclick="lvSearchData()">
                                <i class="bx bx-search"></i> Tìm kiếm
                            </button>
                            <button type="button" class="btn btn-secondary" onclick="lvClearSearch()">
                                <i class="bx bx-x"></i> Xóa lọc
                            </button>
                            <button type="button" class="btn btn-success" onclick="lvAddEmptyRow()">
                                <i class="bx bx-plus"></i> Thêm trống
                            </button>
                        </div>
                    </form>

                    <!-- Data Table -->
                    <div class="table-responsive">
                        <table id="lv_dataTable" class="table table-striped table-bordered table-hover"
                            style="width:100%">
                            <thead class="table-light">
                                <tr>
                                    <th style="width: 1%;">No</th>
                                    <th style="width: 10%;">Nhân viên</th>
                                    <th style="width: 8%;">Phòng ban</th>
                                    <th style="width: 6%;">Phép còn</th>
                                    <th style="width: 10%;">Loại nghỉ</th>
                                    <th style="width: 11%;">Thời gian bắt đầu</th>
                                    <th style="width: 11%;">Thời gian kết thúc</th>
                                    <th style="width: 5%;">Số giờ</th>
                                    <th style="width: 10%;">Lý do</th>
                                    <th style="width: 7%;">Trạng thái</th>
                                    <th style="width: 8%;">Người tạo</th>
                                    <th style="width: 8%;">Người sửa</th>
                                    <th class="text-center" style="width: 10%;">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal Xem Người Duyệt -->
<div class="modal fade" id="lv_approverModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Thông tin người phê duyệt</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <table class="table table-bordered">
                    <thead class="table-light">
                        <tr>
                            <th>Mã NV</th>
                            <th>Tên nhân viên</th>
                            <th>Vị trí</th>
                            <th>Bộ phận</th>
                            <th>Cấp duyệt</th>
                        </tr>
                    </thead>
                    <tbody id="lv_approverTbody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<template id="fragmentScripts">
    <script th:inline="javascript">
        var _lv_typeList = [];
        var _lv_table;
        var _lv_addedRows = [];

        window.lvValidateMinutes = function (input) {
            if (!input.value) return;
            var parts = input.value.split('T');
            if (parts.length < 2) return;
            var datePart = parts[0];
            var timeParts = parts[1].split(':');
            if (timeParts.length < 2) return;
            
            var h = timeParts[0];
            var m = parseInt(timeParts[1], 10);
            var allowed = [0, 2, 15, 17, 30, 32, 45, 47];
            
            if (allowed.indexOf(m) === -1) {
                var closestMinute = 0;
                for (var i = allowed.length - 1; i >= 0; i--) {
                    if (m >= allowed[i]) {
                        closestMinute = allowed[i];
                        break;
                    }
                }
                var formattedMinute = closestMinute < 10 ? '0' + closestMinute : closestMinute;
                input.value = datePart + 'T' + h + ':' + formattedMinute;
                toastr && toastr.warning('Phút không hợp lệ, hệ thống đã tự động điều chỉnh về ' + formattedMinute + ' (chỉ chấp nhận: 00, 02, 15, 17, 30, 32, 45, 47)');
            }
        };

        function lvInitDate() {
            var now = new Date();
            var day = now.getDay() || 7;
            var monday = new Date(now);
            monday.setDate(now.getDate() - day + 1);
            var sunday = new Date(now);
            sunday.setDate(now.getDate() - day + 7);

            var formatDate = function (d) {
                var mm = d.getMonth() + 1;
                var dd = d.getDate();
                return [d.getFullYear(), (mm > 9 ? '' : '0') + mm, (dd > 9 ? '' : '0') + dd].join('-');
            };

            $('#lv_searchFromDate').val(formatDate(monday));
            $('#lv_searchToDate').val(formatDate(sunday));
        }

        $(document).ready(function () {
            // Thiết lập giá trị Từ ngày - Đến ngày mặc định (tuần hiện tại)
            lvInitDate();

            // Tải danh sách loại nghỉ phép thông qua parentCodeNo 21
            $.ajax({
                url: '/sys/api/code/list?parentCodeNo=21',
                success: function (data) {
                    _lv_typeList = data || [];
                    lvInitTable();
                },
                error: function () {
                    toastr && toastr.error('Không tải được danh sách loại nghỉ!');
                    lvInitTable();
                }
            });
        });

        function lvInitTable() {
            _lv_table = $('#lv_dataTable').DataTable({
                destroy: true,
                scrollY: "calc(100vh - 280px)",
                scrollCollapse: true,
                paging: true,
                searching: false,
                lengthChange: true,
                pageLength: 25,
                processing: true,
                language: { url: '//cdn.datatables.net/plug-ins/1.10.25/i18n/Vietnamese.json' },
                ajax: {
                    url: '/ar/attendanceMintenance/api/leaveApply/list',
                    dataSrc: function (json) {
                        return _lv_addedRows.concat(json || []);
                    },
                    data: function (d) {
                        d.empId = $('#lv_searchEmpId').val();
                        d.localName = $('#lv_searchEmpName').val();
                        d.fromDate = $('#lv_searchFromDate').val();
                        d.toDate = $('#lv_searchToDate').val();
                    }
                },
                columns: [
                    {
                        data: null,
                        render: function (data, type, row, meta) { return meta.row + 1; }
                    },
                    {
                        data: 'empId',
                        render: function (data, type, row) {
                            if (row.isNew) {
                                return '<div class="input-group input-group-sm">'
                                    + '<input type="text" class="form-control lv-in-empname" readonly placeholder="Chọn NV...">'
                                    + '<input type="hidden" class="lv-in-personid">'
                                    + '<button class="btn btn-outline-secondary" type="button" onclick="lvPickEmp(this)"><i class="bx bx-search"></i></button>'
                                    + '</div>';
                            }
                            return data + ' - ' + (row.localName || '');
                        }
                    },
                    {
                        data: 'deptName',
                        render: function (data) { return data || ''; }
                    },
                    {
                        data: 'annualLeaveCount',
                        render: function (data) { return data || '0'; }
                    },
                    {
                        data: 'leaveTypeCode',
                        render: function (data, type, row) {
                            var opts = '<option value="">-- Loại nghỉ --</option>';
                            _lv_typeList.forEach(function (s) {
                                var selected = (s.codeNo === data) ? 'selected' : '';
                                var dName = s.nameVi || s.description || s.codeNo;
                                opts += '<option value="' + s.codeNo + '" ' + selected + '>' + dName + '</option>';
                            });
                            return '<select class="form-select form-select-sm lv-in-type">' + opts + '</select>';
                        }
                    },
                    {
                        data: 'leaveFromTime',
                        render: function (data, type, row) {
                            var val = (data) ? data.replace(' ', 'T') : '';
                            return '<input type="datetime-local" class="form-control form-control-sm lv-in-from" onchange="lvValidateMinutes(this)" value="' + val + '">';
                        }
                    },
                    {
                        data: 'leaveToTime',
                        render: function (data, type, row) {
                            var val = (data) ? data.replace(' ', 'T') : '';
                            return '<input type="datetime-local" class="form-control form-control-sm lv-in-to" onchange="lvValidateMinutes(this)" value="' + val + '">';
                        }
                    },
                    {
                        data: 'applyLength',
                        render: function (data) {
                            var val = data || '0';
                            return '<input type="number" step="0.5" class="form-control form-control-sm lv-in-len" value="' + val + '" readonly>';
                        }
                    },
                    {
                        data: 'leaveReason',
                        render: function (data, type, row) {
                            var val = data ? data.replace(/"/g, '&quot;') : '';
                            return '<input type="text" class="form-control form-control-sm lv-in-reason" value="' + val + '">';
                        }
                    },
                    {
                        data: 'affirmFlag',
                        render: function (data) {
                            if (!data || data === '0') return 'Chưa lưu';
                            if (data === '14014306') return '<span class="badge bg-warning text-dark">Lưu tạm</span>';
                            if (data === '14014307') return '<span class="badge bg-info">Đang duyệt</span>';
                            if (data === '14014308') return '<span class="badge bg-success">Đã duyệt</span>';
                            if (data === '14014309') return '<span class="badge bg-danger">Từ chối</span>';
                            return data;
                        }
                    },
                    {
                        data: 'createdBy',
                        render: function (data, type, row) {
                            if (row.isNew) return '';
                            var name = data || '';
                            var date = row.createDate || '';
                            return name + '<br><small class="text-muted">' + date + '</small>';
                        }
                    },
                    {
                        data: 'updatedBy',
                        render: function (data, type, row) {
                            if (row.isNew) return '';
                            var name = data || '';
                            var date = row.updateDate || '';
                            return name + '<br><small class="text-muted">' + date + '</small>';
                        }
                    },
                    {
                        data: null,
                        className: "text-center",
                        render: function (data, type, row) {
                            var btnSave = '<button class="btn btn-sm btn-primary me-1" onclick="lvSaveLine(this, \'' + (row.applyNo || '') + '\', \'' + (row.personId || '') + '\')">'
                                + '<i class="bx bx-save"></i>'
                                + '</button>';

                            var btnApprovers = '';
                            if (!row.isNew && row.affirmStr) {
                                btnApprovers = '<button class="btn btn-sm btn-info text-white" onclick="lvShowApprovers(this, \'' + btoa(unescape(encodeURIComponent(row.affirmStr || ''))) + '\')">'
                                    + '<i class="bx bx-user-check"></i> Duyệt'
                                    + '</button>';
                            }
                            return btnSave + btnApprovers;
                        }
                    }
                ]
            });
        }

        window.lvSearchData = function () {
            _lv_addedRows = [];
            if (_lv_table) _lv_table.ajax.reload();
        };

        window.lvClearSearch = function () {
            $('#lv_searchForm')[0].reset();
            lvInitDate(); // Reset lại ngày theo tuần hiện tại sau khi clear form
            _lv_addedRows = [];
            if (_lv_table) _lv_table.ajax.reload();
        };

        window.lvAddEmptyRow = function () {
            _lv_addedRows.unshift({
                isNew: true,
                applyNo: '',
                personId: '',
                deptName: '',
                annualLeaveCount: '0',
                leaveTypeCode: '',
                leaveFromTime: '',
                leaveToTime: '',
                applyLength: '0',
                leaveReason: '',
                affirmFlag: '',
                createdBy: '',
                createDate: '',
                updatedBy: '',
                updateDate: ''
            });
            if (_lv_table) _lv_table.ajax.reload(null, false);
        };

        window.lvPickEmp = function (btn) {
            if (typeof EmployeeSearchModal !== 'undefined') {
                EmployeeSearchModal.open(function (emp) {
                    var $tr = $(btn).closest('tr');
                    $tr.find('.lv-in-personid').val(emp.personId);
                    $tr.find('.lv-in-empname').val(emp.empId + ' - ' + emp.localName);
                    // store temporarily on row object
                    var rowData = _lv_table.row($tr).data();
                    rowData.personId = emp.personId;
                });
            } else {
                alert('Chưa có component tìm nhân viên.');
            }
        };

        window.lvSaveLine = function (btn, applyNo, rowPersonId) {
            var $tr = $(btn).closest('tr');
            var rowData = _lv_table.row($tr).data();

            var personId = rowData.isNew ? $tr.find('.lv-in-personid').val() : rowPersonId;
            var leaveTypeCode = $tr.find('.lv-in-type').val();
            var leaveFromTime = $tr.find('.lv-in-from').val();
            var leaveToTime = $tr.find('.lv-in-to').val();
            var applyLength = $tr.find('.lv-in-len').val();
            var leaveReason = $tr.find('.lv-in-reason').val();

            if (!personId) { toastr && toastr.warning('Chưa chọn nhân viên!'); return; }
            if (!leaveTypeCode) { toastr && toastr.warning('Chưa chọn loại nghỉ!'); return; }
            if (!leaveFromTime) { toastr && toastr.warning('Chưa chọn Từ lúc!'); return; }
            if (!leaveToTime) { toastr && toastr.warning('Chưa chọn Đến lúc!'); return; }

            // format datetime-local (YYYY-MM-DDTHH:mm) -> YYYY-MM-DD HH:mm
            leaveFromTime = leaveFromTime.replace('T', ' ');
            leaveToTime = leaveToTime.replace('T', ' ');

            var payload = {
                applyNo: applyNo,
                personId: personId,
                leaveTypeCode: leaveTypeCode,
                leaveFromTime: leaveFromTime,
                leaveToTime: leaveToTime,
                applyLength: applyLength,
                leaveReason: leaveReason,
                affirmStr: rowData.affirmStr // passed from backend or undefined when new, we will re-generate confirm at backend ideally by triggering GET_AFFIRMOR_LIST but here params require affirmStr?
            };

            if (rowData.isNew) {
                // If it is new, we cannot run AffirmStr reliably from frontend.
                // Normally backend calculates affirmStr dynamically upon save. But we send empty to trigger insert without level1 first, or ideally backend should generate it if null!
                payload.affirmStr = null;
            }

            var $btn = $(btn);
            var oHtml = $btn.html();
            $btn.html('<i class="bx bx-loader bx-spin"></i>').prop('disabled', true);

            $.ajax({
                url: '/ar/attendanceMintenance/api/leaveApply/save',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify(payload),
                success: function (res) {
                    $btn.html(oHtml).prop('disabled', false);
                    if (res && res.success) {
                        toastr && toastr.success(res.message);
                        if (rowData.isNew) _lv_addedRows.shift();
                        _lv_table.ajax.reload(null, false);
                    } else {
                        toastr && toastr.error(res.error || 'Lỗi lưu dữ liệu');
                    }
                },
                error: function (err) {
                    $btn.html(oHtml).prop('disabled', false);
                    toastr && toastr.error('Lỗi khi gửi dữ liệu!');
                }
            });
        };

        window.lvShowApprovers = function (btn, b64sql) {
            var sql = decodeURIComponent(escape(atob(b64sql)));
            if (!sql) {
                toastr && toastr.warning('Không có thông tin chuỗi câu lệnh'); return;
            }

            $.ajax({
                url: '/ar/attendanceMintenance/api/leaveApply/approvers',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({ sql: sql }),
                success: function (data) {
                    var h = '';
                    if (data && data.length > 0) {
                        data.forEach(function (ap) {
                            h += '<tr>'
                                + '<td>' + (ap.empId || '') + '</td>'
                                + '<td>' + (ap.localName || '') + '</td>'
                                + '<td>' + (ap.positionName || '') + '</td>'
                                + '<td>' + (ap.deptName || '') + '</td>'
                                + '<td class="text-center">' + (ap.affirmLevel || '') + '</td>'
                                + '</tr>';
                        });
                    } else {
                        h = '<tr><td colspan="5" class="text-center">Không có cấp duyệt nào</td></tr>';
                    }
                    $('#lv_approverTbody').html(h);
                    new bootstrap.Modal(document.getElementById('lv_approverModal')).show();
                },
                error: function () {
                    toastr && toastr.error('Lỗi lấy người duyệt!');
                }
            });
        };
    </script>
</template>
