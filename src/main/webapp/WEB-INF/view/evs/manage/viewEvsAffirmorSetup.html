<div th:fragment="content">
    <div class="row">
        <div class="col-12" id="veas_pageWrapper">

            <!-- Điều kiện tìm kiếm -->
            <div class="card mb-3">
                <div class="card-body">
                    <form id="veas_searchForm" class="row gy-2 align-items-end">
                        <div class="col-md-3 d-flex align-items-center gap-2">
                            <label class="form-label small text-muted mb-0 text-nowrap">Tên đánh giá</label>
                            <select class="form-select form-select-sm" id="veas_resumeSeq"
                                style="max-width:260px;"></select>
                        </div>
                        <div class="col-md-2 d-flex align-items-center gap-2">
                            <label class="form-label small text-muted mb-0 text-nowrap">Phòng ban</label>
                            <input type="text" class="form-control form-control-sm" id="veas_deptSearch"
                                style="max-width:200px;" placeholder="Chọn phòng ban" readonly>
                        </div>
                        <div class="col-md-2 d-flex align-items-center gap-2">
                            <label class="form-label small text-muted mb-0 text-nowrap">Người đánh giá</label>
                            <input type="text" class="form-control form-control-sm" id="veas_affirmorSearch"
                                style="max-width:200px;" placeholder="Chọn từ khóa sau đó Enter">
                        </div>
                        <div class="col-md-5 d-flex gap-2">
                            <button type="button" class="btn btn-primary" onclick="veasSearch()">
                                <i class="bi bi-search"></i> Tra cứu
                            </button>
                            <button type="button" class="btn btn-secondary" onclick="veasClearSearch()">
                                <i class="bi bi-x-circle"></i> Xóa lọc
                            </button>
                            <button type="button" class="btn btn-primary" onclick="veasOpenAddModal()">
                                <i class="bi bi-plus-circle"></i> Thêm mới
                            </button>
                            <button type="button" class="btn btn-success" onclick="veasSaveAll()">
                                <i class="bi bi-save"></i> Lưu tất cả
                            </button>
                            <button type="button" class="btn btn-warning" onclick="veasCreateTarget()">
                                <i class="bi bi-bullseye"></i> Tạo mục tiêu
                            </button>
                            <button type="button" class="btn btn-danger" onclick="veasEvsStart()">
                                <i class="bi bi-play-circle"></i> Bắt đầu đánh giá
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Thanh áp dụng hàng loạt -->
            <div class="card mb-2">
                <div class="card-body py-2 px-3">
                    <div class="d-flex align-items-end gap-2 flex-wrap">
                        <div class="col-md-6 d-flex align-items-center gap-2">
                            <label class="form-label small text-muted mb-0 text-nowrap">Giai đoạn</label>
                            <select class="form-select form-select-sm" id="veas_bulkStage">
                                <option value="">Lựa chọn</option>
                                <option value="1">Người đánh giá 1</option>
                                <option value="2">Người đánh giá 2</option>
                            </select>
                            <label class="form-label small text-muted mb-0 text-nowrap">Người đánh giá</label>
                            <div class="input-group input-group-sm">
                                <input type="text" class="form-control" id="veas_bulkDisplay"
                                    placeholder="Chọn từ khóa sau đó Enter" readonly>
                                <input type="hidden" id="veas_bulkPersonId">
                                <input type="hidden" id="veas_bulkLocalName">
                                <input type="hidden" id="veas_bulkPosition">
                                <button class="btn btn-outline-secondary" type="button" onclick="veasBulkSearch('')">
                                    <i class="bi bi-search"></i>
                                </button>
                            </div>
                        </div>

                        <div class="col-md-4 d-flex align-items-center gap-2">
                            <button type="button" class="btn btn-secondary btn-sm" onclick="veasBulkClear()">
                                Xóa
                            </button>
                            <button type="button" class="btn btn-primary btn-sm" onclick="veasBulkApply()">
                                Thực hiện tất cả
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Bảng danh sách -->
            <div class="card">
                <div class="card-body p-2">
                    <div class="table-responsive">
                        <table id="veas_table" class="table table-striped table-bordered table-hover table-sm"
                            style="width:100%">
                            <thead class="table-light">
                                <tr>
                                    <th class="text-center no-sort">
                                        <input type="checkbox" id="veas_checkAll" title="Chọn tất cả">
                                    </th>
                                    <th class="text-center no-sort">No.</th>
                                    <th>Họ tên</th>
                                    <th class="text-center">Mã NV</th>
                                    <th>Phòng ban</th>
                                    <th class="text-center">Chức vụ</th>
                                    <th class="text-center">Ngày vào làm</th>
                                    <th class="no-sort">Bảng đánh giá</th>
                                    <th class="text-center">Nhóm ĐG</th>
                                    <th class="no-sort">ĐG1 - Họ tên</th>
                                    <th class="text-center no-sort">ĐG1 - Chức vụ</th>
                                    <th class="no-sort">ĐG2 - Họ tên</th>
                                    <th class="text-center no-sort">ĐG2 - Chức vụ</th>
                                    <th class="no-sort">Người thay đổi</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div><!-- /#veas_pageWrapper -->
    </div><!-- /.row -->

    <!-- Modal thêm mới đối tượng đánh giá -->
    <div class="modal fade" id="veas_addModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Thêm mới đối tượng đánh giá</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Đối tượng đánh giá <span
                                class="text-danger">*</span></label>
                        <div class="input-group input-group-sm">
                            <input type="text" class="form-control" id="veas_add_objectDisplay"
                                placeholder="Chọn nhân viên..." readonly>
                            <input type="hidden" id="veas_add_objectPersonId">
                            <button class="btn btn-outline-primary" type="button" onclick="veasOpenEmpSearch('object')">
                                <i class="bi bi-search"></i>
                            </button>
                            <button class="btn btn-outline-secondary" type="button"
                                onclick="veasClearAddField('object')">
                                <i class="bi bi-x"></i>
                            </button>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Người đánh giá lần 1</label>
                        <div class="input-group input-group-sm">
                            <input type="text" class="form-control" id="veas_add_affirm1Display"
                                placeholder="Chọn nhân viên..." readonly>
                            <input type="hidden" id="veas_add_affirm1PersonId">
                            <button class="btn btn-outline-primary" type="button"
                                onclick="veasOpenEmpSearch('affirm1')">
                                <i class="bi bi-search"></i>
                            </button>
                            <button class="btn btn-outline-secondary" type="button"
                                onclick="veasClearAddField('affirm1')">
                                <i class="bi bi-x"></i>
                            </button>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Người đánh giá lần 2</label>
                        <div class="input-group input-group-sm">
                            <input type="text" class="form-control" id="veas_add_affirm2Display"
                                placeholder="Chọn nhân viên..." readonly>
                            <input type="hidden" id="veas_add_affirm2PersonId">
                            <button class="btn btn-outline-primary" type="button"
                                onclick="veasOpenEmpSearch('affirm2')">
                                <i class="bi bi-search"></i>
                            </button>
                            <button class="btn btn-outline-secondary" type="button"
                                onclick="veasClearAddField('affirm2')">
                                <i class="bi bi-x"></i>
                            </button>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Đóng</button>
                    <button type="button" class="btn btn-primary btn-sm" onclick="veasSaveNewObject()">
                        <i class="bi bi-save"></i> Lưu
                    </button>
                </div>
            </div>
        </div>
    </div>


</div><!-- th:fragment="content" -->

<template id="fragmentScripts">
    <style>
        #veas_table th,
        #veas_table td {
            vertical-align: middle;
        }

        #veas_table thead th {
            white-space: nowrap;
        }

        .veas-affirm-grade {
            font-size: 0.75rem;
            color: #6c757d;
        }

        .veas-affirm-input {
            font-size: 0.8rem;
        }

        .veas-affirm-display {
            cursor: pointer;
            display: inline-block;
            min-width: 60px;
            min-height: 1.2em;
        }

        .veas-affirm-display:hover {
            text-decoration: underline dotted #aaa;
        }

        .veas-row-chk {
            cursor: pointer;
            width: 16px;
            height: 16px;
        }

        tr.veas-ticked {
            background-color: #fff3cd !important;
        }

        /* Ẩn icon sort ở các cột không cho phép sắp xếp */
        #veas_table thead th.no-sort {
            cursor: default;
            pointer-events: none;
        }

        #veas_table thead th.no-sort::before,
        #veas_table thead th.no-sort::after {
            display: none !important;
        }
    </style>
    <script th:inline="javascript">
        (function () {
            var _veas_tabId = window._currentTabId || 'default-content';

            window._veas_inst = window._veas_inst || {};
            if (!window._veas_inst[_veas_tabId]) {
                window._veas_inst[_veas_tabId] = {
                    evsType: new URLSearchParams((window._currentTabUrl || window.location.href).split('?')[1] || '').get('evsType') || '',
                    addModal: null,
                    table: null,
                    selectedDeptCodes: [],
                    changes: {},
                    ticked: new Set()
                };
            }
            var inst = window._veas_inst[_veas_tabId];

            function veas$(sel) { return $('#' + _veas_tabId).find(sel); }

            function veasEsc(s) {
                if (s == null) return '';
                return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
            }

            // Render ô nhập người đánh giá dạng input-group
            function veasAffirmInput(seq, level, localName, personId) {
                var chg = inst.changes[seq];
                var a = (chg && chg['a' + level]) || { localName: localName, personId: personId };
                var val = veasEsc(a.localName || '');
                var pid = veasEsc(a.personId || '');
                return '<div class="input-group input-group-sm">'
                    + '<input type="text" class="form-control veas-affirm-input" style="font-size:0.8rem;"'
                    + ' data-seq="' + veasEsc(seq) + '" data-level="' + level + '" data-pid="' + pid + '"'
                    + ' value="' + val + '" placeholder="Nhập tên, Enter để tìm...">'
                    + '<button class="btn btn-outline-secondary btn-sm veas-affirm-btn" type="button"'
                    + ' data-seq="' + veasEsc(seq) + '" data-level="' + level + '">'
                    + '<i class="bi bi-search"></i></button>'
                    + '</div>';
            }

            // Render ô người đánh giá dạng text (click để chỉnh sửa)
            function veasAffirmDisplay(seq, level, localName, personId) {
                var chg = inst.changes[seq];
                var a = (chg && chg['a' + level]) || { localName: localName, personId: personId };
                var val = a.localName || '';
                var pid = a.personId || '';
                var display = val ? veasEsc(val) : '<em class="text-muted" style="font-size:0.8rem;">—</em>';
                return '<span class="veas-affirm-display"'
                    + ' data-seq="' + veasEsc(seq) + '" data-level="' + level + '"'
                    + ' data-name="' + veasEsc(val) + '" data-pid="' + veasEsc(pid) + '"'
                    + ' title="Click để chỉnh sửa">' + display + '</span>';
            }

            // Mở EmployeeSearchModal với keyword pre-fill
            function veasOpenAffirmSearch(seq, level, keyword) {
                if (typeof EmployeeSearchModal === 'undefined') {
                    alert('Component tìm kiếm nhân viên chưa được tải!');
                    return;
                }
                EmployeeSearchModal.currentCallback = function (emp) {
                    // Lưu thay đổi vào state
                    if (!inst.changes[seq]) inst.changes[seq] = {};
                    inst.changes[seq]['a' + level] = {
                        personId: emp.personId,
                        localName: emp.localName,
                        postGradeName: emp.position || ''
                    };

                    // Cập nhật tên vào input (input vẫn còn trong DOM nhờ flag _affirmSearchOpen)
                    var $inp = veas$('.veas-affirm-input[data-seq="' + seq + '"][data-level="' + level + '"]');
                    if ($inp.length) {
                        $inp.val(emp.localName).attr('data-pid', emp.personId).focus();
                    } else {
                        // Fallback: cell đã về display mode → cập nhật trực tiếp
                        var colNameMap = { 1: 9, 2: 11 };
                        veas$('.veas-affirm-display[data-seq="' + seq + '"][data-level="' + level + '"]')
                            .closest('td')
                            .html(veasAffirmDisplay(seq, level, emp.localName, emp.personId));
                    }

                    // Cập nhật cột chức vụ tương ứng (col index: ĐG1-CV=10, ĐG2-CV=12)
                    var cvColMap = { 1: 10, 2: 12 };
                    if (cvColMap[level]) {
                        veas$('.veas-affirm-input[data-seq="' + seq + '"][data-level="' + level + '"], .veas-affirm-display[data-seq="' + seq + '"][data-level="' + level + '"]')
                            .closest('tr').find('td').eq(cvColMap[level])
                            .html('<small class="veas-affirm-grade">' + veasEsc(emp.position || '') + '</small>');
                    }

                    // Tự động tick dòng
                    veas$('.veas-row-chk[data-seq="' + seq + '"]').prop('checked', true).trigger('change');
                };

                // Pre-fill keyword vào ô tên rồi mở popup
                $(EmployeeSearchModal.config.searchForm.localName).val(keyword || '');
                $(EmployeeSearchModal.config.searchForm.empId).val('');
                $(EmployeeSearchModal.config.searchForm.deptNo).val('');
                // Đánh dấu modal đang mở để blur handler không đóng input
                inst._affirmSearchOpen = true;
                $(EmployeeSearchModal.config.modalId).off('hidden.bs.modal.veas_flag')
                    .on('hidden.bs.modal.veas_flag', function () { inst._affirmSearchOpen = false; });
                $(EmployeeSearchModal.config.modalId).modal('show');
                $(EmployeeSearchModal.config.modalId).off('shown.bs.modal.veas').on('shown.bs.modal.veas', function () {
                    if (EmployeeSearchModal.dataTable) EmployeeSearchModal.dataTable.columns.adjust();
                });
                EmployeeSearchModal.search();
            }

            // ── Thực hiện tất cả: mở popup chọn người đánh giá hàng loạt ────
            window.veasBulkSearch = function (keyword) {
                if (typeof EmployeeSearchModal === 'undefined') {
                    alert('Component tìm kiếm nhân viên chưa được tải!'); return;
                }
                EmployeeSearchModal.currentCallback = function (emp) {
                    veas$('#veas_bulkDisplay').val(emp.empId + ' - ' + emp.localName);
                    veas$('#veas_bulkPersonId').val(emp.personId);
                    veas$('#veas_bulkLocalName').val(emp.localName);
                    veas$('#veas_bulkPosition').val(emp.position || '');
                };
                $(EmployeeSearchModal.config.searchForm.localName).val(keyword || '');
                $(EmployeeSearchModal.config.searchForm.empId).val('');
                $(EmployeeSearchModal.config.searchForm.deptNo).val('');
                $(EmployeeSearchModal.config.modalId).modal('show');
                $(EmployeeSearchModal.config.modalId).off('shown.bs.modal.veasbulk').on('shown.bs.modal.veasbulk', function () {
                    if (EmployeeSearchModal.dataTable) EmployeeSearchModal.dataTable.columns.adjust();
                });
                EmployeeSearchModal.search();
            };

            window.veasBulkClear = function () {
                veas$('#veas_bulkStage').val('');
                veas$('#veas_bulkDisplay').val('');
                veas$('#veas_bulkPersonId').val('');
                veas$('#veas_bulkLocalName').val('');
                veas$('#veas_bulkPosition').val('');
            };

            window.veasBulkApply = function () {
                var stage = veas$('#veas_bulkStage').val();
                var personId = veas$('#veas_bulkPersonId').val();
                var localName = veas$('#veas_bulkLocalName').val();
                var position = veas$('#veas_bulkPosition').val();

                if (!stage) { alert('Vui lòng chọn Giai đoạn (1 hoặc 2).'); return; }
                if (!personId) { alert('Vui lòng chọn Người đánh giá.'); return; }
                if (inst.ticked.size === 0) {
                    alert('Chưa có dòng nào được tick. Vui lòng tick các dòng cần áp dụng.'); return;
                }

                var count = 0;
                inst.table.rows().data().each(function (row) {
                    if (!inst.ticked.has(String(row.seq))) return;
                    if (!inst.changes[row.seq]) inst.changes[row.seq] = {};
                    inst.changes[row.seq]['a' + stage] = { personId: personId, localName: localName, postGradeName: position };
                    count++;
                });

                // Invalidate cache rồi redraw để render function đọc inst.changes mới
                inst.table.rows().invalidate().draw(false);
                // Khôi phục highlight cho dòng đã tick sau khi redraw
                veas$('.veas-row-chk:checked').closest('tr').addClass('veas-ticked');

                // alert('Đã áp dụng Giai đoạn ' + stage + ' cho ' + count + ' dòng.');
            };

            // Cho phép gõ keyword trong ô bulk rồi Enter để mở popup
            // (bind sau khi DOM ready — xem phần Boot)

            // ── Load resume dropdown ──────────────────────────────────────────
            function veasLoadResumeList() {
                $.ajax({
                    url: '/evs/manage/api/resume/evsResumeList',
                    type: 'GET',
                    data: { evsType: inst.evsType },
                    success: function (rows) {
                        var html = '';
                        (rows || []).forEach(function (r) {
                            html += '<option value="' + veasEsc(r.seq) + '">' + veasEsc(r.resumeName) + '</option>';
                        });
                        veas$('#veas_resumeSeq').html(html);
                        if (rows && rows.length > 0) {
                            veas$('#veas_resumeSeq').val(rows[0].seq);
                            if (inst.table) inst.table.ajax.reload();
                        }
                    }
                });
            }

            // ── Search & Clear ────────────────────────────────────────────────
            window.veasSearch = function () { if (inst.table) inst.table.ajax.reload(); };

            window.veasClearSearch = function () {
                veas$('#veas_deptSearch').val('');
                inst.selectedDeptCodes = [];
                veas$('.auth-dept-chk-global').prop('checked', false).trigger('change');
                veas$('#veas_affirmorSearch').val('');
                if (inst.table) inst.table.ajax.reload();
            };

            // ── Tạo mục tiêu ─────────────────────────────────────────────────
            window.veasCreateTarget = function () {
                var resumeSeq = veas$('#veas_resumeSeq').val();
                if (!resumeSeq) { alert('Vui lòng chọn tên đánh giá trước.'); return; }
                if (!confirm('Bạn có chắc muốn tạo mục tiêu cho đợt đánh giá này không?')) return;
                $.ajax({
                    url: '/evs/manage/api/affirmorSetup/createTarget',
                    type: 'POST', contentType: 'application/json',
                    data: JSON.stringify({ resumeSeq: resumeSeq }),
                    success: function (res) {
                        if (res.success) { alert('Tạo mục tiêu thành công!'); if (inst.table) inst.table.ajax.reload(); }
                        else { alert('Lỗi: ' + (res.message || 'Không thể tạo mục tiêu.')); }
                    },
                    error: function () { alert('Lỗi khi gọi tạo mục tiêu. Vui lòng thử lại.'); }
                });
            };

            // ── Bắt đầu đánh giá ─────────────────────────────────────────────
            window.veasEvsStart = function () {
                var resumeSeq = veas$('#veas_resumeSeq').val();
                if (!resumeSeq) { alert('Vui lòng chọn tên đánh giá trước.'); return; }
                if (!confirm('Bạn có chắc muốn bắt đầu đánh giá cho đợt này không?')) return;
                $.ajax({
                    url: '/evs/manage/api/affirmorSetup/evsStart',
                    type: 'POST', contentType: 'application/json',
                    data: JSON.stringify({ resumeSeq: resumeSeq }),
                    success: function (res) {
                        if (res.success) { alert('Bắt đầu đánh giá thành công!'); if (inst.table) inst.table.ajax.reload(); }
                        else { alert('Lỗi: ' + (res.message || 'Không thể bắt đầu đánh giá.')); }
                    },
                    error: function () { alert('Lỗi khi gọi bắt đầu đánh giá. Vui lòng thử lại.'); }
                });
            };

            // ── Lưu tất cả (chỉ lưu dòng được tick) ─────────────────────────
            window.veasSaveAll = function () {
                if (inst.ticked.size === 0) {
                    alert('Chưa có dòng nào được chọn để lưu. Hãy chọn người đánh giá hoặc tick vào dòng cần lưu.');
                    return;
                }
                var payload = [];
                inst.table.rows().data().each(function (row) {
                    if (!inst.ticked.has(String(row.seq))) return;
                    var chg = inst.changes[row.seq] || {};
                    payload.push({
                        seq: row.seq,
                        personId1: (chg.a1 && chg.a1.personId) || row.personId1 || null,
                        personId2: (chg.a2 && chg.a2.personId) || row.personId2 || null,
                        personId3: (chg.a3 && chg.a3.personId) || row.personId3 || null,
                        personId4: (chg.a4 && chg.a4.personId) || row.personId4 || null
                    });
                });
                $.ajax({
                    url: '/evs/manage/api/affirmorSetup/save',
                    type: 'POST', contentType: 'application/json',
                    data: JSON.stringify(payload),
                    success: function () {
                        inst.changes = {};
                        inst.ticked = new Set();
                        alert('Lưu thành công!');
                        if (inst.table) inst.table.ajax.reload();
                    },
                    error: function () { alert('Lỗi khi lưu dữ liệu. Vui lòng thử lại.'); }
                });
            };

            // ── Thêm mới đối tượng đánh giá ──────────────────────────────────
            window.veasOpenAddModal = function () {
                veas$('#veas_add_objectDisplay').val('');
                veas$('#veas_add_objectPersonId').val('');
                veas$('#veas_add_affirm1Display').val('');
                veas$('#veas_add_affirm1PersonId').val('');
                veas$('#veas_add_affirm2Display').val('');
                veas$('#veas_add_affirm2PersonId').val('');
                veas$('#veas_add_affirm3Display').val('');
                veas$('#veas_add_affirm3PersonId').val('');
                veas$('#veas_add_affirm4Display').val('');
                veas$('#veas_add_affirm4PersonId').val('');
                inst.addModal.show();
            };

            window.veasOpenEmpSearch = function (field) {
                if (typeof EmployeeSearchModal === 'undefined') {
                    alert('Component tìm kiếm nhân viên chưa được tải!'); return;
                }
                EmployeeSearchModal.open(function (employee) {
                    veas$('#veas_add_' + field + 'Display').val(employee.empId + ' - ' + employee.localName);
                    veas$('#veas_add_' + field + 'PersonId').val(employee.personId);
                });
            };

            window.veasClearAddField = function (field) {
                veas$('#veas_add_' + field + 'Display').val('');
                veas$('#veas_add_' + field + 'PersonId').val('');
            };

            window.veasSaveNewObject = function () {
                var resumeSeq = veas$('#veas_resumeSeq').val();
                var objectPersonId = veas$('#veas_add_objectPersonId').val();
                if (!resumeSeq) { alert('Vui lòng chọn tên đánh giá trước.'); return; }
                if (!objectPersonId) { alert('Vui lòng chọn đối tượng đánh giá.'); return; }
                $.ajax({
                    url: '/evs/manage/api/affirmorSetup/addObject',
                    type: 'POST', contentType: 'application/json',
                    data: JSON.stringify({
                        resumeSeq: resumeSeq,
                        personId: objectPersonId,
                        personId1: veas$('#veas_add_affirm1PersonId').val() || null,
                        personId2: veas$('#veas_add_affirm2PersonId').val() || null,
                        personId3: veas$('#veas_add_affirm3PersonId').val() || null,
                        personId4: veas$('#veas_add_affirm4PersonId').val() || null
                    }),
                    success: function (res) {
                        if (res.success) { inst.addModal.hide(); alert('Thêm mới thành công!'); if (inst.table) inst.table.ajax.reload(); }
                        else { alert('Lỗi: ' + (res.message || 'Không thể thêm mới.')); }
                    },
                    error: function () { alert('Lỗi khi thêm mới. Vui lòng thử lại.'); }
                });
            };

            // ── Khởi tạo DeptTree selector ────────────────────────────────────
            function veasInitDeptSelector() {
                if (typeof DeptTree === 'undefined') return;
                DeptTree.init('#' + _veas_tabId + ' #veas_deptSearch', function (selectedCodes) {
                    inst.selectedDeptCodes = selectedCodes || [];
                });
            }

            // ── Boot ─────────────────────────────────────────────────────────
            $(document).ready(function () {
                if (inst.table) return;

                inst.addModal = new bootstrap.Modal(veas$('#veas_addModal')[0]);
                veasInitDeptSelector();

                // Click vào display span → chuyển sang input mode
                $(document).off('click.veas_ad_' + _veas_tabId)
                    .on('click.veas_ad_' + _veas_tabId, '#' + _veas_tabId + ' .veas-affirm-display', function () {
                        var $span = $(this);
                        var seq = $span.data('seq');
                        var level = $span.data('level');
                        var name = $span.data('name');
                        var pid = $span.data('pid');
                        $span.closest('td').html(veasAffirmInput(seq, level, name, pid));
                        $span.closest('td').find('.veas-affirm-input').focus().select();
                    });

                // Mousedown trên search button → preventDefault để tránh blur trên input trước khi click xử lý
                $(document).off('mousedown.veas_abm_' + _veas_tabId)
                    .on('mousedown.veas_abm_' + _veas_tabId, '#' + _veas_tabId + ' .veas-affirm-btn', function (e) {
                        e.preventDefault();
                    });

                // Blur input → chuyển về display mode (bỏ qua khi modal đang mở)
                $(document).off('blur.veas_aib_' + _veas_tabId)
                    .on('blur.veas_aib_' + _veas_tabId, '#' + _veas_tabId + ' .veas-affirm-input', function () {
                        if (inst._affirmSearchOpen) return;
                        var $input = $(this);
                        var seq = $input.data('seq');
                        var level = parseInt($input.data('level'));
                        var localName = $input.val().trim();
                        var personId = $input.attr('data-pid') || '';
                        $input.closest('td').html(veasAffirmDisplay(seq, level, localName, personId));
                    });

                // Enter trong ô nhập người đánh giá → mở popup với keyword đã nhập
                $(document).off('keydown.veas_ai_' + _veas_tabId)
                    .on('keydown.veas_ai_' + _veas_tabId, '#' + _veas_tabId + ' .veas-affirm-input', function (e) {
                        if (e.key !== 'Enter') return;
                        e.preventDefault();
                        veasOpenAffirmSearch($(this).data('seq'), parseInt($(this).data('level')), $(this).val().trim());
                    });

                // Click nút kính lúp → mở popup không có keyword
                $(document).off('click.veas_ab_' + _veas_tabId)
                    .on('click.veas_ab_' + _veas_tabId, '#' + _veas_tabId + ' .veas-affirm-btn', function () {
                        veasOpenAffirmSearch($(this).data('seq'), parseInt($(this).data('level')), '');
                    });

                // Checkbox từng dòng
                $(document).off('change.veas_chk_' + _veas_tabId)
                    .on('change.veas_chk_' + _veas_tabId, '#' + _veas_tabId + ' .veas-row-chk', function () {
                        var seq = $(this).data('seq');
                        var $tr = $(this).closest('tr');
                        if ($(this).is(':checked')) { inst.ticked.add(String(seq)); $tr.addClass('veas-ticked'); }
                        else { inst.ticked.delete(String(seq)); $tr.removeClass('veas-ticked'); }
                    });

                // Enter trong ô bulk display → mở popup với keyword đã gõ
                veas$('#veas_bulkDisplay').prop('readonly', false)
                    .on('keydown', function (e) {
                        if (e.key !== 'Enter') return;
                        e.preventDefault();
                        veasBulkSearch($(this).val().trim());
                    });

                // Checkbox chọn tất cả
                veas$('#veas_checkAll').on('change', function () {
                    var checked = $(this).is(':checked');
                    veas$('.veas-row-chk').prop('checked', checked).trigger('change');
                });

                veas$('#veas_resumeSeq').on('change', function () {
                    inst.changes = {};
                    inst.ticked = new Set();
                    if (inst.table) inst.table.ajax.reload();
                });

                inst.table = veas$('#veas_table').DataTable({
                    scrollY: 'calc(100vh - 320px)',
                    scrollCollapse: true,
                    paging: true,
                    searching: true,
                    lengthChange: true,
                    pageLength: 50,
                    processing: true,
                    dom: 'Blfrtip',
                    buttons: ['copy', 'csv', 'excel', 'pdf', 'print'],
                    // Tắt sort ở các cột: checkbox(0), No.(1), Bảng ĐG(7), ĐG1-name(9), ĐG1-CV(10), ĐG2-name(11), ĐG2-CV(12), Người thay đổi(13)
                    order: [],
                    columnDefs: [{ orderable: false, targets: [0, 1, 7, 9, 10, 11, 12, 13] }],
                    ajax: {
                        url: '/evs/manage/api/affirmorSetup/list',
                        dataSrc: '',
                        data: function (d) {
                            d.resumeSeq = veas$('#veas_resumeSeq').val() || '';
                            d.deptNos = (inst.selectedDeptCodes || []).join(',');
                            d.affirmorKeyword = veas$('#veas_affirmorSearch').val() || '';
                            d.evsType = inst.evsType;
                        }
                    },
                    columns: [
                        // Col 0: checkbox
                        {
                            data: null, className: 'text-center', orderable: false,
                            render: function (data, type, row) {
                                var checked = inst.ticked.has(String(row.seq)) ? 'checked' : '';
                                return '<input type="checkbox" class="veas-row-chk" data-seq="' + veasEsc(row.seq) + '" ' + checked + '>';
                            }
                        },
                        // Col 1: No.
                        {
                            data: null, className: 'text-center', orderable: false,
                            render: function (data, type, row, meta) { return meta.row + 1; }
                        },
                        { data: 'localName' },                                          // 2
                        { data: 'empid', className: 'text-center' },                    // 3
                        { data: 'deptname' },                                           // 4
                        { data: 'postGradeName', className: 'text-center' },            // 5
                        { data: 'dateStarted', className: 'text-center' },              // 6
                        {                                                               // 7
                            data: null,
                            render: function (data, type, row) {
                                return (row.listTypeName ? veasEsc(row.listTypeName) : '')
                                    + (row.evsGroupName ? '<br><small class="text-muted">' + veasEsc(row.evsGroupName) + '</small>' : '');
                            }
                        },
                        { data: 'evsOccGroupName', className: 'text-center', defaultContent: '' }, // 8
                        // Col 9: ĐG1 - Họ tên (click-to-edit)
                        {
                            data: null, orderable: false,
                            render: function (data, type, row) {
                                return veasAffirmDisplay(row.seq, 1, row.localName1, row.personId1);
                            }
                        },
                        // Col 10: ĐG1 - Chức vụ
                        {
                            data: null, orderable: false,
                            render: function (data, type, row) {
                                var chg = inst.changes[row.seq];
                                var pg = (chg && chg.a1) ? chg.a1.postGradeName : (row.postGradeName1 || '');
                                return '<small class="veas-affirm-grade">' + veasEsc(pg) + '</small>';
                            }
                        },
                        // Col 11: ĐG2 - Họ tên (click-to-edit)
                        {
                            data: null, orderable: false,
                            render: function (data, type, row) {
                                return veasAffirmDisplay(row.seq, 2, row.localName2, row.personId2);
                            }
                        },
                        // Col 12: ĐG2 - Chức vụ
                        {
                            data: null, orderable: false,
                            render: function (data, type, row) {
                                var chg = inst.changes[row.seq];
                                var pg = (chg && chg.a2) ? chg.a2.postGradeName : (row.postGradeName2 || '');
                                return '<small class="veas-affirm-grade">' + veasEsc(pg) + '</small>';
                            }
                        },
                        // Col 13: Người thay đổi
                        {
                            data: null, className: 'text-center', orderable: false,
                            render: function (data, type, row) {
                                return '<small>' + veasEsc(row.updatedBy || '') + '<br>' + veasEsc(row.updateDate || '') + '</small>';
                            }
                        }
                    ],
                    autoWidth: false
                });

                veasLoadResumeList();
            });
        })();
    </script>
</template>
