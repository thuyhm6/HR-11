<div th:fragment="content">
    <div class="row h-100">
        <!-- Top Pane: Company Selection -->
        <div class="col-12 mb-3">
            <div class="card">
                <div class="card-body py-2">
                    <div class="row align-items-center">
                        <div class="col-auto">
                            <label class="fw-bold fs-5 mb-0">Công ty (Company):</label>
                        </div>
                        <div class="col-md-4">
                            <select id="menuParam_companySelect" class="form-select select2">
                                <option value="">-- Chọn công ty --</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Left Pane: Menu Tree -->
        <div class="col-md-3 border-end p-3">
            <h5 class="mb-3">Danh sách Menu System</h5>
            <div class="mb-2">
                <input type="text" class="form-control" id="menuParam_searchTreeInput" placeholder="Tìm kiếm...">
            </div>
            <div class="tree-container" style="max-height: 700px; overflow-y: auto;">
                <div id="menuParam_tree"></div>
            </div>
        </div>

        <!-- Right Pane: Child Code List -->
        <div class="col-md-9 p-3">
            <div class="card h-100">
                <div class="card-header bg-light d-flex justify-content-between align-items-center">
                    <span class="fw-bold" id="menuParam_selectedParentLabel">Danh sách Menu con</span>
                    <div>
                        <button class="btn btn-sm btn-primary me-1" id="menuParam_btnSaveList" disabled><i
                                class="bx bx-save"></i> Lưu</button>
                        <button class="btn btn-sm btn-success" id="menuParam_btnExport"><i class="bx bx-download"></i>
                            Xuất Excel</button>
                    </div>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table id="menuParam_table" class="table table-striped table-hover w-100">
                            <thead>
                                <tr>
                                    <th>STT</th>
                                    <th class="text-center"><input type="checkbox" id="menuParam_checkAll" disabled>
                                    </th>
                                    <th>Mã Menu</th>
                                    <th>Tên TV</th>
                                    <th>Tên TA</th>
                                    <th>Thứ tự (Param)</th>
                                    <th>Trạng thái</th>
                                    <th>Thao tác</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Edit Param Options -->
    <div class="modal fade" id="menuParam_modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Cập nhật tham số Menu</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="menuParam_form">
                        <input type="hidden" id="menuParam_menuNo">
                        <div class="mb-3">
                            <label class="form-label">Thứ tự sắp xếp</label>
                            <input type="number" class="form-control" id="menuParam_orderNo">
                        </div>
                        <div class="mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="menuParam_activity">
                                <label class="form-check-label">Hoạt động</label>
                            </div>
                        </div>
                        <div class="mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="menuParam_isCanBeBuild">
                                <label class="form-check-label">Is Can Be Build</label>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                    <button type="button" class="btn btn-primary" id="menuParam_btnSave">Lưu</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <template id="fragmentScripts">
        <link rel="stylesheet" href="/assets/plugins/jstree/style.min.css" />
        <script src="/assets/plugins/jstree/jstree.min.js"></script>

        <script th:inline="none">
            $(document).ready(function () {
                var paramTable;
                var currentParentMenu = '';
                var selectedCompanyId = '';

                // --- 1. Init Components ---
                if ($.fn.select2) {
                    $('.select2').select2({ width: '100%' });
                }

                // Load Companies
                $.ajax({
                    url: '/sys/api/company/list',
                    success: function (data) {
                        var $select = $('#menuParam_companySelect');
                        if (data && data.length > 0) {
                            data.forEach(function (c) {
                                $select.append(new Option(c.nameVi + ' (' + c.cpnyId + ')', c.cpnyId));
                            });
                        }
                    }
                });

                $('#menuParam_companySelect').change(function () {
                    selectedCompanyId = $(this).val();
                    if (currentParentMenu) {
                        loadTable(currentParentMenu);
                    }
                });

                // --- 2. Menu Tree ---
                function loadTree() {
                    $.ajax({
                        url: '/sys/api/menu/list',
                        success: function (data) {
                            if (!data || data.length === 0) {
                                $('#menuParam_tree').html('<div class="text-muted p-2">Không có dữ liệu</div>');
                                return;
                            }
                            // Create Set of IDs for orphan check
                            var idSet = new Set();
                            data.forEach(item => idSet.add(item.menuNo));

                            // Build Tree Data
                            var treeData = data.map(item => {
                                var parentId = item.menuParentNo;
                                // If parent is null, empty, ROOT, or doesn't exist in the current list -> treat as root
                                if (!parentId || parentId === 'ROOT' || !idSet.has(parentId)) {
                                    parentId = '#';
                                }

                                var nodeText = item.nameVi || item.menuCode;
                                if (item.menuCode) nodeText += ' (' + item.menuCode + ')';

                                return {
                                    id: item.menuNo,
                                    parent: parentId,
                                    text: nodeText,
                                    icon: item.menuImg || 'bx bxs-folder',
                                    state: {
                                        opened: parentId === '#' // Only expand root nodes by default
                                    }
                                };
                            });

                            // Destroy and Init jstree
                            $('#menuParam_tree').jstree("destroy").jstree({
                                'core': {
                                    'data': treeData,
                                    'themes': { 'name': 'default', 'responsive': true, 'dots': true },
                                    'check_callback': true
                                },
                                'plugins': ['search', 'types', 'sort'] // Add sort plugin
                            });
                        },
                        error: function (err) {
                            console.error("Tree Load Error", err);
                            $('#menuParam_tree').html('<div class="text-danger p-2">Lỗi tải dữ liệu</div>');
                        }
                    });
                }
                loadTree();

                var to = false;
                $('#menuParam_searchTreeInput').keyup(function () {
                    if (to) clearTimeout(to);
                    to = setTimeout(function () {
                        var v = $('#menuParam_searchTreeInput').val();
                        $('#menuParam_tree').jstree(true).search(v);
                    }, 250);
                });

                $('#menuParam_tree').on("changed.jstree", function (e, data) {
                    if (data.selected.length) {
                        currentParentMenu = data.selected[0];
                        $('#menuParam_selectedParentLabel').text('Danh sách Menu con của: ' + data.instance.get_node(data.selected[0]).text);
                        loadTable(currentParentMenu);
                    } else {
                        currentParentMenu = '';
                        $('#menuParam_selectedParentLabel').text('Danh sách Menu con');
                        loadTable('');
                    }
                });

                // --- 3. DataTable ---
                paramTable = $('#menuParam_table').DataTable({
                    destroy: true,
                    columns: [
                        { data: null, render: (d, t, r, m) => m.row + 1 },
                        {
                            data: 'assigned',
                            className: 'text-center',
                            render: function (data, type, row) {
                                var isChecked = (row.uiChecked !== undefined) ? row.uiChecked : row.assigned;
                                var checked = isChecked ? 'checked' : '';
                                return '<input type="checkbox" class="form-check-input param-check" ' + checked + ' data-menuno="' + row.menuNo + '">';
                            }
                        },
                        { data: 'menuCode' },
                        { data: 'nameVi' },
                        { data: 'nameEn' },
                        { data: 'paramOrderNo', render: (d) => d != null ? d : '-' },
                        {
                            data: 'paramActivity',
                            render: function (d) {
                                if (d === 1) return '<span class="badge bg-success">Active</span>';
                                if (d === 0) return '<span class="badge bg-secondary">Inactive</span>';
                                return '-';
                            }
                        },
                        {
                            data: null,
                            render: function (data, type, row) {
                                var disabled = row.assigned ? '' : 'disabled';
                                return '<button class="btn btn-sm btn-warning btn-edit-param" ' + disabled + '><i class="bx bx-edit"></i></button>';
                            }
                        }
                    ],
                    lengthMenu: [[10, 25, 50, -1], [10, 25, 50, "All"]],
                    pageLength: 25
                });

                function loadTable(parentMenu) {
                    if (!parentMenu) {
                        paramTable.clear().draw();
                        return;
                    }
                    // Fetch API
                    $.ajax({
                        url: '/sys/api/menu_param/list',
                        data: { parentMenuNo: parentMenu, cpnyId: selectedCompanyId || '' },
                        success: function (data) {
                            if (selectedCompanyId) {
                                $('#menuParam_btnSaveList').prop('disabled', false);
                                $('#menuParam_checkAll').prop('disabled', false);
                            } else {
                                $('#menuParam_btnSaveList').prop('disabled', true);
                                $('#menuParam_checkAll').prop('disabled', true);
                            }
                            $('#menuParam_checkAll').prop('checked', false);
                            paramTable.clear().rows.add(data).draw();
                        },
                        error: function () {
                            console.error("API load failed");
                        }
                    });
                }

                // --- 4. Event Handlers ---
                $('#menuParam_table tbody').on('change', '.param-check', function () {
                    var isChecked = $(this).is(':checked');
                    var row = paramTable.row($(this).closest('tr'));
                    var data = row.data();
                    data.uiChecked = isChecked;

                    if (!isChecked) {
                        $('#menuParam_checkAll').prop('checked', false);
                    }
                });

                $('#menuParam_checkAll').change(function () {
                    var isChecked = $(this).is(':checked');
                    paramTable.rows().every(function () {
                        var d = this.data();
                        d.uiChecked = isChecked;
                    });
                    $('.param-check').prop('checked', isChecked);
                });

                $('#menuParam_btnSaveList').click(function () {
                    if (!selectedCompanyId) {
                        if (typeof toastr !== 'undefined') toastr.warning('Vui lòng chọn công ty trước');
                        else alert('Vui lòng chọn công ty trước');
                        return;
                    }

                    var promises = [];
                    var count = 0;

                    paramTable.rows().every(function () {
                        var data = this.data();
                        var currentStatus = (data.uiChecked !== undefined) ? data.uiChecked : data.assigned;
                        var originalStatus = data.assigned;

                        // Only act if changed
                        if (currentStatus != originalStatus) {
                            count++;
                            var payload = {
                                cpnyId: selectedCompanyId,
                                menuNo: data.menuNo,
                                paramActivity: 1,
                                paramOrderNo: 0
                            };

                            if (currentStatus) {
                                // Add
                                promises.push($.ajax({
                                    url: '/sys/api/menu_param/save',
                                    type: 'POST',
                                    contentType: 'application/json',
                                    data: JSON.stringify(payload)
                                }));
                            } else {
                                // Remove
                                promises.push($.ajax({
                                    url: '/sys/api/menu_param/delete',
                                    type: 'POST',
                                    contentType: 'application/json',
                                    data: JSON.stringify(payload)
                                }));
                            }
                        }
                    });

                    if (count === 0) {
                        if (typeof toastr !== 'undefined') toastr.info('Không có thay đổi nào cần lưu');
                        else alert('Không có thay đổi nào cần lưu');
                        return;
                    }

                    Promise.all(promises).then(function () {
                        if (typeof toastr !== 'undefined') toastr.success('Cập nhật thành công ' + count + ' mục');
                        else alert('Cập nhật thành công');
                        loadTable(currentParentMenu);
                    }).catch(function () {
                        if (typeof toastr !== 'undefined') toastr.error('Có lỗi xảy ra khi lưu dữ liệu');
                        else alert('Có lỗi xảy ra khi lưu dữ liệu');
                        loadTable(currentParentMenu);
                    });
                });

                $('#menuParam_table tbody').on('click', '.btn-edit-param', function () {
                    var row = paramTable.row($(this).parents('tr')).data();
                    if (!row.assigned) return;

                    $('#menuParam_menuNo').val(row.menuNo);
                    $('#menuParam_orderNo').val(row.paramOrderNo || 0);
                    $('#menuParam_activity').prop('checked', row.paramActivity !== 0);
                    $('#menuParam_isCanBeBuild').prop('checked', row.isCanBeBuild === '1');

                    var modal = new bootstrap.Modal(document.getElementById('menuParam_modal'));
                    modal.show();
                });

                $('#menuParam_btnSave').click(function () {
                    var menuNo = $('#menuParam_menuNo').val();
                    var orderNo = $('#menuParam_orderNo').val();
                    var activity = $('#menuParam_activity').is(':checked') ? 1 : 0;
                    var isCanBeBuild = $('#menuParam_isCanBeBuild').is(':checked') ? '1' : '0';

                    var data = {
                        cpnyId: selectedCompanyId,
                        menuNo: menuNo,
                        paramActivity: activity,
                        paramOrderNo: orderNo,
                        isCanBeBuild: isCanBeBuild
                    };

                    $.ajax({
                        url: '/sys/api/menu_param/save',
                        type: 'POST',
                        contentType: 'application/json',
                        data: JSON.stringify(data),
                        success: function (res) {
                            if (res.success) {
                                if (typeof toastr !== 'undefined') toastr.success('Cập nhật thành công');
                                else alert('Cập nhật thành công');

                                var modalEl = document.getElementById('menuParam_modal');
                                var modal = bootstrap.Modal.getInstance(modalEl);
                                modal.hide();

                                loadTable(currentParentMenu);
                            } else {
                                if (typeof toastr !== 'undefined') toastr.error(res.message);
                                else alert(res.message);
                            }
                        }
                    });
                });

                $('#menuParam_btnExport').click(function () {
                    if (!selectedCompanyId) {
                        if (typeof toastr !== 'undefined') toastr.warning('Chọn công ty để xuất excel');
                        else alert('Chọn công ty để xuất excel');
                        return;
                    }
                    window.location.href = '/sys/api/menu_param/export?cpnyId=' + selectedCompanyId + '&parentMenuNo=' + currentParentMenu;
                });
            });
        </script>
    </template>
</div>
