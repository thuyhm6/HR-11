# Database Operation Logging Configuration
# This file contains logging settings optimized for database operations only

# ===========================================
# LOGGING CONFIGURATION - DATABASE ONLY
# ===========================================

# Database Operation Logging Only
logging.level.com.ait.config.SqlOnlyInterceptor=INFO
logging.level.com.ait.ar=DEBUG
logging.level.com.ait.hrm=DEBUG
logging.level.com.ait.org=DEBUG
logging.level.com.ait.sy=DEBUG
logging.level.org.apache.ibatis=DEBUG
logging.level.org.springframework.jdbc.core=DEBUG

# MyBatis SQL Logging
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis.configuration.map-underscore-to-camel-case=true

# Application Logging - DISABLED
logging.level.com.ait=OFF
logging.level.com.ait.service=OFF
logging.level.com.ait.aspect=OFF
logging.level.com.ait.controller=OFF

# Framework Logging (minimal noise)
logging.level.com.zaxxer.hikari=WARN
logging.level.oracle.jdbc=WARN
logging.level.org.springframework=WARN
logging.level.org.springframework.web=WARN
logging.level.org.springframework.boot=WARN

# Root Logger - MINIMAL
logging.level.root=WARN

# Log Files (database focused)
logging.file.name=logs/hr-database.log
logging.file.max-size=10MB
logging.file.max-history=7
