<div th:fragment="content">
    <div class="row h-100">
        <!-- Left Pane: Organization Tree -->
        <div class="col-md-3 border-end">
            <div class="p-3">
                <div class="mb-3">
                    <label class="form-label fw-bold">Phiên bản thay đổi</label>
                    <select id="orgBus_resumeSelect" class="form-select select2">
                        <!-- Ajax load -->
                    </select>
                </div>

                <div class="input-group mb-3">
                    <input type="text" class="form-control" placeholder="Tìm kiếm phòng ban..."
                        id="orgBus_searchTreeInput">
                    <button class="btn btn-outline-secondary" type="button" id="orgBus_btnSearchTree">Tra cứu</button>
                </div>

                <div class="mb-2">
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="orgBus_treeViewOption" id="orgBus_expandAll"
                            value="expand">
                        <label class="form-check-label" for="orgBus_expandAll">Mở tất cả</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="orgBus_treeViewOption"
                            id="orgBus_collapseAll" value="collapse">
                        <label class="form-check-label" for="orgBus_collapseAll">Đóng tất cả</label>
                    </div>
                </div>

                <div class="tree-container" style="max-height: 600px; overflow-y: auto;">
                    <div id="orgBus_tree"></div>
                </div>
            </div>
        </div>

        <!-- Right Pane: Business Relation List -->
        <div class="col-md-9">
            <div class="p-3">
                <div class="card h-100">
                    <div class="card-header bg-light d-flex justify-content-between align-items-center">
                        <span class="fw-bold">Danh sách nghiệp vụ phòng ban</span>
                        <div>
                            <button type="button" class="btn btn-sm btn-primary" id="orgBus_btnNew" disabled>
                                <i class="bx bx-plus"></i> Thêm mới
                            </button>
                            <button type="button" class="btn btn-sm btn-warning" id="orgBus_btnEdit" disabled>
                                <i class="bx bx-edit"></i> Sửa
                            </button>
                            <button type="button" class="btn btn-sm btn-danger" id="orgBus_btnDelete" disabled>
                                <i class="bx bx-trash"></i> Xóa
                            </button>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table id="orgBus_table" class="table table-striped table-hover w-100">
                                <thead>
                                    <tr>
                                        <th>No.</th>
                                        <th>Phòng ban</th>
                                        <th>Công việc</th>
                                        <th class="text-center">Mặc định</th>
                                        <th>Người thay đổi</th>
                                        <th>Thời gian thay đổi</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal: Add/Edit Business Relation -->
    <div class="modal fade" id="orgBus_modal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="orgBus_modalTitle">Thêm nghiệp vụ</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="orgBus_form">
                        <input type="hidden" id="orgBus_seq">
                        <input type="hidden" id="orgBus_formDeptNo">
                        <input type="hidden" id="orgBus_formResumeNo">

                        <div class="mb-3">
                            <label class="form-label">Phòng ban</label>
                            <input type="text" class="form-control" id="orgBus_displayDeptName" readonly>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Mã Công việc (Code No) <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="orgBus_codeNo" required
                                placeholder="Nhập mã công việc...">
                            <small class="text-muted">Nhập mã công việc để hệ thống lấy tên tương ứng.</small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Thứ tự hiển thị</label>
                            <input type="number" class="form-control" id="orgBus_orderNo" value="0">
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="orgBus_isDefault" value="1">
                            <label class="form-check-label" for="orgBus_isDefault">Mặc định</label>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                    <button type="button" class="btn btn-primary" id="orgBus_btnSave">Lưu</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <template id="fragmentScripts">
        <link rel="stylesheet" href="/assets/plugins/jstree/style.min.css" />
        <script src="/assets/plugins/jstree/jstree.min.js"></script>

        <script th:inline="none">
            $(document).ready(function () {
                var businessTable;
                var currentDeptNo = null;
                var currentDeptName = '';
                var currentResumeNo = null;

                // Init Select2
                if ($.fn.select2) {
                    $('.select2').select2({ width: '100%' });
                }

                // Load Resumes
                $.ajax({
                    url: '/org/api/resume/dropdown',
                    type: 'GET',
                    success: function (data) {
                        var select = $('#orgBus_resumeSelect');
                        select.empty();
                        if (data && data.length > 0) {
                            data.forEach(function (item) {
                                var text = (item.no ? item.no + ' ' : '') + (item.resumeName || '');
                                select.append(new Option(text, item.no));
                            });
                            select.val(data[0].no).trigger('change');
                        }
                    }
                });

                // Init DataTable
                if ($.fn.DataTable) {
                    businessTable = $('#orgBus_table').DataTable({
                        destroy: true,
                        scrollY: 400,
                        scrollCollapse: true,
                        paging: true,
                        searching: true,
                        lengthChange: true,
                        pageLength: 20,
                        columnDefs: [
                            { "width": "5%", "targets": 0 },   // Cột STT cố định nhỏ
                        ],
                        dom: 'Bfrtip',
                        buttons: ['excel', 'pdf', 'print'],
                        columns: [
                            { data: null, render: (d, t, r, m) => m.row + 1 },
                            { data: 'deptName' },
                            {
                                data: 'businessName',
                                render: function (d, t, r) {
                                    return d || r.codeNo || '';
                                }
                            },
                            {
                                data: 'isDefault',
                                className: 'text-center',
                                render: function (d) {
                                    return (d === '1' || d === 1) ? '<i class="bx bx-check text-success fs-4"></i>' : '';
                                }
                            },
                            { data: 'updatedBy' }, // + updatedIp?
                            {
                                data: 'updateDate',
                                render: function (d) {
                                    if (!d) return '';
                                    return new Date(d).toLocaleString();
                                }
                            }
                        ],
                        language: {
                            url: "//cdn.datatables.net/plug-ins/1.13.6/i18n/vi.json"
                        },
                        select: {
                            style: 'single'
                        }
                    });

                    // Row selection handler
                    businessTable.on('select deselect', function () {
                        var selected = businessTable.rows({ selected: true }).count();
                        $('#orgBus_btnEdit, #orgBus_btnDelete').prop('disabled', selected === 0);
                    });
                }

                // Resume Change
                $('#orgBus_resumeSelect').on('change', function () {
                    var resumeNo = $(this).val();
                    currentResumeNo = resumeNo;
                    if (resumeNo) {
                        loadOrgTree(resumeNo);
                        // Reset table and state
                        if (businessTable) businessTable.clear().draw();
                        currentDeptNo = null;
                        $('#orgBus_btnNew').prop('disabled', true);
                    }
                });

                // Tree Logic
                function loadOrgTree(resumeNo) {
                    var $tree = $('#orgBus_tree');
                    $tree.html('Đang tải...');

                    $.ajax({
                        url: '/org/api/compose/structure',
                        data: { resumeNo: resumeNo },
                        success: function (data) {
                            buildTree(data);
                        },
                        error: function (xhr) {
                            $tree.html('<div class="text-danger">Lỗi tải dữ liệu</div>');
                        }
                    });
                }

                function buildTree(data) {
                    var $tree = $('#orgBus_tree');
                    try { $tree.jstree("destroy"); } catch (e) { }

                    if (!data || data.length === 0) {
                        $tree.html('Không có dữ liệu'); return;
                    }

                    var idSet = new Set();
                    data.forEach(item => { if (item.deptNo) idSet.add(item.deptNo); });

                    var treeData = data.map(item => {
                        var parentId = item.parentDeptNo;
                        if (!parentId || parentId === 'ROOT' || !idSet.has(parentId)) parentId = '#';
                        var label = item.orgNameLocal || item.orgNameEng || item.deptNo;
                        return {
                            id: item.deptNo, parent: parentId, text: label,
                            data: item, icon: 'bx bxs-folder', state: { opened: true }
                        };
                    });

                    $tree.jstree({
                        'core': { 'data': treeData, 'themes': { 'responsive': true } },
                        'plugins': ['search', 'types']
                    });

                    $tree.off("changed.jstree").on("changed.jstree", function (e, data) {
                        if (data && data.selected.length) {
                            var node = data.instance.get_node(data.selected[0]);
                            if (node) {
                                onDeptSelected(node.id, node.text);
                            }
                        }
                    });

                    // Search box
                    var to = false;
                    $('#orgBus_searchTreeInput').keyup(function () {
                        if (to) clearTimeout(to);
                        to = setTimeout(function () {
                            var v = $('#orgBus_searchTreeInput').val();
                            $tree.jstree(true).search(v);
                        }, 250);
                    });
                }

                function onDeptSelected(deptNo, deptName) {
                    currentDeptNo = deptNo;
                    currentDeptName = deptName;
                    $('#orgBus_btnNew').prop('disabled', false); // Enable Add
                    loadBusinessList();
                }

                function loadBusinessList() {
                    if (!currentDeptNo || !currentResumeNo) return;
                    $.ajax({
                        url: '/org/api/business/list',
                        data: { resumeNo: currentResumeNo, deptNo: currentDeptNo },
                        success: function (data) {
                            businessTable.clear().rows.add(data).draw();
                            $('#orgBus_btnEdit, #orgBus_btnDelete').prop('disabled', true);
                        }
                    });
                }

                // Add/Edit/Delete Handlers
                $('#orgBus_btnNew').click(function () {
                    $('#orgBus_modalTitle').text('Thêm nghiệp vụ');
                    $('#orgBus_form')[0].reset();
                    $('#orgBus_seq').val('');
                    $('#orgBus_formDeptNo').val(currentDeptNo);
                    $('#orgBus_formResumeNo').val(currentResumeNo);
                    $('#orgBus_displayDeptName').val(currentDeptName);
                    $('#orgBus_modal').modal('show');
                });

                $('#orgBus_btnEdit').click(function () {
                    var rowData = businessTable.rows({ selected: true }).data()[0];
                    if (!rowData) return;

                    $('#orgBus_modalTitle').text('Cập nhật nghiệp vụ');
                    $('#orgBus_seq').val(rowData.seq); // Assuming SEQ is mapped (lowercase)
                    $('#orgBus_formDeptNo').val(rowData.deptNo);
                    $('#orgBus_formResumeNo').val(rowData.resumeNo);
                    $('#orgBus_displayDeptName').val(rowData.deptName); // Or currentDeptName
                    $('#orgBus_codeNo').val(rowData.codeNo);
                    $('#orgBus_orderNo').val(rowData.orderNo);
                    $('#orgBus_isDefault').prop('checked', rowData.isDefault == '1');

                    $('#orgBus_modal').modal('show');
                });

                $('#orgBus_btnDelete').click(function () {
                    var rowData = businessTable.rows({ selected: true }).data()[0];
                    if (!rowData) return;
                    if (!confirm('Bạn có chắc chắn muốn xóa?')) return;

                    $.ajax({
                        url: '/org/api/business/delete',
                        type: 'POST',
                        data: { seq: rowData.seq },
                        success: function (res) {
                            if (typeof toastr !== 'undefined') toastr.success(res.message);
                            loadBusinessList();
                        },
                        error: function (xhr) {
                            if (typeof toastr !== 'undefined') toastr.error('Lỗi: ' + xhr.responseText);
                        }
                    });
                });

                $('#orgBus_btnSave').click(function () {
                    var payload = {
                        seq: $('#orgBus_seq').val(),
                        resumeNo: $('#orgBus_formResumeNo').val(),
                        deptNo: $('#orgBus_formDeptNo').val(),
                        codeNo: $('#orgBus_codeNo').val(),
                        orderNo: $('#orgBus_orderNo').val(),
                        isDefault: $('#orgBus_isDefault').is(':checked') ? '1' : '0'
                    };

                    if (!payload.codeNo) {
                        alert('Vui lòng nhập Mã công việc');
                        return;
                    }

                    $.ajax({
                        url: '/org/api/business/save',
                        type: 'POST',
                        contentType: 'application/json',
                        data: JSON.stringify(payload),
                        success: function (res) {
                            if (typeof toastr !== 'undefined') toastr.success(res.message);
                            $('#orgBus_modal').modal('hide');
                            loadBusinessList();
                        },
                        error: function (xhr) {
                            if (typeof toastr !== 'undefined') toastr.error('Lỗi: ' + xhr.responseText);
                        }
                    });
                });

                // Expand/Collapse
                $('input[name="orgBus_treeViewOption"]').on('change', function () {
                    if (!$.fn.jstree) return;
                    if ($(this).val() === 'expand') {
                        $('#orgBus_tree').jstree('open_all');
                    } else {
                        $('#orgBus_tree').jstree('close_all');
                    }
                });
            });
        </script>
    </template>
</div>
