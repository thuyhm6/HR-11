<div th:fragment="content">
    <div class="row">
        <!-- Cột trái: Danh sách Role -->
        <div class="col-md-7">
            <div class="card">
                <div class="card-body">
                    <!-- Search Form -->
                    <form id="sysRoleSearchForm" class="row g-3 mb-4">
                        <div class="col-md-4">
                            <label for="sysRoleSearchKeyword" class="form-label">Từ khóa (ID, Tên)</label>
                            <input type="text" class="form-control" id="sysRoleSearchKeyword"
                                placeholder="Nhập mã hoặc tên nhóm quyền">
                        </div>
                        <div class="col-md-8 d-flex align-items-end">
                            <button type="button" class="btn btn-primary me-2" id="btnSearchRole">
                                <i class="bx bx-search"></i> Tìm kiếm
                            </button>
                            <button type="button" class="btn btn-secondary me-2" id="btnClearRole">
                                <i class="bx bx-x"></i> Xóa lọc
                            </button>
                            <button type="button" class="btn btn-success me-2" id="btnAddRole">
                                <i class="bx bx-plus"></i> Thêm mới
                            </button>
                            <button type="button" class="btn btn-info" id="btnExportRole">
                                <i class="bx bx-download"></i> Xuất Excel
                            </button>
                        </div>
                    </form>

                    <!-- Data Table -->
                    <div class="table-responsive">
                        <table id="sysRoleTable" class="table table-striped table-bordered table-hover"
                            style="width:100%; cursor: pointer;">
                            <thead class="table-light">
                                <tr>
                                    <th>STT</th>
                                    <th>Mã Nhóm (ID)</th>
                                    <th>Tên TV</th>
                                    <th>Hệ thống</th>
                                    <th>Thao tác</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Data loaded via AJAX -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- Cột phải: Menu Tree -->
        <div class="col-md-5">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h5 class="card-title mb-0" id="menuPanelTitle">Phân quyền Menu</h4>
                        <button type="button" class="btn btn-primary btn-sm" id="btnSaveRelations" disabled>
                            <i class="bx bx-save"></i> Lưu quyền
                        </button>
                </div>
                <div class="card-body" style="height: 600px; overflow-y: auto;">
                    <div id="menuTreeContainer">
                        <div class="text-center p-3 text-muted">Vui lòng chọn một nhóm quyền bên trái để phân quyền.
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Add/Edit -->
    <div class="modal fade" id="sysRoleModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="sysRoleModalTitle">Thông tin Nhóm quyền</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="sysRoleForm">
                        <input type="hidden" id="sysRoleNo" name="roleNo">
                        <input type="hidden" id="sysCpnyId" name="cpnyId">

                        <div class="row g-3">
                            <div class="col-md-12">
                                <label class="form-label">Mã Nhóm (ID)</label>
                                <input type="text" class="form-control" id="sysRoleId" name="roleId" readonly
                                    placeholder="Tự động sinh khi lưu (Auto Generated)">
                            </div>
                            <!-- Multilingual Names -->
                            <div class="col-md-6">
                                <label class="form-label">Tên Tiếng Việt <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="sysRoleNameVi" name="nameVi" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Tên Tiếng Anh</label>
                                <input type="text" class="form-control" id="sysRoleNameEn" name="nameEn">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Tên Tiếng Trung</label>
                                <input type="text" class="form-control" id="sysRoleNameZh" name="nameZh">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Tên Tiếng Hàn</label>
                                <input type="text" class="form-control" id="sysRoleNameKo" name="nameKo">
                            </div>

                            <!-- Settings -->
                            <div class="col-md-6">
                                <label class="form-label">Loại hệ thống</label>
                                <select class="form-select" id="sysType" name="sysType">
                                    <option value="0">Hub</option>
                                    <option value="1">Partner</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Thứ tự</label>
                                <input type="number" class="form-control" id="sysRoleOrderNo" name="orderNo" value="0">
                            </div>
                            <div class="col-md-6">
                                <div class="form-check mt-4">
                                    <input class="form-check-input" type="checkbox" id="sysRoleActivity" name="activity"
                                        checked>
                                    <label class="form-check-label" for="sysRoleActivity">Hoạt động</label>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                    <button type="button" class="btn btn-primary" id="btnSaveRole">Lưu</button>
                </div>
            </div>
        </div>
    </div>
</div>

<template id="fragmentScripts">
    <script th:inline="none">
        $(function () {
            // Scope variables locally
            var menuListCache = [];
            var selectedRoleNo = null;

            // Load Menus immediately
            loadMenus();

            // Initialize DataTable
            var table = $('#sysRoleTable').DataTable({
                destroy: true,
                paging: true,
                searching: false,
                lengthChange: true,
                pageLength: 10,
                processing: true,

                ajax: {
                    url: '/sys/api/role/list',
                    dataSrc: '',
                    data: function (d) {
                        d.keyword = $('#sysRoleSearchKeyword').val();
                    }
                },
                columns: [
                    {
                        data: null,
                        render: function (data, type, row, meta) {
                            return meta.row + 1;
                        }
                    },
                    { data: 'roleId' },
                    { data: 'nameVi' },
                    {
                        data: 'sysType',
                        render: function (data) {
                            return data === 0 ? '<span class="badge bg-info">Hub</span>' : '<span class="badge bg-warning">Partner</span>';
                        }
                    },
                    {
                        data: null,
                        className: "text-center",
                        render: function (data, type, row) {
                            return '<button class="btn btn-warning btn-sm me-1 btn-edit-role" data-id="' + row.roleNo + '"><i class="bx bx-edit"></i></button>' +
                                '<button class="btn btn-danger btn-sm btn-delete-role" data-id="' + row.roleNo + '"><i class="bx bx-trash"></i></button>';
                        }
                    }
                ]
            });

            // --- Event Bindings ---

            // Search
            $('#btnSearchRole').on('click', function () {
                table.ajax.reload();
            });

            // Clear
            $('#btnClearRole').on('click', function () {
                $('#sysRoleSearchForm')[0].reset();
                table.ajax.reload();
            });

            // Export
            $('#btnExportRole').on('click', function () {
                window.location.href = '/sys/api/role/export';
            });

            // Open Modal (Add)
            $('#btnAddRole').on('click', function () {
                $('#sysRoleForm')[0].reset();
                $('#sysRoleNo').val('');
                $('#sysRoleId').val('');
                $('#sysCpnyId').val('');

                $('#sysRoleModalTitle').text('Thêm mới Nhóm quyền');

                var modal = new bootstrap.Modal(document.getElementById('sysRoleModal'));
                modal.show();
            });

            // Edit (Event Delegation)
            $('#sysRoleTable tbody').on('click', '.btn-edit-role', function (e) {
                e.stopPropagation(); // Ngăn click lan ra row
                var roleNo = $(this).data('id');
                editData(roleNo);
            });

            // Delete (Event Delegation)
            $('#sysRoleTable tbody').on('click', '.btn-delete-role', function (e) {
                e.stopPropagation(); // Ngăn click lan ra row
                var roleNo = $(this).data('id');
                deleteData(roleNo);
            });

            // Row Click
            $('#sysRoleTable tbody').on('click', 'tr', function () {
                var data = table.row(this).data();
                if (!data) return;

                // Highlight dòng được chọn
                $('#sysRoleTable tbody tr').removeClass('table-active');
                $(this).addClass('table-active');

                selectedRoleNo = data.roleNo;
                $('#menuPanelTitle').text('Phân quyền Menu - ' + data.nameVi);
                $('#btnSaveRelations').prop('disabled', false);

                loadRoleRelations(selectedRoleNo);
            });

            // Save Role Info
            $('#btnSaveRole').on('click', function () {
                saveData();
            });

            // Save Role Relations
            $('#btnSaveRelations').on('click', function () {
                saveRelations();
            });

            // --- Helper Functions in Local Scope ---

            function editData(roleNo) {
                // Fetch detail
                $.get('/sys/api/role/detail?roleNo=' + roleNo, function (res) {
                    if (!res) return;

                    $('#sysRoleNo').val(res.roleNo);
                    $('#sysRoleId').val(res.roleId);
                    $('#sysCpnyId').val(res.cpnyId);

                    $('#sysRoleNameVi').val(res.nameVi);
                    $('#sysRoleNameEn').val(res.nameEn);
                    $('#sysRoleNameZh').val(res.nameZh);
                    $('#sysRoleNameKo').val(res.nameKo);

                    $('#sysType').val(res.sysType || 0);
                    $('#sysRoleOrderNo').val(res.orderNo);

                    $('#sysRoleActivity').prop('checked', res.activity === 1);

                    $('#sysRoleModalTitle').text('Cập nhật Nhóm quyền');
                    var modal = new bootstrap.Modal(document.getElementById('sysRoleModal'));
                    modal.show();
                });
            }

            function saveData() {
                if (!$('#sysRoleForm')[0].checkValidity()) {
                    $('#sysRoleForm')[0].reportValidity();
                    return;
                }

                var data = {
                    roleNo: $('#sysRoleNo').val(),
                    roleId: $('#sysRoleId').val(),
                    cpnyId: $('#sysCpnyId').val(),
                    nameVi: $('#sysRoleNameVi').val(),
                    nameEn: $('#sysRoleNameEn').val(),
                    nameZh: $('#sysRoleNameZh').val(),
                    nameKo: $('#sysRoleNameKo').val(),
                    sysType: parseInt($('#sysType').val()),
                    orderNo: $('#sysRoleOrderNo').val(),
                    activity: $('#sysRoleActivity').is(':checked') ? 1 : 0
                };

                $.ajax({
                    url: '/sys/api/role/save',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(data),
                    success: function (res) {
                        if (res.success) {
                            if (typeof toastr !== 'undefined') toastr.success(res.message);
                            else alert(res.message);

                            var modalEl = document.getElementById('sysRoleModal');
                            var modal = bootstrap.Modal.getInstance(modalEl);
                            modal.hide();

                            // Reload table and keep current page
                            table.ajax.reload(null, false);
                        } else {
                            if (typeof toastr !== 'undefined') toastr.error(res.message);
                            else alert(res.message);
                        }
                    },
                    error: function (xhr) {
                        if (typeof toastr !== 'undefined') toastr.error('Lỗi hệ thống');
                        else alert('Lỗi hệ thống');
                    }
                });
            }

            function saveRelations() {
                if (!selectedRoleNo) {
                    if (typeof toastr !== 'undefined') toastr.warning('Chưa chọn nhóm quyền!');
                    else alert('Chưa chọn nhóm quyền!');
                    return;
                }

                var relations = [];
                $('#menuTreeContainer input.menu-checkbox:checked').each(function () {
                    var menuNo = $(this).val();
                    relations.push({
                        menuNo: menuNo,
                        selectr: 'Y',
                        insertr: 'Y',
                        updater: 'Y',
                        deleter: 'Y'
                    });
                });

                var data = {
                    roleNo: selectedRoleNo,
                    roleRelations: relations
                };

                $.ajax({
                    url: '/sys/api/role/saveRelations',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(data),
                    success: function (res) {
                        if (res.success) {
                            if (typeof toastr !== 'undefined') toastr.success(res.message);
                            else alert(res.message);
                        } else {
                            if (typeof toastr !== 'undefined') toastr.error(res.message);
                            else alert(res.message);
                        }
                    },
                    error: function (xhr) {
                        if (typeof toastr !== 'undefined') toastr.error('Lỗi hệ thống');
                        else alert('Lỗi hệ thống');
                    }
                });
            }

            function deleteData(id) {
                if (!confirm('Bạn có chắc muốn xóa nhóm quyền này?')) return;

                $.ajax({
                    url: '/sys/api/role/delete',
                    type: 'POST',
                    data: { roleNo: id },
                    success: function (res) {
                        if (res.success) {
                            if (typeof toastr !== 'undefined') toastr.success(res.message);
                            else alert(res.message);

                            // Nếu đang chọn xóa chính role này
                            if (selectedRoleNo === id) {
                                selectedRoleNo = null;
                                $('#menuPanelTitle').text('Phân quyền Menu');
                                $('#btnSaveRelations').prop('disabled', true);
                                $('#menuTreeContainer input.menu-checkbox').prop('checked', false);
                            }

                            // Reload lại DataTable
                            table.ajax.reload();
                        } else {
                            if (typeof toastr !== 'undefined') toastr.error(res.message);
                            else alert(res.message);
                        }
                    }
                });
            }

            function loadMenus() {
                $.get('/sys/api/menu/list', function (list) {
                    menuListCache = list;
                    buildMenuTree(list);
                });
            }

            function buildMenuTree(list) {
                var container = $('#menuTreeContainer');
                container.empty();

                if (!list || list.length === 0) {
                    container.html('Không có dữ liệu menu.');
                    return;
                }

                var map = {};
                var roots = [];
                list.forEach(function (item) {
                    map[item.menuNo] = item;
                    item.children = [];
                });

                list.forEach(function (item) {
                    if (item.menuParentNo && map[item.menuParentNo]) {
                        map[item.menuParentNo].children.push(item);
                    } else {
                        roots.push(item);
                    }
                });

                var ul = $('<ul>').addClass('list-unstyled');
                roots.forEach(function (root) {
                    ul.append(createMenuLi(root));
                });
                container.append(ul);

                // Nếu đang view một quyền, hãy load lại
                if (selectedRoleNo) {
                    loadRoleRelations(selectedRoleNo);
                }
            }

            function createMenuLi(item) {
                var li = $('<li>').addClass('mb-2');
                var rowDiv = $('<div>').addClass('d-flex align-items-center');

                var hasChildren = item.children && item.children.length > 0;
                var toggleIcon = $('<i>').addClass('bx me-2');

                if (hasChildren) {
                    // Default collapsed (plus icon)
                    toggleIcon.addClass('bx-plus text-primary')
                        .css('cursor', 'pointer')
                        .on('click', function (e) {
                            e.preventDefault();
                            e.stopPropagation();
                            var ul = li.children('ul');
                            ul.slideToggle();
                            $(this).toggleClass('bx-minus bx-plus');
                        });
                } else {
                    toggleIcon.addClass('bx-minus').css('visibility', 'hidden');
                }
                rowDiv.append(toggleIcon);

                var divCheck = $('<div>').addClass('form-check mb-0');
                var inp = $('<input>').addClass('form-check-input menu-checkbox')
                    .attr('type', 'checkbox')
                    .attr('value', item.menuNo)
                    .attr('id', 'menu_chk_' + item.menuNo);

                inp.on('change', function () {
                    var checked = $(this).is(':checked');
                    // Tự động check/uncheck các menu con
                    $(this).closest('li').find('ul input.menu-checkbox').prop('checked', checked);

                    // Nếu check thì tự động check các menu cha
                    if (checked) {
                        $(this).parents('li').each(function () {
                            $(this).children('div').find('input.menu-checkbox').prop('checked', true);
                        });
                    }
                });

                var label = $('<label>').addClass('form-check-label')
                    .attr('for', 'menu_chk_' + item.menuNo)
                    .text(item.menuName || item.nameVi || item.menuNo)
                    .css('cursor', 'pointer'); // Lên UX

                divCheck.append(inp).append(label);
                rowDiv.append(divCheck);
                li.append(rowDiv);

                if (hasChildren) {
                    // Cây con ẩn đi ban đầu
                    var childUl = $('<ul>').addClass('list-unstyled ms-4').hide();
                    item.children.forEach(function (child) {
                        childUl.append(createMenuLi(child));
                    });
                    li.append(childUl);
                }
                return li;
            }

            function loadRoleRelations(roleNo) {
                // Clear checkboxes
                $('#menuTreeContainer input.menu-checkbox').prop('checked', false);

                $.get('/sys/api/role/detail?roleNo=' + roleNo, function (res) {
                    if (!res || !res.roleRelations) return;

                    res.roleRelations.forEach(function (rel) {
                        if (rel.menuNo) {
                            $('#menu_chk_' + rel.menuNo).prop('checked', true);
                        }
                        // Khi init check từ db thì cũng update DOM cha nếu cần
                        // Tuy nhiên vì render server-side có thể đơn giản hóa
                    });
                });
            }
        });
    </script>
</template>
