<div th:fragment="content">
    <div class="row">
        <!-- Cột trái: Danh sách Nhóm Quyền -->
        <div class="col-md-7">
            <div class="card">
                <div class="card-body">
                    <!-- Search Form -->
                    <form id="roleGroupSearchForm" class="row g-3 mb-4">
                        <div class="col-md-4">
                            <label for="roleGroupSearchKeyword" class="form-label">Từ khóa (ID, Tên)</label>
                            <input type="text" class="form-control" id="roleGroupSearchKeyword"
                                placeholder="Nhập mã hoặc tên nhóm quyền">
                        </div>
                        <div class="col-md-8 d-flex align-items-end">
                            <button type="button" class="btn btn-primary me-2" id="btnSearchRoleGroup">
                                <i class="bx bx-search"></i> Tìm kiếm
                            </button>
                            <button type="button" class="btn btn-secondary me-2" id="btnClearRoleGroup">
                                <i class="bx bx-x"></i> Xóa lọc
                            </button>
                            <button type="button" class="btn btn-success me-2" id="btnAddRoleGroup">
                                <i class="bx bx-plus"></i> Thêm mới
                            </button>
                            <button type="button" class="btn btn-info" id="btnExportRoleGroup">
                                <i class="bx bx-download"></i> Xuất Excel
                            </button>
                        </div>
                    </form>

                    <!-- Data Table -->
                    <div class="table-responsive">
                        <table id="roleGroupTable" class="table table-striped table-bordered table-hover"
                            style="width:100%; cursor: pointer;">
                            <thead class="table-light">
                                <tr>
                                    <th>STT</th>
                                    <th>Mã Nhóm (ID)</th>
                                    <th>Tên TV</th>
                                    <th>Hệ thống</th>
                                    <th>Mặc định</th>
                                    <th>Trạng thái</th>
                                    <th>Thao tác</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Data loaded via AJAX -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
        <!-- Cột phải: Phân quyền cho Nhóm -->
        <div class="col-md-5">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h5 class="card-title mb-0" id="rolePanelTitle">Phân quyền hạn</h5>
                    <button type="button" class="btn btn-primary btn-sm" id="btnSaveRelations" disabled>
                        <i class="bx bx-save"></i> Lưu quyền hạn
                    </button>
                </div>
                <div class="card-body" style="height: 600px; overflow-y: auto;">
                    <div id="rolesListContainer">
                        <div class="text-center p-3 text-muted">Vui lòng chọn một nhóm quyền bên trái để phân quyền.
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>




<!-- Modal Add/Edit -->
<div class="modal fade" id="roleGroupModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="roleGroupModalTitle">Thông tin Nhóm quyền</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="roleGroupForm">
                    <input type="hidden" id="roleGroupNo" name="roleGroupNo">
                    <input type="hidden" id="cpnyId" name="cpnyId">

                    <div class="row g-3">
                        <!-- Basic Info -->
                        <div class="col-md-12">
                            <div class="row g-3">
                                <div class="col-md-12">
                                    <label class="form-label">Mã Nhóm (ID)</label>
                                    <input type="text" class="form-control" id="roleGroupId" name="roleGroupId" readonly
                                        placeholder="Tự động sinh khi lưu (Auto Generated)">
                                </div>

                                <!-- Multilingual Names -->
                                <div class="col-md-6">
                                    <label class="form-label">Tên Tiếng Việt <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="roleGroupNameVi" name="nameVi" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Tên Tiếng Anh</label>
                                    <input type="text" class="form-control" id="roleGroupNameEn" name="nameEn">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Tên Tiếng Trung</label>
                                    <input type="text" class="form-control" id="roleGroupNameZh" name="nameZh">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Tên Tiếng Hàn</label>
                                    <input type="text" class="form-control" id="roleGroupNameKo" name="nameKo">
                                </div>

                                <!-- Settings -->
                                <div class="col-md-6">
                                    <label class="form-label">Loại hệ thống</label>
                                    <select class="form-select" id="sysType" name="sysType">
                                        <option value="0">Hub</option>
                                        <option value="1">Partner</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Thứ tự</label>
                                    <input type="number" class="form-control" id="roleGroupOrderNo" name="orderNo"
                                        value="0">
                                </div>

                                <div class="col-md-6">
                                    <div class="form-check mt-4">
                                        <input class="form-check-input" type="checkbox" id="joinDefault"
                                            name="joinDefault">
                                        <label class="form-check-label" for="joinDefault">Mặc định tham gia</label>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-check mt-4">
                                        <input class="form-check-input" type="checkbox" id="roleGroupActivity"
                                            name="activity" checked>
                                        <label class="form-check-label" for="roleGroupActivity">Hoạt động</label>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>
            </div>
            </form>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
            <button type="button" class="btn btn-primary" id="btnSaveRoleGroup">Lưu</button>
        </div>
    </div>
</div>
</div>
</div>

<template id="fragmentScripts">
    <script th:inline="none">
        $(function () {
            var allRoles = [];
            var selectedGroupNo = null;

            var table = $('#roleGroupTable').DataTable({
                destroy: true,
                paging: true,
                searching: false,
                lengthChange: true,
                pageLength: 25,
                processing: true,
                language: {
                    url: '//cdn.datatables.net/plug-ins/1.10.25/i18n/Vietnamese.json'
                },
                ajax: {
                    url: '/sys/api/role_group/list',
                    dataSrc: '',
                    data: function (d) {
                        d.keyword = $('#roleGroupSearchKeyword').val();
                    }
                },
                columns: [
                    {
                        data: null,
                        render: function (data, type, row, meta) {
                            return meta.row + 1;
                        }
                    },
                    { data: 'roleGroupId' },
                    { data: 'nameVi' },
                    {
                        data: 'sysType',
                        render: function (data) {
                            return data === 0 ? '<span class="badge bg-info">Hub</span>' : '<span class="badge bg-warning">Partner</span>';
                        }
                    },
                    {
                        data: 'joinDefault',
                        className: 'text-center',
                        render: function (data) {
                            return data === 1 ? '<i class="bx bx-check text-success fs-4"></i>' : '';
                        }
                    },
                    {
                        data: 'activity',
                        className: 'text-center',
                        render: function (data) {
                            return data === 1 ? '<span class="badge bg-success">Active</span>' : '<span class="badge bg-secondary">Inactive</span>';
                        }
                    },
                    {
                        data: null,
                        className: "text-center",
                        render: function (data, type, row) {
                            return '<button class="btn btn-warning btn-sm me-1 btn-edit-role-group" data-id="' + row.roleGroupNo + '"><i class="bx bx-edit"></i></button>' +
                                '<button class="btn btn-danger btn-sm btn-delete-role-group" data-id="' + row.roleGroupNo + '"><i class="bx bx-trash"></i></button>';
                        }
                    }
                ]
            });

            // --- Event Bindings ---

            // Search
            $('#btnSearchRoleGroup').on('click', function () {
                table.ajax.reload();
            });

            // Clear
            $('#btnClearRoleGroup').on('click', function () {
                $('#roleGroupSearchForm')[0].reset();
                table.ajax.reload();
            });

            // Export
            $('#btnExportRoleGroup').on('click', function () {
                window.location.href = '/sys/api/role_group/export';
            });

            // Open Modal
            $('#btnAddRoleGroup').on('click', function () {
                $('#roleGroupForm')[0].reset();
                $('#roleGroupNo').val('');
                $('#roleGroupId').val('');
                $('#cpnyId').val('');

                $('#roleGroupModalTitle').text('Thêm mới Nhóm quyền');

                var modal = new bootstrap.Modal(document.getElementById('roleGroupModal'));
                modal.show();
            });

            // Save
            $('#btnSaveRoleGroup').on('click', function () {
                saveData();
            });

            // Save Relations
            $('#btnSaveRelations').on('click', function () {
                saveRelations();
            });

            // Edit (Event Delegation)
            $('#roleGroupTable tbody').on('click', '.btn-edit-role-group', function (e) {
                e.stopPropagation();
                var id = $(this).data('id');
                editData(id);
            });

            // Delete (Event Delegation)
            $('#roleGroupTable tbody').on('click', '.btn-delete-role-group', function (e) {
                e.stopPropagation();
                var id = $(this).data('id');
                deleteData(id);
            });

            // Row Click
            $('#roleGroupTable tbody').on('click', 'tr', function () {
                var data = table.row(this).data();
                if (!data) return;

                // Highlight dòng được chọn
                $('#roleGroupTable tbody tr').removeClass('table-active');
                $(this).addClass('table-active');

                selectedGroupNo = data.roleGroupNo;
                $('#rolePanelTitle').text('Phân quyền hạn - ' + data.nameVi);
                $('#btnSaveRelations').prop('disabled', false);

                loadGroupRelations(selectedGroupNo);
            });


            // --- Helper Functions ---

            // Load all roles on init
            loadRoles();

            function editData(id) {
                // Fetch detail
                $.get('/sys/api/role_group/detail?roleGroupNo=' + id, function (res) {
                    if (!res) return;

                    $('#roleGroupNo').val(res.roleGroupNo);
                    $('#roleGroupId').val(res.roleGroupId);
                    $('#cpnyId').val(res.cpnyId);

                    $('#roleGroupNameVi').val(res.nameVi);
                    $('#roleGroupNameEn').val(res.nameEn);
                    $('#roleGroupNameZh').val(res.nameZh);
                    $('#roleGroupNameKo').val(res.nameKo);

                    $('#sysType').val(res.sysType || 0);
                    $('#roleGroupOrderNo').val(res.orderNo);

                    $('#joinDefault').prop('checked', res.joinDefault === 1);
                    $('#roleGroupActivity').prop('checked', res.activity === 1);

                    $('#roleGroupModalTitle').text('Cập nhật Nhóm quyền');

                    var modal = new bootstrap.Modal(document.getElementById('roleGroupModal'));
                    modal.show();
                });
            }

            function saveData() {
                if (!$('#roleGroupForm')[0].checkValidity()) {
                    $('#roleGroupForm')[0].reportValidity();
                    return;
                }

                var data = {
                    roleGroupNo: $('#roleGroupNo').val(),
                    roleGroupId: $('#roleGroupId').val(),
                    cpnyId: $('#cpnyId').val(),
                    nameVi: $('#roleGroupNameVi').val(),
                    nameEn: $('#roleGroupNameEn').val(),
                    nameZh: $('#roleGroupNameZh').val(),
                    nameKo: $('#roleGroupNameKo').val(),
                    sysType: parseInt($('#sysType').val()),
                    orderNo: $('#roleGroupOrderNo').val(),
                    joinDefault: $('#joinDefault').is(':checked') ? 1 : 0,
                    activity: $('#roleGroupActivity').is(':checked') ? 1 : 0
                };

                $.ajax({
                    url: '/sys/api/role_group/save',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(data),
                    success: function (res) {
                        if (res.success) {
                            if (typeof toastr !== 'undefined') toastr.success(res.message);
                            else alert(res.message);

                            var modalEl = document.getElementById('roleGroupModal');
                            var modal = bootstrap.Modal.getInstance(modalEl);
                            modal.hide();

                            table.ajax.reload();
                        } else {
                            if (typeof toastr !== 'undefined') toastr.error(res.message);
                            else alert(res.message);
                        }
                    },
                    error: function (xhr) {
                        if (typeof toastr !== 'undefined') toastr.error('Lỗi hệ thống');
                        else alert('Lỗi hệ thống');
                    }
                });
            }

            function deleteData(id) {
                if (!confirm('Bạn có chắc muốn xóa nhóm quyền này?')) return;

                $.ajax({
                    url: '/sys/api/role_group/delete',
                    type: 'POST',
                    data: { roleGroupId: id },
                    success: function (res) {
                        if (res.success) {
                            if (typeof toastr !== 'undefined') toastr.success(res.message);
                            else alert(res.message);

                            if (selectedGroupNo === id) {
                                selectedGroupNo = null;
                                $('#rolePanelTitle').text('Phân quyền hạn');
                                $('#btnSaveRelations').prop('disabled', true);
                                $('.role-item-checkbox').prop('checked', false);
                            }

                            table.ajax.reload();
                        } else {
                            if (typeof toastr !== 'undefined') toastr.error(res.message);
                            else alert(res.message);
                        }
                    }
                });
            }

            function loadRoles() {
                $.get('/sys/api/role/list', function (list) {
                    allRoles = list;
                    renderRolesList(list);
                });
            }

            function renderRolesList(list) {
                var container = $('#rolesListContainer');
                container.empty();

                if (!list || list.length === 0) {
                    container.html('<div class="text-center text-muted">Không có dữ liệu quyền hạn.</div>');
                    return;
                }

                var ul = $('<ul>').addClass('list-group list-group-flush');

                list.forEach(function (role) {
                    var li = $('<li>').addClass('list-group-item');
                    var div = $('<div>').addClass('form-check');
                    var inp = $('<input>').addClass('form-check-input role-item-checkbox')
                        .attr('type', 'checkbox')
                        .attr('value', role.roleNo) // Assuming roleNo is key
                        .attr('id', 'role_chk_' + role.roleNo);

                    var label = $('<label>').addClass('form-check-label')
                        .attr('for', 'role_chk_' + role.roleNo)
                        .html((role.nameVi || role.roleNo) + ' <small class="text-muted">(' + role.roleId + ')</small>');

                    div.append(inp).append(label);
                    li.append(div);
                    ul.append(li);
                });

                container.append(ul);
            }

            function loadGroupRelations(roleGroupNo) {
                $('.role-item-checkbox').prop('checked', false);

                $.get('/sys/api/role_group/detail?roleGroupNo=' + roleGroupNo, function (res) {
                    if (!res || !res.roleNos) return;

                    res.roleNos.forEach(function (roleNo) {
                        $('#role_chk_' + roleNo).prop('checked', true);
                    });
                });
            }

            function saveRelations() {
                if (!selectedGroupNo) return;

                var selectedRoles = [];
                $('.role-item-checkbox:checked').each(function () {
                    selectedRoles.push($(this).val());
                });

                var data = {
                    roleGroupNo: selectedGroupNo,
                    roleNos: selectedRoles
                };

                $.ajax({
                    url: '/sys/api/role_group/saveRelations',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(data),
                    success: function (res) {
                        if (res.success) {
                            if (typeof toastr !== 'undefined') toastr.success(res.message);
                            else alert(res.message);
                        } else {
                            if (typeof toastr !== 'undefined') toastr.error(res.message);
                            else alert(res.message);
                        }
                    }
                });
            }
        });
    </script>
</template>
