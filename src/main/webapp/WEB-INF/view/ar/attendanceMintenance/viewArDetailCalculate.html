<div th:fragment="content">
    <div class="row justify-content-center">
        <div class="col-xl-8 col-lg-10">
            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0">Tính toán chi tiết</h5>
                </div>
                <div class="card-body">
                    <form id="adc_form" class="row g-3">
                        <div class="col-12">
                            <label class="form-label d-block">Phân loại tính toán</label>
                            <div class="d-flex gap-4 flex-wrap">
                                <div class="form-check">
                                    <input class="form-check-input adc-caltype" type="checkbox" id="adc_caltype_person"
                                        value="EMP" checked>
                                    <label class="form-check-label" for="adc_caltype_person">Nhân viên</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input adc-caltype" type="checkbox" id="adc_caltype_dept"
                                        value="DEPT">
                                    <label class="form-check-label" for="adc_caltype_dept">Phòng ban</label>
                                </div>
                            </div>
                        </div>

                        <div class="col-6">
                            <label for="adc_fromDate" class="form-label">Từ ngày</label>
                            <input type="text" class="form-control js-daterangepicker" id="adc_fromDate"
                                data-drp-format="YYYY/MM/DD" autocomplete="off">
                        </div>

                        <div class="col-6">
                            <label for="adc_toDate" class="form-label">Đến ngày</label>
                            <input type="text" class="form-control js-daterangepicker" id="adc_toDate"
                                data-drp-format="YYYY/MM/DD" autocomplete="off">
                        </div>

                        <div class="col-12" id="adc_personBlock">
                            <label for="adc_personDisplay" class="form-label">Nhân viên</label>
                            <div class="input-group">
                                <input type="text" class="form-control" id="adc_personDisplay"
                                    placeholder="Chọn nhân viên..." readonly>
                                <input type="hidden" id="adc_personId">
                                <button class="btn btn-outline-primary" type="button"
                                    onclick="openEmployeeSearchPopup()">
                                    <i class="bx bx-search"></i>
                                </button>
                            </div>
                        </div>

                        <div class="col-12 d-none" id="adc_deptBlock">
                            <label for="adc_deptDisplay" class="form-label">Phòng ban</label>
                            <input type="text" class="form-control mb-2" id="adc_deptDisplay"
                                placeholder="Chọn phòng ban" readonly>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="adc_sonDeptFlag">
                                <label class="form-check-label" for="adc_sonDeptFlag">
                                    Bao gồm phòng ban con
                                </label>
                            </div>
                        </div>

                        <div class="col-12 d-flex justify-content-end">
                            <button type="button" class="btn btn-primary" id="adc_calculateBtn"
                                onclick="adcRunCalculate()">
                                <i class="bx bx-calculator"></i> Tính toán
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<template id="fragmentScripts">
    <script th:inline="javascript">
        var _adc_pageBooted = false;
        var _adc_selectedDeptCodes = [];

        function adcFormatDate(dateObj) {
            var y = dateObj.getFullYear();
            var m = String(dateObj.getMonth() + 1).padStart(2, '0');
            var d = String(dateObj.getDate()).padStart(2, '0');
            return y + '/' + m + '/' + d;
        }

        function adcInitDefaultDates() {
            var now = new Date();
            var firstDay = new Date(now.getFullYear(), now.getMonth(), 1);
            var lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0);
            $('#adc_fromDate').val(adcFormatDate(firstDay));
            $('#adc_toDate').val(adcFormatDate(lastDay));

            if ($('#adc_fromDate').data('daterangepicker')) {
                $('#adc_fromDate').data('daterangepicker').setStartDate($('#adc_fromDate').val());
            }
            if ($('#adc_toDate').data('daterangepicker')) {
                $('#adc_toDate').data('daterangepicker').setStartDate($('#adc_toDate').val());
            }
        }

        function adcGetCaltype() {
            var $checked = $('.adc-caltype:checked').first();
            return $checked.length ? ($checked.val() || 'EMP') : 'EMP';
        }

        function adcToggleTargetBlocks() {
            var caltype = adcGetCaltype();
            var isPerson = caltype === 'EMP';
            $('#adc_personBlock').toggleClass('d-none', !isPerson);
            $('#adc_deptBlock').toggleClass('d-none', isPerson);

            if (isPerson) {
                $('#adc_deptDisplay').val('');
                $('#adc_sonDeptFlag').prop('checked', false);
                _adc_selectedDeptCodes = [];
            } else {
                $('#adc_personId').val('');
                $('#adc_personDisplay').val('');
            }
        }

        function adcInitDeptSelector() {
            if (typeof DeptTree === 'undefined') {
                return;
            }
            DeptTree.init('#adc_deptDisplay', function (selectedCodes) {
                _adc_selectedDeptCodes = selectedCodes || [];
            }, {
                cascadeChildren: false
            });
        }

        window.openEmployeeSearchPopup = function () {
            if (typeof EmployeeSearchModal !== 'undefined') {
                EmployeeSearchModal.open(function (employee) {
                    $('#adc_personId').val(employee.personId);
                    $('#adc_personDisplay').val(employee.empId + ' - ' + employee.localName);
                });
            } else {
                alert('Component tìm kiếm nhân viên chưa được tải!');
            }
        };

        window.adcRunCalculate = function () {
            var caltype = adcGetCaltype();
            var fromDate = $('#adc_fromDate').val();
            var toDate = $('#adc_toDate').val();
            var deptId = '';
            var personId = '';

            if (!fromDate || !toDate) {
                toastr && toastr.warning('Vui lòng chọn khoảng thời gian tính toán');
                return;
            }

            if (caltype === 'EMP') {
                personId = ($('#adc_personId').val() || '').trim();
                if (!personId) {
                    toastr && toastr.warning('Vui lòng chọn nhân viên');
                    return;
                }
            } else {
                if (!_adc_selectedDeptCodes || _adc_selectedDeptCodes.length === 0) {
                    toastr && toastr.warning('Vui lòng chọn phòng ban');
                    return;
                }
                if (_adc_selectedDeptCodes.length > 1) {
                    toastr && toastr.warning('Chỉ được chọn một phòng ban');
                    return;
                }
                deptId = _adc_selectedDeptCodes[0];
            }

            var payload = {
                caltype: caltype,
                fromDate: fromDate,
                toDate: toDate,
                deptId: deptId,
                sonDeptFlag: $('#adc_sonDeptFlag').is(':checked') ? 'YES' : 'NO',
                personId: personId
            };

            var $btn = $('#adc_calculateBtn');
            var originalHtml = $btn.html();
            $btn.prop('disabled', true).html('<i class="bx bx-loader bx-spin"></i> Đang tính toán');

            $.ajax({
                url: '/ar/attendanceMintenance/api/detailCalculate/run',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify(payload),
                success: function (res) {
                    if (res && res.success) {
                        toastr && toastr.success(res.message || 'Tính toán thành công');
                    } else {
                        toastr && toastr.error((res && res.error) || 'Tính toán thất bại');
                    }
                },
                error: function () {
                    toastr && toastr.error('Không thể thực hiện tính toán');
                },
                complete: function () {
                    $btn.prop('disabled', false).html(originalHtml);
                }
            });
        };

        function adcBootPage() {
            if (_adc_pageBooted) {
                return;
            }
            if (!document.getElementById('adc_form')) {
                setTimeout(adcBootPage, 30);
                return;
            }
            _adc_pageBooted = true;
            adcInitDeptSelector();
            adcInitDefaultDates();
            adcToggleTargetBlocks();
            $('.adc-caltype').off('change.adc').on('change.adc', function () {
                if ($(this).is(':checked')) {
                    $('.adc-caltype').not(this).prop('checked', false);
                } else if (!$('.adc-caltype:checked').length) {
                    $(this).prop('checked', true);
                }
                adcToggleTargetBlocks();
            });
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', adcBootPage);
        }
        if (typeof $ !== 'undefined') {
            $(document).ready(adcBootPage);
        } else {
            adcBootPage();
        }
    </script>
</template>
