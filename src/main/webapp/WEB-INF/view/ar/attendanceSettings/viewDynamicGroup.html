<div th:fragment="content">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-body">
                    <!-- Search Form -->
                    <form id="dynamicGroupSearchForm" class="row g-3 mb-4">
                        <div class="col-md-3">
                            <label for="searchEmpId" class="form-label">Nhân viên</label>
                            <input type="text" class="form-control" id="searchEmpId"
                                placeholder="Nhập mã / tên nhân viên">
                        </div>

                        <div class="col-md-3 d-flex align-items-end">
                            <button type="button" class="btn btn-primary me-2" onclick="dgSearchData()">
                                <i class="bx bx-search"></i> Tìm kiếm
                            </button>
                            <button type="button" class="btn btn-secondary" onclick="dgClearSearch()">
                                <i class="bx bx-x"></i> Xóa lọc
                            </button>
                            <button type="button" class="btn btn-success ms-2" onclick="dgOpenModal()">
                                <i class="bx bx-plus"></i> Thêm mới
                            </button>
                        </div>
                    </form>

                    <!-- Data Table -->
                    <div class="table-responsive">
                        <table id="dynamicGroupTable" class="table table-striped table-bordered table-hover"
                            style="width:100%">
                            <thead class="table-light">
                                <tr>
                                    <th>STT</th>
                                    <th>Emp ID (Mã NV)</th>
                                    <th>Tên nhân viên</th>
                                    <th>Phòng ban</th>
                                    <th>Người cập nhật</th>
                                    <th>Ngày cập nhật</th>
                                    <th class="text-center" style="width: 100px;">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Data loaded via AJAX -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal Thêm/Sửa -->
<div class="modal fade" id="dynamicGroupModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="dynamicGroupModalTitle">Cập nhật nhân viên đặc biệt</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="dynamicGroupForm">
                    <!-- Mặc định GROUP_NO là 80000084 -->
                    <input type="hidden" id="dgGroupNo" name="groupNo" value="80000084">

                    <div class="mb-3">
                        <label for="dgEmpNameDisplay" class="form-label">Nhân viên <span
                                class="text-danger">*</span></label>
                        <div class="input-group">
                            <input type="text" class="form-control" id="dgEmpNameDisplay"
                                placeholder="Chọn nhân viên..." readonly required>
                            <input type="hidden" id="dgPersonId" name="personId">
                            <button class="btn btn-outline-primary" type="button" onclick="openEmployeeSearchPopup()">
                                <i class="bx bx-search"></i>
                            </button>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                <button type="button" class="btn btn-primary" onclick="dgSaveData()">Lưu</button>
            </div>
        </div>
    </div>
</div>

<template id="fragmentScripts">
    <script th:inline="javascript">
        $(document).ready(function () {
            var table = $('#dynamicGroupTable').DataTable({
                destroy: true,
                scrollY: "calc(100vh - 280px)",
                scrollCollapse: true,
                paging: true,
                searching: true,
                lengthChange: true,
                pageLength: 25,
                columnDefs: [
                    { "width": "2%", "targets": 0 },
                ],
                processing: true,
                language: {
                    url: '//cdn.datatables.net/plug-ins/1.10.25/i18n/Vietnamese.json'
                },
                dom: 'Blfrtip',
                buttons: [
                    'copy', 'csv', 'excel', 'pdf', 'print'
                ],
                ajax: {
                    url: '/ar/attendanceSettings/api/dynamicGroup/list',
                    dataSrc: '',
                    data: function (d) {
                        d.empId = $('#searchEmpId').val();
                    }
                },
                columns: [
                    {
                        data: null,
                        render: function (data, type, row, meta) {
                            return meta.row + 1;
                        }
                    },
                    { data: 'empId' },
                    { data: 'localName' },
                    { data: 'deptName' },
                    { data: 'updatedBy' },
                    {
                        data: 'updateDate',
                        render: function (data) {
                            if (!data) return '';
                            var d = new Date(data);
                            return d.toLocaleString('vi-VN');
                        }
                    },
                    {
                        data: null,
                        className: "text-center",
                        render: function (data, type, row) {
                            return `
                                <div class="btn-group btn-group-sm">
                                    <button class="btn btn-danger" onclick="dgDeleteRaw('${row.personId}')">
                                        <i class="bx bx-trash"></i>
                                    </button>
                                </div>
                            `;
                        }
                    }
                ]
            });

            window.dgSearchData = function () {
                table.ajax.reload();
            };

            window.dgClearSearch = function () {
                $('#dynamicGroupSearchForm')[0].reset();
                table.ajax.reload();
            };

            // Mở modal thêm mới
            window.dgOpenModal = function () {
                $('#dynamicGroupModalTitle').text('Thêm mới Nhân viên đặc biệt');
                $('#dynamicGroupForm')[0].reset();
                $('#dgPersonId').val('');
                $('#dgEmpNameDisplay').val('');
                $('#dgGroupNo').val('80000084');
                $('#dgActivity').val('1'); // Mặc định hoạt động
                var modal = new bootstrap.Modal(document.getElementById('dynamicGroupModal'));
                modal.show();
            };

            // Sửa
            window.dgEditRaw = function (personId) {
                $.ajax({
                    url: '/ar/attendanceSettings/api/dynamicGroup/' + personId,
                    type: 'GET',
                    success: function (data) {
                        $('#dynamicGroupModalTitle').text('Cập nhật Nhân viên đặc biệt');
                        $('#dgPersonId').val(data.personId);
                        $('#dgEmpNameDisplay').val((data.empId || '') + ' - ' + (data.localName || ''));
                        $('#dgActivity').val(data.activity);
                        $('#dgOrderno').val(data.orderno);

                        var modal = new bootstrap.Modal(document.getElementById('dynamicGroupModal'));
                        modal.show();
                    },
                    error: function (err) {
                        if (typeof toastr !== 'undefined') toastr.error('Lỗi khi lấy thông tin');
                        else alert('Lỗi khi lấy thông tin');
                    }
                });
            };

            // Mở popup tìm kiếm nhân viên
            window.openEmployeeSearchPopup = function () {
                if (typeof EmployeeSearchModal !== 'undefined') {
                    EmployeeSearchModal.open(function (employee) {
                        $('#dgPersonId').val(employee.personId);
                        $('#dgEmpNameDisplay').val(employee.empId + ' - ' + employee.localName);
                    });
                } else {
                    alert('Component tìm kiếm nhân viên chưa được tải!');
                }
            };

            // Lưu dữ liệu
            window.dgSaveData = function () {
                var personId = $('#dgPersonId').val();
                if (!personId) {
                    if (typeof toastr !== 'undefined') toastr.warning('Vui lòng nhập Person ID');
                    else alert('Vui lòng nhập Person ID');
                    return;
                }

                var formData = {
                    personId: personId,
                    groupNo: $('#dgGroupNo').val() || '80000084',
                    orderno: $('#dgOrderno').val() || null,
                    activity: $('#dgActivity').val() || 0
                };

                $.ajax({
                    url: '/ar/attendanceSettings/api/dynamicGroup/save',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(formData),
                    success: function (res) {
                        if (res.success) {
                            if (typeof toastr !== 'undefined') toastr.success(res.message);
                            else alert(res.message);
                            var modalEl = document.getElementById('dynamicGroupModal');
                            if (modalEl) {
                                var modal = bootstrap.Modal.getInstance(modalEl);
                                if (modal) {
                                    modal.hide();
                                } else {
                                    $(modalEl).modal('hide');
                                }
                            }
                            table.ajax.reload();
                        } else {
                            if (typeof toastr !== 'undefined') toastr.error('Lỗi: ' + res.error);
                            else alert('Lỗi: ' + res.error);
                        }
                    },
                    error: function (err) {
                        if (typeof toastr !== 'undefined') toastr.error('Lỗi kết nối');
                        else alert('Lỗi kết nối');
                    }
                });
            };

            // Xóa
            window.dgDeleteRaw = function (personId) {
                if (confirm('Bạn có chắc chắn muốn xóa nhân viên này khỏi nhóm đặc biệt?')) {
                    $.ajax({
                        url: '/ar/attendanceSettings/api/dynamicGroup/delete/' + personId,
                        type: 'DELETE',
                        success: function (res) {
                            if (res.success) {
                                if (typeof toastr !== 'undefined') toastr.success(res.message);
                                else alert(res.message);
                                table.ajax.reload();
                            } else {
                                if (typeof toastr !== 'undefined') toastr.error('Lỗi: ' + res.error);
                                else alert('Lỗi: ' + res.error);
                            }
                        },
                        error: function (err) {
                            if (typeof toastr !== 'undefined') toastr.error('Lỗi kết nối');
                            else alert('Lỗi kết nối');
                        }
                    });
                }
            };
        });
    </script>
</template>
