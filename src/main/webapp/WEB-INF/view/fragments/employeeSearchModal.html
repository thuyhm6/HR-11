<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Employee Search Modal</title>
</head>
<body>

<!-- Employee Search Modal Fragment -->
<div th:fragment="content">
    <div class="modal fade" id="employeeSearchModal" tabindex="-1" aria-labelledby="employeeSearchModalTitle" aria-hidden="true">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="employeeSearchModalTitle">
                        <i class="bx bx-search me-2"></i>
                        <span th:text="#{empSearch.title}">Tìm kiếm nhân viên</span>
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <!-- Search Form -->
                    <div class="row mb-2 align-items-end g-2">
                        <div class="col-md-4">
                            <label for="popupSearchKeyword" class="form-label" th:text="#{empSearch.field.keyword}">Mã nhân viên / Họ tên</label>
                            <input type="text" class="form-control" id="popupSearchKeyword"
                                th:placeholder="#{empSearch.placeholder.keyword}"
                                onkeydown="if(event.key==='Enter') EmployeeSearchModal.search()">
                        </div>
                        <div class="col-md-4">
                            <label for="esm_deptSearch" class="form-label" th:text="#{empSearch.field.dept}">Phòng ban</label>
                            <input type="text" class="form-control" id="esm_deptSearch" readonly
                                th:placeholder="#{empSearch.field.dept}">
                        </div>
                        <div class="col-md-4">
                            <label for="esm_empOffice" class="form-label" th:text="#{empSearch.field.empOffice}">Trạng thái làm việc</label>
                            <select class="form-select" id="esm_empOffice" data-parent-code="15118"></select>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-12 d-flex gap-2">
                            <button type="button" class="btn btn-primary" onclick="EmployeeSearchModal.search()">
                                <i class="bx bx-search me-1"></i>
                                <span th:text="#{common.search}">Tìm kiếm</span>
                            </button>
                            <button type="button" class="btn btn-secondary" onclick="EmployeeSearchModal.clear()">
                                <i class="bx bx-x me-1"></i>
                                <span th:text="#{empSearch.btn.clearFilter}">Xóa bộ lọc</span>
                            </button>
                        </div>
                    </div>

                    <!-- Employee List Table -->
                    <div class="table-responsive">
                        <table id="employeeSearchTable" class="table table-striped table-hover">
                            <thead class="table-dark">
                                <tr>
                                    <th th:text="#{empSearch.col.no}">STT</th>
                                    <th th:text="#{empSearch.field.empId}">Mã nhân viên</th>
                                    <th th:text="#{empSearch.field.fullName}">Họ tên</th>
                                    <th th:text="#{empSearch.col.dept}">Phòng ban</th>
                                    <th th:text="#{epi.field.position}">Chức vụ</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Data will be loaded here -->
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        <i class="bx bx-x me-1"></i>
                        <span th:text="#{common.close}">Đóng</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- JavaScript is now handled by external file: employeeSearchModal.js -->

</body>
</html>
