<div th:fragment="content">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-body">
                    <form id="caoi_searchForm" class="row g-3 mb-4 d-flex align-items-end">
                        <div class="col-md-2">
                            <label for="caoi_keyword" class="form-label" th:text="#{ex.field.empIdOrName}">Mã NV / Họ tên</label>
                            <input type="text" class="form-control" id="caoi_keyword"
                                th:placeholder="#{ex.placeholder.empIdOrName}" placeholder="Nhập mã hoặc họ tên">
                        </div>
                        <div class="col-md-2">
                            <label for="caoi_deptNo" class="form-label" th:text="#{ex.field.dept}">Phòng ban</label>
                            <input type="text" class="form-control" id="caoi_deptNo"
                                th:placeholder="#{ex.placeholder.dept}" placeholder="Chọn phòng ban" readonly>
                        </div>
                        <div class="col-md-2">
                            <label for="caoi_startDate" class="form-label" th:text="#{ex.field.fromDate}">Ngày bắt đầu</label>
                            <input type="text" class="form-control js-daterangepicker" id="caoi_startDate"
                                data-drp-format="YYYY/MM/DD" autocomplete="off">
                        </div>
                        <div class="col-md-2">
                            <label for="caoi_endDate" class="form-label" th:text="#{ex.field.toDate}">Ngày kết thúc</label>
                            <input type="text" class="form-control js-daterangepicker" id="caoi_endDate"
                                data-drp-format="YYYY/MM/DD" autocomplete="off">
                        </div>
                        <div class="col-md-2">
                            <label for="caoi_postFamily" class="form-label" th:text="#{ex.field.postFamily}">Nhóm nhân viên</label>
                            <select class="form-select" id="caoi_postFamily" data-parent-code="14015812"
                                th:attr="data-default-text=#{ex.opt.all}" data-default-text="-- Tất cả --"></select>
                        </div>
                        <div class="col-md-2">
                            <label for="caoi_shiftNo" class="form-label" th:text="#{ex.field.shiftNo}">Ca làm việc</label>
                            <select class="form-select" id="caoi_shiftNo">
                                <option value="" th:text="#{ex.opt.all}">-- Tất cả --</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label for="caoi_itemNoSearch" class="form-label" th:text="#{caoi.field.otType}">Loại tăng ca</label>
                            <select class="form-select" id="caoi_itemNoSearch">
                                <option value="" th:text="#{ex.opt.all}">-- Tất cả --</option>
                            </select>
                        </div>
                        <div class="col-md-4 d-flex align-items-end gap-2 flex-wrap">
                            <button type="button" class="btn btn-primary" onclick="caoiSearchData()">
                                <i class="bx bx-search"></i>
                                <span th:text="#{ex.btn.search}">Tra cứu</span>
                            </button>
                            <button type="button" class="btn btn-success" onclick="caoiExportExcel()">
                                <i class="bx bx-export"></i>
                                <span th:text="#{ex.btn.export}">Xuất Excel</span>
                            </button>
                        </div>
                    </form>

                    <div class="table-responsive">
                        <table id="caoi_dataTable" class="table table-striped table-bordered table-hover">
                            <thead class="table-light text-center align-middle">
                                <tr>
                                    <th th:text="#{ex.col.no}">No.</th>
                                    <th th:text="#{ex.col.empId}">Mã nhân viên</th>
                                    <th th:text="#{ex.col.fullName}">Họ tên</th>
                                    <th th:text="#{ex.col.dept}">Phòng ban</th>
                                    <th th:text="#{ex.col.position}">Chức vụ</th>
                                    <th th:text="#{cai.col.shift}">Ca</th>
                                    <th th:text="#{caoi.col.otType}">Loại tăng ca</th>
                                    <th th:text="#{cai.col.workDate}">Ngày công</th>
                                    <th th:text="#{caoi.col.checkIn}">Vào</th>
                                    <th th:text="#{caoi.col.checkOut}">Ra</th>
                                    <th th:text="#{cai.col.fromTime}">Thời gian bắt đầu</th>
                                    <th th:text="#{cai.col.toTime}">Thời gian kết thúc</th>
                                    <th th:text="#{cai.col.duration}">Thời lượng</th>
                                    <th th:text="#{caoi.col.remark}">Ghi chú</th>
                                    <th th:text="#{cai.col.status}">Trạng thái</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<template id="fragmentScripts">
    <script th:inline="javascript">
        var _caoi_table = null;
        var _caoi_pageBooted = false;
        var _caoi_selectedDeptCodes = [];

        function caoiFormatDate(dateObj) {
            var d = String(dateObj.getDate()).padStart(2, '0');
            var m = String(dateObj.getMonth() + 1).padStart(2, '0');
            var y = dateObj.getFullYear();
            return y + '/' + m + '/' + d;
        }

        function caoiInitDefaultDateRange() {
            var today = new Date();
            var yesterday = new Date(today);
            yesterday.setDate(today.getDate() - 1);

            var fromValue = caoiFormatDate(yesterday);
            var toValue = caoiFormatDate(today);

            $('#caoi_startDate').val(fromValue);
            $('#caoi_endDate').val(toValue);

            if ($('#caoi_startDate').data('daterangepicker')) {
                $('#caoi_startDate').data('daterangepicker').setStartDate(fromValue);
            }
            if ($('#caoi_endDate').data('daterangepicker')) {
                $('#caoi_endDate').data('daterangepicker').setStartDate(toValue);
            }
        }

        function caoiInitDeptSelector() {
            if (typeof DeptTree === 'undefined') return;
            DeptTree.init('#caoi_deptNo', function (selectedCodes) {
                _caoi_selectedDeptCodes = selectedCodes || [];
            });
        }

        function caoiLoadShiftOptions() {
            return $.ajax({
                url: '/ar/attendanceSettings/api/shift',
                type: 'GET',
                success: function (data) {
                    var optAll = /*[[#{ex.opt.all}]]*/ '-- Tất cả --';
                    var html = '<option value="">' + optAll + '</option>';
                    (data || []).forEach(function (item) {
                        var code = item.shiftNo || '';
                        var name = item.nameVi || item.shiftName || code;
                        html += '<option value="' + code + '">' + name + '</option>';
                    });
                    $('#caoi_shiftNo').html(html);
                }
            });
        }

        function caoiLoadOtItemOptions() {
            return $.ajax({
                url: '/ess/infoApply/api/coordOt/items',
                type: 'GET',
                success: function (data) {
                    var optAll = /*[[#{ex.opt.all}]]*/ '-- Tất cả --';
                    var html = '<option value="">' + optAll + '</option>';
                    (data || []).forEach(function (item) {
                        var code = item.itemNoCode || '';
                        var name = item.itemName || code;
                        html += '<option value="' + code + '">' + name + '</option>';
                    });
                    $('#caoi_itemNoSearch').html(html);
                }
            });
        }

        function caoiInitTable() {
            _caoi_table = $('#caoi_dataTable').DataTable({
                destroy: true,
                scrollX: true,
                scrollY: 'calc(100vh - 320px)',
                scrollCollapse: true,
                paging: true,
                searching: false,
                lengthChange: true,
                pageLength: 25,
                processing: true,
                serverSide: true,
                dom: 'Blfrtip',
                buttons: [
                    {
                        extend: 'excel',
                        title: 'coord_apply_ot_export'
                    }
                ],
                columnDefs: [
                    { targets: 0,  width: '40px',  orderable: false, className: 'text-center' },
                    { targets: 1,  width: '100px', orderable: false, className: 'text-center' },
                    { targets: 2,  width: '160px', orderable: false },
                    { targets: 3,  width: '180px', orderable: false },
                    { targets: 4,  width: '120px', orderable: false },
                    { targets: 5,  width: '100px', orderable: false, className: 'text-center' },
                    { targets: 6,  width: '140px', orderable: false },
                    { targets: 7,  width: '100px', orderable: false, className: 'text-center' },
                    { targets: 8,  width: '70px',  orderable: false, className: 'text-center' },
                    { targets: 9,  width: '70px',  orderable: false, className: 'text-center' },
                    { targets: 10, width: '150px', orderable: false, className: 'text-center' },
                    { targets: 11, width: '150px', orderable: false, className: 'text-center' },
                    { targets: 12, width: '80px',  orderable: false, className: 'text-center' },
                    { targets: 13, width: '160px', orderable: false },
                    { targets: 14, width: '100px', orderable: false, className: 'text-center' }
                ],
                ajax: {
                    url: '/ess/infoApply/api/coordOt/list',
                    data: function (d) {
                        d.keyword      = $('#caoi_keyword').val();
                        d.deptNos      = (_caoi_selectedDeptCodes || []).join(',');
                        d.startDate    = $('#caoi_startDate').val();
                        d.endDate      = $('#caoi_endDate').val();
                        d.shiftNo      = $('#caoi_shiftNo').val();
                        d.itemNoSearch = $('#caoi_itemNoSearch').val();
                        d.postFamily   = $('#caoi_postFamily').val();
                        d.draw         = d.draw   || 1;
                        d.start        = d.start  || 0;
                        d.length       = d.length || 25;
                    },
                    error: function () {
                        if (typeof toastr !== 'undefined') {
                            toastr.error('Lỗi tải danh sách tra cứu tăng ca');
                        }
                    }
                },
                initComplete: function () {
                    $('#caoi_dataTable_wrapper').find('.dt-buttons').hide();
                },
                columns: [
                    {
                        data: null,
                        render: function (data, type, row, meta) {
                            return meta.settings._iDisplayStart + meta.row + 1;
                        }
                    },
                    { data: 'empId',         render: function (d) { return d || ''; } },
                    { data: 'localName',     render: function (d) { return d || ''; } },
                    { data: 'deptName',      render: function (d) { return d || ''; } },
                    { data: 'postGradeName', render: function (d) { return d || ''; } },
                    { data: 'shiftName',     render: function (d) { return d || ''; } },
                    { data: 'itemName',      render: function (d) { return d || ''; } },
                    { data: 'arDateStr',     render: function (d) { return d || ''; } },
                    { data: 'indoorTime',    render: function (d) { return d || ''; } },
                    { data: 'outdoorTime',   render: function (d) { return d || ''; } },
                    { data: 'fromDate',      render: function (d) { return d || ''; } },
                    { data: 'toTime',        render: function (d) { return d || ''; } },
                    {
                        data: null,
                        render: function (data, type, row) {
                            var qty  = row.quantity || '';
                            var unit = row.unit || '';
                            return qty + (unit ? ' ' + unit : '');
                        }
                    },
                    { data: 'remark',     render: function (d) { return d || ''; } },
                    { data: 'statusName', render: function (d) { return d || ''; } }
                ]
            });
        }

        function caoiBootPage() {
            if (_caoi_pageBooted) return;
            if (!document.getElementById('caoi_dataTable')) {
                setTimeout(caoiBootPage, 30);
                return;
            }
            _caoi_pageBooted = true;
            caoiInitDefaultDateRange();
            caoiInitDeptSelector();
            if (typeof initDateRangePickers === 'function') {
                initDateRangePickers('#caoi_searchForm');
            }
            $.when(caoiLoadShiftOptions(), caoiLoadOtItemOptions()).always(function () {
                caoiInitTable();
                if (_caoi_table) {
                    _caoi_table.ajax.reload();
                }
            });
        }

        window.caoiSearchData = function () {
            if (_caoi_table) {
                _caoi_table.ajax.reload();
            }
        };

        window.caoiExportExcel = function () {
            if (_caoi_table) {
                _caoi_table.button('.buttons-excel').trigger();
            }
        };

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', caoiBootPage);
        }
        if (typeof $ !== 'undefined') {
            $(document).ready(caoiBootPage);
        } else {
            caoiBootPage();
        }
    </script>
</template>
