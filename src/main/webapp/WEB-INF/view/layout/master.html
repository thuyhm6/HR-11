    <script>
        // Global Toastr Config
        if (typeof toastr !== 'undefined') {
            toastr.options = {
                "closeButton": true,
                "progressBar": true,
                "positionClass": "toast-top-right",
                "timeOut": "3000",
                "showMethod": "slideDown",
                "hideMethod": "slideUp"
            };
        }

        // --- Common Utils JS ---
        (function setupCsrfForAjaxAndForms() {
            const csrfToken = $('meta[name="_csrf"]').attr('content');
            const csrfHeader = $('meta[name="_csrf_header"]').attr('content');
            const csrfParameter = $('meta[name="_csrf_parameter"]').attr('content') || '_csrf';

            if (csrfToken && csrfHeader) {
                $.ajaxPrefilter(function (options, originalOptions, jqXHR) {
                    const method = ((options.type || 'GET') + '').toUpperCase();
                    if (!['GET', 'HEAD', 'OPTIONS', 'TRACE'].includes(method)) {
                        jqXHR.setRequestHeader(csrfHeader, csrfToken);
                    }
                });
            }

            $(document).on('submit', 'form[method="post"], form[method="POST"]', function () {
                if (!csrfToken) {
                    return;
                }
                const hasCsrfInput = $(this).find('input[name="' + csrfParameter + '"]').length > 0;
                if (!hasCsrfInput) {
                    $('<input>', {
                        type: 'hidden',
                        name: csrfParameter,
                        value: csrfToken
                    }).appendTo(this);
                }
            });
        })();

        window.loadCodeList = function (selectSelector, parentCodeNo, defaultText, callback) {
            var select = $(selectSelector);
            if (!select.length) return;
            //defaultText = defaultText || '-- Chọn --';

            $.ajax({
                url: '/sys/api/code/list?parentCodeNo=' + parentCodeNo,
                type: 'GET',
                success: function (data) {
                    select.empty();
                    // Chỉ thêm option mặc định nếu defaultText có giá trị (không rỗng, không undefined)
                    if (defaultText !== undefined && defaultText !== null && defaultText !== '') {
                        select.append($('<option></option>').val('').text(defaultText));
                    }
                    data.forEach(function (code) {
                        var name = code.nameVi || code.description || code.codeId || code.codeNo;
                        select.append($('<option></option>').val(code.codeNo).text(name));
                    });
                    if (typeof callback === 'function') {
                        callback();
                    }
                },
                error: function (err) {
                    console.error("Lỗi khi tải danh sách Mã cho parentCodeNo=" + parentCodeNo, err);
                }
            });
        };

        window.initCodeSelects = function (context) {
            var $context = $(context || document);
            var $selects = $context.is('select[data-parent-code]') ? $context : $context.find('select[data-parent-code]');
            $selects.each(function () {
                var select = $(this);
                if (select.data('code-initialized')) return;
                select.data('code-initialized', true);

                var parentCodeNo = select.data('parent-code');
                var defaultText = select.data('default-text');
                if (parentCodeNo) {
                    loadCodeList(this, parentCodeNo, defaultText);
                }
            });
        };

        $(document).ready(function () {
            // Auto init for config-driven selects on initial load
            initCodeSelects();
            initDateRangePickers();

            // Watch for dynamically added elements (like Tabs/Modals)
            var observer = new MutationObserver(function (mutations) {
                mutations.forEach(function (mutation) {
                    if (mutation.addedNodes && mutation.addedNodes.length > 0) {
                        mutation.addedNodes.forEach(function (node) {
                            if (node.nodeType === 1) { // ELEMENT_NODE
                                initCodeSelects(node);
                                initDateRangePickers(node);
                            }
                        });
                    }
                });
            });
            observer.observe(document.body, { childList: true, subtree: true });
        });
    </script>

    <!-- Chèn script fragment -->
    <div id="dynamic-scripts"></div> <!-- chỗ inject script -->

    <!-- Language Script -->

    <script>

        // Recalculate scroll height when window is resized
        $(window).on('resize', function () {
            // Debounce the resize event
            clearTimeout(window.resizeTimeout);
            window.resizeTimeout = setTimeout(function () {
                console.log('Window resized, recalculating scroll height...');
                // Trigger custom event for DataTable to recalculate
                $(document).trigger('scrollHeightChanged', [getOptimalDataTableHeight()]);
            }, 250);
        });

        // Function to get optimal DataTable height based on current layout
        function getOptimalDataTableHeight() {
            const viewportHeight = $(window).height();
            const headerHeight = $('.topbar').outerHeight() || 60;
            const footerHeight = $('.footer').outerHeight() || 60;
            const tabNavigationHeight = $('#tab-navigation').outerHeight() || 0;
            const searchFormHeight = $('.searchForm').outerHeight() || 0;
            const cardHeaderHeight = $('.card-header').outerHeight() || 0;
            const paginationHeight = 60; // DataTable pagination
            const buffer = 100; // Extra buffer for spacing

            const availableHeight = viewportHeight - headerHeight - footerHeight - tabNavigationHeight - searchFormHeight - cardHeaderHeight - paginationHeight - buffer;

            return Math.max(200, availableHeight);
        }
    </script>
