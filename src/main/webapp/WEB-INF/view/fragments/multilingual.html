<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Multilingual Fragments</title>
</head>
<body>

    <!-- Fragment để hiển thị nội dung đa ngôn ngữ sử dụng Spring i18n -->
    <div th:fragment="i18nText" th:text="#{${messageKey}}">
        <!-- Nội dung mặc định -->
    </div>

    <!-- Fragment để hiển thị nội dung đa ngôn ngữ với arguments -->
    <div th:fragment="i18nTextWithArgs" th:text="#{${messageKey}(${args})}">
        <!-- Nội dung mặc định -->
    </div>

    <!-- Fragment để hiển thị dropdown chọn ngôn ngữ -->
    <div th:fragment="languageSelector">
        <div class="dropdown">
            <button class="btn btn-light dropdown-toggle" type="button" id="languageDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                <span id="currentLanguageFlag">🇻🇳</span>
                <span id="currentLanguageName" th:text="#{language.vietnamese}">Tiếng Việt</span>
            </button>
            <ul class="dropdown-menu" aria-labelledby="languageDropdown">
                <li>
                    <a class="dropdown-item" href="#" onclick="changeLanguage('vi')">
                        <span class="me-2">🇻🇳</span>
                        <span th:text="#{language.vietnamese}">Tiếng Việt</span>
                    </a>
                </li>
                <li>
                    <a class="dropdown-item" href="#" onclick="changeLanguage('en')">
                        <span class="me-2">🇺🇸</span>
                        <span th:text="#{language.english}">English</span>
                    </a>
                </li>
                <li>
                    <a class="dropdown-item" href="#" onclick="changeLanguage('zh')">
                        <span class="me-2">🇨🇳</span>
                        <span th:text="#{language.chinese}">中文</span>
                    </a>
                </li>
                <li>
                    <a class="dropdown-item" href="#" onclick="changeLanguage('ko')">
                        <span class="me-2">🇰🇷</span>
                        <span th:text="#{language.korean}">한국어</span>
                    </a>
                </li>
            </ul>
        </div>
    </div>

    <!-- Fragment để hiển thị nút chuyển đổi ngôn ngữ -->
    <div th:fragment="languageButtons">
        <div class="btn-group" role="group">
            <button type="button" 
                    class="btn btn-sm btn-outline-primary language-btn"
                    data-lang="vi"
                    onclick="changeLanguage('vi')">
                🇻🇳 <span th:text="#{language.vietnamese}">Tiếng Việt</span>
            </button>
            <button type="button" 
                    class="btn btn-sm btn-outline-primary language-btn"
                    data-lang="en"
                    onclick="changeLanguage('en')">
                🇺🇸 <span th:text="#{language.english}">English</span>
            </button>
            <button type="button" 
                    class="btn btn-sm btn-outline-primary language-btn"
                    data-lang="zh"
                    onclick="changeLanguage('zh')">
                🇨🇳 <span th:text="#{language.chinese}">中文</span>
            </button>
            <button type="button" 
                    class="btn btn-sm btn-outline-primary language-btn"
                    data-lang="ko"
                    onclick="changeLanguage('ko')">
                🇰🇷 <span th:text="#{language.korean}">한국어</span>
            </button>
        </div>
    </div>

    <!-- Fragment để hiển thị compact language selector -->
    <div th:fragment="languageSelectorCompact">
        <div class="language-selector-compact">
            <select id="languageSelect" class="form-select form-select-sm" onchange="changeLanguage(this.value)">
                <option value="vi">🇻🇳 VN</option>
                <option value="en">🇺🇸 EN</option>
                <option value="zh">🇨🇳 CN</option>
                <option value="ko">🇰🇷 KR</option>
            </select>
        </div>
    </div>

    <!-- Script để chuyển đổi ngôn ngữ -->
    <script th:fragment="languageScript">
        // Hàm chuyển đổi ngôn ngữ
        function changeLanguage(language) {
            // Hiển thị loading
            showLanguageLoading();
            
            // Gọi API để thay đổi ngôn ngữ
            fetch('/change-language?lang=' + language, {
                method: 'GET',
                headers: {
                    'Content-Type': 'application/json',
                }
            }).then(response => {
                if (response.ok) {
                    // Reload trang với ngôn ngữ mới
                    window.location.reload();
                } else {
                    console.error('Error changing language:', response.statusText);
                    hideLanguageLoading();
                }
            }).catch(error => {
                console.error('Error changing language:', error);
                hideLanguageLoading();
            });
        }

        // Hiển thị loading khi chuyển đổi ngôn ngữ
        function showLanguageLoading() {
            const buttons = document.querySelectorAll('.language-btn');
            buttons.forEach(btn => {
                btn.disabled = true;
                btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Loading...';
            });
        }

        // Ẩn loading
        function hideLanguageLoading() {
            const buttons = document.querySelectorAll('.language-btn');
            buttons.forEach(btn => {
                btn.disabled = false;
                // Restore original content
                const lang = btn.getAttribute('data-lang');
                switch(lang) {
                    case 'vi':
                        btn.innerHTML = '🇻🇳 <span>Tiếng Việt</span>';
                        break;
                    case 'en':
                        btn.innerHTML = '🇺🇸 <span>English</span>';
                        break;
                    case 'zh':
                        btn.innerHTML = '🇨🇳 <span>中文</span>';
                        break;
                    case 'ko':
                        btn.innerHTML = '🇰🇷 <span>한국어</span>';
                        break;
                }
            });
        }

        // Cập nhật giao diện khi trang load
        document.addEventListener('DOMContentLoaded', function() {
            updateLanguageUI();
        });

        // Cập nhật giao diện ngôn ngữ
        function updateLanguageUI() {
            // Lấy ngôn ngữ hiện tại từ server
            fetch('/api/current-language')
                .then(response => response.json())
                .then(data => {
                    const currentLang = data.languageCode;
                    
                    // Cập nhật dropdown
                    const languageSelect = document.getElementById('languageSelect');
                    if (languageSelect) {
                        languageSelect.value = currentLang;
                    }
                    
                    // Cập nhật dropdown button
                    const currentLanguageFlag = document.getElementById('currentLanguageFlag');
                    const currentLanguageName = document.getElementById('currentLanguageName');
                    if (currentLanguageFlag && currentLanguageName) {
                        switch(currentLang) {
                            case 'vi':
                                currentLanguageFlag.textContent = '🇻🇳';
                                currentLanguageName.textContent = 'Tiếng Việt';
                                break;
                            case 'en':
                                currentLanguageFlag.textContent = '🇺🇸';
                                currentLanguageName.textContent = 'English';
                                break;
                            case 'zh':
                                currentLanguageFlag.textContent = '🇨🇳';
                                currentLanguageName.textContent = '中文';
                                break;
                            case 'ko':
                                currentLanguageFlag.textContent = '🇰🇷';
                                currentLanguageName.textContent = '한국어';
                                break;
                        }
                    }
                    
                    // Cập nhật active button
                    const languageButtons = document.querySelectorAll('.language-btn');
                    languageButtons.forEach(btn => {
                        const btnLang = btn.getAttribute('data-lang');
                        if (btnLang === currentLang) {
                            btn.classList.add('active');
                        } else {
                            btn.classList.remove('active');
                        }
                    });
                })
                .catch(error => {
                    console.error('Error getting current language:', error);
                });
        }
    </script>

</body>
</html>
