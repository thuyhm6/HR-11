<!-- Edit Contract Modal -->
<div th:fragment="content">
    <!-- Edit Contract Modal -->
    <div class="modal fade" id="contractEditModal" tabindex="-1" aria-labelledby="contractEditModalLabel"
        aria-hidden="true">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="contractEditModalLabel">Chỉnh sửa thông tin hợp đồng</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="contractEditForm">
                        <div class="row">
                            <!-- Basic Information -->
                            <div class="col-md-6">
                                <h6 class="text-primary mb-3">Thông tin cơ bản</h6>

                                <div class="mb-3">
                                    <label for="contractEditContractNo" class="form-label">Số hợp đồng <span
                                            class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="contractEditContractNo"
                                        name="contractNo" required readonly>
                                </div>

                                <div class="mb-3">
                                    <label for="contractEditEmpId" class="form-label">Mã nhân viên <span
                                            class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="contractEditEmpId" name="empId"
                                        required>
                                </div>

                                <div class="mb-3">
                                    <label for="contractEditContractName" class="form-label">Tên hợp đồng <span
                                            class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="contractEditContractName"
                                        name="contractName" required>
                                </div>

                                <div class="mb-3">
                                    <label for="contractEditContractType" class="form-label">Loại hợp đồng</label>
                                    <select class="form-select" id="contractEditContractType" name="contractType">
                                        <option value="FULL_TIME">Toàn thời gian</option>
                                        <option value="PART_TIME">Bán thời gian</option>
                                        <option value="INTERN">Thực tập</option>
                                        <option value="CONSULTANT">Tư vấn</option>
                                    </select>
                                </div>

                                <div class="mb-3">
                                    <label for="contractEditContractTypeCode" class="form-label">Mã loại hợp
                                        đồng</label>
                                    <input type="text" class="form-control" id="contractEditContractTypeCode"
                                        name="contractTypeCode">
                                </div>

                                <div class="mb-3">
                                    <label for="contractEditStartContractDate" class="form-label">Ngày bắt đầu hợp
                                        đồng</label>
                                    <input type="date" class="form-control" id="contractEditStartContractDate"
                                        name="startContractDate">
                                </div>

                                <div class="mb-3">
                                    <label for="contractEditEndContractDate" class="form-label">Ngày kết thúc hợp
                                        đồng</label>
                                    <input type="date" class="form-control" id="contractEditEndContractDate"
                                        name="endContractDate">
                                </div>

                                <div class="mb-3">
                                    <label for="contractEditChangeDate" class="form-label">Ngày thay đổi</label>
                                    <input type="date" class="form-control" id="contractEditChangeDate"
                                        name="changeDate">
                                </div>
                            </div>

                            <!-- Work Information -->
                            <div class="col-md-6">
                                <h6 class="text-primary mb-3">Thông tin công việc</h6>

                                <div class="mb-3">
                                    <label for="contractEditDeptno" class="form-label">Phòng ban</label>
                                    <input type="text" class="form-control" id="contractEditDeptno" name="deptno">
                                </div>

                                <div class="mb-3">
                                    <label for="contractEditWorkPosition" class="form-label">Vị trí làm việc</label>
                                    <input type="text" class="form-control" id="contractEditWorkPosition"
                                        name="workPosition">
                                </div>

                                <div class="mb-3">
                                    <label for="contractEditPositionNo" class="form-label">Mã chức vụ</label>
                                    <input type="text" class="form-control" id="contractEditPositionNo"
                                        name="positionNo">
                                </div>

                                <div class="mb-3">
                                    <label for="contractEditPostGradeNo" class="form-label">Mã cấp bậc</label>
                                    <input type="text" class="form-control" id="contractEditPostGradeNo"
                                        name="postGradeNo">
                                </div>

                                <div class="mb-3">
                                    <label for="contractEditSalary" class="form-label">Lương</label>
                                    <input type="number" class="form-control" id="contractEditSalary" name="salary"
                                        min="0">
                                </div>

                                <div class="mb-3">
                                    <label for="contractEditWorkTime" class="form-label">Thời gian làm việc</label>
                                    <input type="text" class="form-control" id="contractEditWorkTime" name="workTime">
                                </div>

                                <div class="mb-3">
                                    <label for="contractEditWorkHourType" class="form-label">Loại giờ làm việc</label>
                                    <select class="form-select" id="contractEditWorkHourType" name="workHourType">
                                        <option value="">Chọn loại giờ làm việc</option>
                                        <option value="FULL_TIME">Toàn thời gian</option>
                                        <option value="PART_TIME">Bán thời gian</option>
                                        <option value="OVERTIME">Tăng ca</option>
                                        <option value="FLEXIBLE">Linh hoạt</option>
                                    </select>
                                </div>

                                <div class="mb-3">
                                    <label for="contractEditTotalPeriod" class="form-label">Tổng thời gian</label>
                                    <input type="text" class="form-control" id="contractEditTotalPeriod"
                                        name="totalPeriod">
                                </div>

                                <div class="mb-3">
                                    <label for="contractEditTotalPeriod08" class="form-label">Tổng thời gian 08</label>
                                    <input type="text" class="form-control" id="contractEditTotalPeriod08"
                                        name="totalPeriod08">
                                </div>

                                <div class="mb-3">
                                    <label for="contractEditActivity" class="form-label">Trạng thái hoạt động</label>
                                    <select class="form-select" id="contractEditActivity" name="activity">
                                        <option value="ACTIVE">Hoạt động</option>
                                        <option value="INACTIVE">Không hoạt động</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <!-- Work Content and Remarks -->
                        <div class="row mt-3">
                            <div class="col-12">
                                <h6 class="text-primary mb-3">Nội dung và ghi chú</h6>

                                <div class="mb-3">
                                    <label for="contractEditWorkContent" class="form-label">Nội dung công việc</label>
                                    <textarea class="form-control" id="contractEditWorkContent" name="workContent"
                                        rows="4" placeholder="Mô tả chi tiết nội dung công việc..."></textarea>
                                </div>

                                <div class="mb-3">
                                    <label for="contractEditRemark" class="form-label">Ghi chú</label>
                                    <textarea class="form-control" id="contractEditRemark" name="remark" rows="3"
                                        placeholder="Ghi chú thêm về hợp đồng..."></textarea>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        <i class="bx bx-x me-1"></i> Hủy
                    </button>
                    <button type="button" class="btn btn-primary" onclick="contractSaveChanges()">
                        <i class="bx bx-save me-1"></i> Lưu thay đổi
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Contract Modal -->

                                            <i class="bx bx-search"></i> Tìm

                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label for="contractAddContractName" class="form-label">Tên hợp đồng <span

                                    <input type="text" class="form-control" id="contractAddContractName"

                                    <label for="contractAddContractType" class="form-label">Loại hợp đồng</label>
                                    <select class="form-select" id="contractAddContractType" name="contractType">

                            </div>

                            <!-- Work Information -->

                                <h6 class="text-primary mb-3">Thông tin công việc</h6>

                                <div class="mb-3">
                                    <label for="contractAddDeptno" class="form-label">Phòng ban</label>
                                    <input type="text" class="form-control" id="contractAddDeptno" name="deptno">
                                </div>

                                <div class="mb-3">
                                    <label for="contractAddWorkPosition" class="form-label">Vị trí làm việc</label>
                                    <input type="text" class="form-control" id="contractAddWorkPosition"
                                        name="workPosition">
                                </div>

                                <div class="mb-3">
                                    <label for="contractAddPositionNo" class="form-label">Mã chức vụ</label>
                                    <input type="text" class="form-control" id="contractAddPositionNo"
                                        name="positionNo">
                                </div>

                                <div class="mb-3">
                                    <label for="contractAddPostGradeNo" class="form-label">Mã cấp bậc</label>
                                    <input type="text" class="form-control" id="contractAddPostGradeNo"
                                        name="postGradeNo">
                                </div>

                                <div class="mb-3">
                                    <label for="contractAddSalary" class="form-label">Lương</label>
                                    <input type="number" class="form-control" id="contractAddSalary" name="salary"
                                        min="0">
                                </div>

                                <div class="mb-3">
                                    <label for="contractAddWorkTime" class="form-label">Thời gian làm việc</label>
                                    <input type="text" class="form-control" id="contractAddWorkTime" name="workTime">
                                </div>

                                <div class="mb-3">
                                    <label for="contractAddWorkHourType" class="form-label">Loại giờ làm việc</label>
                                    <select class="form-select" id="contractAddWorkHourType" name="workHourType">
                                        <option value="">Chọn loại giờ làm việc</option>
                                        <option value="FULL_TIME">Toàn thời gian</option>
                                        <option value="PART_TIME">Bán thời gian</option>
                                        <option value="OVERTIME">Tăng ca</option>
                                        <option value="FLEXIBLE">Linh hoạt</option>
                                    </select>
                                </div>

                                <div class="mb-3">
                                    <label for="contractAddTotalPeriod" class="form-label">Tổng thời gian</label>
                                    <input type="text" class="form-control" id="contractAddTotalPeriod"
                                        name="totalPeriod">
                                </div>

                                <div class="mb-3">
                                    <label for="contractAddTotalPeriod08" class="form-label">Tổng thời gian 08</label>
                                    <input type="text" class="form-control" id="contractAddTotalPeriod08"
                                        name="totalPeriod08">
                                </div>

                                <div class="mb-3">
                                    <label for="contractAddActivity" class="form-label">Trạng thái hoạt động</label>
                                    <select class="form-select" id="contractAddActivity" name="activity">
                                        <option value="ACTIVE">Hoạt động</option>
                                        <option value="INACTIVE">Không hoạt động</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <!-- Work Content and Remarks -->
                        <div class="row mt-3">
                            <div class="col-12">
                                <h6 class="text-primary mb-3">Nội dung và ghi chú</h6>

                                <div class="mb-3">
                                    <label for="contractAddWorkContent" class="form-label">Nội dung công việc</label>
                                    <textarea class="form-control" id="contractAddWorkContent" name="workContent"

                                </div>

                                <div class="mb-3">
                                    <label for="contractAddRemark" class="form-label">Ghi chú</label>

                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        <i class="bx bx-x me-1"></i> Hủy
                    </button>
                    <button type="button" class="btn btn-success" onclick="contractSaveNew()">
                        <i class="bx bx-plus me-1"></i> Thêm mới
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
