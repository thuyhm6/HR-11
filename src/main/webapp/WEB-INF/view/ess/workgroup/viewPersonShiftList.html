<div th:fragment="content">
    <div class="row">
        <div class="col-12">

            <!-- ===== Thông tin nhân viên (fragment chung) ===== -->
            <div th:replace="~{fragments/essEmpInfoCard :: card}"></div>

            <!-- ===== Điều kiện tìm kiếm + Bảng dữ liệu ===== -->
            <div class="card">
                <div class="card-body">

                    <form id="ps_searchForm" class="row g-3 mb-4">
                        <div class="col-md-2">
                            <label for="ps_fromDate" class="form-label">Thời gian từ</label>
                            <input type="text" class="form-control js-daterangepicker" id="ps_fromDate"
                                data-drp-format="YYYY-MM-DD" data-drp-auto-update-input="false" autocomplete="off"
                                placeholder="YYYY-MM-DD">
                        </div>
                        <div class="col-md-2">
                            <label for="ps_toDate" class="form-label">Thời gian đến</label>
                            <input type="text" class="form-control js-daterangepicker" id="ps_toDate"
                                data-drp-format="YYYY-MM-DD" data-drp-auto-update-input="false" autocomplete="off"
                                placeholder="YYYY-MM-DD">
                        </div>
                        <div class="col-md-4 d-flex align-items-end gap-2 flex-wrap">
                            <button type="button" class="btn btn-primary" onclick="psSearchData()">
                                <i class="bx bx-search"></i> Tra cứu
                            </button>
                            <button type="button" class="btn btn-secondary" onclick="psClearSearch()">
                                <i class="bx bx-x"></i> Xóa lọc
                            </button>
                        </div>
                    </form>

                    <div class="dt-table-wrapper" style="overflow: auto;">
                        <table id="ps_dataTable" class="table table-striped table-bordered table-hover">
                            <thead class="table-light text-center align-middle">
                                <tr>
                                    <th>NO</th>
                                    <th>Ngày</th>
                                    <th>Loại ngày</th>
                                    <th>Trạng thái làm việc</th>
                                    <th>Thời gian bắt đầu</th>
                                    <th>Thời gian kết thúc</th>
                                    <th>Giờ vào</th>
                                    <th>Giờ ra</th>
                                    <th>Số giờ làm việc</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>

<template id="fragmentScripts">
    <th:block th:replace="~{fragments/essEmpInfoCard :: script}"></th:block>
    <script th:inline="javascript">
        var _ps_table = null;
        var _ps_pageBooted = false;

        function psEscHtml(value) {
            if (value === null || value === undefined) return '';
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function psDefaultDates() {
            var now = new Date();
            var y = now.getFullYear();
            var m = String(now.getMonth() + 1).padStart(2, '0');
            var lastDay = new Date(y, now.getMonth() + 1, 0).getDate();
            $('#ps_fromDate').val(y + '-' + m + '-01');
            $('#ps_toDate').val(y + '-' + m + '-' + String(lastDay).padStart(2, '0'));
        }

        function psInitTable() {
            _ps_table = $('#ps_dataTable').DataTable({
                destroy: true,
                paging: true,
                scrollY: 'calc(100vh - 380px)',
                scrollCollapse: true,
                searching: false,
                lengthChange: true,
                pageLength: 50,
                processing: true,
                language: {
                    info: 'Từ _START_ đến _END_ /Tổng _TOTAL_ dữ liệu',
                    paginate: {
                        previous: 'Trang trước',
                        next: 'Trang sau'
                    },
                    lengthMenu: 'Mỗi trang _MENU_',
                    search: 'Lọc nhanh'
                },
                ajax: {
                    url: '/ess/workgroup/api/personShift/myList',
                    dataSrc: '',
                    data: function (d) {
                        d.startDate = $('#ps_fromDate').val();
                        d.endDate   = $('#ps_toDate').val();
                    }
                },
                columns: [
                    {
                        data: null,
                        className: 'text-center',
                        render: function (data, type, row, meta) {
                            return meta.settings._iDisplayStart + meta.row + 1;
                        }
                    },
                    { data: 'ddateStr',       className: 'text-center' },
                    { data: 'dateName',       className: 'text-center' },
                    {
                        data: 'overTypeIdName',
                        render: function (data) { return psEscHtml(data || ''); }
                    },
                    { data: 'shiftStartTime', className: 'text-center' },
                    { data: 'shiftEndTime',   className: 'text-center' },
                    { data: 'indoorTime',     className: 'text-center' },
                    { data: 'outdoorTime',    className: 'text-center' },
                    { data: 'workHours',      className: 'text-center' }
                ]
            });
        }

        function psBootPage() {
            if (_ps_pageBooted) return;
            if (!document.getElementById('ps_dataTable')) {
                setTimeout(psBootPage, 30);
                return;
            }
            _ps_pageBooted = true;

            loadEssEmpInfoCard();
            psDefaultDates();
            psInitTable();
            if (_ps_table) _ps_table.ajax.reload();
        }

        window.psSearchData = function () {
            if (_ps_table) _ps_table.ajax.reload();
        };

        window.psClearSearch = function () {
            psDefaultDates();
            if (_ps_table) _ps_table.ajax.reload();
        };

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', psBootPage);
        }
        if (typeof $ !== 'undefined') {
            $(document).ready(psBootPage);
        } else {
            psBootPage();
        }
    </script>
</template>
