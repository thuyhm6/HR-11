<div th:fragment="content">
    <div class="row h-100">
        <!-- Top Pane: Company Selection -->
        <div class="col-12 mb-3">
            <div class="card">
                <div class="card-body py-2">
                    <div class="row align-items-center">
                        <div class="col-auto">
                            <label class="fw-bold fs-5 mb-0">Công ty (Company):</label>
                        </div>
                        <div class="col-md-4">
                            <select id="codeParam_companySelect" class="form-select select2">
                                <option value="">-- Chọn công ty --</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Left Pane: Code Tree -->
        <div class="col-md-3 border-end p-3">
            <h5 class="mb-3">Danh sách Code System</h5>
            <div class="mb-2">
                <input type="text" class="form-control" id="codeParam_searchTreeInput" placeholder="Tìm kiếm...">
            </div>
            <div class="tree-container" style="max-height: 700px; overflow-y: auto;">
                <div id="codeParam_tree"></div>
            </div>
        </div>

        <!-- Right Pane: Child Code List -->
        <div class="col-md-9 p-3">
            <div class="card h-100">
                <div class="card-header bg-light d-flex justify-content-between align-items-center">
                    <span class="fw-bold" id="codeParam_selectedParentLabel">Danh sách mã con</span>
                    <div>
                        <button class="btn btn-sm btn-primary me-1" id="codeParam_btnSaveList" disabled><i
                                class="bx bx-save"></i> Lưu</button>
                        <button class="btn btn-sm btn-success" id="codeParam_btnExport"><i class="bx bx-download"></i>
                            Xuất Excel</button>
                    </div>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table id="codeParam_table" class="table table-striped table-hover w-100">
                            <thead>
                                <tr>
                                    <th>STT</th>
                                    <th class="text-center"><input type="checkbox" id="codeParam_checkAll" disabled>
                                    </th>
                                    <th>Mã Code</th>
                                    <th>Tên TV</th>
                                    <th>Tên TA</th>
                                    <th>Thứ tự (Param)</th>
                                    <th>Trạng thái</th>
                                    <th>Thao tác</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Edit Param Options -->
    <div class="modal fade" id="codeParam_modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Cập nhật tham số</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="codeParam_form">
                        <input type="hidden" id="codeParam_codeNo">
                        <div class="mb-3">
                            <label class="form-label">Thứ tự sắp xếp</label>
                            <input type="number" class="form-control" id="codeParam_orderNo">
                        </div>
                        <div class="mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="codeParam_activity">
                                <label class="form-check-label">Hoạt động</label>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                    <button type="button" class="btn btn-primary" id="codeParam_btnSave">Lưu</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <template id="fragmentScripts">
        <link rel="stylesheet" href="/assets/plugins/jstree/style.min.css" />
        <script src="/assets/plugins/jstree/jstree.min.js"></script>

        <script th:inline="none">
            $(document).ready(function () {
                var paramTable;
                var currentParentCode = '';
                var selectedCompanyId = '';

                // --- 1. Init Components ---
                if ($.fn.select2) {
                    $('.select2').select2({ width: '100%' });
                }

                // Load Companies
                $.ajax({
                    url: '/sys/api/company/list', // Assuming this endpoint exists based on viewCompany.html
                    success: function (data) {
                        var $select = $('#codeParam_companySelect');
                        if (data && data.length > 0) {
                            data.forEach(function (c) {
                                $select.append(new Option(c.nameVi + ' (' + c.cpnyId + ')', c.cpnyId));
                            });
                        }
                    }
                });

                $('#codeParam_companySelect').change(function () {
                    selectedCompanyId = $(this).val();
                    if (currentParentCode) {
                        loadTable(currentParentCode);
                    }
                });

                // --- 2. Code Tree ---
                function loadTree() {
                    $.ajax({
                        url: '/sys/api/code/tree',
                        success: function (data) {
                            if (!data || data.length === 0) {
                                $('#codeParam_tree').html('<div class="text-muted p-2">Không có dữ liệu</div>');
                                return;
                            }
                            var idSet = new Set();
                            data.forEach(item => idSet.add(item.codeNo));

                            var treeData = data.map(item => {
                                var parentId = item.parentCodeNo;
                                if (!parentId || parentId === 'ROOT' || !idSet.has(parentId)) parentId = '#';
                                return {
                                    id: item.codeNo,
                                    parent: parentId,
                                    text: (item.nameVi || item.codeNo),
                                    icon: 'bx bxs-folder',
                                    state: { opened: false }
                                };
                            });

                            $('#codeParam_tree').jstree("destroy").jstree({
                                'core': {
                                    'data': treeData,
                                    'themes': { 'name': 'default', 'responsive': true, 'dots': false },
                                    'check_callback': true
                                },
                                'plugins': ['search', 'types']
                            });
                        }
                    });
                }
                loadTree();

                var to = false;
                $('#codeParam_searchTreeInput').keyup(function () {
                    if (to) clearTimeout(to);
                    to = setTimeout(function () {
                        var v = $('#codeParam_searchTreeInput').val();
                        $('#codeParam_tree').jstree(true).search(v);
                    }, 250);
                });

                $('#codeParam_tree').on("changed.jstree", function (e, data) {
                    if (data.selected.length) {
                        currentParentCode = data.selected[0];
                        $('#codeParam_selectedParentLabel').text('Danh sách mã con của: ' + data.instance.get_node(data.selected[0]).text);
                        loadTable(currentParentCode);
                    } else {
                        currentParentCode = '';
                        $('#codeParam_selectedParentLabel').text('Danh sách mã con');
                        loadTable('');
                    }
                });

                // --- 3. DataTable ---
                paramTable = $('#codeParam_table').DataTable({
                    destroy: true,
                    columns: [
                        { data: null, render: (d, t, r, m) => m.row + 1 },
                        {
                            data: 'assigned',
                            className: 'text-center',
                            render: function (data, type, row) {
                                // Use uiChecked (user modified) if exists, else server state
                                var isChecked = (row.uiChecked !== undefined) ? row.uiChecked : row.assigned;
                                var checked = isChecked ? 'checked' : '';
                                return '<input type="checkbox" class="form-check-input param-check" ' + checked + ' data-codeno="' + row.codeNo + '">';
                            }
                        },
                        { data: 'codeNo' },
                        { data: 'nameVi' },
                        { data: 'nameEn' },
                        { data: 'paramOrderNo', render: (d) => d || '-' }, // Order from SY_CODE_PARAM
                        {
                            data: 'paramActivity',
                            render: function (d) {
                                if (d === '1') return '<span class="badge bg-success">Active</span>';
                                if (d === '0') return '<span class="badge bg-secondary">Inactive</span>';
                                return '-';
                            }
                        },
                        {
                            data: null,
                            render: function (data, type, row) {
                                var disabled = row.assigned ? '' : 'disabled';
                                return '<button class="btn btn-sm btn-warning btn-edit-param" ' + disabled + '><i class="bx bx-edit"></i></button>';
                            }
                        }
                    ],
                    lengthMenu: [[10, 25, 50, -1], [10, 25, 50, "All"]],
                    pageLength: 25
                });

                function loadTable(parentCode) {
                    if (!parentCode) {
                        paramTable.clear().draw();
                        return;
                    }
                    if (!selectedCompanyId) {
                        // paramTable.clear().draw(); 
                        // Optional: Show codes but disable checkboxes? 
                        // Only listing codes if no company selected is confusing. Best to clear or warn.
                    }

                    // Assuming API returns list of SY_CODE children, mixed with SY_CODE_PARAM info for the Company
                    // We need to pass cpnyId
                    $.ajax({
                        url: '/sys/api/code_param/list',
                        data: { parentCodeNo: parentCode, cpnyId: selectedCompanyId },
                        success: function (data) {

                            if (selectedCompanyId) {
                                $('#codeParam_btnSaveList').prop('disabled', false);
                                $('#codeParam_checkAll').prop('disabled', false); // Enable Check All
                            } else {
                                $('#codeParam_btnSaveList').prop('disabled', true);
                                $('#codeParam_checkAll').prop('disabled', true);
                            }
                            $('#codeParam_checkAll').prop('checked', false); // Reset Check All state
                            paramTable.clear().rows.add(data).draw();
                        },
                        error: function () {
                            // If API not ready, handle gracefully (e.g. empty)
                            console.error("API load failed");
                        }
                    });
                }

                // --- 4. Event Handlers ---

                // Track checkbox state locally
                $('#codeParam_table tbody').on('change', '.param-check', function () {
                    var isChecked = $(this).is(':checked');
                    var row = paramTable.row($(this).closest('tr'));
                    var data = row.data();
                    data.uiChecked = isChecked;

                    // Update "Check All" state if one is unchecked
                    if (!isChecked) {
                        $('#codeParam_checkAll').prop('checked', false);
                    }
                });

                // "Check All" Handler
                $('#codeParam_checkAll').change(function () {
                    var isChecked = $(this).is(':checked');

                    // Update all rows in the dataset (handles pagination)
                    paramTable.rows().every(function () {
                        var d = this.data();
                        d.uiChecked = isChecked;
                        // this.invalidate(); // Don't invalidate entire row to avoid flickering or reset
                    });

                    // Update visible checkboxes
                    $('.param-check').prop('checked', isChecked);
                });

                // Batch Save Logic
                $('#codeParam_btnSaveList').click(function () {
                    if (!selectedCompanyId) {
                        toastr.warning('Vui lòng chọn công ty trước');
                        return;
                    }

                    var promises = [];
                    var count = 0;

                    paramTable.rows().every(function () {
                        var data = this.data();
                        var currentStatus = (data.uiChecked !== undefined) ? data.uiChecked : data.assigned;
                        var originalStatus = data.assigned; // Assuming boolean from DTO

                        if (currentStatus != originalStatus) {
                            count++;
                            var payload = {
                                cpnyId: selectedCompanyId,
                                codeNo: data.codeNo,
                                activity: '1',
                                orderNo: 0
                            };

                            if (currentStatus) {
                                // Add (Save)
                                promises.push($.ajax({
                                    url: '/sys/api/code_param/save',
                                    type: 'POST',
                                    contentType: 'application/json',
                                    data: JSON.stringify(payload)
                                }));
                            } else {
                                // Remove (Delete)
                                promises.push($.ajax({
                                    url: '/sys/api/code_param/delete',
                                    type: 'POST',
                                    contentType: 'application/json',
                                    data: JSON.stringify(payload)
                                }));
                            }
                        }
                    });

                    if (count === 0) {
                        toastr.info('Không có thay đổi nào cần lưu');
                        return;
                    }

                    Promise.all(promises).then(function () {
                        toastr.success('Cập nhật thành công ' + count + ' mục');
                        loadTable(currentParentCode);
                    }).catch(function () {
                        toastr.error('Có lỗi xảy ra khi lưu dữ liệu');
                        loadTable(currentParentCode);
                    });
                });

                // Edit Param (Edit extra fields like OrderNo)
                $('#codeParam_table tbody').on('click', '.btn-edit-param', function () {
                    var row = paramTable.row($(this).parents('tr')).data();
                    if (!row.assigned) return;

                    $('#codeParam_codeNo').val(row.codeNo);
                    $('#codeParam_orderNo').val(row.paramOrderNo || 0);
                    $('#codeParam_activity').prop('checked', row.paramActivity !== '0'); // Default check if null or 1

                    $('#codeParam_modal').modal('show');
                });

                $('#codeParam_btnSave').click(function () {
                    var codeNo = $('#codeParam_codeNo').val();
                    var orderNo = $('#codeParam_orderNo').val();
                    var activity = $('#codeParam_activity').is(':checked') ? '1' : '0';

                    var data = {
                        cpnyId: selectedCompanyId,
                        codeNo: codeNo,
                        activity: activity,
                        orderNo: orderNo
                    };

                    $.ajax({
                        url: '/sys/api/code_param/update', // Or save
                        type: 'POST',
                        contentType: 'application/json',
                        data: JSON.stringify(data),
                        success: function (res) {
                            if (res.success) {
                                toastr.success('Cập nhật thành công');
                                $('#codeParam_modal').modal('hide');
                                loadTable(currentParentCode);
                            } else {
                                toastr.error(res.message);
                            }
                        }
                    });
                });

                $('#codeParam_btnExport').click(function () {
                    if (!selectedCompanyId) { toastr.warning('Chọn công ty để xuất excel'); return; }
                    window.location.href = '/sys/api/code_param/export?cpnyId=' + selectedCompanyId + '&parentCode=' + currentParentCode;
                });
            });
        </script>
    </template>
</div>
