<div th:fragment="content">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-body">
                    <!-- Search Form -->
                    <form id="searchForm" class="row g-3 mb-4">
                        <div class="col-md-3">
                            <label for="searchEmpId" class="form-label">Mã nhân viên</label>
                            <input type="text" class="form-control" id="searchEmpId" placeholder="Nhập mã nhân viên">
                        </div>
                        <div class="col-md-3">
                            <label for="searchLocalName" class="form-label">Tên nhân viên</label>
                            <input type="text" class="form-control" id="searchLocalName"
                                placeholder="Nhập tên nhân viên">
                        </div>
                        <div class="col-md-3">
                            <label for="searchFamName" class="form-label">Tên người thân</label>
                            <input type="text" class="form-control" id="searchFamName"
                                placeholder="Nhập tên người thân">
                        </div>
                        <div class="col-md-3 d-flex align-items-end">
                            <button type="button" class="btn btn-primary me-2" onclick="searchData()">
                                <i class="bx bx-search"></i> Tìm kiếm
                            </button>
                            <button type="button" class="btn btn-secondary" onclick="clearSearch()">
                                <i class="bx bx-x"></i> Xóa lọc
                            </button>
                            <button type="button" class="btn btn-success ms-2" onclick="openModal()">
                                <i class="bx bx-plus"></i> Thêm mới
                            </button>
                        </div>
                    </form>

                    <!-- Data Table -->
                    <div class="table-responsive">
                        <table id="familyTable" class="table table-striped table-bordered table-hover"
                            style="width:100%">
                            <thead class="table-light">
                                <tr>
                                    <th>STT</th>
                                    <th>Mã NV</th>
                                    <th>Họ tên</th>
                                    <th>Tên người thân</th>
                                    <th>Quan hệ</th>
                                    <th>Ngày sinh</th>
                                    <th>SĐT</th>
                                    <th>Nghề nghiệp</th>
                                    <th>Người phụ thuộc</th>
                                    <th class="text-center" style="width: 100px;">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Data loaded via AJAX -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal Thêm/Sửa -->
<div class="modal fade" id="familyModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Thông tin người thân</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="familyForm">
                    <input type="hidden" id="familyNo" name="familyNo">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label for="empNameDisplay" class="form-label">Nhân viên <span
                                    class="text-danger">*</span></label>
                            <div class="input-group">
                                <input type="text" class="form-control" id="empNameDisplay"
                                    placeholder="Chọn nhân viên..." readonly required>
                                <input type="hidden" id="personId" name="personId">
                                <button class="btn btn-outline-primary" type="button"
                                    onclick="openEmployeeSearchPopup()">
                                    <i class="bx bx-search"></i>
                                </button>
                            </div>
                        </div>

                        <div class="col-md-4">
                            <label for="famName" class="form-label">Tên người thân <span
                                    class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="famName" name="famName" required>
                        </div>

                        <div class="col-md-4">
                            <label for="famTypeCode" class="form-label">Quan hệ <span
                                    class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="famTypeCode" name="famTypeCode" required
                                placeholder="Vợ/Chồng/Con/Bố/Mẹ...">
                        </div>

                        <div class="col-md-4">
                            <label for="famBorndate" class="form-label">Ngày sinh</label>
                            <input type="date" class="form-control" id="famBorndate" name="famBorndate">
                        </div>

                        <div class="col-md-4">
                            <label for="famIdcard" class="form-label">CCCD/CMND</label>
                            <input type="text" class="form-control" id="famIdcard" name="famIdcard">
                        </div>

                        <div class="col-md-4">
                            <label for="gender" class="form-label">Giới tính</label>
                            <select class="form-select" id="gender" name="gender">
                                <option value="Male">Nam</option>
                                <option value="Female">Nữ</option>
                            </select>
                        </div>

                        <div class="col-md-4">
                            <label for="famPhone" class="form-label">Số điện thoại</label>
                            <input type="text" class="form-control" id="famPhone" name="famPhone">
                        </div>

                        <div class="col-md-4">
                            <label for="famEmail" class="form-label">Email</label>
                            <input type="email" class="form-control" id="famEmail" name="famEmail">
                        </div>

                        <div class="col-md-4">
                            <label for="ocupation" class="form-label">Nghề nghiệp</label>
                            <input type="text" class="form-control" id="ocupation" name="ocupation">
                        </div>
                        <div class="col-md-6">
                            <label for="famCompanyName" class="form-label">Nơi làm việc</label>
                            <input type="text" class="form-control" id="famCompanyName" name="famCompanyName">
                        </div>

                        <div class="col-md-6">
                            <label for="famAddress" class="form-label">Địa chỉ</label>
                            <input type="text" class="form-control" id="famAddress" name="famAddress">
                        </div>

                        <div class="col-md-2">
                            <label class="form-label">Sống cùng</label>
                            <select class="form-select" id="liveYn" name="liveYn">
                                <option value="N">Không</option>
                                <option value="Y">Có</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">LH Khẩn cấp</label>
                            <select class="form-select" id="emergencyContactYn" name="emergencyContactYn">
                                <option value="N">Không</option>
                                <option value="Y">Có</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Giảm trừ gia cảnh</label>
                            <select class="form-select" id="taxYn" name="taxYn">
                                <option value="N">Không</option>
                                <option value="Y">Có</option>
                            </select>
                        </div>

                        <div class="col-md-12">
                            <label for="remarks" class="form-label">Ghi chú</label>
                            <textarea class="form-control" id="remarks" name="remarks" rows="2"></textarea>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                <button type="button" class="btn btn-primary" onclick="saveData()">Lưu</button>
            </div>
        </div>
    </div>
</div>

<template id="fragmentScripts">
    <script th:inline="javascript">
        $(document).ready(function () {
            var table = $('#familyTable').DataTable({
                destroy: true,
                scrollY: "calc(100vh - 280px)",
                scrollCollapse: true,
                paging: true,
                searching: true,
                lengthChange: true,
                pageLength: 20,
                columnDefs: [
                    { "width": "2%", "targets": 0 },
                ],
                processing: true,
                language: {
                    url: '//cdn.datatables.net/plug-ins/1.10.25/i18n/Vietnamese.json'
                },
                dom: 'Blfrtip',
                buttons: [
                    'copy', 'csv', 'excel', 'pdf', 'print'
                ],
                ajax: {
                    url: '/hrm/empinfo/api/family',
                    dataSrc: '',
                    data: function (d) {
                        d.empId = $('#searchEmpId').val();
                        d.localName = $('#searchLocalName').val();
                        d.famName = $('#searchFamName').val();
                    }
                },
                columns: [
                    {
                        data: null,
                        render: function (data, type, row, meta) {
                            return meta.row + 1;
                        }
                    },
                    { data: 'empId' },
                    { data: 'localName' },
                    { data: 'famName' },
                    { data: 'famTypeCode' },
                    {
                        data: 'famBorndate',
                        render: function (data) {
                            if (!data) return '';
                            var date = new Date(data);
                            return date.toLocaleDateString('vi-VN');
                        }
                    },
                    { data: 'famPhone' },
                    { data: 'ocupation' },
                    {
                        data: 'taxYn',
                        render: function (data) {
                            return data == 'Y' ? '<i class="bx bx-check text-success"></i>' : '';
                        },
                        className: "text-center"
                    },
                    {
                        data: null,
                        className: "text-center",
                        render: function (data, type, row) {
                            return `
                                <div class="btn-group btn-group-sm">
                                    <button class="btn btn-warning" onclick="editRaw(${row.familyNo})">
                                        <i class="bx bx-edit"></i>
                                    </button>
                                    <button class="btn btn-danger" onclick="deleteRaw(${row.familyNo})">
                                        <i class="bx bx-trash"></i>
                                    </button>
                                </div>
                            `;
                        }
                    }
                ]
            });

            window.searchData = function () {
                table.ajax.reload();
            };

            window.clearSearch = function () {
                $('#searchForm')[0].reset();
                table.ajax.reload();
            };

            // Mở modal thêm mới
            window.openModal = function () {
                $('#modalTitle').text('Thêm mới Người thân');
                $('#familyForm')[0].reset();
                $('#familyNo').val('');
                $('#personId').val('');
                $('#liveYn').val('N');
                $('#emergencyContactYn').val('N');
                $('#taxYn').val('N');
                var modal = new bootstrap.Modal(document.getElementById('familyModal'));
                modal.show();
            };

            // Mở popup tìm kiếm nhân viên
            window.openEmployeeSearchPopup = function () {
                if (typeof EmployeeSearchModal !== 'undefined') {
                    EmployeeSearchModal.open(function (employee) {
                        $('#personId').val(employee.personId);
                        $('#empNameDisplay').val(employee.empId + ' - ' + employee.localName);
                    });
                } else {
                    alert('Component tìm kiếm nhân viên chưa được tải!');
                }
            };

            // Sửa
            window.editRaw = function (id) {
                $.ajax({
                    url: '/hrm/empinfo/api/family/' + id,
                    type: 'GET',
                    success: function (data) {
                        $('#modalTitle').text('Cập nhật Người thân');
                        // Populate form fields
                        $('#familyNo').val(data.familyNo);
                        $('#personId').val(data.personId);
                        $('#empNameDisplay').val((data.empId || '') + ' - ' + (data.localName || ''));

                        $('#famName').val(data.famName);
                        $('#famTypeCode').val(data.famTypeCode);

                        if (data.famBorndate) {
                            var d = new Date(data.famBorndate);
                            var day = ("0" + d.getDate()).slice(-2);
                            var month = ("0" + (d.getMonth() + 1)).slice(-2);
                            var today = d.getFullYear() + "-" + (month) + "-" + (day);
                            $('#famBorndate').val(today);
                        } else {
                            $('#famBorndate').val('');
                        }

                        $('#famIdcard').val(data.famIdcard);
                        $('#gender').val(data.gender);
                        $('#famPhone').val(data.famPhone);
                        $('#famEmail').val(data.famEmail);
                        $('#ocupation').val(data.ocupation);
                        $('#famCompanyName').val(data.famCompanyName);
                        $('#famAddress').val(data.famAddress);

                        $('#liveYn').val(data.liveYn || 'N');
                        $('#emergencyContactYn').val(data.emergencyContactYn || 'N');
                        $('#taxYn').val(data.taxYn || 'N');

                        $('#remarks').val(data.remarks);

                        var modal = new bootstrap.Modal(document.getElementById('familyModal'));
                        modal.show();
                    },
                    error: function (err) {
                        if (typeof toastr !== 'undefined') toastr.error('Lỗi khi lấy thông tin: ' + (err.responseJSON ? err.responseJSON.error : err.responseText));
                        else alert('Lỗi khi lấy thông tin: ' + (err.responseJSON ? err.responseJSON.error : err.responseText));
                    }
                });
            };

            // Lưu dữ liệu
            window.saveData = function () {
                // Validate cơ bản
                if (!$('#personId').val() || !$('#famName').val() || !$('#famTypeCode').val()) {
                    if (typeof toastr !== 'undefined') toastr.warning('Vui lòng điền đủ: Nhân viên, Tên người thân, Quan hệ');
                    else alert('Vui lòng điền đủ: Nhân viên, Tên người thân, Quan hệ');
                    return;
                }

                var formData = {
                    familyNo: $('#familyNo').val() || null,
                    personId: $('#personId').val(),
                    famName: $('#famName').val(),
                    famTypeCode: $('#famTypeCode').val(),
                    famBorndate: $('#famBorndate').val() ? new Date($('#famBorndate').val()) : null,
                    famIdcard: $('#famIdcard').val(),
                    gender: $('#gender').val(),
                    famPhone: $('#famPhone').val(),
                    famEmail: $('#famEmail').val(),
                    ocupation: $('#ocupation').val(),
                    famCompanyName: $('#famCompanyName').val(),
                    famAddress: $('#famAddress').val(),
                    liveYn: $('#liveYn').val(),
                    emergencyContactYn: $('#emergencyContactYn').val(),
                    taxYn: $('#taxYn').val(),
                    remarks: $('#remarks').val()
                };

                $.ajax({
                    url: '/hrm/empinfo/api/family/save',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(formData),
                    success: function (res) {
                        if (typeof toastr !== 'undefined') toastr.success(res.message || 'Lưu thành công');
                        else alert(res.message || 'Lưu thành công');

                        var modalEl = document.getElementById('familyModal');
                        var modal = bootstrap.Modal.getInstance(modalEl);
                        if (modal) {
                            modal.hide();
                        } else {
                            $(modalEl).modal('hide');
                        }

                        table.ajax.reload();
                    },
                    error: function (err) {
                        var errorMsg = (err.responseJSON && err.responseJSON.error) ? err.responseJSON.error : (err.responseText || "Lỗi không xác định");
                        if (typeof toastr !== 'undefined') toastr.error('Lỗi khi lưu: ' + errorMsg);
                        else alert('Lỗi khi lưu: ' + errorMsg);
                    }
                });
            };

            // Xóa
            window.deleteRaw = function (id) {
                if (confirm('Bạn có chắc chắn muốn xóa bản ghi này?')) {
                    $.ajax({
                        url: '/hrm/empinfo/api/family/delete/' + id,
                        type: 'DELETE',
                        success: function (res) {
                            if (typeof toastr !== 'undefined') toastr.success(res.message || 'Xóa thành công');
                            else alert(res.message || 'Xóa thành công');
                            table.ajax.reload();
                        },
                        error: function (err) {
                            var errorMsg = (err.responseJSON && err.responseJSON.error) ? err.responseJSON.error : (err.responseText || "Lỗi không xác định");
                            if (typeof toastr !== 'undefined') toastr.error('Lỗi khi xóa: ' + errorMsg);
                            else alert('Lỗi khi xóa: ' + errorMsg);
                        }
                    });
                }
            };
        });
    </script>
</template>
