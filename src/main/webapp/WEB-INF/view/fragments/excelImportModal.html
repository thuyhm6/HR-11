<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Excel Import Modal</title>
</head>
<body>

<!-- Excel Import Modal Fragment – Shared Component -->
<div th:fragment="content">
    <div class="modal fade" id="excelImportModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="bx bx-upload me-2"></i>
                        Import Excel
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p class="text-muted mb-2" th:text="#{excelImport.guide}">
                        Chỉ hỗ trợ file <strong>.xlsx</strong>. Đảm bảo dùng đúng file mẫu trước khi upload.
                    </p>
                    <div id="excelImportErrors" class="alert alert-danger d-none"></div>
                    <div class="mb-3">
                        <label for="excelImportFile" class="form-label">
                            <span th:text="#{excelImport.fileLabel}">Chọn file Excel</span>
                            <span class="text-danger">*</span>
                        </label>
                        <input type="file" class="form-control" id="excelImportFile" accept=".xlsx,.xls">
                    </div>
                    <div id="excelImportProgress" class="d-none">
                        <div class="d-flex align-items-center gap-2">
                            <div class="spinner-border spinner-border-sm text-primary"></div>
                            <span th:text="#{excelImport.processing}">Đang xử lý...</span>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" th:text="#{common.close}">Đóng</button>
                    <button type="button" class="btn btn-primary" id="excelImportBtn">
                        <i class="bx bx-upload me-1"></i>
                        <span th:text="#{excelImport.upload}">Upload &amp; Import</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- JavaScript handled by: /assets/js/components/excelImport.js -->

</body>
</html>
