<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Đăng nhập - HR System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/assets/css/style.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            max-width: 400px;
            width: 100%;
        }

        .login-header {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            padding: 2rem;
            text-align: center;
        }

        .login-header h2 {
            margin: 0;
            font-weight: 600;
        }

        .login-body {
            padding: 2rem;
        }

        .form-floating {
            margin-bottom: 1rem;
        }

        .btn-login {
            background: linear-gradient(45deg, #667eea, #764ba2);
            border: none;
            padding: 0.75rem;
            font-weight: 500;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .alert {
            border: none;
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .form-check {
            display: flex;
            align-items: center;
        }

        .form-check-input {
            margin-right: 0.5rem;
            transform: scale(1.1);
        }

        .form-check-label {
            cursor: pointer;
            font-size: 0.9rem;
            color: #6c757d;
            transition: color 0.3s ease;
        }

        .form-check-label:hover {
            color: #667eea;
        }

        .form-check-input:checked+.form-check-label {
            color: #667eea;
            font-weight: 500;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-header">
            <i class="fas fa-user-shield fa-2x mb-3"></i>
            <h2>HR System</h2>
            <p class="mb-0" th:text="#{login.title}">Đăng nhập vào hệ thống</p>
        </div>

        <div class="login-body">
            <!-- Language Selector -->
            <div class="text-end mb-3">
                <div th:replace="~{fragments/multilingual :: languageSelectorCompact}"></div>
            </div>

            <!-- Alert Messages -->
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                <i class="fas fa-check-circle me-2"></i>
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="fas fa-exclamation-circle me-2"></i>
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Login Form -->
            <form th:action="@{/login}" method="post">
                <input type="hidden" name="csrfToken" th:value="${csrfToken}">
                <div class="form-floating">
                    <input type="text" class="form-control" id="username" name="username"
                        th:placeholder="#{login.username}" th:value="${username}" required>
                    <label for="username">
                        <i class="fas fa-user me-2"></i><span th:text="#{login.username}">Tên đăng nhập</span>
                    </label>
                </div>

                <div class="form-floating">
                    <input type="password" class="form-control" id="password" name="password"
                        th:placeholder="#{login.password}" required>
                    <label for="password">
                        <i class="fas fa-lock me-2"></i><span th:text="#{login.password}">Mật khẩu</span>
                    </label>
                </div>

                <!-- Remember Me Checkbox -->
                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" id="rememberMe" name="rememberMe">
                    <label class="form-check-label" for="rememberMe">
                        <i class="fas fa-bookmark me-2"></i><span th:text="#{login.remember}">Ghi nhớ đăng nhập</span>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary btn-login w-100">
                    <i class="fas fa-sign-in-alt me-2"></i><span th:text="#{login.button}">Đăng nhập</span>
                </button>
            </form>

            <!-- Demo Credentials -->
            <div class="demo-credentials">
                <h6><i class="fas fa-info-circle me-2"></i>Thông tin demo:</h6>
                <div class="row">
                    <div class="col-6">
                        <strong>Admin:</strong><br>
                        Username: <code>***</code><br>
                        Password: <code>***</code>
                    </div>
                    <div class="col-6">
                        <strong>HR:</strong><br>
                        Username: <code>***</code><br>
                        Password: <code>***</code>
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <div class="text-center mt-3">
                <small class="text-muted">
                    © 2025 HR System. Tất cả quyền được bảo lưu.
                </small>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="/assets/js/app.js"></script>

    <script>
        $(document).ready(function () {
            // Load saved credentials if remember me was checked
            loadSavedCredentials();

            // Auto focus on username field
            $('#username').focus();

            // Form validation
            $('form').on('submit', function (e) {
                const username = $('#username').val().trim();
                const password = $('#password').val().trim();
                const rememberMe = $('#rememberMe').is(':checked');

                if (!username) {
                    e.preventDefault();
                    $('#username').focus();
                    showAlert('Vui lòng nhập tên đăng nhập', 'danger');
                    return false;
                }

                if (!password) {
                    e.preventDefault();
                    $('#password').focus();
                    showAlert('Vui lòng nhập mật khẩu', 'danger');
                    return false;
                }

                // Save credentials if remember me is checked
                if (rememberMe) {
                    saveCredentials(username);
                } else {
                    clearSavedCredentials();
                }
            });

            // Load saved credentials function
            function loadSavedCredentials() {
                try {
                    const savedUsername = localStorage.getItem('hr_remembered_username');
                    const rememberMe = localStorage.getItem('hr_remember_me');

                    if (savedUsername && rememberMe === 'true') {
                        $('#username').val(savedUsername);
                        $('#rememberMe').prop('checked', true);

                        // Show success message
                        showAlert('Đã khôi phục thông tin đăng nhập đã lưu', 'success');
                    }
                } catch (error) {
                    console.log('Không thể khôi phục thông tin đăng nhập:', error);
                }
            }

            // Save credentials function
            function saveCredentials(username) {
                try {
                    localStorage.setItem('hr_remembered_username', username);
                    localStorage.setItem('hr_remember_me', 'true');
                    console.log('Đã lưu thông tin đăng nhập');
                } catch (error) {
                    console.log('Không thể lưu thông tin đăng nhập:', error);
                }
            }

            // Clear saved credentials function
            function clearSavedCredentials() {
                try {
                    localStorage.removeItem('hr_remembered_username');
                    localStorage.removeItem('hr_remember_me');
                    console.log('Đã xóa thông tin đăng nhập đã lưu');
                } catch (error) {
                    console.log('Không thể xóa thông tin đăng nhập:', error);
                }
            }

            // Handle remember me checkbox change
            $('#rememberMe').on('change', function () {
                if (!$(this).is(':checked')) {
                    clearSavedCredentials();
                    showAlert('Đã tắt chức năng nhớ thông tin đăng nhập', 'info');
                }
            });

            // Show alert function
            function showAlert(message, type) {
                const alertHtml = `
                    <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                        <i class="fas fa-${type === 'success' ? 'check-circle' : type === 'info' ? 'info-circle' : 'exclamation-circle'} me-2"></i>
                        ${message}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                `;
                $('.login-body').prepend(alertHtml);

                // Auto remove after 5 seconds
                setTimeout(() => {
                    $('.alert').fadeOut();
                }, 5000);
            }
        });
    </script>
</body>

</html>
