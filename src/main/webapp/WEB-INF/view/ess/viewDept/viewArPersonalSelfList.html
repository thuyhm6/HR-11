<div th:fragment="content">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-body">

                    <!-- Điều kiện tìm kiếm -->
                    <form id="apsl_searchForm" class="d-flex align-items-end gap-3 mb-3 flex-wrap">
                        <div>
                            <label for="apsl_startDate" class="form-label mb-1" th:text="#{apsl.label.startDate}">Ngày bắt đầu</label>
                            <input type="text" class="form-control js-daterangepicker" id="apsl_startDate"
                                data-drp-format="DD/MM/YYYY" data-drp-auto-update-input="false"
                                autocomplete="off" placeholder="DD/MM/YYYY" style="width:145px;">
                        </div>
                        <div>
                            <label for="apsl_endDate" class="form-label mb-1" th:text="#{apsl.label.endDate}">Ngày kết thúc</label>
                            <input type="text" class="form-control js-daterangepicker" id="apsl_endDate"
                                data-drp-format="DD/MM/YYYY" data-drp-auto-update-input="false"
                                autocomplete="off" placeholder="DD/MM/YYYY" style="width:145px;">
                        </div>
                        <div class="d-flex gap-2 pb-1">
                            <button type="button" class="btn btn-primary" onclick="apslSearch()">
                                <i class="bx bx-search"></i> <span th:text="#{common.search}">Tra cứu</span>
                            </button>
                            <button type="button" class="btn btn-success" onclick="apslExportExcel()">
                                <i class="bx bx-export"></i> <span th:text="#{common.exportExcel}">Xuất Excel</span>
                            </button>
                        </div>
                    </form>

                    <!-- Thanh điều khiển trang -->
                    <div class="d-flex align-items-center gap-2 mb-2">
                        <span class="small" th:text="#{apsl.show}">Hiển thị</span>
                        <select class="form-select form-select-sm" id="apsl_pageSizeSelect"
                            style="width:70px;" onchange="apslChangePageSize(this.value)">
                            <option value="25">25</option>
                            <option value="50">50</option>
                            <option value="100">100</option>
                        </select>
                        <span class="small" th:text="#{apsl.entries}">mục</span>
                    </div>

                    <!-- Bảng pivot -->
                    <div style="overflow-x:auto;">
                        <table id="apsl_dataTable"
                            class="table table-striped table-bordered table-hover table-sm align-middle mb-0"
                            style="white-space:nowrap; width:max-content; min-width:100%;">
                            <thead id="apsl_thead" class="table-primary text-center align-middle"></thead>
                            <tbody id="apsl_tbody"></tbody>
                        </table>
                    </div>

                    <!-- Footer: info + pagination -->
                    <div class="d-flex align-items-center justify-content-between mt-2 flex-wrap gap-2">
                        <div id="apsl_info" class="small text-muted"></div>
                        <ul id="apsl_pagination" class="pagination pagination-sm mb-0"></ul>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal chi tiết -->
<div class="modal fade" id="apsl_detailModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header py-2">
                <h5 class="modal-title" id="apsl_detailModalLabel" th:text="#{apsl.modal.title}">Chi tiết chấm công</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-2">
                <div class="table-responsive">
                    <table class="table table-bordered table-sm align-middle mb-0">
                        <thead class="table-light text-center">
                            <tr>
                                <th style="width:50px;" th:text="#{common.stt}">STT</th>
                                <th style="width:110px;" th:text="#{common.empId}">Mã nhân viên</th>
                                <th style="min-width:140px;" th:text="#{common.empName}">Họ tên</th>
                                <th style="min-width:120px;" th:text="#{apsl.detail.col.shift}">Ca</th>
                                <th style="width:110px;" th:text="#{apsl.detail.col.date}">Ngày</th>
                                <th style="min-width:150px;" th:text="#{apsl.detail.col.leaveType}">Loại nghỉ phụ lục</th>
                                <th style="width:130px;" th:text="#{apsl.detail.col.startTime}">Thời gian bắt đầu</th>
                                <th style="width:130px;" th:text="#{apsl.detail.col.endTime}">Thời gian kết thúc</th>
                                <th style="width:90px;" th:text="#{apsl.detail.col.duration}">Thời lượng</th>
                            </tr>
                        </thead>
                        <tbody id="apsl_detailBody">
                            <tr>
                                <td colspan="9" class="text-center text-muted" th:text="#{apsl.detail.hint}">
                                    Chọn vào từng con số để xem chi tiết.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="modal-footer py-2">
                <button type="button" class="btn btn-secondary btn-sm"
                    data-bs-dismiss="modal" th:text="#{common.close}">Đóng</button>
            </div>
        </div>
    </div>
</div>

<template id="fragmentScripts">
    <script th:inline="javascript">
        var _apsl_msg = {
            stt             : /*[[#{apsl.msg.stt}]]*/ 'STT',
            empId           : /*[[#{apsl.msg.empId}]]*/ 'Mã NV',
            empName         : /*[[#{apsl.msg.empName}]]*/ 'Họ tên',
            deptName        : /*[[#{apsl.msg.deptName}]]*/ 'Phòng ban',
            total           : /*[[#{apsl.msg.total}]]*/ 'Tổng',
            noData          : /*[[#{apsl.msg.noData}]]*/ 'Không có dữ liệu',
            loadFailed      : /*[[#{apsl.msg.loadFailed}]]*/ 'Không tải được dữ liệu tình hình chấm công.',
            noDataExport    : /*[[#{apsl.msg.noDataExport}]]*/ 'Không có dữ liệu để xuất.',
            loading         : /*[[#{apsl.msg.loading}]]*/ 'Đang tải...',
            noDataDetail    : /*[[#{apsl.msg.noDataDetail}]]*/ 'Không có dữ liệu.',
            loadDetailFailed: /*[[#{apsl.msg.loadDetailFailed}]]*/ 'Tải dữ liệu thất bại.',
            modalTitle      : /*[[#{apsl.msg.modalTitle}]]*/ 'Chi tiết chấm công'
        };

        var _apsl_items       = [];
        var _apsl_data        = [];   /* pivot rows */
        var _apsl_currentPage = 1;
        var _apsl_pageSize    = 25;
        var _apsl_detailModal = null;
        var _apsl_pageBooted  = false;

        /* ── helpers ── */
        function apslEsc(v) {
            if (v === null || v === undefined) return '';
            return String(v)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;')
                .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        function apslFmtQty(v) {
            var n = parseFloat(v);
            if (isNaN(n) || n === 0) return '0';
            return n % 1 === 0 ? String(n) : n.toFixed(2).replace(/\.?0+$/, '');
        }

        /* AR_DATE_STR 'YYYY/MM/DD' → 'DD/MM/YYYY' */
        function apslFmtDate(s) {
            if (!s) return '';
            var p = s.split('/');
            return p.length === 3 ? p[2] + '/' + p[1] + '/' + p[0] : s;
        }

        /* ── pivot ── */
        function apslPivot(rawData) {
            var map = {}, order = [];
            (rawData || []).forEach(function (row) {
                if (!map[row.personId]) {
                    map[row.personId] = {
                        personId : row.personId,
                        empId    : row.empId,
                        localName: row.localName,
                        deptName : row.deptName,
                        total    : 0,
                        items    : {}
                    };
                    order.push(row.personId);
                }
                var qty = parseFloat(row.totalQuantity) || 0;
                map[row.personId].items[row.itemNo]  = qty;
                map[row.personId].total             += qty;
            });
            return order.map(function (pid) { return map[pid]; });
        }

        /* ── render header ── */
        function apslRenderHeader() {
            var nw = 'style="white-space:nowrap;"';
            var html = '<tr>'
                + '<th ' + nw + '>' + apslEsc(_apsl_msg.stt)     + '</th>'
                + '<th ' + nw + '>' + apslEsc(_apsl_msg.empId)    + '</th>'
                + '<th ' + nw + '>' + apslEsc(_apsl_msg.empName)  + '</th>'
                + '<th ' + nw + '>' + apslEsc(_apsl_msg.deptName) + '</th>'
                + '<th ' + nw + '>' + apslEsc(_apsl_msg.total)    + '</th>';
            _apsl_items.forEach(function (itm) {
                html += '<th ' + nw + '>' + apslEsc(itm.itemName) + '</th>';
            });
            html += '</tr>';
            $('#apsl_thead').html(html);
        }

        /* ── render rows của trang hiện tại ── */
        function apslRenderRows() {
            var cols  = 5 + _apsl_items.length;
            var total = _apsl_data.length;
            if (!total) {
                $('#apsl_tbody').html(
                    '<tr><td colspan="' + cols + '" class="text-center text-muted">' + apslEsc(_apsl_msg.noData) + '</td></tr>'
                );
                apslRenderFooter(0, 0, 0);
                return;
            }

            var start    = (_apsl_currentPage - 1) * _apsl_pageSize;
            var end      = Math.min(start + _apsl_pageSize, total);
            var pageData = _apsl_data.slice(start, end);

            var html = '';
            pageData.forEach(function (row, idx) {
                html += '<tr>'
                    + '<td class="text-center">' + (start + idx + 1) + '</td>'
                    + '<td class="text-center">' + apslEsc(row.empId)    + '</td>'
                    + '<td>'                     + apslEsc(row.localName) + '</td>'
                    + '<td>'                     + apslEsc(row.deptName)  + '</td>'
                    + '<td class="text-center fw-bold">' + apslFmtQty(row.total) + '</td>';

                _apsl_items.forEach(function (itm) {
                    var qty = row.items[itm.itemNo] || 0;
                    if (qty > 0) {
                        html += '<td class="text-center">'
                            + '<a href="javascript:void(0)" class="apsl-detail-link fw-bold"'
                            + ' data-person-id="' + apslEsc(row.personId)  + '"'
                            + ' data-item-no="'   + apslEsc(itm.itemNo)    + '"'
                            + ' data-item-name="' + apslEsc(itm.itemName)  + '">'
                            + apslFmtQty(qty) + '</a></td>';
                    } else {
                        html += '<td class="text-center text-muted">0</td>';
                    }
                });
                html += '</tr>';
            });
            $('#apsl_tbody').html(html);
            apslRenderFooter(start + 1, end, total);
        }

        /* ── footer: info + pagination ── */
        function apslRenderFooter(from, to, total) {
            $('#apsl_info').text(
                total === 0
                    ? 'Showing 0 to 0 of 0 entries'
                    : 'Showing ' + from + ' to ' + to + ' of ' + total + ' entries'
            );

            var totalPages = Math.ceil(total / _apsl_pageSize);
            var pg = '';

            pg += '<li class="page-item' + (_apsl_currentPage <= 1 ? ' disabled' : '') + '">'
                + '<a class="page-link" href="javascript:void(0)" onclick="apslGoPage(' + (_apsl_currentPage - 1) + ')">Previous</a></li>';

            var s = Math.max(1, _apsl_currentPage - 2);
            var e = Math.min(totalPages, _apsl_currentPage + 2);
            for (var i = s; i <= e; i++) {
                pg += '<li class="page-item' + (i === _apsl_currentPage ? ' active' : '') + '">'
                    + '<a class="page-link" href="javascript:void(0)" onclick="apslGoPage(' + i + ')">' + i + '</a></li>';
            }

            pg += '<li class="page-item' + (_apsl_currentPage >= totalPages ? ' disabled' : '') + '">'
                + '<a class="page-link" href="javascript:void(0)" onclick="apslGoPage(' + (_apsl_currentPage + 1) + ')">Next</a></li>';

            $('#apsl_pagination').html(pg);
        }

        /* ── render toàn bộ bảng ── */
        function apslRenderTable(pivotData) {
            _apsl_data        = pivotData;
            _apsl_currentPage = 1;
            apslRenderHeader();
            apslRenderRows();

            /* gắn sự kiện click cho link chi tiết */
            $('#apsl_tbody').off('click', '.apsl-detail-link')
                .on('click', '.apsl-detail-link', function (e) {
                    e.preventDefault();
                    apslOpenDetail(
                        $(this).data('person-id'),
                        $(this).data('item-no'),
                        $(this).data('item-name')
                    );
                });
        }

        window.apslGoPage = function (n) {
            var totalPages = Math.ceil(_apsl_data.length / _apsl_pageSize);
            if (n < 1 || n > totalPages) return;
            _apsl_currentPage = n;
            apslRenderRows();
        };

        window.apslChangePageSize = function (val) {
            _apsl_pageSize    = parseInt(val, 10) || 25;
            _apsl_currentPage = 1;
            apslRenderRows();
        };

        /* ── tra cứu ── */
        window.apslSearch = function () {
            $.ajax({
                url : '/ess/viewDept/api/arPersonalSelf/summary',
                type: 'GET',
                data: {
                    startDate: $('#apsl_startDate').val(),
                    endDate  : $('#apsl_endDate').val()
                },
                success: function (data) {
                    apslRenderTable(apslPivot(data));
                },
                error: function () {
                    if (typeof toastr !== 'undefined') {
                        toastr.error(_apsl_msg.loadFailed);
                    }
                }
            });
        };

        /* ── xuất Excel ── */
        window.apslExportExcel = function () {
            if (!_apsl_data.length) {
                if (typeof toastr !== 'undefined') toastr.warning(_apsl_msg.noDataExport);
                return;
            }
            var html = '<html xmlns:o="urn:schemas-microsoft-com:office:office"'
                + ' xmlns:x="urn:schemas-microsoft-com:office:excel">'
                + '<head><meta charset="UTF-8"></head><body><table border="1">';

            /* header */
            html += '<tr>'
                + '<th>' + _apsl_msg.stt     + '</th>'
                + '<th>' + _apsl_msg.empId   + '</th>'
                + '<th>' + _apsl_msg.empName + '</th>'
                + '<th>' + _apsl_msg.deptName + '</th>'
                + '<th>' + _apsl_msg.total   + '</th>';
            _apsl_items.forEach(function (itm) { html += '<th>' + itm.itemName + '</th>'; });
            html += '</tr>';

            /* rows */
            _apsl_data.forEach(function (row, idx) {
                html += '<tr>'
                    + '<td>' + (idx + 1)           + '</td>'
                    + '<td>' + (row.empId     || '') + '</td>'
                    + '<td>' + (row.localName || '') + '</td>'
                    + '<td>' + (row.deptName  || '') + '</td>'
                    + '<td>' + apslFmtQty(row.total) + '</td>';
                _apsl_items.forEach(function (itm) {
                    html += '<td>' + apslFmtQty(row.items[itm.itemNo] || 0) + '</td>';
                });
                html += '</tr>';
            });
            html += '</table></body></html>';

            var blob = new Blob(['﻿' + html], { type: 'application/vnd.ms-excel' });
            var url  = URL.createObjectURL(blob);
            var a    = document.createElement('a');
            a.href     = url;
            a.download = 'tinh_hinh_cham_cong.xls';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        };

        /* ── modal chi tiết ── */
        function apslOpenDetail(personId, itemNo, itemName) {
            $('#apsl_detailModalLabel').text(itemName || _apsl_msg.modalTitle);
            $('#apsl_detailBody').html(
                '<tr><td colspan="9" class="text-center text-muted">' + apslEsc(_apsl_msg.loading) + '</td></tr>'
            );
            if (_apsl_detailModal) { _apsl_detailModal.show(); }

            $.ajax({
                url : '/ess/viewDept/api/arPersonalSelf/detail',
                type: 'GET',
                data: {
                    personId : personId,
                    itemNo   : itemNo,
                    startDate: $('#apsl_startDate').val(),
                    endDate  : $('#apsl_endDate').val()
                },
                success: function (data) {
                    if (!data || !data.length) {
                        $('#apsl_detailBody').html(
                            '<tr><td colspan="9" class="text-center text-muted">' + apslEsc(_apsl_msg.noDataDetail) + '</td></tr>'
                        );
                        return;
                    }
                    var html = '';
                    data.forEach(function (row, idx) {
                        html += '<tr>'
                            + '<td class="text-center">' + (idx + 1) + '</td>'
                            + '<td class="text-center">' + apslEsc(row.empId)      + '</td>'
                            + '<td>'                     + apslEsc(row.localName)  + '</td>'
                            + '<td class="text-center">' + apslEsc(row.shiftName || row.shiftNo || '') + '</td>'
                            + '<td class="text-center">' + apslFmtDate(row.arDateStr) + '</td>'
                            + '<td>'                     + apslEsc(row.itemName)   + '</td>'
                            + '<td class="text-center">' + apslEsc(row.fromTimeStr || '') + '</td>'
                            + '<td class="text-center">' + apslEsc(row.toTimeStr   || '') + '</td>'
                            + '<td class="text-center">' + apslFmtQty(row.quantity) + '</td>'
                            + '</tr>';
                    });
                    $('#apsl_detailBody').html(html);
                },
                error: function () {
                    $('#apsl_detailBody').html(
                        '<tr><td colspan="9" class="text-center text-danger">' + apslEsc(_apsl_msg.loadDetailFailed) + '</td></tr>'
                    );
                }
            });
        }

        /* ── set mặc định tháng hiện tại ── */
        function apslDefaultCurrentMonth() {
            var now = new Date();
            var y   = now.getFullYear();
            var m   = now.getMonth() + 1;
            var pad = function (n) { return n < 10 ? '0' + n : '' + n; };
            $('#apsl_startDate').val('01/' + pad(m) + '/' + y);
            $('#apsl_endDate').val(pad(new Date(y, m, 0).getDate()) + '/' + pad(m) + '/' + y);
        }

        /* ── load item list rồi search ── */
        function apslLoadItems(callback) {
            $.ajax({
                url    : '/ess/viewDept/api/arPersonalSelf/items',
                type   : 'GET',
                success: function (data) {
                    _apsl_items = data || [];
                    if (typeof callback === 'function') callback();
                },
                error  : function () {
                    _apsl_items = [];
                    if (typeof callback === 'function') callback();
                }
            });
        }

        /* ── boot ── */
        function apslBootPage() {
            if (_apsl_pageBooted) return;
            if (!document.getElementById('apsl_dataTable')) {
                setTimeout(apslBootPage, 30);
                return;
            }
            _apsl_pageBooted = true;

            if (window.bootstrap && document.getElementById('apsl_detailModal')) {
                _apsl_detailModal = new bootstrap.Modal(document.getElementById('apsl_detailModal'));
            }
            if (typeof initDateRangePickers === 'function') {
                initDateRangePickers('#apsl_searchForm');
            }
            apslDefaultCurrentMonth();
            apslLoadItems(function () { apslSearch(); });
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', apslBootPage);
        }
        if (typeof $ !== 'undefined') {
            $(document).ready(apslBootPage);
        } else {
            apslBootPage();
        }
    </script>
</template>
