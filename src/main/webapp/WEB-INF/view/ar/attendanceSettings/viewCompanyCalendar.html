<div th:fragment="content">

    <!-- ===== Toolbar ===== -->
    <div id="ccal_toolbar" class="ccal-toolbar">
        <div class="ccal-nav">
            <button class="ccal-nav-btn" id="ccal_prevMonth" title="Tháng trước">
                <i class="bx bx-chevron-left"></i>
            </button>
            <select id="ccal_monthSel" class="ccal-combo">
                <option value="1">Tháng 01</option>
                <option value="2">Tháng 02</option>
                <option value="3">Tháng 03</option>
                <option value="4">Tháng 04</option>
                <option value="5">Tháng 05</option>
                <option value="6">Tháng 06</option>
                <option value="7">Tháng 07</option>
                <option value="8">Tháng 08</option>
                <option value="9">Tháng 09</option>
                <option value="10">Tháng 10</option>
                <option value="11">Tháng 11</option>
                <option value="12">Tháng 12</option>
            </select>
            <select id="ccal_yearSel" class="ccal-combo ccal-year"></select>
            <button class="ccal-nav-btn" id="ccal_nextMonth" title="Tháng sau">
                <i class="bx bx-chevron-right"></i>
            </button>
        </div>

        <div class="ccal-actions">
            <button class="ccal-btn ccal-btn-default" onclick="ccalLoad()"><i class="bx bx-refresh"></i> Tra
                cứu</button>
            <button class="ccal-btn ccal-btn-primary" onclick="ccalOpenAddModal()"><i class="bx bx-plus"></i> Thêm
                mới</button>
            <!-- <button class="ccal-btn ccal-btn-success" onclick="ccalOpenEditSelected()"><i class="bx bx-edit"></i>Sửa</button> -->
        </div>
    </div>

    <!-- ===== Calendar ===== -->
    <div id="ccal_gridWrap" class="ccal-grid-wrap">
        <div class="ccal-hrow">
            <div class="ccal-hcell ccal-col-sun"><i class="bx bxs-sun"></i> CN</div>
            <div class="ccal-hcell">T2</div>
            <div class="ccal-hcell">T3</div>
            <div class="ccal-hcell">T4</div>
            <div class="ccal-hcell">T5</div>
            <div class="ccal-hcell">T6</div>
            <div class="ccal-hcell ccal-col-sat"><i class="bx bxs-star"></i> T7</div>
        </div>
        <div id="ccal_body"></div>
    </div>

    <!-- ===== Legend ===== -->
    <div class="ccal-legend">
        <span class="ccal-legend-item"><span class="ccal-legend-dot ccal-lg-work"></span> Ngày làm việc</span>
        <span class="ccal-legend-item"><span class="ccal-legend-dot ccal-lg-rest"></span> Ngày nghỉ</span>
        <span class="ccal-legend-item"><span class="ccal-legend-dot ccal-lg-holiday"></span> Ngày lễ</span>
        <span class="ccal-legend-item"><span class="ccal-legend-dot ccal-lg-today"></span> Hôm nay</span>
    </div>

    <!-- ===== Modal ===== -->
    <div class="modal fade" id="ccal_modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header py-2">
                    <h6 class="modal-title mb-0" id="ccal_modalTitle">Cập nhật ngày</h6>
                    <button class="btn-close btn-sm" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="ccal_form">
                        <input type="hidden" id="ccal_editDdateStr">
                        <div class="row g-2">
                            <div class="col-md-6">
                                <label class="form-label form-label-sm">Ngày làm việc</label>
                                <select class="form-select form-select-sm" id="ccal_workdayflag">
                                    <option value="0">0 — Ngày nghỉ</option>
                                    <option value="1">1 — Ngày làm việc</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label form-label-sm">Ca làm việc (Shift No)</label>
                                <select class="form-select form-select-sm" id="ccal_shiftNo">
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label form-label-sm">TypeID</label>
                                <select class="form-select" id="ccal_typeid" name="ccal_typeid" data-parent-code="1439">
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label form-label-sm">OvertypeID</label>
                                <select class="form-select" id="ccal_overtypeid" name="ccal_overtypeid"
                                    data-parent-code="1439">
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label form-label-sm">TypeID mặc định</label>
                                <select class="form-select" id="ccal_typeidDefault" name="ccal_typeidDefault"
                                    data-parent-code="1439">
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label form-label-sm">Ngày lễ</label>
                                <select class="form-select form-select-sm" id="ccal_statutoryFlag">
                                    <option value="0">0 — Không</option>
                                    <option value="1">1 — Ngày lễ</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label form-label-sm">Operation ID</label>
                                <input type="text" class="form-control form-control-sm" id="ccal_operationId">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label form-label-sm">Sắp xếp</label>
                                <input type="number" class="form-control form-control-sm" id="ccal_orderno" value="0">
                            </div>
                            <div class="col-md-8">
                                <label class="form-label form-label-sm">Ghi chú (Remark)</label>
                                <input type="text" class="form-control form-control-sm" id="ccal_remark">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label form-label-sm">Trạng thái</label>
                                <select class="form-select form-select-sm" id="ccal_activity">
                                    <option value="1">Hoạt động</option>
                                    <option value="0">Ngừng</option>
                                </select>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer py-2">
                    <button class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Đóng</button>
                    <button class="btn btn-sm btn-primary" onclick="ccalSave()">
                        <i class="bx bx-save me-1"></i>Lưu
                    </button>
                </div>
            </div>
        </div>
    </div>

</div>

<template id="fragmentScripts">
    <script th:inline="javascript">
        /* ===========================
           INJECT CSS
           =========================== */
        (function () {
            var old = document.getElementById('ccal-injected-css');
            if (old) old.remove();
            var css = document.createElement('style');
            css.id = 'ccal-injected-css';
            css.type = 'text/css';
            css.appendChild(document.createTextNode(
                /* --- Keyframes --- */

                + 'box-shadow:0 1px 3px rgba(0,0,0,.06);}'
                + '.ccal-toolbar-left{display:flex;align-items:center;gap:8px;}'
                + '.ccal-toolbar-icon{font-size:1.2rem;color:#3b82f6;}'
                + '.ccal-select-company{font-size:.82rem;height:32px;padding:4px 8px;border:1px solid #cbd5e1;'
                + 'border-radius:6px;min-width:180px;max-width:280px;background:#fff;'
                + 'transition:border-color .2s,box-shadow .2s;outline:none;}'
                + '.ccal-select-company:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.15);}'
                + '.ccal-nav{display:flex;align-items:center;gap:4px;margin:0 auto;}'
                + '.ccal-nav-btn{background:#fff;border:1px solid #cbd5e1;border-radius:6px;padding:4px 10px;'
                + 'font-size:.85rem;cursor:pointer;color:#475569;transition:all .2s;line-height:1;}'
                + '.ccal-nav-btn:hover{background:#3b82f6;color:#fff;border-color:#3b82f6;transform:scale(1.05);}'
                + '.ccal-combo{font-size:.82rem;height:32px;padding:4px 6px;border:1px solid #cbd5e1;'

                + '.ccal-btn:active{transform:scale(.96);}'
                + '.ccal-btn-default{background:#fff;border:1px solid #cbd5e1;color:#475569;}'
                + '.ccal-btn-default:hover{background:#f1f5f9;box-shadow:0 2px 4px rgba(0,0,0,.06);}'
                + '.ccal-btn-primary{background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;'
                + 'box-shadow:0 2px 6px rgba(37,99,235,.3);}'
                + '.ccal-btn-primary:hover{background:linear-gradient(135deg,#2563eb,#1d4ed8);box-shadow:0 3px 10px rgba(37,99,235,.4);}'
                + '.ccal-btn-success{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;'
                + 'box-shadow:0 2px 6px rgba(22,163,74,.3);}'
                + '.ccal-btn-success:hover{background:linear-gradient(135deg,#16a34a,#15803d);box-shadow:0 3px 10px rgba(22,163,74,.4);}'

                /* --- Grid Wrapper --- */
                + '.ccal-grid-wrap{border:1px solid #cbd5e1;border-top:none;border-radius:0 0 8px 8px;'
                + 'overflow:hidden;box-shadow:0 4px 12px rgba(0,0,0,.06);}'

                /* --- Header Row --- */
                + '.ccal-hrow{display:grid;grid-template-columns:repeat(7,1fr);'
                + 'background:linear-gradient(135deg,#1e293b 0%,#334155 100%);}'
                + '.ccal-hcell{padding:8px;text-align:center;font-weight:700;font-size:.82rem;'
                + 'color:#e2e8f0;letter-spacing:.5px;border-right:1px solid rgba(255,255,255,.08);}'
                + '.ccal-hcell:last-child{border-right:none;}'
                + '.ccal-col-sun{color:#fca5a5 !important;}'
                + '.ccal-col-sat{color:#86efac !important;}'

                /* --- Week Row --- */
                + '.ccal-week{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid #e2e8f0;'
                + 'animation:ccal-slideDown .3s ease-out both;}'
                + '.ccal-week:last-child{border-bottom:none;}'

                /* --- Day Cell --- */
                + '.ccal-day{min-height:90px;padding:6px 8px;border-right:1px solid #e2e8f0;cursor:pointer;'
                + 'background:#fff;overflow:hidden;transition:all .2s ease;position:relative;}'
                + '.ccal-day:last-child{border-right:none;}'
                + '.ccal-day:hover{transform:scale(1.02);z-index:2;'
                + 'box-shadow:0 4px 16px rgba(0,0,0,.1);border-radius:4px;}'
                + '.ccal-day.is-empty{background:#f8fafc;cursor:default;min-height:0;}'
                + '.ccal-day.is-empty:hover{transform:none;box-shadow:none;}'
                + '.ccal-day.is-today{background:linear-gradient(135deg,#eff6ff 0%,#dbeafe 100%);'
                + 'animation:ccal-pulse 2.5s infinite;}'
                + '.ccal-day.is-rest{background:linear-gradient(180deg,#fff 0%,#fef2f2 100%);}'
                + '.ccal-day.is-work{background:linear-gradient(180deg,#fff 0%,#f0fdf4 100%);}'
                + '.ccal-day.ccal-selected{outline:2px solid #3b82f6;outline-offset:-2px;'
                + 'box-shadow:0 0 0 4px rgba(59,130,246,.15);border-radius:4px;z-index:3;}'

                /* --- Day Top --- */
                + '.ccal-day-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}'
                + '.ccal-day-num{font-size:.95rem;font-weight:800;color:#1e293b;white-space:nowrap;line-height:1.2;}'
                + '.ccal-day-num.is-sun{color:#dc2626;}'
                + '.ccal-day-num.is-sat{color:#16a34a;}'

                /* --- Status Badge --- */
                + '.ccal-status{font-size:.62rem;padding:2px 7px;border-radius:10px;font-weight:700;'
                + 'white-space:nowrap;line-height:1.3;letter-spacing:.3px;text-transform:uppercase;}'
                + '.ccal-status.s-rest{background:linear-gradient(135deg,#fecaca,#fca5a5);color:#7f1d1d;}'
                + '.ccal-status.s-holiday{background:linear-gradient(135deg,#fde68a,#fbbf24);color:#78350f;'
                + 'box-shadow:0 1px 4px rgba(251,191,36,.3);}'
                + '.ccal-status.s-work-text{font-size:.62rem;color:#166534;font-weight:600;'
                + 'padding:2px 7px;border-radius:10px;background:linear-gradient(135deg,#bbf7d0,#86efac);}'

                /* --- Tags --- */
                + '.ccal-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px;}'

                + '.ccal-tag:hover{transform:scale(1.08);}'
                + '.ccal-tag.t-we{background:#fde8e8;color:#991b1b;}'
                + '.ccal-tag.t-wd{background:#dbeafe;color:#1e3a8a;}'
                + '.ccal-tag.t-hol{background:linear-gradient(135deg,#fef3c7,#fde68a);color:#92400e;'
                + 'border:1px solid #fbbf24;}'
                + '.ccal-tag.t-sh{background:#d1fae5;color:#065f46;}'
                + '.ccal-tag.t-rest{background:#fde8e8;color:#991b1b;}'

                /* --- Remark --- */
                + '.ccal-remark{margin-top:3px;font-size:.58rem;color:#94a3b8;white-space:nowrap;'
                + 'overflow:hidden;text-overflow:ellipsis;font-style:italic;}'

                /* --- Legend --- */
                + '.ccal-legend{display:flex;gap:16px;padding:8px 14px;background:#f8fafc;'
                + 'border:1px solid #cbd5e1;border-top:none;border-radius:0 0 8px 8px;'
                + 'margin-top:-1px;flex-wrap:wrap;}'
                + '.ccal-legend-item{display:inline-flex;align-items:center;gap:5px;font-size:.72rem;'
                + 'color:#64748b;font-weight:500;}'
                + '.ccal-legend-dot{width:10px;height:10px;border-radius:50%;border:1px solid rgba(0,0,0,.1);}'
                + '.ccal-lg-work{background:linear-gradient(135deg,#86efac,#4ade80);}'
                + '.ccal-lg-rest{background:linear-gradient(135deg,#fca5a5,#f87171);}'
                + '.ccal-lg-holiday{background:linear-gradient(135deg,#fde68a,#fbbf24);}'
                + '.ccal-lg-today{background:linear-gradient(135deg,#93c5fd,#3b82f6);}'

                /* --- Animate stagger delay for weeks --- */
                + '.ccal-week:nth-child(1){animation-delay:.03s;}'
                + '.ccal-week:nth-child(2){animation-delay:.06s;}'
                + '.ccal-week:nth-child(3){animation-delay:.09s;}'
                + '.ccal-week:nth-child(4){animation-delay:.12s;}'
                + '.ccal-week:nth-child(5){animation-delay:.15s;}'
                + '.ccal-week:nth-child(6){animation-delay:.18s;}'
            ));
            document.head.appendChild(css);
        })();

        /* ===========================
           MAIN LOGIC
           =========================== */

        /* --- khai báo biến nội bộ của tab này --- */
        var _ccal_initialized = false;

        /* ===================== FUNCTIONS (định nghĩa trước khi gọi) ===================== */

        function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

        window.ccalLoad = function () {
            var year  = parseInt($('#ccal_yearSel').val());
            var month = parseInt($('#ccal_monthSel').val());
            $.ajax({
                url: '/ar/attendanceSettings/api/calender/month',
                data: { year: year, month: month },
                success: function (data) { renderCalendar(year, month, data); },
                error: function () { toastr && toastr.error('Lỗi tải lịch!'); }
            });
        };

        function renderCalendar(year, month, records) {
            if (!records || records.length === 0) {
                $('#ccal_body').html('<div style="padding: 20px; text-align: center; color: #64748b;">Không có dữ liệu lịch công ty trong khoảng thời gian này.</div>');
                return;
            }

            var today = new Date();
            var todayKey = today.getFullYear()
                + '/' + String(today.getMonth() + 1).padStart(2, '0')
                + '/' + String(today.getDate()).padStart(2, '0');

            var firstRec = records[0];
            var firstKey = (firstRec.ddateStr || firstRec.ddateFormatted || '').replace(/-/g, '/');
            var firstParts = firstKey.split('/');
            var firstDateObj = new Date(parseInt(firstParts[0]), parseInt(firstParts[1]) - 1, parseInt(firstParts[2]));
            var firstDow = firstDateObj.getDay();

            var html = '<div class="ccal-week">';
            var cellCount = 0;

            for (var i = 0; i < firstDow; i++) {
                html += '<div class="ccal-day is-empty"></div>';
                cellCount++;
            }

            records.forEach(function (rec) {
                if (cellCount > 0 && cellCount % 7 === 0) {
                    html += '</div><div class="ccal-week">';
                }

                var key = (rec.ddateStr || rec.ddateFormatted || '').replace(/-/g, '/');
                var p = key.split('/');
                var dMonth = parseInt(p[1]);
                var day = parseInt(p[2]);

                var dow = cellCount % 7;
                var isSun = dow === 0, isSat = dow === 6, isWE = isSun || isSat;
                var isToday = (key === todayKey);

                var isRest = rec.workdayflag == 0;
                var isWork = rec.workdayflag == 1;
                var isStat = rec.statutoryFlag == 1;

                var cellCls = 'ccal-day' + (isToday ? ' is-today' : isRest ? ' is-rest' : ' is-work');
                var numCls  = 'ccal-day-num' + (isSun ? ' is-sun' : isSat ? ' is-sat' : '');

                var statusHtml;
                if (isStat)      statusHtml = '<span class="ccal-status s-holiday">Ngày lễ</span>';
                else if (isRest) statusHtml = '<span class="ccal-status s-rest">Nghỉ</span>';
                else             statusHtml = '<span class="ccal-status s-work-text">Làm việc</span>';

                var tags = '';
                if (isWE) {
                    tags += '<span class="ccal-tag t-we">Cuối tuần</span>';
                    tags += '<span class="ccal-tag t-rest">Nghỉ ngơi</span>';
                } else {
                    tags += '<span class="ccal-tag t-wd">Ngày thường</span>';
                    var shiftLabel = (rec.shiftName || rec.shiftNo) ? esc(rec.shiftName || rec.shiftNo) : 'Ca hành chính';
                    tags += '<span class="ccal-tag t-sh">' + shiftLabel + '</span>';
                }
                if (isStat) tags += '<span class="ccal-tag t-hol">\u2605 Lễ</span>';
                if (rec.typeidName) tags += '<span class="ccal-tag t-wd">' + esc(rec.typeidName) + '</span>';

                var remarkHtml = rec.remark
                    ? '<div class="ccal-remark" title="' + esc(rec.remark) + '">\u2014 ' + esc(rec.remark) + '</div>'
                    : '';

                html += '<div class="' + cellCls + '" data-datestr="' + key + '" onclick="ccalDayClick(this)">';
                html += '<div class="ccal-day-top"><span class="' + numCls + '">' + day + '-' + dMonth + '</span>' + statusHtml + '</div>';
                html += '<div class="ccal-tags">' + tags + '</div>';
                html += remarkHtml;
                html += '</div>';

                cellCount++;
            });

            var remain = cellCount % 7;
            if (remain > 0) {
                for (var j = remain; j < 7; j++) {
                    html += '<div class="ccal-day is-empty"></div>';
                }
            }
            html += '</div>';

            $('#ccal_body').html(html);
        }

        window.ccalDayClick = function (el) {
            $('#ccal_body .ccal-day').removeClass('ccal-selected');
            $(el).addClass('ccal-selected');
            var ddateStr = $(el).attr('data-datestr');
            $.ajax({
                url: '/ar/attendanceSettings/api/calender/holidays/detail',
                data: { ddateStr: ddateStr },
                success: function (data) { fillModal(data, ddateStr, false); },
                error: function () { fillModal(null, ddateStr, false); }
            });
        };

        window.ccalOpenAddModal = function () {
            var t = new Date();
            var key = t.getFullYear() + '/' + String(t.getMonth() + 1).padStart(2, '0') + '/' + String(t.getDate()).padStart(2, '0');
            fillModal(null, key, true);
        };

        window.ccalOpenEditSelected = function () {
            var sel = document.querySelector('#ccal_body .ccal-selected');
            if (!sel) { toastr && toastr.warning('Bấm chọn 1 ngày trên lịch!'); return; }
            ccalDayClick(sel);
        };

        function fillModal(data, ddateStr, forceAdd) {
            var p = ddateStr.split('/');
            var display = p[2] + '/' + p[1] + '/' + p[0];

            $('#ccal_modalTitle').text((forceAdd || !data ? 'Thêm mới' : 'Cập nhật') + ' \u2014 ' + display);
            $('#ccal_editDdateStr').val(ddateStr);

            if (data && !forceAdd) {
                $('#ccal_workdayflag').val(data.workdayflag != null ? data.workdayflag : 0);
                $('#ccal_shiftNo').val(data.shiftNo || '');
                $('#ccal_typeid').val(data.typeid || '');
                $('#ccal_overtypeid').val(data.overtypeid || '');
                $('#ccal_typeidDefault').val(data.typeidDefault || '');
                $('#ccal_statutoryFlag').val(data.statutoryFlag != null ? data.statutoryFlag : 0);
                $('#ccal_operationId').val(data.operationId || '');
                $('#ccal_orderno').val(data.orderno || 0);
                $('#ccal_remark').val(data.remark || '');
                $('#ccal_activity').val(data.activity != null ? data.activity : 1);
            } else {
                $('#ccal_form')[0].reset();
                var d = new Date(parseInt(p[0]), parseInt(p[1]) - 1, parseInt(p[2]));
                $('#ccal_workdayflag').val((d.getDay() === 0 || d.getDay() === 6) ? 0 : 1);
                $('#ccal_activity').val(1);
                $('#ccal_orderno').val(0);
            }

            // Load shift nếu chưa load
            var $sel = $('#ccal_shiftNo');
            if ($sel.children('option').length === 0) {
                $.ajax({
                    url: '/ar/attendanceSettings/api/shift',
                    success: function (list) {
                        (list || []).forEach(function (s) { $sel.append(new Option(s.nameVi || s.shiftNo, s.shiftNo)); });
                        if (data) $sel.val(data.shiftNo || '');
                    }
                });
            }

            new bootstrap.Modal(document.getElementById('ccal_modal')).show();
        }

        window.ccalSave = function () {
            var ddateStr = $('#ccal_editDdateStr').val();
            if (!ddateStr) { toastr && toastr.warning('Dữ liệu không hợp lệ!'); return; }
            var payload = {
                ddateStr:      ddateStr,
                workdayflag:   parseInt($('#ccal_workdayflag').val()) || 0,
                shiftNo:       $('#ccal_shiftNo').val() || null,
                typeid:        $('#ccal_typeid').val() || null,
                overtypeid:    $('#ccal_overtypeid').val() || null,
                typeidDefault: $('#ccal_typeidDefault').val() || null,
                statutoryFlag: parseInt($('#ccal_statutoryFlag').val()) || 0,
                operationId:   $('#ccal_operationId').val() || null,
                orderno:       parseInt($('#ccal_orderno').val()) || 0,
                remark:        $('#ccal_remark').val() || null,
                activity:      parseInt($('#ccal_activity').val()) || 1
            };
            $.ajax({
                url: '/ar/attendanceSettings/api/calender/holidays/save',
                type: 'POST', contentType: 'application/json', data: JSON.stringify(payload),
                success: function (res) {
                    if (res.success) {
                        toastr && toastr.success(res.message || 'Lưu thành công!');
                        var m = bootstrap.Modal.getInstance(document.getElementById('ccal_modal'));
                        if (m) m.hide();
                        ccalLoad();
                    } else { toastr && toastr.error(res.error || 'Lỗi!'); }
                },
                error: function (err) {
                    var msg = (err.responseJSON && err.responseJSON.error) ? err.responseJSON.error : 'Lỗi không xác định';
                    toastr && toastr.error('Lỗi: ' + msg);
                }
            });
        };

        /* ===================== INIT (gọi sau khi định nghĩa xong) ===================== */

        $(document).ready(function () {
            if (_ccal_initialized) return;  // chống init 2 lần khi script inject lại
            _ccal_initialized = true;

            var now = new Date();
            var curYear  = now.getFullYear();
            var curMonth = now.getMonth() + 1;

            var $ys = $('#ccal_yearSel');
            for (var y = curYear - 5; y <= curYear + 5; y++) $ys.append(new Option(y, y));
            $ys.val(curYear);
            $('#ccal_monthSel').val(curMonth);

            $('#ccal_prevMonth').on('click', function () {
                var m = parseInt($('#ccal_monthSel').val()), y = parseInt($('#ccal_yearSel').val());
                if (--m < 1) { m = 12; y--; }
                $('#ccal_monthSel').val(m); $('#ccal_yearSel').val(y); ccalLoad();
            });
            $('#ccal_nextMonth').on('click', function () {
                var m = parseInt($('#ccal_monthSel').val()), y = parseInt($('#ccal_yearSel').val());
                if (++m > 12) { m = 1; y++; }
                $('#ccal_monthSel').val(m); $('#ccal_yearSel').val(y); ccalLoad();
            });

            ccalLoad();   // <-- Gọi sau khi ccalLoad đã định nghĩa xong bên trên
        });
    </script>
</template>
