<div th:fragment="content">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-body">
                    <!-- Search Form -->
                    <form id="shiftSearchForm" class="row g-3 mb-4">
                        <div class="col-md-3">
                            <label for="searchMonth" class="form-label" th:text="#{addShift.month}">Tháng</label>
                            <input type="month" class="form-control" id="searchMonth">
                        </div>
                        <div class="col-md-3">
                            <label for="searchEmpId" class="form-label" th:text="#{addShift.employee}">Nhân viên</label>
                            <input type="text" class="form-control" id="searchEmpId"
                                th:placeholder="#{addShift.placeholder.empIdOrName}" placeholder="Nhập mã / tên nhân viên">
                        </div>

                        <div class="col-md-4 d-flex align-items-end flex-wrap gap-1">
                            <button type="button" class="btn btn-primary" onclick="svSearchData()">
                                <i class="bx bx-search"></i> <span th:text="#{common.search}">Tìm kiếm</span>
                            </button>
                            <button type="button" class="btn btn-secondary" onclick="svClearSearch()">
                                <i class="bx bx-x"></i> <span th:text="#{common.clearFilter}">Xóa lọc</span>
                            </button>
                            <button type="button" class="btn btn-success" onclick="svOpenModal()">
                                <i class="bx bx-plus"></i> <span th:text="#{common.addNew}">Thêm mới</span>
                            </button>
                            <button type="button" class="btn btn-info text-white" onclick="svDownloadTemplate()">
                                <i class="bx bx-download"></i> <span th:text="#{common.downloadTemplate}">Tải File Mẫu</span>
                            </button>
                            <button type="button" class="btn btn-warning" onclick="svOpenImportModal()">
                                <i class="bx bx-upload"></i> <span th:text="#{common.importExcel}">Import Excel</span>
                            </button>
                        </div>
                    </form>

                    <!-- Data Table -->
                    <div class="table-responsive">
                        <table id="shiftTable" class="table table-striped table-bordered table-hover"
                            style="width:100%">
                            <thead class="table-light">
                                <tr>
                                    <th th:text="#{common.stt}">STT</th>
                                    <th th:text="#{common.date}">Ngày</th>
                                    <th th:text="#{common.empId}">Mã nhân viên</th>
                                    <th th:text="#{common.empName}">Tên nhân viên</th>
                                    <th th:text="#{addShift.shift}">Ca quy định</th>
                                    <th th:text="#{addShift.dayType}">Loại ngày</th>
                                    <th th:text="#{common.remark}">Ghi chú</th>
                                    <th class="text-center" style="width: 100px;" th:text="#{common.action}">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Data loaded via AJAX -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal Thêm/Sửa -->
<div class="modal fade" id="shiftModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="shiftModalTitle" th:text="#{addShift.modal.title.edit}">Cập nhật Xếp ca làm việc</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="shiftForm">
                    <input type="hidden" id="svPkNo" name="pkNo">

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="svEmpNameDisplay" class="form-label">
                                <span th:text="#{addShift.employee}">Nhân viên</span> <span class="text-danger">*</span>
                            </label>
                            <div class="input-group">
                                <input type="text" class="form-control" id="svEmpNameDisplay"
                                    th:placeholder="#{addShift.selectEmployee}" placeholder="Chọn nhân viên..." readonly required>
                                <input type="hidden" id="svPersonId" name="personId">
                                <button class="btn btn-outline-primary" type="button"
                                    onclick="openEmployeeSearchPopup()">
                                    <i class="bx bx-search"></i>
                                </button>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label for="svArDateStr" class="form-label">
                                <span th:text="#{addShift.shiftDate}">Ngày công</span> <span class="text-danger">*</span>
                            </label>
                            <input type="date" class="form-control" id="svArDateStr" name="arDateStr" required>
                        </div>

                        <div class="col-md-6">
                            <label for="svShiftNo" class="form-label">
                                <span th:text="#{addShift.shift}">Ca làm việc</span> <span class="text-danger">*</span>
                            </label>
                            <select class="form-select" id="svShiftNo" name="shiftNo" required>
                                <option value="" th:text="#{addShift.selectShift}">-- Chọn ca làm việc --</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label for="svTypeid" class="form-label" th:text="#{addShift.dayType}">Loại ngày</label>
                            <select class="form-select" id="svTypeid" name="typeid" data-parent-code="1439"></select>
                        </div>

                        <div class="col-md-12">
                            <label for="svRemark" class="form-label" th:text="#{common.remark}">Ghi chú</label>
                            <textarea class="form-control" id="svRemark" name="remark" rows="2"></textarea>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" th:text="#{common.close}">Đóng</button>
                <button type="button" class="btn btn-primary" onclick="svSaveData()" th:text="#{common.save}">Lưu</button>
            </div>
        </div>
    </div>
</div>



<template id="fragmentScripts">
    <script th:inline="javascript">
        var _addShift_i18n = {
            msgSelectEmployee: /*[[#{addShift.msg.selectEmployee}]]*/ 'Vui lòng chọn nhân viên',
            msgSelectDate: /*[[#{addShift.msg.selectDate}]]*/ 'Vui lòng chọn Ngày công',
            msgSelectShift: /*[[#{addShift.msg.selectShift}]]*/ 'Vui lòng chọn Ca làm việc',
            msgConfirmDelete: /*[[#{addShift.msg.confirmDelete}]]*/ 'Bạn có chắc chắn muốn xóa dữ liệu xếp ca này không?',
            msgErrorLoad: /*[[#{addShift.msg.errorLoad}]]*/ 'Lỗi khi lấy thông tin',
            msgErrorConnect: /*[[#{addShift.msg.errorConnect}]]*/ 'Lỗi kết nối',
            modalTitleAdd: /*[[#{addShift.modal.title.add}]]*/ 'Thêm mới Xếp ca làm việc',
            modalTitleEdit: /*[[#{addShift.modal.title.edit}]]*/ 'Cập nhật Xếp ca làm việc'
        };
        $(document).ready(function () {
            // Khởi tạo tháng hiện tại
            var now = new Date();
            var monthStr = now.getFullYear() + "-" + ("0" + (now.getMonth() + 1)).slice(-2);
            $('#searchMonth').val(monthStr);

            // Load ca làm việc
            $.ajax({
                url: '/ar/attendanceSettings/api/shift',
                type: 'GET',
                success: function (data) {
                    var html = '';
                    if (data && data.length > 0) {
                        data.forEach(function (itm) {
                            var name = itm.nameVi || itm.shiftName || itm.shiftNo;
                            html += '<option value="' + itm.shiftNo + '">' + name + '</option>';
                        });
                    }
                    $('#svShiftNo').html(html);
                },
                error: function (e) {
                    console.log("Không tải được ds ca", e);
                }
            });

            var table = $('#shiftTable').DataTable({
                destroy: true,
                scrollY: "calc(100vh - 280px)",
                scrollCollapse: true,
                paging: true,
                searching: true,
                lengthChange: true,
                pageLength: 25,
                columnDefs: [
                    { "width": "2%", "targets": 0 },
                ],
                processing: true,

                dom: 'Blfrtip',
                buttons: [
                    'copy', 'csv', 'excel', 'pdf', 'print'
                ],
                ajax: {
                    url: '/ar/attendanceMintenance/api/scheduleHtsv/list',
                    dataSrc: '',
                    data: function (d) {
                        d.empId = $('#searchEmpId').val();
                        d.month = $('#searchMonth').val().replace(/-/g, '/'); // YYYY-MM
                    }
                },
                columns: [
                    {
                        data: null,
                        render: function (data, type, row, meta) {
                            return meta.row + 1;
                        }
                    },
                    { data: 'arDateStr' },
                    { data: 'empId' },
                    {
                        data: null,
                        render: function (data, type, row) {
                            return row.localName;
                        }
                    },
                    { data: 'shiftName' },
                    { data: 'typeName' },
                    { data: 'remark' },
                    {
                        data: null,
                        className: "text-center",
                        render: function (data, type, row) {
                            return `
                                <div class="btn-group btn-group-sm">
                                    <button class="btn btn-warning" onclick="svEditRaw(${row.pkNo})">
                                        <i class="bx bx-edit"></i>
                                    </button>
                                    <button class="btn btn-danger" onclick="svDeleteRaw(${row.pkNo})">
                                        <i class="bx bx-trash"></i>
                                    </button>
                                </div>
                            `;
                        }
                    }
                ]
            });

            window.svSearchData = function () {
                table.ajax.reload();
            };

            window.svClearSearch = function () {
                $('#shiftSearchForm')[0].reset();
                $('#searchMonth').val(monthStr.replace(/-/g, '/')); // reset về tháng hiện tại
                table.ajax.reload();
            };

            // Tải file Excel mẫu
            window.svDownloadTemplate = function () {
                window.location.href = '/sy/excel/api/downloadTemplate?templateName=AR_SCHEDULE_HTSV_Template';
            };

            // Mở modal import Excel (dùng shared component ExcelImport)
            window.svOpenImportModal = function () {
                ExcelImport.open('/sy/excel/api/importTemplate?templateName=AR_SCHEDULE_HTSV_Template', function () {
                    table.ajax.reload();
                });
            };

            // Mở popup tìm kiếm nhân viên
            window.openEmployeeSearchPopup = function () {
                if (typeof EmployeeSearchModal !== 'undefined') {
                    EmployeeSearchModal.open(function (employee) {
                        $('#svPersonId').val(employee.personId);
                        $('#svEmpNameDisplay').val(employee.empId + ' - ' + employee.localName);
                    });
                } else {
                    alert(_addShift_i18n.msgSelectEmployee);
                }
            };

            // Mở modal thêm mới
            window.svOpenModal = function () {
                $('#shiftModalTitle').text(_addShift_i18n.modalTitleAdd);
                $('#shiftForm')[0].reset();
                $('#svPkNo').val('');
                $('#svPersonId').val('');
                $('#svEmpNameDisplay').val('');
                var modal = new bootstrap.Modal(document.getElementById('shiftModal'));
                modal.show();
            };

            // Sửa
            window.svEditRaw = function (pkNo) {
                $.ajax({
                    url: '/ar/attendanceMintenance/api/scheduleHtsv/' + pkNo,
                    type: 'GET',
                    success: function (data) {
                        $('#shiftModalTitle').text(_addShift_i18n.modalTitleEdit);
                        $('#svPkNo').val(data.pkNo);
                        $('#svPersonId').val(data.personId);
                        $('#svEmpNameDisplay').val((data.empId || '') + ' - ' + (data.localName || ''));
                        $('#svArDateStr').val(data.arDateStr ? data.arDateStr.replace(/\//g, '-') : '');
                        $('#svShiftNo').val(data.shiftNo);
                        $('#svTypeid').val(data.typeid);
                        $('#svRemark').val(data.remark);

                        var modal = new bootstrap.Modal(document.getElementById('shiftModal'));
                        modal.show();
                    },
                    error: function (err) {
                        if (typeof toastr !== 'undefined') toastr.error(_addShift_i18n.msgErrorLoad);
                        else alert(_addShift_i18n.msgErrorLoad);
                    }
                });
            };

            // Lưu dữ liệu
            window.svSaveData = function () {
                var personId = $('#svPersonId').val();
                if (!personId) {
                    if (typeof toastr !== 'undefined') toastr.warning(_addShift_i18n.msgSelectEmployee);
                    else alert(_addShift_i18n.msgSelectEmployee);
                    return;
                }
                var arDateStr = $('#svArDateStr').val();
                if (!arDateStr) {
                    if (typeof toastr !== 'undefined') toastr.warning(_addShift_i18n.msgSelectDate);
                    else alert(_addShift_i18n.msgSelectDate);
                    return;
                }
                var shiftNo = $('#svShiftNo').val();
                if (!shiftNo) {
                    if (typeof toastr !== 'undefined') toastr.warning(_addShift_i18n.msgSelectShift);
                    else alert(_addShift_i18n.msgSelectShift);
                    return;
                }

                var formData = {
                    pkNo: $('#svPkNo').val() || null,
                    personId: personId,
                    arDateStr: arDateStr.replace(/-/g, '/'),
                    shiftNo: shiftNo,
                    typeid: $('#svTypeid').val() || null,
                    remark: $('#svRemark').val()
                };

                $.ajax({
                    url: '/ar/attendanceMintenance/api/scheduleHtsv/save',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(formData),
                    success: function (res) {
                        if (res.success) {
                            if (typeof toastr !== 'undefined') toastr.success(res.message);
                            else alert(res.message);
                            var modalEl = document.getElementById('shiftModal');
                            if (modalEl) {
                                var modal = bootstrap.Modal.getInstance(modalEl);
                                if (modal) {
                                    modal.hide();
                                } else {
                                    $(modalEl).modal('hide');
                                }
                            }
                            table.ajax.reload();
                        } else {
                            if (typeof toastr !== 'undefined') toastr.error('Lỗi: ' + res.error);
                            else alert('Lỗi: ' + res.error);
                        }
                    },
                    error: function (err) {
                        if (typeof toastr !== 'undefined') toastr.error(_addShift_i18n.msgErrorConnect);
                        else alert(_addShift_i18n.msgErrorConnect);
                    }
                });
            };

            // Xóa
            window.svDeleteRaw = function (pkNo) {
                if (confirm(_addShift_i18n.msgConfirmDelete)) {
                    $.ajax({
                        url: '/ar/attendanceMintenance/api/scheduleHtsv/delete/' + pkNo,
                        type: 'DELETE',
                        success: function (res) {
                            if (res.success) {
                                if (typeof toastr !== 'undefined') toastr.success(res.message);
                                else alert(res.message);
                                table.ajax.reload();
                            } else {
                                if (typeof toastr !== 'undefined') toastr.error('Lỗi: ' + res.error);
                                else alert('Lỗi: ' + res.error);
                            }
                        },
                        error: function (err) {
                            if (typeof toastr !== 'undefined') toastr.error(_addShift_i18n.msgErrorConnect);
                            else alert(_addShift_i18n.msgErrorConnect);
                        }
                    });
                }
            };
        });
    </script>
</template>
