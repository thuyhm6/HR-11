<div th:fragment="content">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-body">

                    <!-- Điều kiện tìm kiếm -->
                    <form id="otsl_searchForm" class="d-flex align-items-end gap-3 mb-3 flex-wrap">
                        <div>
                            <label for="otsl_startDate" class="form-label mb-1">Ngày bắt đầu</label>
                            <input type="text" class="form-control js-daterangepicker" id="otsl_startDate"
                                data-drp-format="DD/MM/YYYY" data-drp-auto-update-input="false"
                                autocomplete="off" placeholder="DD/MM/YYYY" style="width:145px;">
                        </div>
                        <div>
                            <label for="otsl_endDate" class="form-label mb-1">Ngày kết thúc</label>
                            <input type="text" class="form-control js-daterangepicker" id="otsl_endDate"
                                data-drp-format="DD/MM/YYYY" data-drp-auto-update-input="false"
                                autocomplete="off" placeholder="DD/MM/YYYY" style="width:145px;">
                        </div>
                        <div class="d-flex gap-2 pb-1">
                            <button type="button" class="btn btn-primary" onclick="otslSearch()">
                                <i class="bx bx-search"></i> Tra cứu
                            </button>
                            <button type="button" class="btn btn-success" onclick="otslExportExcel()">
                                <i class="bx bx-export"></i> Xuất Excel
                            </button>
                        </div>
                    </form>

                    <!-- Thanh điều khiển trang -->
                    <div class="d-flex align-items-center gap-2 mb-2">
                        <span class="small">Show</span>
                        <select class="form-select form-select-sm" id="otsl_pageSizeSelect"
                            style="width:70px;" onchange="otslChangePageSize(this.value)">
                            <option value="25">25</option>
                            <option value="50">50</option>
                            <option value="100">100</option>
                        </select>
                        <span class="small">entries</span>
                    </div>

                    <!-- Bảng pivot -->
                    <div style="overflow-x:auto;">
                        <table id="otsl_dataTable"
                            class="table table-striped table-bordered table-hover table-sm align-middle mb-0"
                            style="white-space:nowrap; width:max-content; min-width:100%;">
                            <thead id="otsl_thead" class="table-primary text-center align-middle"></thead>
                            <tbody id="otsl_tbody"></tbody>
                        </table>
                    </div>

                    <!-- Footer: info + pagination -->
                    <div class="d-flex align-items-center justify-content-between mt-2 flex-wrap gap-2">
                        <div id="otsl_info" class="small text-muted"></div>
                        <ul id="otsl_pagination" class="pagination pagination-sm mb-0"></ul>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal chi tiết -->
<div class="modal fade" id="otsl_detailModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header py-2">
                <h5 class="modal-title" id="otsl_detailModalLabel">Chi tiết tăng ca</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-2">
                <div class="table-responsive">
                    <table class="table table-bordered table-sm align-middle mb-0">
                        <thead class="table-light text-center">
                            <tr>
                                <th style="width:50px;">N</th>
                                <th style="width:110px;">Mã nhân viên</th>
                                <th style="min-width:140px;">Họ tên</th>
                                <th style="min-width:120px;">Ca</th>
                                <th style="width:130px;">Thời gian làm việc</th>
                                <th style="width:110px;">Ngày</th>
                                <th style="min-width:150px;">Tăng ca</th>
                                <th style="width:130px;">Thời gian bắt đầu</th>
                                <th style="width:130px;">Thời gian kết thúc</th>
                                <th style="width:90px;">Thời lượng</th>
                            </tr>
                        </thead>
                        <tbody id="otsl_detailBody">
                            <tr>
                                <td colspan="10" class="text-center text-muted">
                                    Chọn vào từng con số để xem chi tiết.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="modal-footer py-2">
                <button type="button" class="btn btn-secondary btn-sm"
                    data-bs-dismiss="modal">Đóng</button>
            </div>
        </div>
    </div>
</div>

<template id="fragmentScripts">
    <script th:inline="javascript">
        var _otsl_items       = [];
        var _otsl_data        = [];
        var _otsl_currentPage = 1;
        var _otsl_pageSize    = 25;
        var _otsl_detailModal = null;
        var _otsl_pageBooted  = false;

        /* ── helpers ── */
        function otslEsc(v) {
            if (v === null || v === undefined) return '';
            return String(v)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;')
                .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        function otslFmtQty(v) {
            var n = parseFloat(v);
            if (isNaN(n) || n === 0) return '0';
            return n % 1 === 0 ? String(n) : n.toFixed(2).replace(/\.?0+$/, '');
        }

        /* AR_DATE_STR 'YYYY/MM/DD' → 'DD/MM/YYYY' */
        function otslFmtDate(s) {
            if (!s) return '';
            var p = s.split('/');
            return p.length === 3 ? p[2] + '/' + p[1] + '/' + p[0] : s;
        }

        /* ── pivot ── */
        function otslPivot(rawData) {
            var map = {}, order = [];
            (rawData || []).forEach(function (row) {
                if (!map[row.personId]) {
                    map[row.personId] = {
                        personId : row.personId,
                        empId    : row.empId,
                        localName: row.localName,
                        deptName : row.deptName,
                        total    : 0,
                        items    : {}
                    };
                    order.push(row.personId);
                }
                var qty = parseFloat(row.totalQuantity) || 0;
                map[row.personId].items[row.itemNo]  = qty;
                map[row.personId].total             += qty;
            });
            return order.map(function (pid) { return map[pid]; });
        }

        /* ── render header ── */
        function otslRenderHeader() {
            var nw = 'style="white-space:nowrap;"';
            var html = '<tr>'
                + '<th ' + nw + '>STT</th>'
                + '<th ' + nw + '>Mã NV</th>'
                + '<th ' + nw + '>Họ tên</th>'
                + '<th ' + nw + '>Phòng ban</th>'
                + '<th ' + nw + '>Tổng</th>';
            _otsl_items.forEach(function (itm) {
                html += '<th ' + nw + '>' + otslEsc(itm.itemName) + '</th>';
            });
            html += '</tr>';
            $('#otsl_thead').html(html);
        }

        /* ── render rows trang hiện tại ── */
        function otslRenderRows() {
            var cols  = 5 + _otsl_items.length;
            var total = _otsl_data.length;
            if (!total) {
                $('#otsl_tbody').html(
                    '<tr><td colspan="' + cols + '" class="text-center text-muted">Không có dữ liệu</td></tr>'
                );
                otslRenderFooter(0, 0, 0);
                return;
            }

            var start    = (_otsl_currentPage - 1) * _otsl_pageSize;
            var end      = Math.min(start + _otsl_pageSize, total);
            var pageData = _otsl_data.slice(start, end);

            var html = '';
            pageData.forEach(function (row, idx) {
                html += '<tr>'
                    + '<td class="text-center">' + (start + idx + 1) + '</td>'
                    + '<td class="text-center">' + otslEsc(row.empId)    + '</td>'
                    + '<td>'                     + otslEsc(row.localName) + '</td>'
                    + '<td>'                     + otslEsc(row.deptName)  + '</td>'
                    + '<td class="text-center fw-bold">' + otslFmtQty(row.total) + '</td>';

                _otsl_items.forEach(function (itm) {
                    var qty = row.items[itm.itemNo] || 0;
                    if (qty > 0) {
                        html += '<td class="text-center">'
                            + '<a href="javascript:void(0)" class="otsl-detail-link fw-bold"'
                            + ' data-person-id="' + otslEsc(row.personId)  + '"'
                            + ' data-item-no="'   + otslEsc(itm.itemNo)    + '"'
                            + ' data-item-name="' + otslEsc(itm.itemName)  + '">'
                            + otslFmtQty(qty) + '</a></td>';
                    } else {
                        html += '<td class="text-center text-muted">0</td>';
                    }
                });
                html += '</tr>';
            });
            $('#otsl_tbody').html(html);
            otslRenderFooter(start + 1, end, total);
        }

        /* ── footer ── */
        function otslRenderFooter(from, to, total) {
            $('#otsl_info').text(
                total === 0
                    ? 'Showing 0 to 0 of 0 entries'
                    : 'Showing ' + from + ' to ' + to + ' of ' + total + ' entries'
            );
            var totalPages = Math.ceil(total / _otsl_pageSize);
            var pg = '';
            pg += '<li class="page-item' + (_otsl_currentPage <= 1 ? ' disabled' : '') + '">'
                + '<a class="page-link" href="javascript:void(0)" onclick="otslGoPage(' + (_otsl_currentPage - 1) + ')">Previous</a></li>';
            var s = Math.max(1, _otsl_currentPage - 2);
            var e = Math.min(totalPages, _otsl_currentPage + 2);
            for (var i = s; i <= e; i++) {
                pg += '<li class="page-item' + (i === _otsl_currentPage ? ' active' : '') + '">'
                    + '<a class="page-link" href="javascript:void(0)" onclick="otslGoPage(' + i + ')">' + i + '</a></li>';
            }
            pg += '<li class="page-item' + (_otsl_currentPage >= totalPages ? ' disabled' : '') + '">'
                + '<a class="page-link" href="javascript:void(0)" onclick="otslGoPage(' + (_otsl_currentPage + 1) + ')">Next</a></li>';
            $('#otsl_pagination').html(pg);
        }

        /* ── render toàn bộ bảng ── */
        function otslRenderTable(pivotData) {
            _otsl_data        = pivotData;
            _otsl_currentPage = 1;
            otslRenderHeader();
            otslRenderRows();
            $('#otsl_tbody').off('click', '.otsl-detail-link')
                .on('click', '.otsl-detail-link', function (e) {
                    e.preventDefault();
                    otslOpenDetail(
                        $(this).data('person-id'),
                        $(this).data('item-no'),
                        $(this).data('item-name')
                    );
                });
        }

        window.otslGoPage = function (n) {
            var totalPages = Math.ceil(_otsl_data.length / _otsl_pageSize);
            if (n < 1 || n > totalPages) return;
            _otsl_currentPage = n;
            otslRenderRows();
        };

        window.otslChangePageSize = function (val) {
            _otsl_pageSize    = parseInt(val, 10) || 25;
            _otsl_currentPage = 1;
            otslRenderRows();
        };

        /* ── tra cứu ── */
        window.otslSearch = function () {
            $.ajax({
                url : '/ess/viewDept/api/otApplyPersonalSelf/summary',
                type: 'GET',
                data: {
                    startDate: $('#otsl_startDate').val(),
                    endDate  : $('#otsl_endDate').val()
                },
                success: function (data) {
                    otslRenderTable(otslPivot(data));
                },
                error: function () {
                    if (typeof toastr !== 'undefined') {
                        toastr.error('Không tải được dữ liệu tình hình tăng ca.');
                    }
                }
            });
        };

        /* ── xuất Excel ── */
        window.otslExportExcel = function () {
            if (!_otsl_data.length) {
                if (typeof toastr !== 'undefined') toastr.warning('Không có dữ liệu để xuất.');
                return;
            }
            var html = '<html xmlns:o="urn:schemas-microsoft-com:office:office"'
                + ' xmlns:x="urn:schemas-microsoft-com:office:excel">'
                + '<head><meta charset="UTF-8"></head><body><table border="1">';
            html += '<tr><th>STT</th><th>Mã NV</th><th>Họ tên</th><th>Phòng ban</th><th>Tổng</th>';
            _otsl_items.forEach(function (itm) { html += '<th>' + itm.itemName + '</th>'; });
            html += '</tr>';
            _otsl_data.forEach(function (row, idx) {
                html += '<tr>'
                    + '<td>' + (idx + 1)            + '</td>'
                    + '<td>' + (row.empId      || '') + '</td>'
                    + '<td>' + (row.localName  || '') + '</td>'
                    + '<td>' + (row.deptName   || '') + '</td>'
                    + '<td>' + otslFmtQty(row.total)  + '</td>';
                _otsl_items.forEach(function (itm) {
                    html += '<td>' + otslFmtQty(row.items[itm.itemNo] || 0) + '</td>';
                });
                html += '</tr>';
            });
            html += '</table></body></html>';
            var blob = new Blob(['﻿' + html], { type: 'application/vnd.ms-excel' });
            var url  = URL.createObjectURL(blob);
            var a    = document.createElement('a');
            a.href = url; a.download = 'tinh_hinh_tang_ca.xls';
            document.body.appendChild(a); a.click();
            document.body.removeChild(a); URL.revokeObjectURL(url);
        };

        /* ── modal chi tiết ── */
        function otslOpenDetail(personId, itemNo, itemName) {
            $('#otsl_detailModalLabel').text(itemName || 'Chi tiết tăng ca');
            $('#otsl_detailBody').html(
                '<tr><td colspan="10" class="text-center text-muted">Đang tải...</td></tr>'
            );
            if (_otsl_detailModal) { _otsl_detailModal.show(); }

            $.ajax({
                url : '/ess/viewDept/api/otApplyPersonalSelf/detail',
                type: 'GET',
                data: {
                    personId : personId,
                    itemNo   : itemNo,
                    startDate: $('#otsl_startDate').val(),
                    endDate  : $('#otsl_endDate').val()
                },
                success: function (data) {
                    if (!data || !data.length) {
                        $('#otsl_detailBody').html(
                            '<tr><td colspan="10" class="text-center text-muted">Không có dữ liệu.</td></tr>'
                        );
                        return;
                    }
                    var html = '';
                    data.forEach(function (row, idx) {
                        html += '<tr>'
                            + '<td class="text-center">' + (idx + 1) + '</td>'
                            + '<td class="text-center">' + otslEsc(row.empId)       + '</td>'
                            + '<td>'                     + otslEsc(row.localName)   + '</td>'
                            + '<td class="text-center">' + otslEsc(row.shiftName || row.shiftNo || '') + '</td>'
                            + '<td class="text-center">' + otslEsc(row.workTime  || '') + '</td>'
                            + '<td class="text-center">' + otslFmtDate(row.arDateStr) + '</td>'
                            + '<td>'                     + otslEsc(row.itemName)    + '</td>'
                            + '<td class="text-center">' + otslEsc(row.fromTimeStr || '') + '</td>'
                            + '<td class="text-center">' + otslEsc(row.toTimeStr   || '') + '</td>'
                            + '<td class="text-center">' + otslFmtQty(row.quantity) + '</td>'
                            + '</tr>';
                    });
                    $('#otsl_detailBody').html(html);
                },
                error: function () {
                    $('#otsl_detailBody').html(
                        '<tr><td colspan="10" class="text-center text-danger">Tải dữ liệu thất bại.</td></tr>'
                    );
                }
            });
        }

        /* ── set mặc định tháng hiện tại ── */
        function otslDefaultCurrentMonth() {
            var now = new Date();
            var y   = now.getFullYear();
            var m   = now.getMonth() + 1;
            var pad = function (n) { return n < 10 ? '0' + n : '' + n; };
            $('#otsl_startDate').val('01/' + pad(m) + '/' + y);
            $('#otsl_endDate').val(pad(new Date(y, m, 0).getDate()) + '/' + pad(m) + '/' + y);
        }

        /* ── load item list rồi search ── */
        function otslLoadItems(callback) {
            $.ajax({
                url    : '/ess/viewDept/api/otApplyPersonalSelf/items',
                type   : 'GET',
                success: function (data) {
                    _otsl_items = data || [];
                    if (typeof callback === 'function') callback();
                },
                error  : function () {
                    _otsl_items = [];
                    if (typeof callback === 'function') callback();
                }
            });
        }

        /* ── boot ── */
        function otslBootPage() {
            if (_otsl_pageBooted) return;
            if (!document.getElementById('otsl_dataTable')) {
                setTimeout(otslBootPage, 30);
                return;
            }
            _otsl_pageBooted = true;
            if (window.bootstrap && document.getElementById('otsl_detailModal')) {
                _otsl_detailModal = new bootstrap.Modal(document.getElementById('otsl_detailModal'));
            }
            if (typeof initDateRangePickers === 'function') {
                initDateRangePickers('#otsl_searchForm');
            }
            otslDefaultCurrentMonth();
            otslLoadItems(function () { otslSearch(); });
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', otslBootPage);
        }
        if (typeof $ !== 'undefined') {
            $(document).ready(otslBootPage);
        } else {
            otslBootPage();
        }
    </script>
</template>
