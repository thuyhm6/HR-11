# Production Logging Configuration
# This file contains logging settings optimized for production environment

# ===========================================
# LOGGING CONFIGURATION - PRODUCTION
# ===========================================

# Application Logging (reduced for production)
logging.level.com.ait=INFO
logging.level.com.ait.ar=WARN
logging.level.com.ait.hrm=WARN
logging.level.com.ait.org=WARN
logging.level.com.ait.sy=WARN
logging.level.com.ait.service=INFO
logging.level.com.ait.aspect=INFO

# Framework Logging (minimal noise)
logging.level.com.zaxxer.hikari=ERROR
logging.level.oracle.jdbc=ERROR
logging.level.org.springframework=WARN
logging.level.org.apache.ibatis=WARN

# MyBatis Configuration (reduced logging)
mybatis.configuration.log-impl=org.apache.ibatis.logging.nologging.NoLoggingImpl

# Log Files (production optimized)
logging.file.name=logs/hr-application-prod.log
logging.file.max-size=50MB
logging.file.max-history=7

# Console Logging (minimal for production)
logging.level.root=WARN
