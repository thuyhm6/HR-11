<div th:fragment="content">
    <div class="row">
        <div class="col-12">

            <!-- ===== Thông tin nhân viên (dùng fragment chung) ===== -->
            <div th:replace="~{fragments/essEmpInfoCard :: card}"></div>

            <!-- ===== Điều kiện tìm kiếm + Bảng dữ liệu ===== -->
            <div class="card">
                <div class="card-body">

                    <form id="wg_searchForm" class="row g-3 mb-4">
                        <div class="col-md-3">
                            <label for="wg_searchShiftNo" class="form-label" th:text="#{wg.label.shiftNo}">Ca làm</label>
                            <select class="form-select" id="wg_searchShiftNo" data-parent-code="400223"
                                th:attr="data-default-text=#{common.selectAll}" data-default-text="-- Tất cả --"></select>
                        </div>
                        <div class="col-md-2">
                            <label for="wg_fromDate" class="form-label" th:text="#{wg.label.fromDate}">Thời gian từ</label>
                            <input type="text" class="form-control js-daterangepicker" id="wg_fromDate"
                                data-drp-format="YYYY-MM-DD" data-drp-auto-update-input="false" autocomplete="off"
                                placeholder="YYYY-MM-DD">
                        </div>
                        <div class="col-md-2">
                            <label for="wg_toDate" class="form-label" th:text="#{wg.label.toDate}">Thời gian đến</label>
                            <input type="text" class="form-control js-daterangepicker" id="wg_toDate"
                                data-drp-format="YYYY-MM-DD" data-drp-auto-update-input="false" autocomplete="off"
                                placeholder="YYYY-MM-DD">
                        </div>
                        <div class="col-md-4 d-flex align-items-end gap-2 flex-wrap">
                            <button type="button" class="btn btn-primary" onclick="wgSearchData()">
                                <i class="bx bx-search"></i> <span th:text="#{wg.btn.search}">Tra cứu</span>
                            </button>
                            <button type="button" class="btn btn-secondary" onclick="wgClearSearch()">
                                <i class="bx bx-x"></i> <span th:text="#{wg.btn.clearFilter}">Xóa lọc</span>
                            </button>
                        </div>
                    </form>

                    <div class="dt-table-wrapper" style="overflow: auto;">
                        <table id="wg_dataTable" class="table table-striped table-bordered table-hover">
                            <thead class="table-light text-center align-middle">
                                <tr>
                                    <th style="width:60px;" th:text="#{wg.col.seq}">STT</th>
                                    <th style="width:140px;" th:text="#{wg.col.startDate}">Ngày bắt đầu</th>
                                    <th th:text="#{wg.col.shift}">Ca</th>
                                    <th th:text="#{wg.col.reason}">Nguyên nhân</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>

<template id="fragmentScripts">
    <th:block th:replace="~{fragments/essEmpInfoCard :: script}"></th:block>
    <script th:inline="javascript">
        var _wg_table = null;
        var _wg_pageBooted = false;
        var _wg_shiftMap = {};

        function wgEscHtml(value) {
            if (value === null || value === undefined) return '';
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function wgBuildShiftMap() {
            _wg_shiftMap = {};
            $('#wg_searchShiftNo option').each(function () {
                var val = $(this).val();
                if (val) _wg_shiftMap[val] = $(this).text();
            });
        }

        function wgInitTable() {
            wgBuildShiftMap();

            _wg_table = $('#wg_dataTable').DataTable({
                destroy: true,
                paging: true,
                scrollY: 'calc(100vh - 380px)',
                scrollCollapse: true,
                searching: false,
                lengthChange: true,
                pageLength: 15,
                processing: true,
                autoWidth: false,
                ajax: {
                    url: '/ess/workgroup/api/workGroup/myList',
                    dataSrc: '',
                    data: function (d) {
                        d.shiftNo  = $('#wg_searchShiftNo').val();
                        d.fromDate = $('#wg_fromDate').val();
                        d.toDate   = $('#wg_toDate').val();
                    }
                },
                columns: [
                    {
                        data: null,
                        className: 'text-center',
                        render: function (data, type, row, meta) {
                            return meta.settings._iDisplayStart + meta.row + 1;
                        }
                    },
                    {
                        data: 'startDate',
                        className: 'text-center'
                    },
                    {
                        data: 'shiftNo',
                        render: function (data) {
                            return wgEscHtml(_wg_shiftMap[data] || data || '');
                        }
                    },
                    {
                        data: 'remark',
                        render: function (data) {
                            return wgEscHtml(data || '');
                        }
                    }
                ]
            });
        }

        function wgBootPage() {
            if (_wg_pageBooted) return;
            if (!document.getElementById('wg_dataTable')) {
                setTimeout(wgBootPage, 30);
                return;
            }
            _wg_pageBooted = true;

            loadEssEmpInfoCard();

            $.when(typeof initCodeSelects === 'function' ? initCodeSelects('#wg_searchForm') : null)
                .always(function () {
                    wgInitTable();
                    if (_wg_table) {
                        _wg_table.ajax.reload();
                    }
                });
        }

        window.wgSearchData = function () {
            if (_wg_table) {
                _wg_table.ajax.reload();
            }
        };

        window.wgClearSearch = function () {
            $('#wg_fromDate').val('');
            $('#wg_toDate').val('');
            if (typeof resetCodeSelectDefaults === 'function') {
                resetCodeSelectDefaults('#wg_searchForm');
            } else {
                $('#wg_searchShiftNo').val('');
            }
            if (_wg_table) {
                _wg_table.ajax.reload();
            }
        };

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', wgBootPage);
        }
        if (typeof $ !== 'undefined') {
            $(document).ready(wgBootPage);
        } else {
            wgBootPage();
        }
    </script>
</template>
