<div th:fragment="content">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-body">
                    <form id="ve_searchForm" class="row g-3 mb-4">
                        <div class="col-md-4">
                            <label for="ve_keyword" class="form-label">Mã nhân viên / Họ tên</label>
                            <input type="text" class="form-control" id="ve_keyword" placeholder="Nhập mã hoặc họ tên">
                        </div>
                        <div class="col-md-4">
                            <label for="ve_deptNo" class="form-label">Phòng ban</label>
                            <input type="text" class="form-control" id="ve_deptNo" placeholder="Chọn phòng ban"
                                readonly>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Năm phép</label>
                            <input type="text" class="form-control" id="ve_vacIdDisplay" readonly>
                            <input type="hidden" id="ve_vacId">
                        </div>
                        <div class="col-md-2 d-flex align-items-end">
                            <span class="badge bg-info-subtle text-info border border-info-subtle w-100 py-2">
                                Dữ liệu mặc định theo năm hiện tại
                            </span>
                        </div>
                        <div class="col-md-12 d-flex align-items-end gap-2 flex-wrap">
                            <button type="button" class="btn btn-primary" onclick="veSearchData()">
                                <i class="bx bx-search"></i> Tra cứu
                            </button>
                            <button type="button" class="btn btn-secondary" onclick="veClearSearch()">
                                <i class="bx bx-x"></i> Xóa lọc
                            </button>
                            <button type="button" class="btn btn-success" onclick="veExportExcel()">
                                <i class="bx bx-export"></i> Xuất excel
                            </button>
                        </div>
                    </form>

                    <div class="table-responsive">
                        <table id="ve_dataTable" class="table table-striped table-bordered table-hover"
                            style="width: 100%;">
                            <thead class="table-light text-center align-middle">
                                <tr>
                                    <th>No.</th>
                                    <th>Mã nhân viên</th>
                                    <th>Họ tên</th>
                                    <th>Phòng ban</th>
                                    <th>Chức vụ</th>
                                    <th>Tổng phép</th>
                                    <th>Phép năm trước</th>
                                    <th>Đã dùng</th>
                                    <th>Chờ duyệt</th>
                                    <th>Tháng 1</th>
                                    <th>Tháng 2</th>
                                    <th>Tháng 3</th>
                                    <th>Tháng 4</th>
                                    <th>Tháng 5</th>
                                    <th>Tháng 6</th>
                                    <th>Tháng 7</th>
                                    <th>Tháng 8</th>
                                    <th>Tháng 9</th>
                                    <th>Tháng 10</th>
                                    <th>Tháng 11</th>
                                    <th>Tháng 12</th>
                                    <th>Quy đổi</th>
                                    <th>Tháng công tác</th>
                                    <th>Khóa</th>
                                    <th>Ghi chú</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<template id="fragmentScripts">
    <script th:inline="javascript">
        var _ve_table = null;
        var _ve_pageBooted = false;
        var _ve_selectedDeptCodes = [];

        function veInitDefaultYear() {
            var currentYear = new Date().getFullYear().toString();
            $('#ve_vacId').val(currentYear);
            $('#ve_vacIdDisplay').val(currentYear);
        }

        function veInitDeptSelector() {
            if (typeof DeptTree === 'undefined') {
                return;
            }
            DeptTree.init('#ve_deptNo', function (selectedCodes) {
                _ve_selectedDeptCodes = selectedCodes || [];
            });
        }

        function veInitTable() {
            _ve_table = $('#ve_dataTable').DataTable({
                destroy: true,
                scrollX: true,
                scrollY: "calc(100vh - 330px)",
                scrollCollapse: true,
                paging: true,
                searching: false,
                lengthChange: true,
                pageLength: 25,
                processing: true,
                autoWidth: false,
                dom: 'Blfrtip',
                buttons: [
                    {
                        extend: 'excel',
                        title: 'vac_emp_export_' + ($('#ve_vacId').val() || '')
                    }
                ],
                ajax: {
                    url: '/ar/attendanceSettings/api/vacEmp/list',
                    dataSrc: '',
                    data: function (d) {
                        d.keyword = $('#ve_keyword').val();
                        d.deptNos = (_ve_selectedDeptCodes || []).join(',');
                        d.vacId = $('#ve_vacId').val();
                    }
                },
                initComplete: function () {
                    $('#ve_dataTable_wrapper').find('.dt-buttons').hide();
                },
                columns: [
                    {
                        data: null,
                        width: '25px',
                        className: 'text-center',
                        render: function (data, type, row, meta) {
                            return meta.settings._iDisplayStart + meta.row + 1;
                        }
                    },
                    { data: 'empId', width: '45px', className: 'text-center' },
                    { data: 'localName', width: '55px' },
                    { data: 'deptName', width: '55px' },
                    { data: 'postGradeName' },
                    { data: 'totVacCnt', className: 'text-end' },
                    { data: 'lastYearVac', className: 'text-end' },
                    { data: 'addVac', className: 'text-end' },
                    { data: 'useVacCnt', className: 'text-end' },
                    { data: 'useVac', className: 'text-end' },
                    { data: 'affirmUseVac', className: 'text-end' },
                    { data: 'useVac1', className: 'text-end' },
                    { data: 'useVac2', className: 'text-end' },
                    { data: 'useVac3', className: 'text-end' },
                    { data: 'useVac4', className: 'text-end' },
                    { data: 'useVac5', className: 'text-end' },
                    { data: 'useVac6', className: 'text-end' },
                    { data: 'useVac7', className: 'text-end' },
                    { data: 'useVac8', className: 'text-end' },
                    { data: 'useVac9', className: 'text-end' },
                    { data: 'useVac10', className: 'text-end' },
                    { data: 'useVac11', className: 'text-end' },
                    { data: 'useVac12', className: 'text-end' },
                    { data: 'mentVac', className: 'text-end' },
                    { data: 'workMonth', className: 'text-end' },
                    { data: 'isLocked', className: 'text-center' },
                    { data: 'remark', render: function (data) { return data || ''; } }
                ]
            });
        }

        function veBootPage() {
            if (_ve_pageBooted) {
                return;
            }
            if (!document.getElementById('ve_dataTable')) {
                setTimeout(veBootPage, 30);
                return;
            }
            _ve_pageBooted = true;
            veInitDefaultYear();
            veInitDeptSelector();
            veInitTable();
            if (_ve_table) {
                _ve_table.ajax.reload();
            }
        }

        window.veSearchData = function () {
            if (_ve_table) {
                _ve_table.ajax.reload();
            }
        };

        window.veClearSearch = function () {
            $('#ve_keyword').val('');
            $('#ve_deptNo').val('');
            _ve_selectedDeptCodes = [];
            $('.auth-dept-chk-global').prop('checked', false).trigger('change');
            veInitDefaultYear();
            if (_ve_table) {
                _ve_table.ajax.reload();
            }
        };

        window.veExportExcel = function () {
            if (_ve_table) {
                _ve_table.button('.buttons-excel').trigger();
            }
        };

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', veBootPage);
        }
        if (typeof $ !== 'undefined') {
            $(document).ready(veBootPage);
        } else {
            veBootPage();
        }
    </script>
</template>
