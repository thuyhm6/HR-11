<div th:fragment="content">
    <div class="row">
        <div class="col-12" id="atpi_pageWrapper">

            <!-- Thông tin nhân viên -->
            <div th:replace="~{fragments/essEmpInfoCard :: card}"></div>

            <!-- Điều kiện tìm kiếm -->
            <div class="card mb-3">
                <div class="card-body p-0">
                    <table class="table table-bordered table-sm align-middle mb-0" style="table-layout:fixed;">
                        <colgroup>
                            <col style="width:15%;">
                            <col style="width:35%;">
                            <col style="width:15%;">
                            <col style="width:35%;">
                        </colgroup>
                        <tbody>
                            <tr>
                                <th class="table-light text-center" th:text="#{atpi.label.category}">Phân loại</th>
                                <td>
                                    <select class="form-select form-select-sm" id="atpi_itemNo">
                                        <option value="" th:text="#{atpi.select.allOption}">-- Tất cả --</option>
                                    </select>
                                </td>
                                <th class="table-light text-center" th:text="#{atpi.label.time}">Thời gian</th>
                                <td>
                                    <div class="d-flex align-items-center gap-2">
                                        <input type="text" class="form-control form-control-sm js-daterangepicker"
                                            id="atpi_startDate"
                                            data-drp-format="DD/MM/YYYY"
                                            data-drp-auto-update-input="false"
                                            autocomplete="off" style="width:130px;">
                                        <span>~</span>
                                        <input type="text" class="form-control form-control-sm js-daterangepicker"
                                            id="atpi_endDate"
                                            data-drp-format="DD/MM/YYYY"
                                            data-drp-auto-update-input="false"
                                            autocomplete="off" style="width:130px;">
                                        <button class="btn btn-primary btn-sm" onclick="atpiSearch()">
                                            <i class="bi bi-search"></i>
                                            <span th:text="#{atpi.btn.search}">Tra cứu</span>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Toolbar -->
            <div class="d-flex align-items-center gap-2 mb-2">
                <span class="small" th:text="#{atpi.placeholder.quickFilter}">Lọc nhanh...</span>
                <input type="text" class="form-control form-control-sm" id="atpi_filterInput"
                    th:placeholder="#{atpi.placeholder.quickFilter}" placeholder="Lọc nhanh..."
                    style="max-width:200px;" oninput="atpiQuickFilter(this.value)">
                <div class="ms-auto d-flex align-items-center gap-2">
                    <span class="small" th:text="#{atpi.label.perPage}">Mỗi trang</span>
                    <select class="form-select form-select-sm" id="atpi_pageSize" style="width:70px;"
                        onchange="atpiChangePageSize(this.value)">
                        <option value="25">25</option>
                        <option value="50" selected>50</option>
                        <option value="100">100</option>
                    </select>
                    <span class="small" th:text="#{atpi.label.data}">Dữ liệu</span>
                </div>
            </div>

            <!-- Bảng danh sách -->
            <div class="card">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-bordered table-sm align-middle mb-0" id="atpi_table">
                            <thead class="table-light">
                                <tr>
                                    <th class="text-center" style="width:36px;">NO</th>
                                    <th class="text-center" style="min-width:140px;" th:text="#{atpi.col.fullName}">Họ tên</th>
                                    <th class="text-center" style="min-width:110px;" th:text="#{atpi.col.empId}">Mã nhân viên</th>
                                    <th class="text-center" style="min-width:120px;" th:text="#{atpi.col.deptName}">Phòng ban</th>
                                    <th class="text-center" style="min-width:130px;" th:text="#{atpi.col.category}">Phân loại</th>
                                    <th class="text-center" style="min-width:90px;"  th:text="#{atpi.col.duration}">Thời lượng</th>
                                    <th class="text-center" style="min-width:110px;" th:text="#{atpi.col.time}">Thời gian</th>
                                    <th class="text-center" style="min-width:120px;" th:text="#{atpi.col.startTime}">Thời gian bắt đầu</th>
                                    <th class="text-center" style="min-width:120px;" th:text="#{atpi.col.endTime}">Thời gian kết thúc</th>
                                </tr>
                            </thead>
                            <tbody id="atpi_tableBody">
                                <tr>
                                    <td colspan="9" class="text-center text-muted py-3" th:text="#{atpi.js.loadingData}">Đang tải dữ liệu...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <!-- Phân trang -->
                    <div class="d-flex justify-content-between align-items-center px-3 py-2">
                        <span id="atpi_pageInfo" class="small text-muted"></span>
                        <div id="atpi_pagination" class="d-flex gap-1"></div>
                    </div>
                </div>
            </div>

        </div><!-- /#atpi_pageWrapper -->
    </div><!-- /.row -->
</div>

<template id="fragmentScripts">
    <th:block th:replace="~{fragments/essEmpInfoCard :: script}"></th:block>
    <script th:inline="javascript">
        var _atpi_data        = [];
        var _atpi_filtered    = [];
        var _atpi_pageBooted  = false;
        var _atpi_pageSize    = 50;
        var _atpi_currentPage = 1;

        /* i18n */
        var _atpi_i18n = {
            loading     : /*[[#{atpi.js.loading}]]*/ 'Đang tải...',
            loadingData : /*[[#{atpi.js.loadingData}]]*/ 'Đang tải dữ liệu...',
            noData      : /*[[#{atpi.js.noData}]]*/ 'Không có dữ liệu',
            loadError   : /*[[#{atpi.js.loadError}]]*/ 'Lỗi tải dữ liệu',
            pageInfo    : /*[[#{atpi.js.pageInfo}]]*/ 'Hiển thị {0} - {1} / {2} dòng'
        };

        function atpiEscHtml(s) {
            if (s == null) return '';
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function atpiGetDefaultDateRange() {
            var now  = new Date();
            var year = now.getFullYear();
            var mon  = now.getMonth() + 1;
            var mm   = String(mon).padStart(2, '0');
            var last = new Date(year, mon, 0).getDate();
            return {
                from: '01/' + mm + '/' + year,
                to  : String(last).padStart(2, '0') + '/' + mm + '/' + year
            };
        }

        // ── Load dropdown Phân loại ──────────────────────────────────────────
        function atpiLoadItemList() {
            $.ajax({
                url    : '/ess/infoApplyAttendance/api/attendancePersonal/items',
                type   : 'GET',
                success: function(items) {
                    var $sel = $('#atpi_itemNo');
                    $sel.find('option:not(:first)').remove();
                    if (items && items.length) {
                        items.forEach(function(it) {
                            $sel.append('<option value="' + atpiEscHtml(it.itemNo) + '">'
                                + atpiEscHtml(it.itemName || it.itemNo) + '</option>');
                        });
                    }
                }
            });
        }

        // ── Search ───────────────────────────────────────────────────────────
        window.atpiSearch = function() {
            $('#atpi_tableBody').html('<tr><td colspan="9" class="text-center text-muted py-3">' + atpiEscHtml(_atpi_i18n.loading) + '</td></tr>');
            $.ajax({
                url : '/ess/infoApplyAttendance/api/attendancePersonal/list',
                type: 'GET',
                data: {
                    startDate   : $('#atpi_startDate').val() || '',
                    endDate     : $('#atpi_endDate').val()   || '',
                    itemNoSearch: $('#atpi_itemNo').val()    || ''
                },
                success: function(rows) {
                    _atpi_data        = rows || [];
                    _atpi_filtered    = _atpi_data.slice();
                    _atpi_currentPage = 1;
                    atpiRenderPage();
                },
                error: function() {
                    $('#atpi_tableBody').html('<tr><td colspan="9" class="text-center text-danger py-3">' + atpiEscHtml(_atpi_i18n.loadError) + '</td></tr>');
                }
            });
        };

        // ── Render bảng ──────────────────────────────────────────────────────
        function atpiRenderPage() {
            var rows    = _atpi_filtered;
            var total   = rows.length;
            var totalPg = Math.max(1, Math.ceil(total / _atpi_pageSize));
            if (_atpi_currentPage > totalPg) _atpi_currentPage = totalPg;
            var start = (_atpi_currentPage - 1) * _atpi_pageSize;
            var end   = Math.min(start + _atpi_pageSize, total);
            var page  = rows.slice(start, end);

            var $tbody = $('#atpi_tableBody');
            if (!page.length) {
                $tbody.html('<tr><td colspan="9" class="text-center text-muted py-3">' + atpiEscHtml(_atpi_i18n.noData) + '</td></tr>');
            } else {
                var html = '';
                page.forEach(function(r, idx) {
                    html += '<tr>'
                        + '<td class="text-center">' + (start + idx + 1) + '</td>'
                        + '<td>' + atpiEscHtml(r.localName  || '') + '</td>'
                        + '<td class="text-center">' + atpiEscHtml(r.empId    || '') + '</td>'
                        + '<td>' + atpiEscHtml(r.deptName   || '') + '</td>'
                        + '<td>' + atpiEscHtml(r.itemName   || r.itemNo || '') + '</td>'
                        + '<td class="text-center">' + atpiEscHtml(r.workHour  || '') + '</td>'
                        + '<td class="text-center">' + atpiEscHtml(r.arDateStr || '') + '</td>'
                        + '<td class="text-center">' + atpiEscHtml(r.indoorTime  || '') + '</td>'
                        + '<td class="text-center">' + atpiEscHtml(r.outdoorTime || '') + '</td>'
                        + '</tr>';
                });
                $tbody.html(html);
            }

            var _from = total ? start + 1 : 0;
            $('#atpi_pageInfo').text(_atpi_i18n.pageInfo.replace('{0}', _from).replace('{1}', end).replace('{2}', total));
            atpiRenderPagination(totalPg);
        }

        function atpiRenderPagination(totalPg) {
            var cur  = _atpi_currentPage;
            var prev = cur > 1 ? cur - 1 : 1;
            var next = cur < totalPg ? cur + 1 : totalPg;
            var html = '<button class="btn btn-outline-secondary btn-sm px-2 py-0" '
                + (cur === 1 ? 'disabled' : '') + ' onclick="atpiGoPage(' + prev + ')">‹</button>';
            var s = Math.max(1, cur - 2), e = Math.min(totalPg, s + 4);
            s = Math.max(1, e - 4);
            for (var i = s; i <= e; i++) {
                html += '<button class="btn btn-sm px-2 py-0 '
                    + (i === cur ? 'btn-primary' : 'btn-outline-secondary')
                    + '" onclick="atpiGoPage(' + i + ')">' + i + '</button>';
            }
            html += '<button class="btn btn-outline-secondary btn-sm px-2 py-0" '
                + (cur === totalPg ? 'disabled' : '') + ' onclick="atpiGoPage(' + next + ')">›</button>';
            $('#atpi_pagination').html(html);
        }

        window.atpiGoPage = function(p) { _atpi_currentPage = p; atpiRenderPage(); };

        window.atpiChangePageSize = function(val) {
            _atpi_pageSize    = parseInt(val, 10) || 50;
            _atpi_currentPage = 1;
            atpiRenderPage();
        };

        window.atpiQuickFilter = function(kw) {
            if (!kw || !kw.trim()) {
                _atpi_filtered = _atpi_data.slice();
            } else {
                var k = kw.trim().toLowerCase();
                _atpi_filtered = _atpi_data.filter(function(r) {
                    return [r.localName, r.empId, r.deptName, r.itemName, r.arDateStr, r.indoorTime, r.outdoorTime]
                        .some(function(v) { return v && String(v).toLowerCase().indexOf(k) !== -1; });
                });
            }
            _atpi_currentPage = 1;
            atpiRenderPage();
        };

        // ── Boot ─────────────────────────────────────────────────────────────
        function atpiBootPage() {
            if (_atpi_pageBooted) return;
            if (!document.getElementById('atpi_startDate')) { setTimeout(atpiBootPage, 30); return; }
            _atpi_pageBooted = true;

            loadEssEmpInfoCard();

            if (typeof initDateRangePickers === 'function') initDateRangePickers('#atpi_pageWrapper');

            var dr = atpiGetDefaultDateRange();
            $('#atpi_startDate').val(dr.from);
            $('#atpi_endDate').val(dr.to);

            atpiLoadItemList();
            atpiSearch();
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', atpiBootPage);
        }
        if (typeof $ !== 'undefined') {
            $(document).ready(atpiBootPage);
        } else {
            atpiBootPage();
        }
    </script>
</template>
