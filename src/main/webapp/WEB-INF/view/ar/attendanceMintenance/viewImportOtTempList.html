<div th:fragment="content">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-body">
                    <form id="iot_searchForm" class="row g-3 mb-3">
                        <div class="col-md-2 d-flex align-items-end">
                            <div class="form-text fw-bold mb-2">Tổng số hàng: <span id="iot_totalRows">0</span></div>
                        </div>
                        <div class="col-md-2 d-flex align-items-end">
                            <div class="form-text fw-bold mb-2">Số hàng lỗi: <span id="iot_errorRows">0</span></div>
                        </div>
                        <div class="col-md-3">
                            <label for="iot_errorOnly" class="form-label">Gặp lỗi hay không</label>
                            <select id="iot_errorOnly" class="form-select">
                                <option value="">Tất cả</option>
                                <option value="Y">Chỉ hiển thị dòng lỗi</option>
                                <option value="N">Chỉ hiển thị dòng hợp lệ</option>
                            </select>
                        </div>
                        <div class="col-md-3 d-flex align-items-end gap-2">
                            <button type="button" class="btn btn-primary" onclick="iotSearch()">
                                <i class="bx bx-search"></i> Tra cứu
                            </button>
                            <button type="button" class="btn btn-success" id="iot_saveBtn" onclick="iotSave(this)">
                                <i class="bx bx-save"></i> Lưu
                            </button>
                        </div>
                    </form>

                    <div class="table-responsive">
                        <table id="iot_resultTable" class="table table-striped table-bordered table-hover"
                            style="min-width: 2200px;">
                            <thead class="table-light text-center align-middle">
                                <tr>
                                    <th>Line</th>
                                    <th>Họ tên</th>
                                    <th>Mã nhân viên</th>
                                    <th>Phòng ban</th>
                                    <th>Ngày tăng ca</th>
                                    <th>Từ ngày</th>
                                    <th>Từ giờ</th>
                                    <th>Đến ngày</th>
                                    <th>Đến giờ</th>
                                    <th>Loại tăng ca</th>
                                    <th>Số giờ</th>
                                    <th>Tổng tăng ca tháng</th>
                                    <th>Giới hạn tăng ca</th>
                                    <th>Trừ ăn nghỉ</th>
                                    <th>Qua ngày</th>
                                    <th>Lý do</th>
                                    <th>Trạng thái duyệt</th>
                                    <th>Kết quả kiểm chứng</th>
                                    <th>Người tải</th>
                                    <th>Thời gian</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<template id="fragmentScripts">
    <script th:inline="javascript">
        var _iot_table = null;
        var _iot_pageBooted = false;

        function iotSafeText(value) {
            return value == null ? '' : value;
        }

        function iotFlagText(value) {
            var raw = iotSafeText(value);
            if (raw === '1') return 'Có';
            if (raw === '0') return 'Không';
            return raw;
        }

        function iotUpdateCounter(rows) {
            var list = rows || [];
            var errorCount = list.filter(function (item) {
                return item && item.uploadErrorMsg && String(item.uploadErrorMsg).trim() !== '';
            }).length;
            $('#iot_totalRows').text(list.length);
            $('#iot_errorRows').text(errorCount);
        }

        function iotInitTable() {
            _iot_table = $('#iot_resultTable').DataTable({
                destroy: true,
                scrollX: true,
                scrollY: "calc(100vh - 290px)",
                scrollCollapse: true,
                paging: true,
                searching: false,
                lengthChange: true,
                pageLength: 25,
                processing: true,
                order: [],
                ajax: {
                    url: '/ar/attendanceMintenance/api/overtime/importTemp/list',
                    dataSrc: function (json) {
                        var rows = json || [];
                        iotUpdateCounter(rows);
                        return rows;
                    },
                    data: function (d) {
                        d.errorOnly = $('#iot_errorOnly').val();
                    }
                },
                columns: [
                    { data: 'lineId', className: 'text-center' },
                    { data: 'applyName', render: function (data) { return iotSafeText(data); } },
                    { data: 'empId', className: 'text-center', render: function (data) { return iotSafeText(data); } },
                    { data: 'deptName', className: 'text-center', render: function (data) { return iotSafeText(data); } },
                    { data: 'applyOtDate', className: 'text-center', render: function (data) { return iotSafeText(data); } },
                    { data: 'otFromDate', className: 'text-center', render: function (data) { return iotSafeText(data); } },
                    { data: 'otFromTime', className: 'text-center', render: function (data) { return iotSafeText(data); } },
                    { data: 'otToDate', className: 'text-center', render: function (data) { return iotSafeText(data); } },
                    { data: 'otToTime', className: 'text-center', render: function (data) { return iotSafeText(data); } },
                    { data: 'otTypeName', className: 'text-center', render: function (data) { return iotSafeText(data); } },
                    { data: 'otApplyHour', className: 'text-center', render: function (data) { return iotSafeText(data); } },
                    { data: 'otTotalMonth', className: 'text-center', render: function (data) { return iotSafeText(data); } },
                    { data: 'otLimit', className: 'text-center', render: function (data) { return iotSafeText(data); } },
                    { data: 'deductYn', className: 'text-center', render: function (data) { return iotFlagText(data); } },
                    { data: 'specialYn', className: 'text-center', render: function (data) { return iotFlagText(data); } },
                    { data: 'applyOtRemark', render: function (data) { return iotSafeText(data); } },
                    { data: 'affirmFlagName', className: 'text-center', render: function (data) { return iotSafeText(data); } },
                    { data: 'uploadErrorMsg', render: function (data) { return iotSafeText(data); } },
                    { data: 'uploadBy', className: 'text-center', render: function (data) { return iotSafeText(data); } },
                    { data: 'uploadDate', className: 'text-center', render: function (data) { return iotSafeText(data); } }
                ]
            });
        }

        function iotBootPage() {
            if (_iot_pageBooted) {
                return;
            }
            if (!document.getElementById('iot_resultTable')) {
                setTimeout(iotBootPage, 30);
                return;
            }
            _iot_pageBooted = true;
            iotInitTable();
        }

        window.iotSearch = function () {
            if (_iot_table) {
                _iot_table.ajax.reload();
            }
        };

        function iotGetCurrentTabId() {
            var tableEl = document.getElementById('iot_resultTable');
            if (!tableEl) {
                return '';
            }
            var pane = tableEl.closest('.tab-pane');
            return pane ? pane.id : '';
        }

        function iotCloseCurrentTab() {
            var currentTabId = iotGetCurrentTabId();
            if (currentTabId && typeof tabSystem !== 'undefined' && tabSystem
                && typeof tabSystem.closeTab === 'function') {
                tabSystem.closeTab(currentTabId);
                return;
            }
            window.close();
        }

        window.iotSave = function (btn) {
            var $btn = $(btn || '#iot_saveBtn');
            if ($btn.prop('disabled')) {
                return;
            }

            var originalHtml = $btn.html();
            $btn.prop('disabled', true).html('<i class="bx bx-loader bx-spin"></i> Đang lưu');

            $.ajax({
                url: '/ar/attendanceMintenance/api/overtime/importTemp/save',
                type: 'POST',
                success: function (res) {
                    $btn.prop('disabled', false).html(originalHtml);
                    if (res && res.success) {
                        toastr && toastr.success(res.message || 'Lưu thành công');
                        iotCloseCurrentTab();
                        return;
                    }
                    toastr && toastr.error((res && (res.error || res.message)) || 'Lưu thất bại');
                },
                error: function () {
                    $btn.prop('disabled', false).html(originalHtml);
                    toastr && toastr.error('Lỗi kết nối khi lưu dữ liệu');
                }
            });
        };

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', iotBootPage);
        }
        if (typeof $ !== 'undefined') {
            $(document).ready(iotBootPage);
        } else {
            iotBootPage();
        }
    </script>
</template>
