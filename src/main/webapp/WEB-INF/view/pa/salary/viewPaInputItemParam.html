<div th:fragment="content">
    <div class="row">
        <div class="col-12" id="vpiip_pageWrapper">

            <!-- Điều kiện tìm kiếm -->
            <div class="card mb-2">
                <div class="card-body py-2">
                    <div class="row g-2 align-items-start">
                        <div class="col-8 d-flex align-items-center gap-2">
                            <label class="form-label small text-muted mb-0 text-nowrap"
                                th:text="#{pa.inputItemParam.itemType}">Loại hạng mục</label>
                            <select class="form-select form-select-sm" id="vpiip_itemTypeSearch" style="max-width:220px;">
                                <option value="" th:text="#{pa.salaryCode.itemType.all}">Tất cả</option>
                                <option value="1" th:text="#{pa.salaryCode.itemType.std}">Hạng mục tiêu chuẩn</option>
                                <option value="2" th:text="#{pa.salaryCode.itemType.adj}">Điều chỉnh trả lương</option>
                                <option value="3" th:text="#{pa.salaryCode.itemType.excPay}">Trả lương ngoại lệ</option>
                                <option value="4" th:text="#{pa.salaryCode.itemType.adjDed}">Điều chỉnh khoản trừ</option>
                                <option value="5" th:text="#{pa.salaryCode.itemType.excDed}">Khoản trừ ngoại lệ</option>
                                <option value="6" th:text="#{pa.salaryCode.itemType.calc}">Hạng mục tính toán</option>
                            </select>
                            <label class="form-label small text-muted mb-0 text-nowrap"
                                th:text="#{pa.inputItemParam.itemName}">Tên hạng mục</label>
                            <input type="text" class="form-control form-control-sm" id="vpiip_aliasNameSearch"
                                style="max-width:200px;"
                                onkeydown="if(event.key==='Enter') vpiipSearch()">
                        </div>
                        <div class="col-4 d-flex gap-2 align-items-start justify-content-end flex-wrap">
                            <button type="button" class="btn btn-primary btn-sm" onclick="vpiipSearch()">
                                <i class="bi bi-search"></i>
                                <span th:text="#{pa.inputItemParam.search}">Tra cứu</span>
                            </button>
                            <button type="button" class="btn btn-warning btn-sm" onclick="vpiipEditSelected()">
                                <i class="bi bi-pencil"></i>
                                <span th:text="#{pa.inputItemParam.edit}">Sửa</span>
                            </button>
                            <button type="button" class="btn btn-danger btn-sm" onclick="vpiipDeleteSelected()">
                                <i class="bi bi-trash"></i>
                                <span th:text="#{pa.inputItemParam.delete}">Xóa</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Bảng danh sách -->
            <div class="card">
                <div class="card-body p-2">
                    <div class="table-responsive">
                        <table id="vpiip_table" class="table table-striped table-bordered table-hover table-sm"
                            style="width:100%">
                            <thead class="table-light">
                                <tr>
                                    <th class="text-center" style="width:36px;">
                                        <input type="checkbox" id="vpiip_checkAll">
                                    </th>
                                    <th class="text-center" style="width:40px;" th:text="#{pa.inputItemParam.no}">STT</th>
                                    <th th:text="#{pa.inputItemParam.company}">Công ty</th>
                                    <th th:text="#{pa.inputItemParam.itemType}">Loại hạng mục</th>
                                    <th th:text="#{pa.inputItemParam.distinctField1}">Hạng mục phân biệt 1</th>
                                    <th th:text="#{pa.inputItemParam.distinctField2}">Hạng mục phân biệt 2</th>
                                    <th class="text-center" style="width:130px;" th:text="#{pa.inputItemParam.defaultVal}">Giá trị mặc định</th>
                                    <th th:text="#{pa.inputItemParam.itemName}">Tên hạng mục</th>
                                    <th class="text-center" style="width:120px;" th:text="#{pa.inputItemParam.activity}">Tình trạng sử dụng</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div><!-- /#vpiip_pageWrapper -->
    </div><!-- /.row -->

    <!-- ── Modal chỉnh sửa ──────────────────────────────────────────────────── -->
    <div class="modal fade" id="vpiip_editModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" th:text="#{pa.inputItemParam.editTitle}">Chỉnh sửa thông số mục nhập</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="vpiip_paramNo">
                    <table class="table table-bordered table-sm align-middle mb-0" style="table-layout:fixed;">
                        <colgroup>
                            <col style="width:35%;">
                            <col style="width:65%;">
                        </colgroup>
                        <tbody>
                            <tr>
                                <th class="table-light text-end pe-3" th:text="#{pa.inputItemParam.company}">Công ty</th>
                                <td><span id="vpiip_cpnyId" class="form-control-plaintext form-control-sm"></span></td>
                            </tr>
                            <tr>
                                <th class="table-light text-end pe-3" th:text="#{pa.inputItemParam.itemType}">Loại hạng mục</th>
                                <td><span id="vpiip_itemTypeName" class="form-control-plaintext form-control-sm"></span></td>
                            </tr>
                            <tr>
                                <th class="table-light text-end pe-3" th:text="#{pa.inputItemParam.itemName}">Tên hạng mục</th>
                                <td><span id="vpiip_aliasName" class="form-control-plaintext form-control-sm"></span></td>
                            </tr>
                            <tr>
                                <th class="table-light text-end pe-3" th:text="#{pa.inputItemParam.distinctField1}">Hạng mục phân biệt 1</th>
                                <td>
                                    <select class="form-select form-select-sm" id="vpiip_distinctField">
                                        <option value=""></option>
                                    </select>
                                </td>
                            </tr>
                            <tr>
                                <th class="table-light text-end pe-3" th:text="#{pa.inputItemParam.distinctField2}">Hạng mục phân biệt 2</th>
                                <td>
                                    <select class="form-select form-select-sm" id="vpiip_distinctField2nd">
                                        <option value=""></option>
                                    </select>
                                </td>
                            </tr>
                            <tr>
                                <th class="table-light text-end pe-3">
                                    <span th:text="#{pa.inputItemParam.defaultVal}">Giá trị mặc định</span>
                                </th>
                                <td>
                                    <input type="text" class="form-control form-control-sm" id="vpiip_defaultVal"
                                        style="max-width:200px;" maxlength="50">
                                </td>
                            </tr>
                            <tr>
                                <th class="table-light text-end pe-3" th:text="#{pa.inputItemParam.activity}">Tình trạng sử dụng</th>
                                <td>
                                    <select class="form-select form-select-sm" id="vpiip_activity" style="max-width:180px;">
                                        <option value="1" th:text="#{pa.inputItemParam.activity.use}">Sử dụng</option>
                                        <option value="0" th:text="#{pa.inputItemParam.activity.notUse}">Không sử dụng</option>
                                    </select>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal"
                        th:text="#{common.close}">Đóng</button>
                    <button type="button" class="btn btn-primary btn-sm" onclick="vpiipSave()">
                        <i class="bi bi-save"></i>
                        <span th:text="#{pa.inputItemParam.save}">Lưu</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

</div><!-- /th:fragment="content" -->

<template id="fragmentScripts">
    <script th:inline="javascript">
        var vpiip_table = null;
        var vpiip_msgConfirmDelete  = /*[[#{pa.inputItemParam.confirmDelete}]]*/ 'Bạn có chắc chắn muốn xóa các bản ghi đã chọn?';
        var vpiip_msgSelectRequired = /*[[#{pa.inputItemParam.selectRequired}]]*/ 'Vui lòng chọn ít nhất một bản ghi!';
        var vpiip_msgSelectOne      = /*[[#{pa.inputItemParam.selectOne}]]*/ 'Vui lòng chọn đúng một bản ghi để sửa!';
        var vpiip_itemTypeMap = {
            1: /*[[#{pa.salaryCode.itemType.std}]]*/ 'Hạng mục tiêu chuẩn',
            2: /*[[#{pa.salaryCode.itemType.adj}]]*/ 'Điều chỉnh trả lương',
            3: /*[[#{pa.salaryCode.itemType.excPay}]]*/ 'Trả lương ngoại lệ',
            4: /*[[#{pa.salaryCode.itemType.adjDed}]]*/ 'Điều chỉnh khoản trừ',
            5: /*[[#{pa.salaryCode.itemType.excDed}]]*/ 'Khoản trừ ngoại lệ',
            6: /*[[#{pa.salaryCode.itemType.calc}]]*/ 'Hạng mục tính toán'
        };
        var vpiip_activityUse    = /*[[#{pa.inputItemParam.activity.use}]]*/ 'Sử dụng';
        var vpiip_activityNotUse = /*[[#{pa.inputItemParam.activity.notUse}]]*/ 'Không sử dụng';

        function vpiipBuildDistinctOptions(list) {
            var base = '<option value=""></option>';
            $.each(list, function (i, item) {
                base += '<option value="' + item.distinctField + '">'
                    + (item.distinctFieldName || item.distinctField) + '</option>';
            });
            $('#vpiip_distinctField').html(base);
            $('#vpiip_distinctField2nd').html(base);
        }

        $(document).ready(function () {

            // Load danh sách hạng mục phân biệt từ PA_DISTINCT_LIST
            $.ajax({
                url: '/pa/salary/inputitemparam/api/distinctList',
                type: 'GET',
                success: function (list) {
                    vpiipBuildDistinctOptions(list);
                },
                error: function () {
                    console.warn('Không thể tải danh sách hạng mục phân biệt');
                }
            });

            vpiip_table = $('#vpiip_table').DataTable({
                destroy: true,
                scrollY: 'calc(100vh - 330px)',
                scrollCollapse: true,
                paging: true,
                searching: false,
                lengthChange: true,
                pageLength: 20,
                lengthMenu: [10, 20, 50, 100],
                processing: true,
                serverSide: true,
                columnDefs: [
                    { targets: 0, width: '36px', className: 'text-center', orderable: false },
                    { targets: 1, width: '40px', className: 'text-center', orderable: false },
                    { targets: [6, 8], className: 'text-center' }
                ],
                ajax: {
                    url: '/pa/salary/inputitemparam/api/list',
                    type: 'GET',
                    data: function (d) {
                        d.itemTypeSearch  = $('#vpiip_itemTypeSearch').val();
                        d.aliasNameSearch = $('#vpiip_aliasNameSearch').val();
                    }
                },
                columns: [
                    {
                        data: null,
                        render: function (data, type, row) {
                            return '<input type="checkbox" class="vpiip_rowCheck"'
                                + ' data-paramno="' + row.paramNo + '">';
                        }
                    },
                    {
                        data: null,
                        render: function (data, type, row, meta) {
                            return meta.settings._iDisplayStart + meta.row + 1;
                        }
                    },
                    { data: 'cpnyName', defaultContent: '' },
                    {
                        data: 'itemType',
                        render: function (data) {
                            return vpiip_itemTypeMap[data] || data;
                        }
                    },
                    { data: 'distinctFieldName', defaultContent: '' },
                    { data: 'distinctField2ndName', defaultContent: '' },
                    { data: 'defaultVal', defaultContent: '' },
                    { data: 'aliasName', defaultContent: '' },
                    {
                        data: 'activity',
                        render: function (data) {
                            return data == 1
                                ? '<span class="badge bg-success">' + vpiip_activityUse + '</span>'
                                : '<span class="badge bg-secondary">' + vpiip_activityNotUse + '</span>';
                        }
                    }
                ],
                drawCallback: function () {
                    $('#vpiip_checkAll').off('change').on('change', function () {
                        $('.vpiip_rowCheck').prop('checked', $(this).is(':checked'));
                    });
                    // Click hàng để mở modal sửa
                    $('#vpiip_table tbody').off('click', 'tr').on('click', 'tr', function (e) {
                        if ($(e.target).is('input[type=checkbox]')) return;
                        var rowData = vpiip_table.row(this).data();
                        if (rowData) vpiipOpenEditModal(rowData.paramNo);
                    });
                }
            });

            window.vpiipSearch = function () {
                vpiip_table.ajax.reload();
            };

            window.vpiipEditSelected = function () {
                var selected = [];
                $('.vpiip_rowCheck:checked').each(function () {
                    selected.push($(this).data('paramno'));
                });
                if (selected.length !== 1) {
                    toastr ? toastr.warning(vpiip_msgSelectOne) : alert(vpiip_msgSelectOne);
                    return;
                }
                vpiipOpenEditModal(selected[0]);
            };

            window.vpiipOpenEditModal = function (paramNo) {
                $.ajax({
                    url: '/pa/salary/inputitemparam/api/' + paramNo,
                    type: 'GET',
                    success: function (dto) {
                        $('#vpiip_paramNo').val(dto.paramNo);
                        $('#vpiip_cpnyId').text(dto.cpnyId || '');
                        $('#vpiip_itemTypeName').text(vpiip_itemTypeMap[dto.itemType] || dto.itemType || '');
                        $('#vpiip_aliasName').text(dto.aliasName || dto.paramItemId || '');
                        $('#vpiip_distinctField').val(dto.distinctField || '');
                        $('#vpiip_distinctField2nd').val(dto.distinctField2nd || '');
                        $('#vpiip_defaultVal').val(dto.defaultVal || '');
                        $('#vpiip_activity').val(dto.activity != null ? String(dto.activity) : '1');
                        new bootstrap.Modal(document.getElementById('vpiip_editModal')).show();
                    },
                    error: function (err) {
                        var msg = (err.responseJSON && err.responseJSON.error) ? err.responseJSON.error : 'Lỗi không xác định';
                        toastr ? toastr.error(msg) : alert(msg);
                    }
                });
            };

            window.vpiipSave = function () {
                var payload = {
                    paramNo:         $('#vpiip_paramNo').val(),
                    distinctField:   $('#vpiip_distinctField').val() || null,
                    distinctField2nd: $('#vpiip_distinctField2nd').val() || null,
                    defaultVal:      $('#vpiip_defaultVal').val().trim(),
                    activity:        parseInt($('#vpiip_activity').val())
                };
                $.ajax({
                    url: '/pa/salary/inputitemparam/api/update',
                    type: 'PUT',
                    contentType: 'application/json',
                    data: JSON.stringify(payload),
                    success: function (res) {
                        toastr ? toastr.success(res.message || 'Cập nhật thành công') : alert(res.message || 'Cập nhật thành công');
                        var modal = bootstrap.Modal.getInstance(document.getElementById('vpiip_editModal'));
                        if (modal) modal.hide();
                        vpiip_table.ajax.reload();
                    },
                    error: function (err) {
                        var msg = (err.responseJSON && err.responseJSON.error) ? err.responseJSON.error : (err.responseText || 'Lỗi không xác định');
                        toastr ? toastr.error(msg) : alert(msg);
                    }
                });
            };

            window.vpiipDeleteSelected = function () {
                var selected = [];
                $('.vpiip_rowCheck:checked').each(function () {
                    selected.push($(this).data('paramno'));
                });
                if (selected.length === 0) {
                    toastr ? toastr.warning(vpiip_msgSelectRequired) : alert(vpiip_msgSelectRequired);
                    return;
                }
                if (!confirm(vpiip_msgConfirmDelete)) return;
                $.ajax({
                    url: '/pa/salary/inputitemparam/api/deleteList',
                    type: 'DELETE',
                    contentType: 'application/json',
                    data: JSON.stringify(selected),
                    success: function (res) {
                        toastr ? toastr.success(res.message || 'Xóa thành công') : alert(res.message || 'Xóa thành công');
                        vpiip_table.ajax.reload();
                    },
                    error: function (err) {
                        var msg = (err.responseJSON && err.responseJSON.error) ? err.responseJSON.error : (err.responseText || 'Lỗi không xác định');
                        toastr ? toastr.error(msg) : alert(msg);
                    }
                });
            };
        });
    </script>
</template>
