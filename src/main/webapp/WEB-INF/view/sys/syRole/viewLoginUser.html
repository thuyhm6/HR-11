<div th:fragment="content">
    <!-- Hidden JS messages -->
    <span id="vlu-msgNoRoleData"   th:text="#{sys.role.viewLoginUser.noRoleData}"    style="display:none">Không có dữ liệu nhóm quyền.</span>
    <span id="vlu-msgSelectUser"   th:text="#{sys.role.viewLoginUser.hint.selectUser}" style="display:none">Vui lòng chọn một người dùng bên trái để phân nhóm quyền.</span>
    <span id="vlu-rolePanelPrefix" th:text="#{sys.role.viewLoginUser.rolePanel.titlePrefix}" style="display:none">Nhóm quyền -</span>

    <div class="row">
        <!-- Cột trái: Danh sách User -->
        <div class="col-md-7">
            <div class="card">
                <div class="card-body">
                    <!-- Search Form -->
                    <form id="userSearchForm" class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label for="userSearchKeyword" class="form-label" th:text="#{sys.role.viewLoginUser.search.keyword}">Từ khóa (ID, Tên)</label>
                            <input type="text" class="form-control" id="userSearchKeyword"
                                th:placeholder="#{sys.role.viewLoginUser.search.keyword.placeholder}">
                        </div>
                        <div class="col-md-6 d-flex align-items-end">
                            <button type="button" class="btn btn-primary me-2" id="btnSearchUser">
                                <i class="bx bx-search"></i> <span th:text="#{common.search}">Tìm kiếm</span>
                            </button>
                            <button type="button" class="btn btn-secondary me-2" id="btnClearUser">
                                <i class="bx bx-x"></i> <span th:text="#{common.clearFilter}">Xóa lọc</span>
                            </button>
                            <button type="button" class="btn btn-info" id="btnExportUser">
                                <i class="bx bx-download"></i> <span th:text="#{common.exportExcel}">Xuất Excel</span>
                            </button>
                        </div>
                    </form>

                    <!-- Data Table -->
                    <div class="table-responsive">
                        <table id="userTable" class="table table-striped table-bordered table-hover"
                            style="width:100%; cursor: pointer;">
                            <thead class="table-light">
                                <tr>
                                    <th th:text="#{sys.role.viewLoginUser.col.no}">STT</th>
                                    <th th:text="#{sys.role.viewLoginUser.col.loginId}">ID Đăng nhập</th>
                                    <th th:text="#{sys.role.viewLoginUser.col.fullName}">Họ tên</th>
                                    <th th:text="#{sys.role.viewLoginUser.col.dept}">Phòng ban</th>
                                    <th th:text="#{sys.role.viewLoginUser.col.empCode}">Mã NV</th>
                                    <th th:text="#{sys.role.viewLoginUser.col.accountType}">Loại TK</th>
                                    <th th:text="#{sys.role.viewLoginUser.col.action}">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Data loaded via AJAX -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- Cột phải: Phân nhóm quyền cho User -->
        <div class="col-md-5">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h5 class="card-title mb-0" id="userPanelTitle" th:text="#{sys.role.viewLoginUser.rolePanel.title}">Nhóm quyền</h5>
                    <button type="button" class="btn btn-primary btn-sm" id="btnSaveRelations">
                        <i class="bx bx-save"></i> <span th:text="#{sys.role.viewLoginUser.btn.saveRoleGroup}">Lưu nhóm quyền</span>
                    </button>
                </div>
                <div class="card-body" style="height: 600px; overflow-y: auto;">
                    <div id="roleGroupListContainer">
                        <div class="text-center p-3 text-muted" th:text="#{sys.role.viewLoginUser.hint.selectUser}">Vui lòng chọn một người dùng bên trái để phân nhóm quyền.</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Reset Password -->
    <div class="modal fade" id="resetPasswordModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="resetPasswordModalTitle" th:text="#{sys.role.viewLoginUser.modal.resetPassword.title}">Reset Mật khẩu</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="resetPasswordForm">
                        <input type="hidden" id="resetUserNo" name="userNo">

                        <div class="mb-3">
                            <label class="form-label" th:text="#{sys.role.viewLoginUser.modal.resetPassword.loginId}">ID Đăng nhập</label>
                            <input type="text" class="form-control" id="resetUserName" readonly>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">
                                <span th:text="#{sys.role.viewLoginUser.modal.resetPassword.newPassword}">Mật khẩu mới</span>
                                <span class="text-danger">*</span>
                            </label>
                            <input type="text" class="form-control" id="newPassword" value="123456A@" required>
                            <div class="form-text" th:text="#{sys.role.viewLoginUser.modal.resetPassword.defaultNote}">Mật khẩu mặc định là 123456A@. Bạn có thể tự thay đổi.</div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" th:text="#{common.close}">Đóng</button>
                    <button type="button" class="btn btn-primary" id="btnConfirmReset" th:text="#{common.confirm}">Xác nhận</button>
                </div>
            </div>
        </div>
    </div>
</div>

<template id="fragmentScripts">
    <script th:inline="none">
        $(function () {
            var selectedUserNo = null;
            var rolePanelPrefix = $('#vlu-rolePanelPrefix').text();
            var msgNoRoleData   = $('#vlu-msgNoRoleData').text();

            var table = $('#userTable').DataTable({
                destroy: true,
                paging: true,
                searching: false,
                lengthChange: true,
                pageLength: 20,
                processing: true,

                ajax: {
                    url: '/sys/api/user/list',
                    dataSrc: '',
                    data: function (d) {
                        d.keyword = $('#userSearchKeyword').val();
                    }
                },
                columns: [
                    {
                        data: null,
                        render: function (data, type, row, meta) {
                            return meta.row + 1;
                        }
                    },
                    { data: 'userName' },
                    {
                        data: 'empName',
                        render: function (data, type, row) {
                            return data ? data : (row.userName ? row.userName : '');
                        }
                    },
                    { data: 'deptName' },
                    { data: 'personId' },
                    { data: 'userType' },
                    {
                        data: null,
                        className: "text-center",
                        render: function (data, type, row) {
                            return '<button class="btn btn-warning btn-sm btn-reset-password" data-id="' + row.userNo + '" data-name="' + row.userName + '" title="Reset Password"><i class="bx bx-key"></i></button>';
                        }
                    }
                ]
            });

            // Load all role groups
            loadAllRoleGroups();

            // Search
            $('#btnSearchUser').on('click', function () {
                table.ajax.reload();
            });

            // Clear
            $('#btnClearUser').on('click', function () {
                $('#userSearchForm')[0].reset();
                table.ajax.reload();
            });

            // Export
            $('#btnExportUser').on('click', function () {
                window.location.href = '/sys/api/user/export';
            });

            // Reset Password Click
            $('#userTable tbody').on('click', '.btn-reset-password', function (e) {
                e.stopPropagation();
                var id = $(this).data('id');
                var name = $(this).data('name');

                $('#resetUserNo').val(id);
                $('#resetUserName').val(name);
                $('#newPassword').val('123456A@'); // Default

                var modal = new bootstrap.Modal(document.getElementById('resetPasswordModal'));
                modal.show();
            });

            // Confirm Reset
            $('#btnConfirmReset').on('click', function () {
                if (!$('#resetPasswordForm')[0].checkValidity()) {
                    $('#resetPasswordForm')[0].reportValidity();
                    return;
                }

                var userNo = $('#resetUserNo').val();
                var newPassword = $('#newPassword').val();

                $.ajax({
                    url: '/sys/api/user/resetPassword',
                    type: 'POST',
                    data: {
                        userNo: userNo,
                        newPassword: newPassword
                    },
                    success: function (res) {
                        if (res.success) {
                            if (typeof toastr !== 'undefined') toastr.success(res.message);
                            else alert(res.message);

                            var modalEl = document.getElementById('resetPasswordModal');
                            var modal = bootstrap.Modal.getInstance(modalEl);
                            modal.hide();
                        } else {
                            if (typeof toastr !== 'undefined') toastr.error(res.message);
                            else alert(res.message);
                        }
                    }
                });
            });

            // Row Click
            $('#userTable tbody').on('click', 'tr', function () {
                var data = table.row(this).data();
                if (!data) return;

                $('#userTable tbody tr').removeClass('table-active');
                $(this).addClass('table-active');

                selectedUserNo = data.userNo;
                $('#userPanelTitle').text(rolePanelPrefix + ' ' + (data.userName || data.userNo));
                //$('#btnSaveRelations').prop('disabled', false);

                loadUserRelations(selectedUserNo);
            });

            // Save Relations
            $('#btnSaveRelations').on('click', function () {
                if (!selectedUserNo) return;

                var selectedGroups = [];
                $('.rolegroup-item-checkbox:checked').each(function () {
                    selectedGroups.push($(this).val());
                });

                var payload = {
                    userNo: selectedUserNo,
                    roleGroupNos: selectedGroups
                };

                $.ajax({
                    url: '/sys/api/user/saveRelations',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(payload),
                    success: function (res) {
                        if (res.success) {
                            if (typeof toastr !== 'undefined') toastr.success(res.message);
                            else alert(res.message);
                        } else {
                            if (typeof toastr !== 'undefined') toastr.error(res.message);
                            else alert(res.message);
                        }
                    }
                });
            });

            // --- Helpers ---

            function loadAllRoleGroups() {
                $.get('/sys/api/role_group/list', function (list) {
                    var container = $('#roleGroupListContainer');
                    container.empty();

                    if (!list || list.length === 0) {
                        container.html('<div class="text-center text-muted">' + msgNoRoleData + '</div>');
                        return;
                    }

                    var ul = $('<ul>').addClass('list-group list-group-flush');

                    list.forEach(function (group) {
                        var li = $('<li>').addClass('list-group-item');
                        var div = $('<div>').addClass('form-check');
                        var inp = $('<input>').addClass('form-check-input rolegroup-item-checkbox')
                            .attr('type', 'checkbox')
                            .attr('value', group.roleGroupNo)
                            .attr('id', 'rg_chk_' + group.roleGroupNo);

                        var label = $('<label>').addClass('form-check-label')
                            .attr('for', 'rg_chk_' + group.roleGroupNo)
                            .html((group.nameVi || group.roleGroupNo) + ' <small class="text-muted">(' + group.roleGroupId + ')</small>');

                        div.append(inp).append(label);
                        li.append(div);
                        ul.append(li);
                    });

                    container.append(ul);
                });
            }

            function loadUserRelations(userNo) {
                $('.rolegroup-item-checkbox').prop('checked', false);

                $.get('/sys/api/user/detail?userNo=' + userNo, function (res) {
                    if (!res || !res.roleGroupNos) return;

                    res.roleGroupNos.forEach(function (rgNo) {
                        $('#rg_chk_' + rgNo).prop('checked', true);
                    });
                });
            }
        });
    </script>
</template>
