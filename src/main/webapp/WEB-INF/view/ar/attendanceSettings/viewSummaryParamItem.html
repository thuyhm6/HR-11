<div th:fragment="content">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-body">
                    <!-- Search Form -->
                    <form id="arStaParamSearchForm" class="row g-3 mb-4">
                        <div class="col-md-4">
                            <label for="searchArStaParam" class="form-label">Tìm kiếm</label>
                            <input type="text" class="form-control" id="searchArStaParam"
                                placeholder="Nhập mã hạng mục / Tên hạng mục">
                        </div>

                        <div class="col-md-4 d-flex align-items-end">
                            <button type="button" class="btn btn-primary me-2" onclick="arStaParamSearchData()">
                                <i class="bx bx-search"></i> Tìm kiếm
                            </button>
                            <button type="button" class="btn btn-secondary" onclick="arStaParamClearSearch()">
                                <i class="bx bx-x"></i> Xóa lọc
                            </button>
                            <button type="button" class="btn btn-success ms-2" onclick="arStaParamOpenModal()">
                                <i class="bx bx-plus"></i> Thêm mới
                            </button>
                        </div>
                    </form>

                    <!-- Data Table -->
                    <div class="table-responsive">
                        <table id="arStaParamTable" class="table table-striped table-bordered table-hover w-100">
                            <thead class="table-light">
                                <tr>
                                    <th>STT</th>
                                    <th>Param No</th>
                                    <th>Tên công ty</th>
                                    <th>Mã hạng mục</th>
                                    <th>Tên hạng mục</th>
                                    <th>Đơn vị</th>
                                    <th>Đơn vị tối thiểu (Min)</th>
                                    <th>Thứ tự tính toán (Cal)</th>
                                    <th>Cờ quản lý</th>
                                    <th>Sắp xếp</th>
                                    <th>Trạng thái</th>
                                    <th class="text-center" style="width: 100px;">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Data loaded via AJAX -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal Thêm/Sửa -->
<div class="modal fade" id="arStaParamModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="arStaParamModalTitle">Thông số tổng hợp</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="arStaParamForm">
                    <input type="hidden" id="arStaParamNo" name="paramNo">

                    <h6 class="mb-3 text-primary border-bottom pb-2">Thông tin Hạng mục</h6>
                    <div class="row g-3 mb-4">
                        <div class="col-md-12">
                            <label for="arStaParamItemNo" class="form-label">Chọn Hạng mục (ITEM_NO) <span
                                    class="text-danger">*</span></label>
                            <select class="form-select arStaParam-select2" id="arStaParamItemNo" required>
                                <option value="">-- Chọn hạng mục chưa có thông số --</option>
                            </select>
                        </div>
                    </div>

                    <h6 class="mb-3 text-primary border-bottom pb-2">Cấu hình thông số (Parameters)</h6>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="arStaParamUnit" class="form-label">Đơn vị (ngày, giờ, phút)</label>
                            <select class="form-select" id="arStaParamUnit">
                                <option value="DAY">Ngày</option>
                                <option value="HOUR">Giờ</option>
                                <option value="MINUTE">Phút</option>
                                <option value="TIME">Lần</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="arStaParamMinUnit" class="form-label">Đơn vị tối thiểu (Min Unit)</label>
                            <select class="form-select" id="arStaParamMinUnit">
                                <option value="1">1</option>
                                <option value="0.5">0.5</option>
                                <option value="0.25">0.25</option>
                                <option value="0.05">0.05</option>
                                <option value="0.01">0.01</option>
                            </select>
                        </div>
                        <div class="col-md-6" id="calOrderContainer" style="display: none;">
                            <label for="arStaParamCalOrder" class="form-label">Thứ tự tính toán (Cal Order)</label>
                            <input type="number" class="form-control" id="arStaParamCalOrder" readonly>
                            <small class="text-muted">Tự động tăng khi thêm mới</small>
                        </div>
                        <div class="col-md-6">
                            <label for="arStaParamManageFlag" class="form-label">Cờ quản lý (Manage Flag)</label>
                            <input type="number" class="form-control" id="arStaParamManageFlag">
                        </div>
                        <div class="col-md-6">
                            <label for="arStaParamOrderno" class="form-label">Sắp xếp (Orderno)</label>
                            <input type="number" class="form-control" id="arStaParamOrderno">
                        </div>
                        <div class="col-md-6">
                            <label for="arStaParamActivity" class="form-label">Trạng thái (1: Hoạt động, 0:
                                Ngừng)</label>
                            <select class="form-select" id="arStaParamActivity">
                                <option value="1">1 - Hoạt động</option>
                                <option value="0">0 - Ngừng</option>
                            </select>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                <button type="button" class="btn btn-primary" onclick="arStaParamSaveData()">Lưu dữ liệu</button>
            </div>
        </div>
    </div>
</div>

<!-- Scripts -->
<template id="fragmentScripts">
    <script th:inline="javascript">
        $(document).ready(function () {
            if ($.fn.select2) {
                $('.arStaParam-select2').select2({
                    width: '100%',
                    dropdownParent: $('#arStaParamModal')
                });
            }

            var table = $('#arStaParamTable').DataTable({
                destroy: true,
                scrollY: "calc(100vh - 280px)",
                scrollX: true,
                select: 'single',
                scrollCollapse: true,
                paging: true,
                searching: true,
                lengthChange: true,
                pageLength: 25,
                processing: true,
                language: {
                    url: '//cdn.datatables.net/plug-ins/1.10.25/i18n/Vietnamese.json'
                },
                dom: 'Blfrtip',
                buttons: ['copy', 'csv', 'excel', 'pdf', 'print'],
                ajax: {
                    url: '/ar/attendanceSettings/api/arStaItemParam',
                    dataSrc: '',
                    data: function (d) {
                        d.searchText = $('#searchArStaParam').val();
                    }
                },
                columns: [
                    { data: null, render: function (data, type, row, meta) { return meta.row + 1; } },
                    { data: 'paramNo' },
                    { data: 'companyName' },
                    { data: 'itemNo' },
                    { data: 'itemNameVi' },
                    { data: 'unit' },
                    { data: 'minUnit' },
                    { data: 'calOrder' },
                    { data: 'manageFlag' },
                    { data: 'orderno' },
                    {
                        data: 'activity', render: function (data) {
                            return data == 1 ? '<span class="badge bg-success">Hoạt động</span>' : '<span class="badge bg-secondary">Ngừng</span>';
                        }
                    },
                    {
                        data: null,
                        className: "text-center",
                        render: function (data, type, row) {
                            return `
                                <div class="btn-group btn-group-sm">
                                    <button class="btn btn-warning" onclick="arStaParamEdit('${row.paramNo}', '${row.itemNo}', '${row.itemNameVi || row.itemNo}')"><i class="bx bx-edit"></i></button>
                                    <button class="btn btn-danger" onclick="arStaParamDelete('${row.paramNo}')"><i class="bx bx-trash"></i></button>
                                </div>
                            `;
                        }
                    }
                ]
            });

            window.arStaParamSearchData = function () { table.ajax.reload(); };
            window.arStaParamClearSearch = function () {
                $('#arStaParamSearchForm')[0].reset();
                table.ajax.reload();
            };

            function loadAvailableItems(selectedItemNo, selectedItemName) {
                $.ajax({
                    url: '/ar/attendanceSettings/api/arStaItemParam/availableItems',
                    success: function (data) {
                        var $sel = $('#arStaParamItemNo');
                        $sel.empty().append(new Option('-- Chọn hạng mục chưa có thông số --', ''));

                        // Nếu đang edit, thêm option hiện tại vào danh sách
                        if (selectedItemNo) {
                            $sel.append(new Option(selectedItemName + ' (' + selectedItemNo + ')', selectedItemNo));
                        }

                        data.forEach(function (itm) {
                            var itmNoVal = itm.itemNo || itm.ITEMNO || itm.ITEM_NO || '';
                            var nameViVal = itm.nameVi || itm.NAMEVI || itm.NAME_VI || '';
                            var text = (nameViVal || itmNoVal) + ' (' + itmNoVal + ')';
                            $sel.append(new Option(text, itmNoVal));
                        });

                        if (selectedItemNo) {
                            $sel.val(selectedItemNo);
                        }
                    }
                });
            }

            window.arStaParamOpenModal = function () {
                $('#arStaParamModalTitle').text('Thêm mới Thông số tổng hợp');
                $('#arStaParamForm')[0].reset();
                $('#arStaParamNo').val('');
                $('#arStaParamActivity').val('1');
                $('#calOrderContainer').hide();
                $('#arStaParamItemNo').prop('disabled', false); // Cần thiết lập item khi tạo mới
                loadAvailableItems(null, null);
                new bootstrap.Modal(document.getElementById('arStaParamModal')).show();
            };

            window.arStaParamEdit = function (paramNo, itemNo, itemName) {
                $.ajax({
                    url: '/ar/attendanceSettings/api/arStaItemParam/' + paramNo,
                    type: 'GET',
                    success: function (data) {
                        $('#arStaParamModalTitle').text('Cập nhật Thông số: ' + paramNo);
                        $('#arStaParamNo').val(data.paramNo);
                        $('#arStaParamUnit').val(data.unit);
                        $('#arStaParamMinUnit').val(data.minUnit);
                        $('#arStaParamManageFlag').val(data.manageFlag);
                        $('#arStaParamOrderno').val(data.orderno);
                        $('#arStaParamCalOrder').val(data.calOrder);
                        $('#arStaParamActivity').val(data.activity !== undefined ? data.activity : 1);
                        $('#calOrderContainer').show();

                        $('#arStaParamItemNo').prop('disabled', true); // Không cho phép đổi item 
                        loadAvailableItems(data.itemNo, data.itemNameVi || data.itemNo);

                        new bootstrap.Modal(document.getElementById('arStaParamModal')).show();
                    },
                    error: function () { toastr.error('Lỗi khi tải dữ liệu!'); }
                });
            };

            window.arStaParamSaveData = function () {
                var itemNo = $('#arStaParamItemNo').val();
                if (!itemNo) {
                    toastr.warning('Vui lòng chọn Hạng mục tổng hợp!');
                    return;
                }

                var paramNo = $('#arStaParamNo').val();

                var formData = {
                    paramNo: paramNo || null,
                    itemNo: itemNo,
                    unit: $('#arStaParamUnit').val(),
                    minUnit: parseFloat($('#arStaParamMinUnit').val()) || null,
                    manageFlag: parseInt($('#arStaParamManageFlag').val()) || null,
                    orderno: $('#arStaParamOrderno').val() || null,
                    activity: parseInt($('#arStaParamActivity').val()) || 0
                };

                if (paramNo) {
                    formData.calOrder = parseInt($('#arStaParamCalOrder').val()) || null;
                }

                $.ajax({
                    url: '/ar/attendanceSettings/api/arStaItemParam/save',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(formData),
                    success: function (res) {
                        toastr.success(res.message);
                        var modalEl = document.getElementById('arStaParamModal');
                        if (modalEl) bootstrap.Modal.getInstance(modalEl).hide();
                        table.ajax.reload();
                    },
                    error: function (err) {
                        toastr.error('Lỗi khi lưu!');
                    }
                });
            };

            window.arStaParamDelete = function (paramNo) {
                if (confirm('Bạn có chắc chắn muốn xóa thông số này?')) {
                    $.ajax({
                        url: '/ar/attendanceSettings/api/arStaItemParam/delete/' + paramNo,
                        type: 'DELETE',
                        success: function (res) {
                            toastr.success(res.message);
                            table.ajax.reload();
                        },
                        error: function (err) {
                            toastr.error('Lỗi khi xóa!');
                        }
                    });
                }
            };
        });
    </script>
</template>
