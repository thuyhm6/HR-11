<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/master :: master}">
<head>
    <title th:text="${title}">Quản lý đa ngôn ngữ</title>
    <style>
        .sidebar {
            width: 300px;
            background-color: #f8f9fa;
            border-right: 1px solid #dee2e6;
            height: calc(100vh - 60px);
            overflow-y: auto;
        }
        
        .sidebar-header {
            padding: 15px;
            background-color: #e9ecef;
            border-bottom: 1px solid #dee2e6;
            font-weight: bold;
        }
        
        .tree-view {
            padding: 10px;
        }
        
        .tree-node {
            margin-bottom: 2px;
        }
        
        .tree-node-header {
            padding: 8px 12px;
            background-color: #fff;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
        }
        
        .tree-node-header:hover {
            background-color: #f8f9fa;
            border-color: #007bff;
        }
        
        .tree-node.active .tree-node-header {
            background-color: #007bff;
            color: white;
            border-color: #0056b3;
        }
        
        .tree-node-children {
            margin-left: 20px;
            margin-top: 2px;
        }
        
        .toggle-icon {
            font-size: 12px;
            transition: transform 0.2s ease;
        }
        
        .tree-node.expanded .toggle-icon {
            transform: rotate(90deg);
        }
        
        .content-area {
            flex: 1;
            padding: 20px;
        }
        
        .search-section {
            margin-bottom: 20px;
        }
        
        .search-input {
            width: 300px;
            padding: 8px 12px;
            border: 1px solid #ced4da;
            border-radius: 4px;
        }
        
        .btn-group {
            margin-left: 10px;
        }
        
        .btn {
            padding: 8px 16px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            background-color: #fff;
            cursor: pointer;
            margin-right: 5px;
        }
        
        .btn-primary {
            background-color: #007bff;
            color: white;
            border-color: #007bff;
        }
        
        .btn-success {
            background-color: #28a745;
            color: white;
            border-color: #28a745;
        }
        
        .btn-warning {
            background-color: #ffc107;
            color: #212529;
            border-color: #ffc107;
        }
        
        .btn-danger {
            background-color: #dc3545;
            color: white;
            border-color: #dc3545;
        }
        
        .btn:hover {
            opacity: 0.8;
        }
        
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        .data-table th,
        .data-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #dee2e6;
        }
        
        .data-table th {
            background-color: #f8f9fa;
            font-weight: bold;
        }
        
        .data-table tbody tr:nth-child(even) {
            background-color: #f8f9fa;
        }
        
        .data-table tbody tr:hover {
            background-color: #e9ecef;
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }
        
        .modal-content {
            background-color: #fefefe;
            margin: 5% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            max-width: 600px;
            border-radius: 8px;
        }
        
        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .close:hover {
            color: black;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        .form-input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ced4da;
            border-radius: 4px;
        }
        
        .form-textarea {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            min-height: 100px;
            resize: vertical;
        }
        
        .language-tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 1px solid #dee2e6;
        }
        
        .language-tab {
            padding: 10px 20px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }
        
        .language-tab.active {
            border-bottom-color: #007bff;
            color: #007bff;
        }
        
        .language-tab:hover {
            background-color: #f8f9fa;
        }
        
        .language-content {
            display: none;
        }
        
        .language-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <div th:fragment="content">
        <div style="display: flex; height: calc(100vh - 60px);">
            <!-- Sidebar -->
            <div class="sidebar">
                <div class="sidebar-header">
                    Dữ liệu đa ngôn ngữ
                </div>
                <div class="tree-view" id="treeView">
                    <!-- Dữ liệu sẽ được load bằng JavaScript -->
                </div>
            </div>
            
            <!-- Content Area -->
            <div class="content-area">
                <!-- Search Section -->
                <div class="search-section">
                    <input type="text" class="search-input" id="searchInput" placeholder="Tên mã:" />
                    <button class="btn btn-primary" onclick="searchData()">Tra cứu</button>
                    <div class="btn-group">
                        <button class="btn btn-success" onclick="showAddModal()">Thêm mới</button>
                        <button class="btn btn-warning" onclick="showEditModal()" id="editBtn" disabled>Sửa</button>
                        <button class="btn btn-danger" onclick="deleteSelected()" id="deleteBtn" disabled>Xóa</button>
                        <button class="btn btn-info" onclick="createSampleData()">Tạo dữ liệu mẫu</button>
                    </div>
                </div>
                
                <!-- Language Tabs -->
                <div class="language-tabs">
                    <div class="language-tab active" th:each="lang : ${availableLanguages}" 
                         th:onclick="switchLanguage(this)" 
                         th:data-language="${lang}"
                         th:text="${#strings.equals(lang, 'vi') ? 'Tiếng Việt' : #strings.equals(lang, 'en') ? 'English' : #strings.equals(lang, 'zh') ? '中文' : #strings.equals(lang, 'ko') ? '한국어' : lang}">
                        Language
                    </div>
                </div>
                
                <!-- Data Table -->
                <table class="data-table" id="dataTable">
                    <thead>
                        <tr>
                            <th>STT</th>
                            <th>Mã số</th>
                            <th>Ngôn ngữ</th>
                            <th>Nội dung</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="dataTableBody">
                        <!-- Data will be loaded here -->
                    </tbody>
                </table>
            </div>
        </div>
        
        <!-- Add/Edit Modal -->
        <div id="contentModal" class="modal">
            <div class="modal-content">
                <span class="close" onclick="closeModal()">&times;</span>
                <h2 id="modalTitle">Thêm nội dung đa ngôn ngữ</h2>
                <form id="contentForm">
                    <div class="form-group">
                        <label class="form-label">Mã số:</label>
                        <input type="text" class="form-input" id="inputNo" required />
                    </div>
                    <div class="form-group">
                        <label class="form-label">Ngôn ngữ:</label>
                        <select class="form-input" id="inputLanguage" required>
                            <option value="">Chọn ngôn ngữ</option>
                            <option th:each="lang : ${availableLanguages}" 
                                    th:value="${lang}"
                                    th:text="${#strings.equals(lang, 'vi') ? 'Tiếng Việt' : #strings.equals(lang, 'en') ? 'English' : #strings.equals(lang, 'zh') ? '中文' : #strings.equals(lang, 'ko') ? '한국어' : lang}">
                                Language
                            </option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Nội dung:</label>
                        <textarea class="form-textarea" id="inputContent" required></textarea>
                    </div>
                    <div style="text-align: right; margin-top: 20px;">
                        <button type="button" class="btn" onclick="closeModal()">Hủy</button>
                        <button type="submit" class="btn btn-primary">Lưu</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <script>
        let currentCodeNo = null;
        let currentLanguage = 'vi';
        let selectedRow = null;
        let treeData = {};
        
        // Load tree data on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadTreeData();
        });
        
        // Load tree data
        function loadTreeData() {
            fetch('/multilingual/codes/children/ROOT')
                .then(response => response.json())
                .then(data => {
                    buildTree(data);
                })
                .catch(error => {
                    console.error('Error loading tree data:', error);
                    // Fallback: load root codes
                    loadRootCodes();
                });
        }
        
        // Load root codes
        function loadRootCodes() {
            fetch('/multilingual/codes')
                .then(response => response.json())
                .then(data => {
                    const rootCodes = data.filter(code => !code.parentCodeNo || code.parentCodeNo === '');
                    buildTree(rootCodes);
                })
                .catch(error => {
                    console.error('Error loading root codes:', error);
                });
        }
        
        // Build tree structure
        function buildTree(codes) {
            const treeView = document.getElementById('treeView');
            treeView.innerHTML = '';
            
            codes.forEach(code => {
                const node = createTreeNode(code);
                treeView.appendChild(node);
            });
        }
        
        // Create tree node
        function createTreeNode(code) {
            const nodeDiv = document.createElement('div');
            nodeDiv.className = 'tree-node';
            nodeDiv.dataset.codeNo = code.codeNo;
            
            const headerDiv = document.createElement('div');
            headerDiv.className = 'tree-node-header';
            headerDiv.onclick = () => toggleNode(headerDiv);
            
            const contentSpan = document.createElement('span');
            contentSpan.textContent = code.description || code.codeNo;
            
            const iconSpan = document.createElement('span');
            iconSpan.className = 'toggle-icon';
            iconSpan.textContent = '▶';
            
            headerDiv.appendChild(contentSpan);
            headerDiv.appendChild(iconSpan);
            
            const childrenDiv = document.createElement('div');
            childrenDiv.className = 'tree-node-children';
            childrenDiv.style.display = 'none';
            
            nodeDiv.appendChild(headerDiv);
            nodeDiv.appendChild(childrenDiv);
            
            return nodeDiv;
        }
        
        // Toggle tree node
        function toggleNode(element) {
            const nodeDiv = element.parentElement;
            const children = element.nextElementSibling;
            const icon = element.querySelector('.toggle-icon');
            
            if (children.style.display === 'none') {
                // Expand node
                children.style.display = 'block';
                icon.textContent = '▼';
                nodeDiv.classList.add('expanded');
                
                // Load children if not loaded yet
                if (children.children.length === 0) {
                    loadChildren(nodeDiv.dataset.codeNo, children);
                }
            } else {
                // Collapse node
                children.style.display = 'none';
                icon.textContent = '▶';
                nodeDiv.classList.remove('expanded');
            }
        }
        
        // Load children for a node
        function loadChildren(parentCodeNo, childrenContainer) {
            fetch(`/multilingual/codes/children/${parentCodeNo}`)
                .then(response => response.json())
                .then(data => {
                    data.forEach(childCode => {
                        const childNode = createTreeNode(childCode);
                        childNode.querySelector('.tree-node-header').onclick = () => selectCode(childNode);
                        childrenContainer.appendChild(childNode);
                    });
                })
                .catch(error => {
                    console.error('Error loading children:', error);
                });
        }
        
        // Select code
        function selectCode(nodeElement) {
            // Remove active class from all nodes
            document.querySelectorAll('.tree-node').forEach(node => {
                node.classList.remove('active');
            });
            
            // Add active class to selected
            nodeElement.classList.add('active');
            
            // Load data
            currentCodeNo = nodeElement.dataset.codeNo;
            loadData();
        }
        
        // Switch language
        function switchLanguage(element) {
            // Remove active class from all tabs
            document.querySelectorAll('.language-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            
            // Add active class to selected
            element.classList.add('active');
            
            // Update current language
            currentLanguage = element.dataset.language;
            
            // Reload data
            if (currentCodeNo) {
                loadData();
            }
        }
        
        // Load data
        function loadData() {
            if (!currentCodeNo) return;
            
            // Load code info and children
            Promise.all([
                fetch(`/multilingual/data/by-code/${currentCodeNo}`).then(r => r.json()),
                fetch(`/multilingual/codes/children/${currentCodeNo}`).then(r => r.json())
            ])
            .then(([codeData, childCodes]) => {
                if (codeData.success) {
                    displayData(codeData.contents, codeData.codeInfo, childCodes);
                }
            })
            .catch(error => {
                console.error('Error loading data:', error);
                // Fallback: try to load just the code data
                fetch(`/multilingual/data/by-code/${currentCodeNo}`)
                    .then(response => response.json())
                    .then(data => {
                        if (data.success) {
                            displayData(data.contents, data.codeInfo, []);
                        }
                    })
                    .catch(fallbackError => {
                        console.error('Fallback error:', fallbackError);
                    });
            });
        }
        
        // Display data
        function displayData(contents, codeInfo, childCodes) {
            const tbody = document.getElementById('dataTableBody');
            tbody.innerHTML = '';
            
            // Hiển thị thông tin mã code
            if (codeInfo) {
                const infoRow = document.createElement('tr');
                infoRow.className = 'table-info';
                infoRow.innerHTML = `
                    <td colspan="5">
                        <strong>Thông tin mã code:</strong> ${codeInfo.description || codeInfo.codeNo}
                        ${codeInfo.remark ? '<br><small class="text-muted">' + codeInfo.remark + '</small>' : ''}
                    </td>
                `;
                tbody.appendChild(infoRow);
            }
            
            // Hiển thị nội dung đa ngôn ngữ
            if (contents && Object.keys(contents).length > 0) {
                let index = 1;
                for (const [language, content] of Object.entries(contents)) {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${index++}</td>
                        <td>${currentCodeNo}</td>
                        <td>${getLanguageName(language)}</td>
                        <td>${content}</td>
                        <td>
                            <button class="btn btn-warning btn-sm" onclick="editRow(this)">Sửa</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteRow(this)">Xóa</button>
                        </td>
                    `;
                    row.dataset.language = language;
                    tbody.appendChild(row);
                }
            } else {
                // Hiển thị thông báo không có dữ liệu
                const noDataRow = document.createElement('tr');
                noDataRow.innerHTML = `
                    <td colspan="5" class="text-center text-muted">
                        <i>Chưa có nội dung đa ngôn ngữ cho mã code này</i>
                    </td>
                `;
                tbody.appendChild(noDataRow);
            }
            
            // Hiển thị danh sách con nếu có
            if (childCodes && childCodes.length > 0) {
                const childHeaderRow = document.createElement('tr');
                childHeaderRow.className = 'table-secondary';
                childHeaderRow.innerHTML = `
                    <td colspan="5">
                        <strong>Mã code con (${childCodes.length}):</strong>
                    </td>
                `;
                tbody.appendChild(childHeaderRow);
                
                childCodes.forEach((childCode, index) => {
                    const childRow = document.createElement('tr');
                    childRow.className = 'table-light';
                    childRow.innerHTML = `
                        <td>${index + 1}</td>
                        <td>${childCode.codeNo}</td>
                        <td>${childCode.description || 'N/A'}</td>
                        <td>${childCode.remark || 'N/A'}</td>
                        <td>
                            <button class="btn btn-primary btn-sm" onclick="selectChildCode('${childCode.codeNo}')">Chọn</button>
                        </td>
                    `;
                    tbody.appendChild(childRow);
                });
            }
        }
        
        // Select child code
        function selectChildCode(codeNo) {
            // Find and select the node in tree
            const nodeElement = document.querySelector(`[data-code-no="${codeNo}"]`);
            if (nodeElement) {
                selectCode(nodeElement);
            }
        }
        
        // Get language name
        function getLanguageName(language) {
            const names = {
                'vi': 'Tiếng Việt',
                'en': 'English',
                'zh': '中文',
                'ko': '한국어'
            };
            return names[language] || language;
        }
        
        // Search data
        function searchData() {
            const searchTerm = document.getElementById('searchInput').value;
            if (searchTerm.trim()) {
                // Implement search logic
                console.log('Searching for:', searchTerm);
            }
        }
        
        // Show add modal
        function showAddModal() {
            document.getElementById('modalTitle').textContent = 'Thêm nội dung đa ngôn ngữ';
            document.getElementById('contentForm').reset();
            document.getElementById('inputNo').value = currentCodeNo || '';
            document.getElementById('contentModal').style.display = 'block';
        }
        
        // Show edit modal
        function showEditModal() {
            if (!selectedRow) return;
            
            document.getElementById('modalTitle').textContent = 'Sửa nội dung đa ngôn ngữ';
            document.getElementById('inputNo').value = currentCodeNo;
            document.getElementById('inputLanguage').value = selectedRow.dataset.language;
            document.getElementById('inputContent').value = selectedRow.cells[3].textContent;
            document.getElementById('contentModal').style.display = 'block';
        }
        
        // Edit row
        function editRow(button) {
            selectedRow = button.closest('tr');
            document.getElementById('editBtn').disabled = false;
            document.getElementById('deleteBtn').disabled = false;
            showEditModal();
        }
        
        // Delete row
        function deleteRow(button) {
            if (confirm('Bạn có chắc chắn muốn xóa nội dung này?')) {
                const row = button.closest('tr');
                const language = row.dataset.language;
                
                fetch('/multilingual/delete', {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: `no=${currentCodeNo}&language=${language}`
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        loadData();
                        alert(data.message);
                    } else {
                        alert('Lỗi: ' + data.message);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Có lỗi xảy ra khi xóa dữ liệu');
                });
            }
        }
        
        // Delete selected
        function deleteSelected() {
            if (selectedRow) {
                deleteRow(selectedRow.querySelector('.btn-danger'));
            }
        }
        
        // Close modal
        function closeModal() {
            document.getElementById('contentModal').style.display = 'none';
            selectedRow = null;
            document.getElementById('editBtn').disabled = true;
            document.getElementById('deleteBtn').disabled = true;
        }
        
        // Form submit
        document.getElementById('contentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const no = document.getElementById('inputNo').value;
            const language = document.getElementById('inputLanguage').value;
            const content = document.getElementById('inputContent').value;
            
            const isEdit = document.getElementById('modalTitle').textContent.includes('Sửa');
            const url = isEdit ? '/multilingual/update' : '/multilingual/save';
            const method = isEdit ? 'PUT' : 'POST';
            
            fetch(url, {
                method: method,
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: `no=${no}&language=${language}&content=${content}`
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    closeModal();
                    loadData();
                    alert(data.message);
                } else {
                    alert('Lỗi: ' + data.message);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Có lỗi xảy ra khi lưu dữ liệu');
            });
        });
        
        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('contentModal');
            if (event.target === modal) {
                closeModal();
            }
        }
        
        // Create sample data
        function createSampleData() {
            if (confirm('Bạn có chắc chắn muốn tạo dữ liệu mẫu? Dữ liệu cũ sẽ bị ghi đè.')) {
                fetch('/multilingual/create-sample-data', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    }
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        alert(data.message);
                        // Reload tree data
                        loadTreeData();
                    } else {
                        alert('Lỗi: ' + data.message);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Có lỗi xảy ra khi tạo dữ liệu mẫu');
                });
            }
        }
    </script>
</body>
</html>
