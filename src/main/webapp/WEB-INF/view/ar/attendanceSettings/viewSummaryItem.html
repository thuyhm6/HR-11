<div th:fragment="content">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-body">
                    <!-- Search Form -->
                    <form id="arStaItemSearchForm" class="row g-3 mb-4">
                        <div class="col-md-4">
                            <label for="searchArStaItem" class="form-label">Hạng mục</label>
                            <input type="text" class="form-control" id="searchArStaItem"
                                placeholder="Nhập mã / tên hạng mục tổng hợp">
                        </div>

                        <div class="col-md-4 d-flex align-items-end">
                            <button type="button" class="btn btn-primary me-2" onclick="arStaItemSearchData()">
                                <i class="bx bx-search"></i> Tìm kiếm
                            </button>
                            <button type="button" class="btn btn-secondary" onclick="arStaItemClearSearch()">
                                <i class="bx bx-x"></i> Xóa lọc
                            </button>
                            <button type="button" class="btn btn-success ms-2" onclick="arStaItemOpenModal()">
                                <i class="bx bx-plus"></i> Thêm mới
                            </button>
                        </div>
                    </form>

                    <!-- Data Table -->
                    <div class="table-responsive">
                        <table id="arStaItemTable" class="table table-striped table-bordered table-hover w-100">
                            <thead class="table-light">
                                <tr>
                                    <th>STT</th>
                                    <th>Mã hạng mục (No)</th>
                                    <th>Tên hạng mục</th>
                                    <th>Đơn vị</th>
                                    <th>ID Hạng mục</th>
                                    <th>Sắp xếp</th>
                                    <th>Hiển thị (Y/N)</th>
                                    <th>Thứ tự hiển thị</th>
                                    <th>Trạng thái</th>
                                    <th class="text-center" style="width: 100px;">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Data loaded via AJAX -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal Thêm/Sửa -->
<div class="modal fade" id="arStaItemModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="arStaItemModalTitle">Thiết lập hạng mục tổng hợp</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="arStaItemForm">
                    <input type="hidden" id="arStaItemNo" name="itemNo">

                    <h6 class="mb-3 text-primary border-bottom pb-2">Thông tin Đa Ngôn Ngữ</h6>
                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label for="arStaNameVi" class="form-label">Tên Tiếng Việt <span
                                    class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="arStaNameVi" required>
                        </div>
                        <div class="col-md-6">
                            <label for="arStaNameEn" class="form-label">Tên Tiếng Anh</label>
                            <input type="text" class="form-control" id="arStaNameEn">
                        </div>
                        <div class="col-md-6">
                            <label for="arStaNameZh" class="form-label">Tên Tiếng Trung</label>
                            <input type="text" class="form-control" id="arStaNameZh">
                        </div>
                        <div class="col-md-6">
                            <label for="arStaNameKo" class="form-label">Tên Tiếng Hàn</label>
                            <input type="text" class="form-control" id="arStaNameKo">
                        </div>
                    </div>

                    <h6 class="mb-3 text-primary border-bottom pb-2">Thuộc Tính Hạng Mục</h6>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="arStaUnit" class="form-label">Đơn vị (ngày, giờ, phút)</label>
                            <input type="text" class="form-control" id="arStaUnit">
                        </div>
                        <div class="col-md-6">
                            <label for="arStaItemId" class="form-label">ID Hạng mục (CODE)</label>
                            <input type="text" class="form-control" id="arStaItemId">
                        </div>
                        <div class="col-md-6">
                            <label for="arStaOrderno" class="form-label">Sắp xếp</label>
                            <input type="number" class="form-control" id="arStaOrderno">
                        </div>
                        <div class="col-md-6">
                            <label for="arStaShowYn" class="form-label">Có hiển thị (Y / N)</label>
                            <select class="form-select" id="arStaShowYn">
                                <option value="Y">Có (Y)</option>
                                <option value="N">Không (N)</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="arStaShowOrder" class="form-label">Thứ tự hiển thị</label>
                            <input type="number" class="form-control" id="arStaShowOrder">
                        </div>
                        <div class="col-md-6">
                            <label for="arStaActivity" class="form-label">Trạng thái (1: Hoạt động, 0: Ngừng)</label>
                            <select class="form-select" id="arStaActivity">
                                <option value="1">1 - Hoạt động</option>
                                <option value="0">0 - Ngừng</option>
                            </select>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                <button type="button" class="btn btn-primary" onclick="arStaItemSaveData()">Lưu dữ liệu</button>
            </div>
        </div>
    </div>
</div>

<!-- Scripts -->
<template id="fragmentScripts">
    <script th:inline="javascript">
        $(document).ready(function () {
            var table = $('#arStaItemTable').DataTable({
                destroy: true,
                scrollY: "calc(100vh - 280px)",
                scrollX: true,
                select: 'single',
                scrollCollapse: true,
                paging: true,
                searching: true,
                lengthChange: true,
                pageLength: 25,
                processing: true,

                dom: 'Blfrtip',
                buttons: ['copy', 'csv', 'excel', 'pdf', 'print'],
                ajax: {
                    url: '/ar/attendanceSettings/api/arStaItem',
                    dataSrc: '',
                    data: function (d) {
                        d.searchText = $('#searchArStaItem').val();
                    }
                },
                columns: [
                    { data: null, render: function (data, type, row, meta) { return meta.row + 1; } },
                    { data: 'itemNo' },
                    { data: 'nameVi' },
                    { data: 'unit' },
                    { data: 'staItemId' },
                    { data: 'orderno' },
                    { data: 'showYn' },
                    { data: 'showOrder' },
                    {
                        data: 'activity', render: function (data) {
                            return data == 1 ? '<span class="badge bg-success">Hoạt động</span>' : '<span class="badge bg-secondary">Ngừng</span>';
                        }
                    },
                    {
                        data: null,
                        className: "text-center",
                        render: function (data, type, row) {
                            return `
                                <div class="btn-group btn-group-sm">
                                    <button class="btn btn-warning" onclick="arStaItemEdit('${row.itemNo}')"><i class="bx bx-edit"></i></button>
                                    <button class="btn btn-danger" onclick="arStaItemDelete('${row.itemNo}')"><i class="bx bx-trash"></i></button>
                                </div>
                            `;
                        }
                    }
                ]
            });

            window.arStaItemSearchData = function () { table.ajax.reload(); };
            window.arStaItemClearSearch = function () {
                $('#arStaItemSearchForm')[0].reset();
                table.ajax.reload();
            };

            window.arStaItemOpenModal = function () {
                $('#arStaItemModalTitle').text('Thêm mới Hạng mục tổng hợp');
                $('#arStaItemForm')[0].reset();
                $('#arStaItemNo').val('');
                $('#arStaActivity').val('1');
                $('#arStaShowYn').val('Y');
                new bootstrap.Modal(document.getElementById('arStaItemModal')).show();
            };

            window.arStaItemEdit = function (id) {
                $.ajax({
                    url: '/ar/attendanceSettings/api/arStaItem/' + id,
                    type: 'GET',
                    success: function (data) {
                        $('#arStaItemModalTitle').text('Cập nhật Hạng mục tổng hợp');
                        $('#arStaItemNo').val(data.itemNo);
                        $('#arStaNameVi').val(data.nameVi);
                        $('#arStaNameEn').val(data.nameEn);
                        $('#arStaNameZh').val(data.nameZh);
                        $('#arStaNameKo').val(data.nameKo);
                        $('#arStaUnit').val(data.unit);
                        $('#arStaItemId').val(data.staItemId);
                        $('#arStaOrderno').val(data.orderno);
                        $('#arStaShowYn').val(data.showYn || 'Y');
                        $('#arStaShowOrder').val(data.showOrder);
                        $('#arStaActivity').val(data.activity !== undefined ? data.activity : 1);

                        new bootstrap.Modal(document.getElementById('arStaItemModal')).show();
                    },
                    error: function () { toastr.error('Lỗi khi tải dữ liệu!'); }
                });
            };

            window.arStaItemSaveData = function () {
                if (!$('#arStaNameVi').val()) {
                    toastr.warning('Vui lòng nhập Tên tiếng Việt');
                    return;
                }

                var formData = {
                    itemNo: $('#arStaItemNo').val() || null,
                    nameVi: $('#arStaNameVi').val(),
                    nameEn: $('#arStaNameEn').val(),
                    nameZh: $('#arStaNameZh').val(),
                    nameKo: $('#arStaNameKo').val(),
                    unit: $('#arStaUnit').val(),
                    staItemId: $('#arStaItemId').val(),
                    orderno: $('#arStaOrderno').val() || null,
                    showYn: $('#arStaShowYn').val(),
                    showOrder: $('#arStaShowOrder').val() || null,
                    activity: parseInt($('#arStaActivity').val()) || 0
                };

                $.ajax({
                    url: '/ar/attendanceSettings/api/arStaItem/save',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(formData),
                    success: function (res) {
                        toastr.success(res.message);
                        var modalEl = document.getElementById('arStaItemModal');
                        if (modalEl) bootstrap.Modal.getInstance(modalEl).hide();
                        table.ajax.reload();
                    },
                    error: function (err) {
                        toastr.error('Lỗi khi lưu!');
                    }
                });
            };

            window.arStaItemDelete = function (id) {
                if (confirm('Bạn có chắc chắn muốn xóa hạng mục này?')) {
                    $.ajax({
                        url: '/ar/attendanceSettings/api/arStaItem/delete/' + id,
                        type: 'DELETE',
                        success: function (res) {
                            toastr.success(res.message);
                            table.ajax.reload();
                        },
                        error: function (err) {
                            toastr.error('Lỗi khi xóa!');
                        }
                    });
                }
            };
        });
    </script>
</template>
