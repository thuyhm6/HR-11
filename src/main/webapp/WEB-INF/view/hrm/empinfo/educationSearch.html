<div th:fragment="content">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-body">
                    <!-- Search Form -->
                    <form id="searchForm" class="row g-3 mb-2">
                        <div class="col-md-3">
                            <label for="searchEmpId" class="form-label">Mã nhân viên</label>
                            <input type="text" class="form-control" id="searchEmpId" placeholder="Nhập mã nhân viên">
                        </div>
                        <div class="col-md-3">
                            <label for="searchLocalName" class="form-label">Tên nhân viên</label>
                            <input type="text" class="form-control" id="searchLocalName"
                                placeholder="Nhập tên nhân viên">
                        </div>
                        <div class="col-md-3">
                            <label for="searchInstitutionName" class="form-label">Tên trường/Cơ sở</label>
                            <input type="text" class="form-control" id="searchInstitutionName"
                                placeholder="Nhập tên trường">
                        </div>
                        <div class="col-md-3 d-flex align-items-end">
                            <button type="button" class="btn btn-primary me-2" onclick="searchData()">
                                <i class="bx bx-search"></i> Tìm kiếm
                            </button>
                            <button type="button" class="btn btn-secondary" onclick="clearSearch()">
                                <i class="bx bx-x"></i> Xóa lọc
                            </button>
                            <button type="button" class="btn btn-success ms-2" onclick="openModal()">
                                <i class="bx bx-plus"></i> Thêm mới
                            </button>
                        </div>
                    </form>

                    <!-- Data Table -->
                    <div class="table-responsive">
                        <table id="educationTable" class="table table-striped table-bordered table-hover"
                            style="width:100%">
                            <thead class="table-light">
                                <tr>
                                    <th>STT</th>
                                    <th>Mã NV</th>
                                    <th>Họ tên</th>
                                    <th>Tên trường</th>
                                    <th>Bằng cấp</th>
                                    <th>Chuyên ngành</th>
                                    <th>Từ ngày</th>
                                    <th>Đến ngày</th>
                                    <th>Hình thức</th>
                                    <th>Quốc gia</th>
                                    <th>Ghi chú</th>
                                    <th class="text-center" style="width: 100px;">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Data loaded via AJAX -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal Thêm/Sửa -->
<div class="modal fade" id="educationModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Thông tin quá trình học tập</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="educationForm">
                    <input type="hidden" id="educNo" name="educNo">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label for="empNameDisplay" class="form-label">Nhân viên <span
                                    class="text-danger">*</span></label>
                            <div class="input-group">
                                <input type="text" class="form-control" id="empNameDisplay"
                                    placeholder="Chọn nhân viên..." readonly required>
                                <input type="hidden" id="personId" name="personId">
                                <button class="btn btn-outline-primary" type="button"
                                    onclick="openEmployeeSearchPopup()">
                                    <i class="bx bx-search"></i>
                                </button>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <label for="institutionName" class="form-label">Tên trường/Cơ sở <span
                                    class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="institutionName" name="institutionName"
                                required>
                        </div>
                        <div class="col-md-4">
                            <label for="degreeCode" class="form-label">Bằng cấp</label>
                            <input type="text" class="form-control" id="degreeCode" name="degreeCode">
                        </div>

                        <div class="col-md-4">
                            <label for="subject" class="form-label">Chuyên ngành chính</label>
                            <input type="text" class="form-control" id="subject" name="subject">
                        </div>
                        <div class="col-md-4">
                            <label for="startDate" class="form-label">Từ ngày</label>
                            <input type="text" class="form-control" id="startDate" name="startDate"
                                placeholder="YYYYMMDD">
                        </div>
                        <div class="col-md-4">
                            <label for="endDate" class="form-label">Đến ngày</label>
                            <input type="text" class="form-control" id="endDate" name="endDate" placeholder="YYYYMMDD">
                        </div>

                        <div class="col-md-4">
                            <label for="schoolLength" class="form-label">Thời gian học (Hệ đào tạo)</label>
                            <input type="text" class="form-control" id="schoolLength" name="schoolLength">
                        </div>
                        <div class="col-md-4">
                            <label for="siteCountry" class="form-label">Quốc gia</label>
                            <input type="text" class="form-control" id="siteCountry" name="siteCountry">
                        </div>
                        <div class="col-md-4">
                            <label for="place" class="form-label">Địa điểm</label>
                            <input type="text" class="form-control" id="place" name="place">
                        </div>

                        <div class="col-md-4">
                            <label for="thesisNameLocal" class="form-label">Tên luận văn</label>
                            <input type="text" class="form-control" id="thesisNameLocal" name="thesisNameLocal">
                        </div>
                        <div class="col-md-4">
                            <label for="thesisNameEng" class="form-label">Tên luận văn (Anh)</label>
                            <input type="text" class="form-control" id="thesisNameEng" name="thesisNameEng">
                        </div>
                        <div class="col-md-4">
                            <label for="subjectSecond" class="form-label">Chuyên ngành 2</label>
                            <input type="text" class="form-control" id="subjectSecond" name="subjectSecond">
                        </div>

                        <div class="col-md-3">
                            <label for="eduDegNum" class="form-label">Số bằng cấp</label>
                            <input type="text" class="form-control" id="eduDegNum" name="eduDegNum">
                        </div>
                        <div class="col-md-3">
                            <label for="degreesCode" class="form-label">Mã học vị</label>
                            <input type="text" class="form-control" id="degreesCode" name="degreesCode">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Du học</label>
                            <select class="form-select" id="studyExperience" name="studyExperience">
                                <option value="N">Không</option>
                                <option value="Y">Có</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Bằng cao nhất</label>
                            <select class="form-select" id="finalDegreeWhether" name="finalDegreeWhether">
                                <option value="N">Không</option>
                                <option value="Y">Có</option>
                            </select>
                        </div>

                        <div class="col-md-12">
                            <label for="remark" class="form-label">Ghi chú</label>
                            <textarea class="form-control" id="remark" name="remark" rows="2"></textarea>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                <button type="button" class="btn btn-primary" onclick="saveData()">Lưu</button>
            </div>
        </div>
    </div>
</div>

<template id="fragmentScripts">
    <script th:inline="javascript">
        $(document).ready(function () {
            var table = $('#educationTable').DataTable({
                destroy: true,
                scrollY: "calc(100vh - 280px)",
                scrollCollapse: true,
                paging: true,
                searching: true,
                lengthChange: true,
                pageLength: 20,
                columnDefs: [
                    { "width": "2%", "targets": 0 },
                ],
                processing: true,

                dom: 'Blfrtip',
                buttons: [
                    'copy', 'csv', 'excel', 'pdf', 'print'
                ],
                ajax: {
                    url: '/hrm/empinfo/api/education',
                    dataSrc: '',
                    data: function (d) {
                        d.empId = $('#searchEmpId').val();
                        d.localName = $('#searchLocalName').val();
                        d.institutionName = $('#searchInstitutionName').val();
                    }
                },
                columns: [
                    {
                        data: null,
                        render: function (data, type, row, meta) {
                            return meta.row + 1;
                        }
                    },
                    { data: 'empId' },
                    { data: 'localName' },
                    { data: 'institutionName' },
                    { data: 'degreeCode' },
                    { data: 'subject' },
                    { data: 'startDate' },
                    { data: 'endDate' },
                    { data: 'schoolLength' },
                    { data: 'siteCountry' },
                    { data: 'remark' },
                    {
                        data: null,
                        className: "text-center",
                        render: function (data, type, row) {
                            return `
                                <div class="btn-group btn-group-sm">
                                    <button class="btn btn-warning" onclick="editRaw(${row.educNo})">
                                        <i class="bx bx-edit"></i>
                                    </button>
                                    <button class="btn btn-danger" onclick="deleteRaw(${row.educNo})">
                                        <i class="bx bx-trash"></i>
                                    </button>
                                </div>
                            `;
                        }
                    }
                ]
            });

            window.searchData = function () {
                table.ajax.reload();
            };

            window.clearSearch = function () {
                $('#searchForm')[0].reset();
                table.ajax.reload();
            };

            // Mở modal thêm mới
            window.openModal = function () {
                $('#modalTitle').text('Thêm mới Quá trình học tập');
                $('#educationForm')[0].reset();
                $('#educNo').val('');
                $('#personId').val('');
                var modal = new bootstrap.Modal(document.getElementById('educationModal'));
                modal.show();
            };

            // Mở popup tìm kiếm nhân viên
            window.openEmployeeSearchPopup = function () {
                if (typeof EmployeeSearchModal !== 'undefined') {
                    EmployeeSearchModal.open(function (employee) {
                        $('#personId').val(employee.personId);
                        $('#empNameDisplay').val(employee.empId + ' - ' + employee.localName);
                    });
                } else {
                    alert('Component tìm kiếm nhân viên chưa được tải!');
                }
            };

            // Sửa
            window.editRaw = function (id) {
                $.ajax({
                    url: '/hrm/empinfo/api/education/' + id,
                    type: 'GET',
                    success: function (data) {
                        $('#modalTitle').text('Cập nhật Quá trình học tập');
                        // Populate form fields
                        $('#educNo').val(data.educNo);
                        $('#personId').val(data.personId);
                        $('#empNameDisplay').val((data.empId || '') + ' - ' + (data.localName || ''));

                        $('#institutionName').val(data.institutionName);
                        $('#degreeCode').val(data.degreeCode);
                        $('#subject').val(data.subject);
                        $('#startDate').val(data.startDate);
                        $('#endDate').val(data.endDate);
                        $('#schoolLength').val(data.schoolLength);
                        $('#siteCountry').val(data.siteCountry);
                        $('#place').val(data.place);
                        $('#thesisNameLocal').val(data.thesisNameLocal);
                        $('#thesisNameEng').val(data.thesisNameEng);
                        $('#subjectSecond').val(data.subjectSecond);
                        $('#eduDegNum').val(data.eduDegNum);
                        $('#degreesCode').val(data.degreesCode);
                        $('#studyExperience').val(data.studyExperience || 'N');
                        $('#finalDegreeWhether').val(data.finalDegreeWhether || 'N');
                        $('#remark').val(data.remark);

                        var modal = new bootstrap.Modal(document.getElementById('educationModal'));
                        modal.show();
                    },
                    error: function (err) {
                        if (typeof toastr !== 'undefined') toastr.error('Lỗi khi lấy thông tin: ' + (err.responseJSON ? err.responseJSON.error : err.responseText));
                        else alert('Lỗi khi lấy thông tin: ' + (err.responseJSON ? err.responseJSON.error : err.responseText));
                    }
                });
            };

            // Lưu dữ liệu
            window.saveData = function () {
                // Validate cơ bản
                if (!$('#personId').val() || !$('#institutionName').val()) {
                    if (typeof toastr !== 'undefined') toastr.warning('Vui lòng chọn Nhân viên và nhập Tên trường');
                    else alert('Vui lòng chọn Nhân viên và nhập Tên trường');
                    return;
                }

                var formData = {
                    educNo: $('#educNo').val() || null,
                    personId: $('#personId').val(),
                    institutionName: $('#institutionName').val(),
                    degreeCode: $('#degreeCode').val(),
                    subject: $('#subject').val(),
                    startDate: $('#startDate').val(),
                    endDate: $('#endDate').val(),
                    schoolLength: $('#schoolLength').val(),
                    siteCountry: $('#siteCountry').val(),
                    place: $('#place').val(),
                    thesisNameLocal: $('#thesisNameLocal').val(),
                    thesisNameEng: $('#thesisNameEng').val(),
                    subjectSecond: $('#subjectSecond').val(),
                    eduDegNum: $('#eduDegNum').val(),
                    degreesCode: $('#degreesCode').val(),
                    studyExperience: $('#studyExperience').val(),
                    finalDegreeWhether: $('#finalDegreeWhether').val(),
                    remark: $('#remark').val()
                };

                $.ajax({
                    url: '/hrm/empinfo/api/education/save',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(formData),
                    success: function (res) {
                        if (typeof toastr !== 'undefined') toastr.success(res.message || 'Lưu thành công');
                        else alert(res.message || 'Lưu thành công');

                        var modalEl = document.getElementById('educationModal');
                        var modal = bootstrap.Modal.getInstance(modalEl);
                        if (modal) {
                            modal.hide();
                        } else {
                            $(modalEl).modal('hide');
                        }

                        table.ajax.reload();
                    },
                    error: function (err) {
                        var errorMsg = (err.responseJSON && err.responseJSON.error) ? err.responseJSON.error : (err.responseText || "Lỗi không xác định");
                        if (typeof toastr !== 'undefined') toastr.error('Lỗi khi lưu: ' + errorMsg);
                        else alert('Lỗi khi lưu: ' + errorMsg);
                    }
                });
            };

            // Xóa
            window.deleteRaw = function (id) {
                if (confirm('Bạn có chắc chắn muốn xóa bản ghi này?')) {
                    $.ajax({
                        url: '/hrm/empinfo/api/education/delete/' + id,
                        type: 'DELETE',
                        success: function (res) {
                            if (typeof toastr !== 'undefined') toastr.success(res.message || 'Xóa thành công');
                            else alert(res.message || 'Xóa thành công');
                            table.ajax.reload();
                        },
                        error: function (err) {
                            var errorMsg = (err.responseJSON && err.responseJSON.error) ? err.responseJSON.error : (err.responseText || "Lỗi không xác định");
                            if (typeof toastr !== 'undefined') toastr.error('Lỗi khi xóa: ' + errorMsg);
                            else alert('Lỗi khi xóa: ' + errorMsg);
                        }
                    });
                }
            };
        });
    </script>
</template>
