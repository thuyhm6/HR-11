<div th:fragment="content">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-body">
                    <form id="ot_searchForm" class="row g-3 mb-4">
                        <div class="col-md-3">
                            <label for="ot_keyword" class="form-label">Mã nhân viên / Họ tên</label>
                            <input type="text" class="form-control" id="ot_keyword" placeholder="Nhập mã hoặc họ tên">
                        </div>
                        <div class="col-md-3">
                            <label for="ot_deptNo" class="form-label">Phòng ban</label>
                            <input type="text" class="form-control" id="ot_deptNo" placeholder="Chọn phòng ban" readonly>
                        </div>
                        <div class="col-md-2">
                            <label for="ot_fromDate" class="form-label">Ngày bắt đầu</label>
                            <input type="text" class="form-control js-daterangepicker" id="ot_fromDate"
                                data-drp-format="YYYY-MM-DD" autocomplete="off">
                        </div>
                        <div class="col-md-2">
                            <label for="ot_toDate" class="form-label">Ngày kết thúc</label>
                            <input type="text" class="form-control js-daterangepicker" id="ot_toDate"
                                data-drp-format="YYYY-MM-DD" autocomplete="off">
                        </div>
                        <div class="col-md-2">
                            <label for="ot_postFamily" class="form-label">Nhóm nhân viên</label>
                            <select class="form-select" id="ot_postFamily" data-parent-code="14015812"
                                data-default-text="-- Tất cả --"></select>
                        </div>
                        <div class="col-md-3">
                            <label for="ot_shiftNo" class="form-label">Ca làm việc</label>
                            <select class="form-select" id="ot_shiftNo">
                                <option value="">-- Tất cả --</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label for="ot_itemNo" class="form-label">Loại tăng ca</label>
                            <select class="form-select" id="ot_itemNo">
                                <option value="">-- Tất cả --</option>
                            </select>
                        </div>
                        <div class="col-md-6 d-flex align-items-end gap-2 flex-wrap">
                            <button type="button" class="btn btn-primary" onclick="otSearchData()">
                                <i class="bx bx-search"></i> Tra cứu
                            </button>
                            <button type="button" class="btn btn-secondary" onclick="otClearSearch()">
                                <i class="bx bx-x"></i> Xóa lọc
                            </button>
                            <button type="button" class="btn btn-success" onclick="otExportExcel()">
                                <i class="bx bx-export"></i> Xuất excel
                            </button>
                        </div>
                    </form>

                    <div class="table-responsive">
                        <table id="ot_dataTable" class="table table-striped table-bordered table-hover" style="min-width: 2200px;">
                            <thead class="table-light text-center align-middle">
                                <tr>
                                    <th>STT</th>
                                    <th>Ngày công</th>
                                    <th>Mã nhân viên</th>
                                    <th>Tên nhân viên</th>
                                    <th>Phòng ban</th>
                                    <th>Chức vụ</th>
                                    <th>Nhóm nhân viên</th>
                                    <th>Ca làm việc</th>
                                    <th>Loại tăng ca</th>
                                    <th>Từ thời gian</th>
                                    <th>Đến thời gian</th>
                                    <th>Số lượng</th>
                                    <th>Đơn vị</th>
                                    <th>Trạng thái</th>
                                    <th>Ghi chú</th>
                                    <th>Người cập nhật</th>
                                    <th>Thời gian cập nhật</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<template id="fragmentScripts">
    <script th:inline="javascript">
        var _ot_table = null;
        var _ot_pageBooted = false;
        var _ot_selectedDeptCodes = [];

        function otFormatDate(dateObj) {
            var y = dateObj.getFullYear();
            var m = String(dateObj.getMonth() + 1).padStart(2, '0');
            var d = String(dateObj.getDate()).padStart(2, '0');
            return y + '-' + m + '-' + d;
        }

        function otInitDefaultDateRange() {
            var today = new Date();
            var yesterday = new Date(today);
            yesterday.setDate(today.getDate() - 1);
            var fromValue = otFormatDate(yesterday);
            var toValue = otFormatDate(today);
            $('#ot_fromDate').val(fromValue);
            $('#ot_toDate').val(toValue);

            if ($('#ot_fromDate').data('daterangepicker')) {
                $('#ot_fromDate').data('daterangepicker').setStartDate(fromValue);
            }
            if ($('#ot_toDate').data('daterangepicker')) {
                $('#ot_toDate').data('daterangepicker').setStartDate(toValue);
            }
        }

        function otLoadShiftOptions() {
            return $.ajax({
                url: '/ar/attendanceSettings/api/shift',
                type: 'GET',
                success: function (data) {
                    var html = '<option value="">-- Tất cả --</option>';
                    (data || []).forEach(function (item) {
                        var code = item.shiftNo || '';
                        var name = item.nameVi || item.shiftName || code;
                        html += '<option value="' + code + '">' + name + '</option>';
                    });
                    $('#ot_shiftNo').html(html);
                }
            });
        }

        function otLoadItemOptions() {
            return $.ajax({
                url: '/ar/attendanceSettings/api/arItemParam/options',
                type: 'GET',
                data: { type: 'overtime' },
                success: function (data) {
                    var html = '<option value="">-- Tất cả --</option>';
                    (data || []).forEach(function (item) {
                        var code = item.itemNo || '';
                        var name = item.itemName || code;
                        html += '<option value="' + code + '">' + name + '</option>';
                    });
                    $('#ot_itemNo').html(html);
                }
            });
        }

        function otInitDeptSelector() {
            if (typeof DeptTree === 'undefined') {
                return;
            }
            DeptTree.init('#ot_deptNo', function (selectedCodes) {
                _ot_selectedDeptCodes = selectedCodes || [];
            });
        }

        function otInitTable() {
            _ot_table = $('#ot_dataTable').DataTable({
                destroy: true,
                scrollX: true,
                scrollY: "calc(100vh - 330px)",
                scrollCollapse: true,
                paging: true,
                searching: false,
                lengthChange: true,
                pageLength: 25,
                processing: true,
                dom: 'Blfrtip',
                buttons: [
                    {
                        extend: 'excel',
                        title: 'attendance_ot_search_export'
                    }
                ],
                ajax: {
                    url: '/ar/attendanceMintenance/api/attendanceSearch/otList',
                    dataSrc: '',
                    data: function (d) {
                        d.keyword = $('#ot_keyword').val();
                        d.deptNos = (_ot_selectedDeptCodes || []).join(',');
                        d.fromDate = $('#ot_fromDate').val();
                        d.toDate = $('#ot_toDate').val();
                        d.postFamily = $('#ot_postFamily').val();
                        d.shiftNo = $('#ot_shiftNo').val();
                        d.itemNo = $('#ot_itemNo').val();
                    }
                },
                initComplete: function () {
                    var $wrapper = $('#ot_dataTable_wrapper');
                    $wrapper.find('.dt-buttons').hide();
                },
                columns: [
                    {
                        data: null,
                        className: 'text-center',
                        render: function (data, type, row, meta) {
                            return meta.row + 1;
                        }
                    },
                    { data: 'arDateStr', className: 'text-center' },
                    { data: 'empId', className: 'text-center' },
                    { data: 'localName' },
                    { data: 'deptName' },
                    { data: 'postGradeName' },
                    { data: 'postFamilyName' },
                    { data: 'shiftName', className: 'text-center' },
                    { data: 'itemName' },
                    { data: 'fromTime', className: 'text-center' },
                    { data: 'toTime', className: 'text-center' },
                    { data: 'quantity', className: 'text-end' },
                    { data: 'unit', className: 'text-center' },
                    { data: 'statusName', className: 'text-center' },
                    { data: 'remark' },
                    { data: 'updatedBy', className: 'text-center' },
                    { data: 'updateDate', className: 'text-center' }
                ]
            });
        }

        function otBootPage() {
            if (_ot_pageBooted) {
                return;
            }
            if (!document.getElementById('ot_dataTable')) {
                setTimeout(otBootPage, 30);
                return;
            }
            _ot_pageBooted = true;
            otInitDefaultDateRange();
            otInitDeptSelector();
            $.when(otLoadShiftOptions(), otLoadItemOptions()).always(function () {
                otInitTable();
                if (_ot_table) {
                    _ot_table.ajax.reload();
                }
            });
        }

        window.otSearchData = function () {
            if (_ot_table) {
                _ot_table.ajax.reload();
            }
        };

        window.otClearSearch = function () {
            $('#ot_keyword').val('');
            $('#ot_postFamily').val('');
            $('#ot_shiftNo').val('');
            $('#ot_itemNo').val('');
            $('#ot_deptNo').val('');
            _ot_selectedDeptCodes = [];
            $('.auth-dept-chk-global').prop('checked', false).trigger('change');
            otInitDefaultDateRange();
            if (_ot_table) {
                _ot_table.ajax.reload();
            }
        };

        window.otExportExcel = function () {
            if (_ot_table) {
                _ot_table.button('.buttons-excel').trigger();
            }
        };

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', otBootPage);
        }
        if (typeof $ !== 'undefined') {
            $(document).ready(otBootPage);
        } else {
            otBootPage();
        }
    </script>
</template>
