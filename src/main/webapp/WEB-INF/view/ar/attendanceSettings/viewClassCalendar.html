<div th:fragment="content">

    <!-- ===== Toolbar ===== -->
    <div id="cccal_toolbar" class="ccal-toolbar">
        <div class="ccal-nav">
            <button class="ccal-nav-btn" id="cccal_prevMonth" title="Tháng trước">
                <i class="bx bx-chevron-left"></i>
            </button>
            <select id="cccal_monthSel" class="ccal-combo">
                <option value="1">Tháng 01</option>
                <option value="2">Tháng 02</option>
                <option value="3">Tháng 03</option>
                <option value="4">Tháng 04</option>
                <option value="5">Tháng 05</option>
                <option value="6">Tháng 06</option>
                <option value="7">Tháng 07</option>
                <option value="8">Tháng 08</option>
                <option value="9">Tháng 09</option>
                <option value="10">Tháng 10</option>
                <option value="11">Tháng 11</option>
                <option value="12">Tháng 12</option>
            </select>
            <select id="cccal_yearSel" class="ccal-combo ccal-year"></select>
            <button class="ccal-nav-btn" id="cccal_nextMonth" title="Tháng sau">
                <i class="bx bx-chevron-right"></i>
            </button>
            <select id="cccal_groupFilter" class="ccal-combo" data-parent-code="400223"
                style="min-width:160px;"></select>
        </div>

        <div class="ccal-actions">
            <button class="ccal-btn ccal-btn-default" onclick="cccalLoad()"><i class="bx bx-refresh"></i> Tra
                cứu</button>
            <button class="ccal-btn ccal-btn-primary" onclick="cccalOpenAddModal()"><i class="bx bx-plus"></i> Thêm
                mới</button>
            <!-- <button class="ccal-btn ccal-btn-success" onclick="cccalOpenEditSelected()"><i class="bx bx-edit"></i>Sửa</button> -->
        </div>
    </div>

    <!-- ===== Calendar ===== -->
    <div id="cccal_gridWrap" class="ccal-grid-wrap">
        <div class="ccal-hrow">
            <div class="ccal-hcell ccal-col-sun"><i class="bx bxs-sun"></i> CN</div>
            <div class="ccal-hcell">T2</div>
            <div class="ccal-hcell">T3</div>
            <div class="ccal-hcell">T4</div>
            <div class="ccal-hcell">T5</div>
            <div class="ccal-hcell">T6</div>
            <div class="ccal-hcell ccal-col-sat"><i class="bx bxs-star"></i> T7</div>
        </div>
        <div id="cccal_body"></div>
    </div>

    <!-- ===== Legend ===== -->
    <div class="ccal-legend">
        <span class="ccal-legend-item"><span class="ccal-legend-dot ccal-lg-work"></span> Ngày làm việc</span>
        <span class="ccal-legend-item"><span class="ccal-legend-dot ccal-lg-rest"></span> Ngày nghỉ</span>
        <span class="ccal-legend-item"><span class="ccal-legend-dot ccal-lg-today"></span> Hôm nay</span>
    </div>

    <!-- ===== Modal Thêm Mới Batch ===== -->
    <div class="modal fade" id="cccal_addModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-md">
            <div class="modal-content">
                <div class="modal-header py-2">
                    <h6 class="modal-title mb-0">Thêm Mới Lịch Nhóm Ca</h6>
                    <button class="btn-close btn-sm" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row g-2">
                        <div class="col-md-6">
                            <label class="form-label form-label-sm">Từ ngày <span class="text-danger">*</span></label>
                            <input type="text" class="form-control form-control-sm" id="cccal_startDate"
                                placeholder="DD-MM-YYYY">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label form-label-sm">Đến ngày <span class="text-danger">*</span></label>
                            <input type="text" class="form-control form-control-sm" id="cccal_endDate"
                                placeholder="DD-MM-YYYY">
                        </div>
                        <div class="col-md-12">
                            <label class="form-label form-label-sm">Nhóm ca <span class="text-danger">*</span></label>
                            <select class="form-select form-select-sm" id="cccal_addGroupId" data-parent-code="400223"
                                data-default-text="-- Chọn nhóm ca --"></select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label form-label-sm">Ca làm việc (Work Shift) <span
                                    class="text-danger">*</span></label>
                            <select class="form-select form-select-sm" id="cccal_workShift"></select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label form-label-sm">Ca nghỉ ngơi (Rest Shift) <span
                                    class="text-danger">*</span></label>
                            <select class="form-select form-select-sm" id="cccal_restShift"></select>
                        </div>
                    </div>
                </div>
                <div class="modal-footer py-2">
                    <button class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Đóng</button>
                    <button class="btn btn-sm btn-primary" onclick="cccalSaveBatch()">
                        <i class="bx bx-save me-1"></i>Thêm Mới
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== Modal Cập nhật 1 ngày / nhóm ===== -->
    <div class="modal fade" id="cccal_modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header py-2">
                    <h6 class="modal-title mb-0" id="cccal_modalTitle">Cập nhật ngày</h6>
                    <button class="btn-close btn-sm" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="cccal_form">
                        <input type="hidden" id="cccal_editArDateStr">
                        <input type="hidden" id="cccal_editGroupId">
                        <div class="row g-2">
                            <div class="col-md-6">
                                <label class="form-label form-label-sm">Ngày làm việc</label>
                                <select class="form-select form-select-sm" id="cccal_workdayflag">
                                    <option value="0">0 — Ngày nghỉ</option>
                                    <option value="1">1 — Ngày làm việc</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label form-label-sm">Ca làm việc (Shift No)</label>
                                <select class="form-select form-select-sm" id="cccal_shiftNo"></select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label form-label-sm">TypeID</label>
                                <select class="form-select" id="cccal_typeid" data-parent-code="1439"></select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label form-label-sm">OvertypeID</label>
                                <select class="form-select" id="cccal_overtypeid" data-parent-code="1439"></select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label form-label-sm">TypeID mặc định</label>
                                <select class="form-select" id="cccal_typeidDefault" data-parent-code="1439"></select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label form-label-sm">Operation ID</label>
                                <input type="text" class="form-control form-control-sm" id="cccal_operationId">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label form-label-sm">Sắp xếp</label>
                                <input type="number" class="form-control form-control-sm" id="cccal_orderno" value="0">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label form-label-sm">Trạng thái</label>
                                <select class="form-select form-select-sm" id="cccal_activity">
                                    <option value="1">Hoạt động</option>
                                    <option value="0">Ngừng</option>
                                </select>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer py-2">
                    <button class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Đóng</button>
                    <button class="btn btn-sm btn-primary" onclick="cccalSave()">
                        <i class="bx bx-save me-1"></i>Lưu
                    </button>
                </div>
            </div>
        </div>
    </div>

</div>

<template id="fragmentScripts">
    <script th:inline="javascript">
        /* ===========================
           INJECT CSS (dùng chung ccal-* với viewCompanyCalendar)
           =========================== */
        (function () {
            if (document.getElementById('ccal-injected-css')) return; // đã inject rồi thì bỏ qua
            var css = document.createElement('style');
            css.id = 'ccal-injected-css';

                + '.ccal-nav-btn:hover{background:#3b82f6;color:#fff;border-color:#3b82f6;transform:scale(1.05);}'
                + '.ccal-combo{font-size:.82rem;height:32px;padding:4px 6px;border:1px solid #cbd5e1;'
                + 'border-radius:6px;background:#fff;outline:none;transition:border-color .2s;}'
                + '.ccal-combo:focus{border-color:#3b82f6;}'
                + '.ccal-year{width:78px;}'
                + '.ccal-actions{display:flex;gap:6px;}'
                + '.ccal-btn{padding:5px 12px;font-size:.78rem;border-radius:6px;border:none;cursor:pointer;'
                + 'font-weight:600;transition:all .2s;display:inline-flex;align-items:center;gap:4px;}'
                + '.ccal-btn:active{transform:scale(.96);}'
                + '.ccal-btn-default{background:#fff;border:1px solid #cbd5e1;color:#475569;}'
                + '.ccal-btn-default:hover{background:#f1f5f9;box-shadow:0 2px 4px rgba(0,0,0,.06);}'
                + '.ccal-btn-primary{background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;'
                + 'box-shadow:0 2px 6px rgba(37,99,235,.3);}'
                + '.ccal-btn-primary:hover{background:linear-gradient(135deg,#2563eb,#1d4ed8);box-shadow:0 3px 10px rgba(37,99,235,.4);}'
                + '.ccal-btn-success{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;'
                + 'box-shadow:0 2px 6px rgba(22,163,74,.3);}'
                + '.ccal-btn-success:hover{background:linear-gradient(135deg,#16a34a,#15803d);box-shadow:0 3px 10px rgba(22,163,74,.4);}'
                + '.ccal-grid-wrap{border:1px solid #cbd5e1;border-top:none;border-radius:0 0 8px 8px;'
                + 'overflow:hidden;box-shadow:0 4px 12px rgba(0,0,0,.06);}'
                + '.ccal-hrow{display:grid;grid-template-columns:repeat(7,1fr);'
                + 'background:linear-gradient(135deg,#1e293b 0%,#334155 100%);}'
                + '.ccal-hcell{padding:8px;text-align:center;font-weight:700;font-size:.82rem;'
                + 'color:#e2e8f0;letter-spacing:.5px;border-right:1px solid rgba(255,255,255,.08);}'
                + '.ccal-hcell:last-child{border-right:none;}'
                + '.ccal-col-sun{color:#fca5a5 !important;}'
                + '.ccal-col-sat{color:#86efac !important;}'
                + '.ccal-week{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid #e2e8f0;'
                + 'animation:ccal-slideDown .3s ease-out both;}'
                + '.ccal-week:last-child{border-bottom:none;}'
                + '.ccal-day{min-height:90px;padding:6px 8px;border-right:1px solid #e2e8f0;cursor:pointer;'
                + 'background:#fff;overflow:hidden;transition:all .2s ease;position:relative;}'
                + '.ccal-day:last-child{border-right:none;}'
                + '.ccal-day:hover{transform:scale(1.02);z-index:2;'
                + 'box-shadow:0 4px 16px rgba(0,0,0,.1);border-radius:4px;}'
                + '.ccal-day.is-empty{background:#f8fafc;cursor:default;min-height:0;}'
                + '.ccal-day.is-empty:hover{transform:none;box-shadow:none;}'
                + '.ccal-day.is-today{background:linear-gradient(135deg,#eff6ff 0%,#dbeafe 100%);'
                + 'animation:ccal-pulse 2.5s infinite;}'
                + '.ccal-day.is-rest{background:linear-gradient(180deg,#fff 0%,#fef2f2 100%);}'
                + '.ccal-day.is-work{background:linear-gradient(180deg,#fff 0%,#f0fdf4 100%);}'
                + '.ccal-day.ccal-selected{outline:2px solid #3b82f6;outline-offset:-2px;'
                + 'box-shadow:0 0 0 4px rgba(59,130,246,.15);border-radius:4px;z-index:3;}'
                + '.ccal-day-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}'
                + '.ccal-day-num{font-size:.95rem;font-weight:800;color:#1e293b;white-space:nowrap;line-height:1.2;}'
                + '.ccal-day-num.is-sun{color:#dc2626;}'
                + '.ccal-day-num.is-sat{color:#16a34a;}'
                + '.ccal-status{font-size:.62rem;padding:2px 7px;border-radius:10px;font-weight:700;'
                + 'white-space:nowrap;line-height:1.3;letter-spacing:.3px;text-transform:uppercase;}'
                + '.ccal-status.s-rest{background:linear-gradient(135deg,#fecaca,#fca5a5);color:#7f1d1d;}'
                + '.ccal-status.s-work-text{font-size:.62rem;color:#166534;font-weight:600;'
                + 'padding:2px 7px;border-radius:10px;background:linear-gradient(135deg,#bbf7d0,#86efac);}'
                + '.ccal-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px;}'
                + '.ccal-tag{display:inline-flex;align-items:center;font-size:.58rem;padding:1px 6px;'
                + 'border-radius:8px;line-height:1.6;white-space:nowrap;font-weight:600;transition:transform .15s;}'
                + '.ccal-tag:hover{transform:scale(1.08);}'
                + '.ccal-tag.t-grp{background:#ede9fe;color:#5b21b6;}'
                + '.ccal-tag.t-sh{background:#d1fae5;color:#065f46;}'
                + '.ccal-tag.t-rest{background:#fde8e8;color:#991b1b;}'
                + '.ccal-tag.t-wd{background:#dbeafe;color:#1e3a8a;}'
                + '.ccal-remark{margin-top:3px;font-size:.58rem;color:#94a3b8;white-space:nowrap;'
                + 'overflow:hidden;text-overflow:ellipsis;font-style:italic;}'
                + '.ccal-legend{display:flex;gap:16px;padding:8px 14px;background:#f8fafc;'
                + 'border:1px solid #cbd5e1;border-top:none;border-radius:0 0 8px 8px;'
                + 'margin-top:-1px;flex-wrap:wrap;}'
                + '.ccal-legend-item{display:inline-flex;align-items:center;gap:5px;font-size:.72rem;'
                + 'color:#64748b;font-weight:500;}'
                + '.ccal-legend-dot{width:10px;height:10px;border-radius:50%;border:1px solid rgba(0,0,0,.1);}'
                + '.ccal-lg-work{background:linear-gradient(135deg,#86efac,#4ade80);}'
                + '.ccal-lg-rest{background:linear-gradient(135deg,#fca5a5,#f87171);}'
                + '.ccal-lg-today{background:linear-gradient(135deg,#93c5fd,#3b82f6);}'
                + '.ccal-week:nth-child(1){animation-delay:.03s;}'
                + '.ccal-week:nth-child(2){animation-delay:.06s;}'
                + '.ccal-week:nth-child(3){animation-delay:.09s;}'
                + '.ccal-week:nth-child(4){animation-delay:.12s;}'
                + '.ccal-week:nth-child(5){animation-delay:.15s;}'
                + '.ccal-week:nth-child(6){animation-delay:.18s;}'
            ));
            document.head.appendChild(css);
        })();

        /* ===========================
           MAIN LOGIC — prefix: cccal (Class Calendar)
           =========================== */
        $(document).ready(function () {
            var now = new Date();
            var curYear = now.getFullYear();
            var curMonth = now.getMonth() + 1;

            // Init year select
            var $ys = $('#cccal_yearSel');
            for (var y = curYear - 5; y <= curYear + 5; y++) $ys.append(new Option(y, y));
            $ys.val(curYear);
            $('#cccal_monthSel').val(curMonth);

            // Load shift dropdown
            $.ajax({
                url: '/ar/attendanceSettings/api/shift',
                success: function (data) {
                    var opts = '';
                    (data || []).forEach(function (s) {
                        var n = s.nameVi || s.shiftNo;
                        opts += '<option value="' + s.shiftNo + '">' + n + '</option>';
                    });
                    $('#cccal_shiftNo, #cccal_workShift, #cccal_restShift').html(opts);
                }
            });

            // Setup date pickers (flatpickr nếu có)
            if (typeof flatpickr === 'function') {
                flatpickr('#cccal_startDate', { dateFormat: 'd-m-Y' });
                flatpickr('#cccal_endDate', { dateFormat: 'd-m-Y' });
            }

            // Nav
            $('#cccal_prevMonth').on('click', function () {
                var m = parseInt($('#cccal_monthSel').val()), y = parseInt($('#cccal_yearSel').val());
                if (--m < 1) { m = 12; y--; }
                $('#cccal_monthSel').val(m); $('#cccal_yearSel').val(y); cccalLoad();
            });
            $('#cccal_nextMonth').on('click', function () {
                var m = parseInt($('#cccal_monthSel').val()), y = parseInt($('#cccal_yearSel').val());
                if (++m > 12) { m = 1; y++; }
                $('#cccal_monthSel').val(m); $('#cccal_yearSel').val(y); cccalLoad();
            });
            $('#cccal_groupFilter').on('change', function () { cccalLoad(); });

            cccalLoad();
        });

        window.cccalLoad = function () {
            var year = parseInt($('#cccal_yearSel').val());
            var month = parseInt($('#cccal_monthSel').val());
            var gId = $('#cccal_groupFilter').val() || '400224';
            $.ajax({
                url: '/ar/attendanceSettings/api/calender/group/month',
                data: { year: year, month: month, groupId: gId },
                success: function (data) { cccalRender(year, month, data); },
                error: function () { toastr && toastr.error('Lỗi tải lịch nhóm ca!'); }
            });
        };

        function cccalRender(year, month, records) {
            if (!records || records.length === 0) {
                $('#cccal_body').html('<div style="padding: 20px; text-align: center; color: #64748b;">Không có dữ liệu lịch nhóm ca trong khoảng thời gian này.</div>');
                return;
            }

            // Nhóm dữ liệu theo ngày: map[dateKey] = [item, ...]
            var map = {};
            records.forEach(function (r) {
                var k = r.arDateStr || r.ddateStr || '';
                if (!k) return;
                k = k.replace(/-/g, '/');
                if (!map[k]) map[k] = [];
                map[k].push(r);
            });

            var dateKeys = Object.keys(map).sort();
            if (dateKeys.length === 0) return;

            var today = new Date();
            var todayKey = today.getFullYear()
                + '/' + String(today.getMonth() + 1).padStart(2, '0')
                + '/' + String(today.getDate()).padStart(2, '0');

            var firstKey = dateKeys[0];
            var firstParts = firstKey.split('/');
            var firstDateObj = new Date(parseInt(firstParts[0]), parseInt(firstParts[1]) - 1, parseInt(firstParts[2]));
            var firstDow = firstDateObj.getDay();

            var html = '<div class="ccal-week">';
            var cellCount = 0;

            for (var i = 0; i < firstDow; i++) {
                html += '<div class="ccal-day is-empty"></div>';
                cellCount++;
            }

            dateKeys.forEach(function (key) {
                if (cellCount > 0 && cellCount % 7 === 0) {
                    html += '</div><div class="ccal-week">';
                }

                var items = map[key] || [];
                var p = key.split('/');
                var dMonth = parseInt(p[1]);
                var day = parseInt(p[2]);

                var dow = cellCount % 7;
                var isSun = dow === 0, isSat = dow === 6;
                var isToday = (key === todayKey);

                var defaultWork = !(isSun || isSat);
                var hasWork = items.length > 0 ? items.some(function (it) { return it.workdayflag == 1; }) : defaultWork;
                var cellCls = 'ccal-day' + (isToday ? ' is-today' : hasWork ? ' is-work' : ' is-rest');
                var numCls = 'ccal-day-num' + (isSun ? ' is-sun' : isSat ? ' is-sat' : '');

                var statusHtml = hasWork
                    ? '<span class="ccal-status s-work-text">Làm việc</span>'
                    : '<span class="ccal-status s-rest">Nghỉ</span>';

                var tagsHtml = '';
                if (items.length === 0) {
                    tagsHtml += isSun || isSat
                        ? '<span class="ccal-tag t-rest">Cuối tuần</span>'
                        : '<span class="ccal-tag t-wd">Chưa có dữ liệu</span>';
                } else {
                    items.forEach(function (it) {
                        var shiftName = esc(it.shiftName || it.shiftNo || '');
                        if (shiftName) tagsHtml += '<span class="ccal-tag t-sh">' + shiftName + '</span>';
                    });
                }

                html += '<div class="' + cellCls + '" data-datestr="' + key + '" onclick="cccalDayClick(this)">';
                html += '<div class="ccal-day-top"><span class="' + numCls + '">' + day + '-' + dMonth + '</span>' + statusHtml + '</div>';
                html += '<div class="ccal-tags">' + tagsHtml + '</div>';
                html += '</div>';

                cellCount++;
            });

            var remain = cellCount % 7;
            if (remain > 0) {
                for (var j = remain; j < 7; j++) {
                    html += '<div class="ccal-day is-empty"></div>';
                }
            }
            html += '</div>';
            $('#cccal_body').html(html);
        }

        function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

        window.cccalDayClick = function (el) {
            $('#cccal_body .ccal-day').removeClass('ccal-selected');
            $(el).addClass('ccal-selected');
            var dateStr = $(el).attr('data-datestr');
            var gId = $('#cccal_groupFilter').val() || '';
            cccalOpenEditModal(dateStr, gId);
        };

        window.cccalOpenEditSelected = function () {
            var sel = document.querySelector('#cccal_body .ccal-selected');
            if (!sel) { toastr && toastr.warning('Bấm chọn 1 ngày trên lịch!'); return; }
            var dateStr = $(sel).attr('data-datestr');
            var gId = $('#cccal_groupFilter').val() || '';
            if (!gId) { toastr && toastr.warning('Vui lòng chọn Nhóm ca ở thanh lọc trước khi sửa!'); return; }
            cccalOpenEditModal(dateStr, gId);
        };

        // --- Add Batch ---
        window.cccalOpenAddModal = function () {
            $('#cccal_startDate').val('');
            $('#cccal_endDate').val('');
            // reinit datepicker nếu cần
            if (typeof flatpickr === 'function' && !$('#cccal_startDate').hasClass('flatpickr-input')) {
                flatpickr('#cccal_startDate', { dateFormat: 'd-m-Y' });
                flatpickr('#cccal_endDate', { dateFormat: 'd-m-Y' });
            }
            new bootstrap.Modal(document.getElementById('cccal_addModal')).show();
        };

        window.cccalSaveBatch = function () {
            var data = {
                startDate: $('#cccal_startDate').val(),
                endDate: $('#cccal_endDate').val(),
                groupId: $('#cccal_addGroupId').val(),
                workShift: $('#cccal_workShift').val(),
                restShift: $('#cccal_restShift').val()
            };
            if (!data.startDate || !data.endDate || !data.groupId || !data.workShift || !data.restShift) {
                toastr ? toastr.warning('Vui lòng điền đủ thông tin bắt buộc!') : alert('Vui lòng điền đủ thông tin!');
                return;
            }
            $.ajax({
                url: '/ar/attendanceSettings/api/calender/group/batch_save',
                type: 'POST', data: data,
                success: function (res) {
                    if (res && res.success) {
                        toastr && toastr.success(res.message || 'Thêm mới thành công!');
                        bootstrap.Modal.getInstance(document.getElementById('cccal_addModal')).hide();
                        cccalLoad();
                    } else { toastr && toastr.error((res && res.error) || 'Lỗi!'); }
                },
                error: function () { toastr && toastr.error('Lỗi kết nối!'); }
            });
        };

        // --- Edit Single ---
        function cccalOpenEditModal(dateStr, groupId) {
            $.ajax({
                url: '/ar/attendanceSettings/api/calender/group/detail',
                data: { arDateStr: dateStr, groupId: groupId },
                success: function (item) {
                    if (!item) { toastr && toastr.warning('Không tìm thấy dữ liệu!'); return; }
                    var p = dateStr.split('/');
                    var display = p[2] + '/' + p[1] + '/' + p[0];
                    $('#cccal_modalTitle').text('Cập nhật — ' + display + ' / Nhóm: ' + (item.groupName || item.groupId));
                    $('#cccal_editArDateStr').val(item.arDateStr);
                    $('#cccal_editGroupId').val(item.groupId);
                    $('#cccal_workdayflag').val(item.workdayflag != null ? item.workdayflag : 0);
                    $('#cccal_shiftNo').val(item.shiftNo || '');
                    $('#cccal_typeid').val(item.typeid || '');
                    $('#cccal_overtypeid').val(item.overtypeid || '');
                    $('#cccal_typeidDefault').val(item.typeidDefault || '');
                    $('#cccal_operationId').val(item.operationId || '');
                    $('#cccal_orderno').val(item.orderno || 0);
                    $('#cccal_activity').val(item.activity != null ? item.activity : 1);
                    new bootstrap.Modal(document.getElementById('cccal_modal')).show();
                },
                error: function () { toastr && toastr.error('Không tìm thấy dữ liệu!'); }
            });
        }

        window.cccalSave = function () {
            var arDateStr = $('#cccal_editArDateStr').val();
            if (!arDateStr) { toastr && toastr.warning('Dữ liệu không hợp lệ!'); return; }
            var payload = {
                arDateStr: arDateStr,
                groupId: $('#cccal_editGroupId').val(),
                workdayflag: parseInt($('#cccal_workdayflag').val()) || 0,
                shiftNo: $('#cccal_shiftNo').val() || null,
                typeid: $('#cccal_typeid').val() || null,
                overtypeid: $('#cccal_overtypeid').val() || null,
                typeidDefault: $('#cccal_typeidDefault').val() || null,
                operationId: $('#cccal_operationId').val() || null,
                orderno: parseInt($('#cccal_orderno').val()) || 0,
                activity: parseInt($('#cccal_activity').val()) || 1
            };
            $.ajax({
                url: '/ar/attendanceSettings/api/calender/group/save',
                type: 'POST', contentType: 'application/json', data: JSON.stringify(payload),
                success: function (res) {
                    if (res && res.success) {
                        toastr && toastr.success(res.message || 'Lưu thành công!');
                        var m = bootstrap.Modal.getInstance(document.getElementById('cccal_modal'));
                        if (m) m.hide();
                        cccalLoad();
                    } else { toastr && toastr.error((res && res.error) || 'Lỗi!'); }
                },
                error: function (err) {
                    var msg = (err.responseJSON && err.responseJSON.error) ? err.responseJSON.error : 'Lỗi không xác định';
                    toastr && toastr.error('Lỗi: ' + msg);
                }
            });
        };
    </script>
</template>
