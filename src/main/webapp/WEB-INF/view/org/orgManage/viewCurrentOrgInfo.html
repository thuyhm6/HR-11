<div th:fragment="content">
    <div class="row h-100">
        <!-- Left Pane: Organization Tree -->
        <div class="col-md-3 border-end">
            <div class="p-3">
                <h5 class="mb-3">Sơ đồ tổ chức</h5>
                <div class="input-group mb-3">
                    <input type="text" class="form-control" placeholder="Tìm kiếm phòng ban..."
                        id="currOrg_searchTreeInput">
                    <button class="btn btn-outline-secondary" type="button"><i class="bx bx-search"></i></button>
                </div>

                <div class="mb-2">
                    <button class="btn btn-sm btn-outline-primary" id="currOrg_btnExpandAll">Mở tất cả</button>
                    <button class="btn btn-sm btn-outline-secondary" id="currOrg_btnCollapseAll">Đóng tất cả</button>
                </div>

                <div class="tree-container" style="max-height: calc(100vh - 280px); overflow-y: auto;">
                    <div id="currOrg_tree"></div>
                </div>
            </div>
        </div>

        <!-- Right Pane: Employee List -->
        <div class="col-md-9">
            <div class="p-3">
                <div class="card h-100">
                    <div class="card-header bg-light d-flex justify-content-between align-items-center">
                        <span class="fw-bold" id="currOrg_selectedDeptTitle">Thông tin phòng ban</span>
                    </div>
                    <div class="card-body">
                        <!-- Department Info -->
                        <div class="row mb-3" id="currOrg_deptInfoPanel" style="display:none;">
                            <div class="col-md-3 mb-2">
                                <strong>Tên phòng ban:</strong> <span id="currOrg_lblOrgNameLocal"
                                    class="text-primary"></span>
                            </div>
                            <div class="col-md-3 mb-2">
                                <strong>ID phòng ban:</strong> <span id="currOrg_lblDeptNo"></span>
                            </div>
                            <div class="col-md-3 mb-2">
                                <strong>Trưởng phòng:</strong> <span id="currOrg_lblManagerEmpId"></span>
                            </div>
                            <div class="col-md-3 mb-2">
                                <strong>Loại tổ chức:</strong> <span id="currOrg_lblDeptType"></span>
                            </div>
                            <div class="col-md-3 mb-2">
                                <strong>Mã chi phí:</strong> <span id="currOrg_lblCostCenter"></span>
                            </div>
                            <div class="col-12">
                                <hr class="my-2">
                            </div>
                        </div>

                        <div class="table-responsive">
                            <table id="currOrg_empTable" class="table table-striped table-hover w-100">
                                <thead>
                                    <tr>
                                        <th>STT</th>
                                        <th>Mã NV</th>
                                        <th>Tên nhân viên</th>
                                        <th>Tên tiếng Anh</th>
                                        <th>Vị trí (Position)</th>
                                        <th>Ngày vào làm</th>
                                        <th>Trạng thái</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <template id="fragmentScripts">
        <link rel="stylesheet" href="/assets/plugins/jstree/style.min.css" />
        <script src="/assets/plugins/jstree/jstree.min.js"></script>

        <script th:inline="none">
            $(document).ready(function () {
                var empTable;
                var currentDeptNo = null;

                // Init DataTable
                if ($.fn.DataTable) {
                    empTable = $('#currOrg_empTable').DataTable({
                        destroy: true,
                        scrollY: "calc(100vh - 280px)",
                        scrollCollapse: true,
                        paging: true,
                        searching: true,
                        lengthChange: true,
                        pageLength: 20,
                        columnDefs: [
                            { "width": "3%", "targets": 0 },   // Cột STT cố định nhỏ
                        ],
                        dom: 'Blfrtip',
                        buttons: ['excel', 'pdf', 'print'],
                        columns: [
                            { data: null, render: (d, t, r, m) => m.row + 1 },
                            { data: 'empId' },
                            { data: 'localName' },
                            { data: 'englishName' },
                            { data: 'position' },
                            {
                                data: 'dateStarted',
                                render: function (d) {
                                    if (!d) return '';
                                    return new Date(d).toLocaleDateString('vi-VN');
                                }
                            },
                            {
                                data: 'activity',
                                render: function (d) {
                                    return (d === 1 || d === '1') ? 'Hoạt động' : 'Không hoạt động';
                                }
                            }
                        ],
                        language: {
                            url: "//cdn.datatables.net/plug-ins/1.13.6/i18n/vi.json"
                        }
                    });
                }

                // Load Tree
                currOrg_loadTree();

                function currOrg_loadTree() {
                    var $tree = $('#currOrg_tree');
                    $tree.html('Đang tải...');

                    $.ajax({
                        url: '/org/api/current/structure',
                        type: 'GET',
                        success: function (data) {
                            currOrg_buildTree(data);
                        },
                        error: function (xhr) {
                            $tree.html('<div class="text-danger">Lỗi tải dữ liệu: ' + xhr.statusText + '</div>');
                        }
                    });
                }

                function currOrg_buildTree(data) {
                    var $tree = $('#currOrg_tree');
                    try { $tree.jstree("destroy"); } catch (e) { }

                    if (!data || data.length === 0) {
                        $tree.html('Không có dữ liệu'); return;
                    }

                    var idSet = new Set();
                    data.forEach(item => { if (item.deptNo) idSet.add(item.deptNo); });

                    var treeData = data.map(item => {
                        var parentId = item.parentDeptNo;
                        if (!parentId || parentId === 'ROOT' || !idSet.has(parentId)) parentId = '#';
                        // Display Name Logic: Local Name (Eng Name)
                        var label = item.orgNameLocal || item.deptNo;
                        // if (item.orgNameEng) label += " (" + item.orgNameEng + ")";

                        return {
                            id: item.deptNo,
                            parent: parentId,
                            text: label,
                            icon: 'bx bxs-folder',
                            state: { opened: (parentId === '#') },
                            data: item // Pass full object
                        };
                    });

                    $tree.jstree({
                        'core': { 'data': treeData, 'themes': { 'responsive': true } },
                        'plugins': ['search', 'types', 'sort']
                    });

                    $tree.off("changed.jstree").on("changed.jstree", function (e, data) {
                        if (data && data.selected.length) {
                            var node = data.instance.get_node(data.selected[0]);
                            if (node) {
                                currentDeptNo = node.id;
                                var dept = node.data;

                                // Update Dept Info
                                $('#currOrg_selectedDeptTitle').text('Thông tin phòng ban - ' + node.text);
                                $('#currOrg_lblOrgNameLocal').text(dept.orgNameLocal || '');
                                $('#currOrg_lblDeptNo').text(dept.deptNo || '');
                                // Use Name if available, else ID
                                $('#currOrg_lblManagerEmpId').text(dept.managerEmpName ? dept.managerEmpName + ' (' + dept.managerEmpId + ')' : (dept.managerEmpId || ''));
                                $('#currOrg_lblDeptType').text(dept.deptType || '');
                                $('#currOrg_lblCostCenter').text(dept.costCenterName ? dept.costCenterName + ' (' + dept.costCenter + ')' : (dept.costCenter || ''));
                                $('#currOrg_deptInfoPanel').show();

                                currOrg_loadEmployees(currentDeptNo);
                            }
                        }
                    });

                    // Search
                    var to = false;
                    $('#currOrg_searchTreeInput').keyup(function () {
                        if (to) clearTimeout(to);
                        to = setTimeout(function () {
                            var v = $('#currOrg_searchTreeInput').val();
                            $tree.jstree(true).search(v);
                        }, 250);
                    });

                    $('#currOrg_btnExpandAll').click(function () { $tree.jstree('open_all'); });
                    $('#currOrg_btnCollapseAll').click(function () { $tree.jstree('close_all'); });
                }

                function currOrg_loadEmployees(deptNo) {
                    if (!deptNo) return;

                    // Show loading on table?

                    $.ajax({
                        url: '/org/api/current/employees',
                        data: { deptNo: deptNo },
                        success: function (data) {
                            empTable.clear().rows.add(data).draw();
                        },
                        error: function (xhr) {
                            alert('Lỗi tải danh sách nhân viên');
                        }
                    });
                }
            });
        </script>
    </template>
</div>
