<div th:fragment="content">
    <div class="row">
        <div class="col-12" id="yuif_pageWrapper">

            <!-- Thông tin nhân viên -->
            <div th:replace="~{fragments/essEmpInfoCard :: card}"></div>

            <!-- Điều kiện tìm kiếm -->
            <div class="card mb-3">
                <div class="card-body">
                    <div class="col-md-4">
                        <div class="d-flex align-items-center gap-2">
                            <input type="number" class="form-control form-control-sm" id="yuif_year"
                                style="max-width:100px;" min="2000" max="2099" step="1">
                            <button class="btn btn-primary btn-sm" onclick="yuifSearch()">
                                <i class="bi bi-search"></i> Tra cứu
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Section 1: Thông tin nghỉ phép năm -->
            <div class="card mb-3">
                <div class="card-header fw-semibold">Thông tin nghỉ phép năm</div>
                <div class="card-body p-0">
                    <div style="overflow-x:auto;">
                        <table class="table table-bordered table-sm align-middle mb-0" id="yuif_vacTable"
                            style="white-space:nowrap; width:max-content; min-width:100%;">
                            <thead class="table-light">
                                <tr>
                                    <th class="text-center" style="white-space:nowrap;">NO</th>
                                    <th class="text-center" style="white-space:nowrap;">Ngày bắt đầu</th>
                                    <th class="text-center" style="white-space:nowrap;">Ngày kết thúc</th>
                                    <th class="text-center" style="white-space:nowrap;">Tổng phép năm</th>
                                    <th class="text-center" style="white-space:nowrap;">Phép năm ngoài</th>
                                    <th class="text-center" style="white-space:nowrap;">Đặc biệt</th>
                                    <th class="text-center" style="white-space:nowrap;">Đã nghỉ</th>
                                    <th class="text-center" style="white-space:nowrap;">Chờ duyệt</th>
                                    <th class="text-center" style="white-space:nowrap;">Còn lại</th>
                                </tr>
                            </thead>
                            <tbody id="yuif_vacTableBody">
                                <tr>
                                    <td colspan="9" class="text-center text-muted py-3">Đang tải dữ liệu...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Section 2: Tình trạng sử dụng phép năm -->
            <div class="card">
                <div class="card-header fw-semibold">Tình trạng sử dụng phép năm</div>
                <div class="card-body p-0">
                    <!-- Toolbar -->
                    <div class="d-flex align-items-center gap-2 px-3 pt-2 pb-1">
                        <div class="ms-auto d-flex align-items-center gap-2">
                            <span class="small">Mỗi trang</span>
                            <select class="form-select form-select-sm" id="yuif_pageSize" style="width:70px;"
                                onchange="yuifChangePageSize(this.value)">
                                <option value="25" selected>25</option>
                                <option value="50">50</option>
                                <option value="100">100</option>
                            </select>
                            <span class="small">Dữ liệu</span>
                        </div>
                    </div>
                    <div style="overflow-x:auto;">
                        <table class="table table-bordered table-sm align-middle mb-0" id="yuif_leaveTable"
                            style="white-space:nowrap; width:max-content; min-width:100%;">
                            <thead class="table-light">
                                <tr>
                                    <th class="text-center" style="white-space:nowrap;">NO</th>
                                    <th class="text-center" style="white-space:nowrap;">Ngày bắt đầu</th>
                                    <th class="text-center" style="white-space:nowrap;">Thời gian bắt đầu</th>
                                    <th class="text-center" style="white-space:nowrap;">Ngày kết thúc</th>
                                    <th class="text-center" style="white-space:nowrap;">Thời gian kết thúc</th>
                                    <th class="text-center" style="white-space:nowrap;">Thời lượng</th>
                                    <th class="text-center" style="white-space:nowrap;">Trạng thái duyệt</th>
                                </tr>
                            </thead>
                            <tbody id="yuif_leaveTableBody">
                                <tr>
                                    <td colspan="7" class="text-center text-muted py-3">Đang tải dữ liệu...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <!-- Phân trang -->
                    <div class="d-flex justify-content-between align-items-center px-3 py-2">
                        <span id="yuif_pageInfo" class="small text-muted"></span>
                        <div id="yuif_pagination" class="d-flex gap-1"></div>
                    </div>
                </div>
            </div>

        </div><!-- /#yuif_pageWrapper -->
    </div><!-- /.row -->
</div>

<template id="fragmentScripts">
    <th:block th:replace="~{fragments/essEmpInfoCard :: script}"></th:block>
    <script th:inline="javascript">
        var _yuif_leaveData = [];
        var _yuif_currentPage = 1;
        var _yuif_pageSize = 25;
        var _yuif_pageBooted = false;

        function yuifEscHtml(s) {
            if (s == null) return '';
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        // ── Search ───────────────────────────────────────────────────────────
        window.yuifSearch = function () {
            var year = $('#yuif_year').val() || '';

            $('#yuif_vacTableBody').html(
                '<tr><td colspan="9" class="text-center text-muted py-3">Đang tải...</td></tr>');
            $.ajax({
                url: '/ess/viewDept/api/yearUseInfo/vacationRows',
                type: 'GET',
                data: { year: year },
                success: function (rows) { yuifRenderVacTable(rows || []); },
                error: function () {
                    $('#yuif_vacTableBody').html(
                        '<tr><td colspan="9" class="text-center text-danger py-3">Lỗi tải dữ liệu</td></tr>');
                }
            });

            $('#yuif_leaveTableBody').html(
                '<tr><td colspan="7" class="text-center text-muted py-3">Đang tải...</td></tr>');
            $.ajax({
                url: '/ess/viewDept/api/yearUseInfo/leaveUsage',
                type: 'GET',
                data: { year: year },
                success: function (rows) {
                    _yuif_leaveData = rows || [];
                    _yuif_currentPage = 1;
                    yuifRenderLeavePage();
                },
                error: function () {
                    $('#yuif_leaveTableBody').html(
                        '<tr><td colspan="7" class="text-center text-danger py-3">Lỗi tải dữ liệu</td></tr>');
                }
            });
        };

        // ── Section 1: Thông tin nghỉ phép năm ──────────────────────────────
        function yuifRenderVacTable(rows) {
            if (!rows.length) {
                $('#yuif_vacTableBody').html(
                    '<tr><td colspan="9" class="text-center text-muted py-3">Không có dữ liệu</td></tr>');
                return;
            }
            var html = '';
            rows.forEach(function (r, i) {
                html += '<tr>'
                    + '<td class="text-center">' + (i + 1) + '</td>'
                    + '<td class="text-center">' + yuifEscHtml(r.strtDate) + '</td>'
                    + '<td class="text-center">' + yuifEscHtml(r.endDate) + '</td>'
                    + '<td class="text-center">' + yuifEscHtml(r.total) + '</td>'
                    + '<td class="text-center">' + yuifEscHtml(r.lastYearVac) + '</td>'
                    + '<td class="text-center">' + yuifEscHtml(r.addVac) + '</td>'
                    + '<td class="text-center">' + yuifEscHtml(r.useVac) + '</td>'
                    + '<td class="text-center">' + yuifEscHtml(r.affirmUseVac) + '</td>'
                    + '<td class="text-center">' + yuifEscHtml(r.remainVac) + '</td>'
                    + '</tr>';
            });
            $('#yuif_vacTableBody').html(html);
        }

        // ── Section 2: Tình trạng sử dụng phép năm ──────────────────────────
        function yuifRenderLeavePage() {
            var rows = _yuif_leaveData;
            var total = rows.length;
            var totalPg = Math.max(1, Math.ceil(total / _yuif_pageSize));
            if (_yuif_currentPage > totalPg) _yuif_currentPage = totalPg;
            var start = (_yuif_currentPage - 1) * _yuif_pageSize;
            var end = Math.min(start + _yuif_pageSize, total);
            var page = rows.slice(start, end);

            if (!page.length) {
                $('#yuif_leaveTableBody').html(
                    '<tr><td colspan="7" class="text-center text-muted py-3">Không có dữ liệu</td></tr>');
            } else {
                var html = '';
                page.forEach(function (r, idx) {
                    html += '<tr>'
                        + '<td class="text-center">' + (start + idx + 1) + '</td>'
                        + '<td class="text-center">' + yuifEscHtml(r.leaveFromDate) + '</td>'
                        + '<td class="text-center">' + yuifEscHtml(r.leaveFromTime) + '</td>'
                        + '<td class="text-center">' + yuifEscHtml(r.leaveToDate) + '</td>'
                        + '<td class="text-center">' + yuifEscHtml(r.leaveToTime) + '</td>'
                        + '<td class="text-center">' + yuifEscHtml(r.applyLength) + '</td>'
                        + '<td>' + yuifEscHtml(r.affirmFlagName || '') + '</td>'
                        + '</tr>';
                });
                $('#yuif_leaveTableBody').html(html);
            }

            $('#yuif_pageInfo').text(
                'Hiển thị ' + (total ? start + 1 : 0) + ' - ' + end + ' / ' + total + ' dòng');
            yuifRenderPagination(totalPg);
        }

        function yuifRenderPagination(totalPg) {
            var cur = _yuif_currentPage;
            var prev = cur > 1 ? cur - 1 : 1;
            var next = cur < totalPg ? cur + 1 : totalPg;
            var html = '<button class="btn btn-outline-secondary btn-sm px-2 py-0" '
                + (cur === 1 ? 'disabled' : '') + ' onclick="yuifGoPage(' + prev + ')">&#8249;</button>';
            var s = Math.max(1, cur - 2), e = Math.min(totalPg, s + 4);
            s = Math.max(1, e - 4);
            for (var i = s; i <= e; i++) {
                html += '<button class="btn btn-sm px-2 py-0 '
                    + (i === cur ? 'btn-primary' : 'btn-outline-secondary')
                    + '" onclick="yuifGoPage(' + i + ')">' + i + '</button>';
            }
            html += '<button class="btn btn-outline-secondary btn-sm px-2 py-0" '
                + (cur === totalPg ? 'disabled' : '') + ' onclick="yuifGoPage(' + next + ')">&#8250;</button>';
            $('#yuif_pagination').html(html);
        }

        window.yuifGoPage = function (p) {
            _yuif_currentPage = p;
            yuifRenderLeavePage();
        };

        window.yuifChangePageSize = function (val) {
            _yuif_pageSize = parseInt(val, 10) || 25;
            _yuif_currentPage = 1;
            yuifRenderLeavePage();
        };

        // ── Boot ─────────────────────────────────────────────────────────────
        function yuifBootPage() {
            if (_yuif_pageBooted) return;
            if (!document.getElementById('yuif_year')) { setTimeout(yuifBootPage, 30); return; }
            _yuif_pageBooted = true;

            loadEssEmpInfoCard();

            $('#yuif_year').val(new Date().getFullYear());
            yuifSearch();
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', yuifBootPage);
        }
        if (typeof $ !== 'undefined') {
            $(document).ready(yuifBootPage);
        } else {
            yuifBootPage();
        }
    </script>
</template>
