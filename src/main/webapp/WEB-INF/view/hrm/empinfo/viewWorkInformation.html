<div th:fragment="content">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-body">
                    <!-- Search Form -->
                    <form id="workExpSearchForm" class="row g-3 mb-4">
                        <div class="col-md-3">
                            <label for="workExpSearchEmpId" class="form-label">Mã nhân viên</label>
                            <input type="text" class="form-control" id="workExpSearchEmpId"
                                placeholder="Nhập mã nhân viên">
                        </div>
                        <div class="col-md-3">
                            <label for="workExpSearchLocalName" class="form-label">Tên nhân viên</label>
                            <input type="text" class="form-control" id="workExpSearchLocalName"
                                placeholder="Nhập tên nhân viên">
                        </div>
                        <div class="col-md-3">
                            <label for="workExpSearchCompanyName" class="form-label">Tên công ty</label>
                            <input type="text" class="form-control" id="workExpSearchCompanyName"
                                placeholder="Nhập tên công ty">
                        </div>
                        <div class="col-md-3 d-flex align-items-end">
                            <button type="button" class="btn btn-primary me-2" onclick="workExpSearchData()">
                                <i class="bx bx-search"></i> Tìm kiếm
                            </button>
                            <button type="button" class="btn btn-secondary" onclick="workExpClearSearch()">
                                <i class="bx bx-x"></i> Xóa lọc
                            </button>
                            <button type="button" class="btn btn-success ms-2" onclick="workExpOpenModal()">
                                <i class="bx bx-plus"></i> Thêm mới
                            </button>
                        </div>
                    </form>

                    <!-- Data Table -->
                    <div class="table-responsive">
                        <table id="workExpTable" class="table table-striped table-bordered table-hover"
                            style="width:100%">
                            <thead class="table-light">
                                <tr>
                                    <th>STT</th>
                                    <th>Mã NV</th>
                                    <th>Họ tên</th>
                                    <th>Công ty</th>
                                    <th>Bộ phận</th>
                                    <th>Vị trí</th>
                                    <th>Từ ngày</th>
                                    <th>Đến ngày</th>
                                    <th>Nhiệm vụ</th>
                                    <th>Lý do nghỉ</th>
                                    <th>Mức lương</th>
                                    <th>Ghi chú</th>
                                    <th class="text-center" style="width: 100px;">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Data loaded via AJAX -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal Thêm/Sửa -->
<div class="modal fade" id="workExpModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="workExpModalTitle">Thông tin kinh nghiệm</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="workExpForm">
                    <input type="hidden" id="workExpNo" name="workExpNo">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="workExpEmpNameDisplay" class="form-label">Nhân viên <span
                                    class="text-danger">*</span></label>
                            <div class="input-group">
                                <input type="text" class="form-control" id="workExpEmpNameDisplay"
                                    placeholder="Chọn nhân viên..." readonly required>
                                <input type="hidden" id="workExpPersonId" name="personId">
                                <button class="btn btn-outline-primary" type="button"
                                    onclick="workExpOpenEmployeeSearchPopup()">
                                    <i class="bx bx-search"></i>
                                </button>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label for="workExpCpnyName" class="form-label">Tên công ty <span
                                    class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="workExpCpnyName" name="cpnyName" required>
                        </div>
                        <div class="col-md-6">
                            <label for="workExpDeptName" class="form-label">Bộ phận</label>
                            <input type="text" class="form-control" id="workExpDeptName" name="deptName">
                        </div>
                        <div class="col-md-6">
                            <label for="workExpPosition" class="form-label">Vị trí</label>
                            <input type="text" class="form-control" id="workExpPosition" name="position">
                        </div>
                        <div class="col-md-6">
                            <label for="workExpStartDate" class="form-label">Từ ngày</label>
                            <input type="text" class="form-control" id="workExpStartDate" name="startDate"
                                placeholder="YYYYMMDD">
                        </div>
                        <div class="col-md-6">
                            <label for="workExpEndDate" class="form-label">Đến ngày</label>
                            <input type="text" class="form-control" id="workExpEndDate" name="endDate"
                                placeholder="YYYYMMDD">
                        </div>
                        <div class="col-md-12">
                            <label for="workExpDuty" class="form-label">Nhiệm vụ</label>
                            <textarea class="form-control" id="workExpDuty" name="duty" rows="2"></textarea>
                        </div>
                        <div class="col-md-6">
                            <label for="workExpPayYear" class="form-label">Mức lương</label>
                            <input type="text" class="form-control" id="workExpPayYear" name="payYear">
                        </div>
                        <div class="col-md-6">
                            <label for="workExpResignReason" class="form-label">Lý do nghỉ</label>
                            <input type="text" class="form-control" id="workExpResignReason" name="resignReason">
                        </div>
                        <div class="col-md-12">
                            <label for="workExpRemark" class="form-label">Ghi chú</label>
                            <textarea class="form-control" id="workExpRemark" name="remark" rows="2"></textarea>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                <button type="button" class="btn btn-primary" onclick="workExpSaveData()">Lưu</button>
            </div>
        </div>
    </div>
</div>

<template id="fragmentScripts">
    <script th:inline="javascript">
        $(document).ready(function () {
            var table = $('#workExpTable').DataTable({
                destroy: true,
                scrollY: "calc(100vh - 280px)",
                scrollCollapse: true,
                paging: true,
                searching: true,
                lengthChange: true,
                pageLength: 20,
                columnDefs: [
                    { "width": "2%", "targets": 0 },   // Cột STT cố định nhỏ
                ],
                processing: true,

                dom: 'Blfrtip',
                buttons: [
                    'copy', 'csv', 'excel', 'pdf', 'print'
                ],
                ajax: {
                    url: '/hrm/empinfo/api/work-experience',
                    dataSrc: '',
                    data: function (d) {
                        d.empId = $('#workExpSearchEmpId').val();
                        d.localName = $('#workExpSearchLocalName').val();
                        d.companyName = $('#workExpSearchCompanyName').val();
                    }
                },
                columns: [
                    {
                        data: null,
                        render: function (data, type, row, meta) {
                            return meta.row + 1;
                        }
                    },
                    { data: 'empId' },
                    { data: 'localName' },
                    { data: 'cpnyName' },
                    { data: 'deptName' },
                    { data: 'position' },
                    { data: 'startDate' },
                    { data: 'endDate' },
                    { data: 'duty' },
                    { data: 'resignReason' },
                    { data: 'payYear' },
                    { data: 'remark' },
                    {
                        data: null,
                        className: "text-center",
                        render: function (data, type, row) {
                            return `
                                <div class="btn-group btn-group-sm">
                                    <button class="btn btn-warning" onclick="workExpEditRaw(${row.workExpNo})">
                                        <i class="bx bx-edit"></i>
                                    </button>
                                    <button class="btn btn-danger" onclick="workExpDeleteRaw(${row.workExpNo})">
                                        <i class="bx bx-trash"></i>
                                    </button>
                                </div>
                            `;
                        }
                    }
                ]
            });

            window.workExpSearchData = function () {
                table.ajax.reload();
            };

            window.workExpClearSearch = function () {
                $('#workExpSearchForm')[0].reset();
                table.ajax.reload();
            };

            // Mở modal thêm mới
            window.workExpOpenModal = function () {
                $('#workExpModalTitle').text('Thêm mới Kinh nghiệm làm việc');
                $('#workExpForm')[0].reset();
                $('#workExpNo').val('');
                $('#workExpPersonId').val(''); // Reset hidden field specifically
                var modal = new bootstrap.Modal(document.getElementById('workExpModal'));
                modal.show();
            };

            // Mở popup tìm kiếm nhân viên
            window.workExpOpenEmployeeSearchPopup = function () {
                if (typeof EmployeeSearchModal !== 'undefined') {
                    EmployeeSearchModal.open(function (employee) {
                        $('#workExpPersonId').val(employee.personId);
                        $('#workExpEmpNameDisplay').val(employee.empId + ' - ' + employee.localName);
                    });
                } else {
                    alert('Component tìm kiếm nhân viên chưa được tải!');
                }
            };

            // Sửa
            window.workExpEditRaw = function (id) {
                $.ajax({
                    url: '/hrm/empinfo/api/work-experience/' + id,
                    type: 'GET',
                    success: function (data) {
                        $('#workExpModalTitle').text('Cập nhật Kinh nghiệm làm việc');
                        $('#workExpNo').val(data.workExpNo);
                        $('#workExpPersonId').val(data.personId);
                        $('#workExpEmpNameDisplay').val((data.empId || '') + ' - ' + (data.localName || ''));
                        $('#workExpCpnyName').val(data.cpnyName);
                        $('#workExpDeptName').val(data.deptName);
                        $('#workExpPosition').val(data.position);
                        $('#workExpStartDate').val(data.startDate);
                        $('#workExpEndDate').val(data.endDate);
                        $('#workExpDuty').val(data.duty);
                        $('#workExpPayYear').val(data.payYear);
                        $('#workExpResignReason').val(data.resignReason);
                        $('#workExpRemark').val(data.remark);

                        var modal = new bootstrap.Modal(document.getElementById('workExpModal'));
                        modal.show();
                    },
                    error: function (err) {
                        if (typeof toastr !== 'undefined') toastr.error('Lỗi khi lấy thông tin: ' + (err.responseJSON ? err.responseJSON.error : err.responseText));
                        else alert('Lỗi khi lấy thông tin: ' + (err.responseJSON ? err.responseJSON.error : err.responseText));
                    }
                });
            };

            // Lưu dữ liệu
            window.workExpSaveData = function () {
                // Validate cơ bản
                if (!$('#workExpPersonId').val() || !$('#workExpCpnyName').val()) {
                    if (typeof toastr !== 'undefined') toastr.warning('Vui lòng chọn Nhân viên và nhập Tên công ty');
                    else alert('Vui lòng chọn Nhân viên và nhập Tên công ty');
                    return;
                }

                var formData = {
                    workExpNo: $('#workExpNo').val() || null, // null nếu đang thêm mới
                    personId: $('#workExpPersonId').val(),
                    cpnyName: $('#workExpCpnyName').val(),
                    deptName: $('#workExpDeptName').val(),
                    position: $('#workExpPosition').val(),
                    startDate: $('#workExpStartDate').val(),
                    endDate: $('#workExpEndDate').val(),
                    duty: $('#workExpDuty').val(),
                    payYear: $('#workExpPayYear').val(),
                    resignReason: $('#workExpResignReason').val(),
                    remark: $('#workExpRemark').val()
                };

                $.ajax({
                    url: '/hrm/empinfo/api/work-experience/save',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(formData),
                    success: function (res) {
                        if (typeof toastr !== 'undefined') toastr.success(res.message || 'Lưu thành công');
                        else alert(res.message || 'Lưu thành công');
                        // Đóng modal thủ công
                        var modalEl = document.getElementById('workExpModal');
                        var modal = bootstrap.Modal.getInstance(modalEl);
                        if (modal) {
                            modal.hide();
                        } else {
                            // Fallback nếu chưa lấy được instance, dù hiếm khi xảy ra nếu đã mở
                            $(modalEl).modal('hide');
                        }
                        // Reload data
                        table.ajax.reload();
                    },
                    error: function (err) {
                        var errorMsg = (err.responseJSON && err.responseJSON.error) ? err.responseJSON.error : (err.responseText || "Lỗi không xác định");
                        if (typeof toastr !== 'undefined') toastr.error('Lỗi khi lưu: ' + errorMsg);
                        else alert('Lỗi khi lưu: ' + errorMsg);
                    }
                });
            };

            // Xóa
            window.workExpDeleteRaw = function (id) {
                if (confirm('Bạn có chắc chắn muốn xóa bản ghi này?')) {
                    $.ajax({
                        url: '/hrm/empinfo/api/work-experience/delete/' + id,
                        type: 'DELETE',
                        success: function (res) {
                            if (typeof toastr !== 'undefined') toastr.success(res.message || 'Xóa thành công');
                            else alert(res.message || 'Xóa thành công');
                            table.ajax.reload();
                        },
                        error: function (err) {
                            var errorMsg = (err.responseJSON && err.responseJSON.error) ? err.responseJSON.error : (err.responseText || "Lỗi không xác định");
                            if (typeof toastr !== 'undefined') toastr.error('Lỗi khi xóa: ' + errorMsg);
                            else alert('Lỗi khi xóa: ' + errorMsg);
                        }
                    });
                }
            };
        });
    </script>
</template>
