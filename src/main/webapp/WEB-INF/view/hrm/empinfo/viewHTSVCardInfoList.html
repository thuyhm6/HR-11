<div th:fragment="content">
    <style>
        .hrcard-container {
            font-family: Arial, sans-serif;
            color: #333;
            width: 90%;
            background: #fff;
            padding: 10px;
            page-break-after: always;
            break-after: page;
        }

        .hrcard-container:last-child {
            page-break-after: auto;
            break-after: auto;
        }

        .hrcard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px dashed #ccc;
            padding-bottom: 10px;
            margin-bottom: 10px;
        }

        .hrcard-title {
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            flex-grow: 1;
        }

        .hrcard-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
            margin-bottom: 15px;
        }

        .hrcard-table th,
        .hrcard-table td {
            border: 1px solid #ccc;
            padding: 4px;
            text-align: center;
            vertical-align: middle;
        }

        .hrcard-table th {
            background-color: #f9f9f9;
            font-weight: normal;
            color: #555;
        }

        .hrcard-photo-cell {
            width: 120px;
            text-align: center;
            vertical-align: middle;
            padding: 0;
            border: 1px solid #ccc;
        }

        .hrcard-photo {
            width: 100px;
            height: 130px;
            margin: 5px auto;
            background: #0066cc;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hrcard-emp-name {
            font-weight: bold;
            font-size: 12px;
            margin-top: 5px;
        }

        .hrcard-emp-id {
            font-size: 11px;
            margin-bottom: 5px;
        }

        .hrcard-label {
            text-align: left !important;
            padding-left: 8px !important;
            width: 100px;
        }

        .hrcard-value {
            text-align: center;
        }

        .hrcard-grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .hrcard-grid-2>div {
            min-width: 0;
        }

        .hrcard-section-title {
            font-weight: bold;
            font-size: 13px;
            margin-bottom: 5px;
            text-align: left;
        }
    </style>

<template id="fragmentScripts">


    <script th:inline="javascript">
        var _hcv_table = null;
        var _hcv_selectedDeptCodes = [];
        var _hcv_previewModal = null;

        function hcvInitDeptSelector() {
            if (typeof DeptTree === 'undefined') {
                return;
            }
            DeptTree.init('#hcv_deptNo', function (selectedCodes) {
                _hcv_selectedDeptCodes = selectedCodes || [];
            });
        }

        function hcvEscHtml(value) {
            if (value === null || value === undefined) return '';
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function hcvInitTable() {
            _hcv_table = $('#hcv_dataTable').DataTable({
                destroy: true,
                paging: true,
                searching: false,
                lengthChange: true,
                scrollY: 'calc(100vh - 320px)',
                pageLength: 50,
                processing: true,
                autoWidth: false,
                dom: "<'row'<'col-sm-12 col-md-6'l><'col-sm-12 col-md-6'f>>" +
                    "<'row'<'col-sm-12'tr>>" +
                    "<'row'<'col-sm-12 col-md-5'i><'col-sm-12 col-md-7'p>>",
                language: {
                    lengthMenu: 'Mỗi trang _MENU_ dữ liệu',
                    info: 'Từ _START_ đến _END_/Tổng _TOTAL_ dữ liệu',
                    paginate: {
                        previous: 'Trang trước',
                        next: 'Trang sau'
                    },
                    zeroRecords: "Không tìm thấy dữ liệu"
                },
                ajax: {
                    url: '/ess/viewDept/api/manageEmpPositionInfo/list',
                    dataSrc: function (json) {
                        return json || [];
                    },
                    data: function (d) {
                        d.keyword = $('#hcv_keyword').val();
                        d.deptNos = (_hcv_selectedDeptCodes || []).join(',');
                        d.fromDate = $('#hcv_fromDate').val();
                        d.toDate = $('#hcv_toDate').val();
                        d.postFamily = $('#hcv_postFamily').val();
                        d.empTypeCode = $('#hcv_empTypeCode').val();
                        d.empOffice = $('#hcv_empOffice').val();
                    },
                    error: function () {
                        // Dummy data for visual testing since API is probably not ready
                        var dummyData = [];
                        if ($('#hcv_keyword').val() === '') {
                            dummyData = [
                                { empId: '43170002', localName: 'Nguyễn Bá Tấn', deptName: 'Procurement PART', postFamilyName: 'Nhóm NV gián tiếp', empTypeName: 'Regular', empOfficeName: 'Working', dateStarted: '2017-07-03' }
                            ];
                        }
                        if (_hcv_table && _hcv_table.settings()[0]) {
                            var settings = _hcv_table.settings()[0];
                            settings.oApi._fnAjaxUpdateDraw(settings, { data: dummyData });
                        }
                    }
                },
                columns: [
                    {
                        data: null,
                        orderable: false,
                        className: 'text-center',
                        render: function (data, type, row) {
                            return '<input type="checkbox" class="form-check-input hcv-row-check" value="' + hcvEscHtml(row.empId) + '">';
                        }
                    },
                    { data: 'empId' },
                    {
                        data: 'localName',
                        render: function (data, type, row) {
                            if (type === 'display') {
                                return '<a href="javascript:void(0)" class="hcv-name-link text-primary fw-semibold" data-empid="' + hcvEscHtml(row.empId) + '">' + hcvEscHtml(data) + '</a>';
                            }
                            return data;
                        }
                    },
                    { data: 'deptName' },
                    { data: 'postFamilyName' },
                    { data: 'empTypeName' },
                    { data: 'empOfficeName' },
                    { data: 'dateStarted' }
                ]
            });

            // Check All
            $('#hcv_checkAll').on('change', function () {
                var isChecked = $(this).is(':checked');
                $('.hcv-row-check').prop('checked', isChecked);
            });

            // Single Check
            $('#hcv_dataTable tbody').on('change', '.hcv-row-check', function () {
                if (!$(this).is(':checked')) {
                    $('#hcv_checkAll').prop('checked', false);
                } else {
                    var allChecked = $('.hcv-row-check:not(:checked)').length === 0;
                    $('#hcv_checkAll').prop('checked', allChecked);
                }
            });

            // Click vào tên nhân viên -> mở thẻ nhân sự ngay
            $('#hcv_dataTable tbody').on('click', '.hcv-name-link', function () {
                var empId = $(this).data('empid');
                if (empId) hcvOpenCardModal([empId]);
            });
        }

        window.hcvSearchData = function () {
            if (_hcv_table) {
                _hcv_table.ajax.reload();
            }
        };

        window.hcvClearSearch = function () {
            $('#hcv_keyword').val('');
            $('#hcv_deptNo').val('');
            $('#hcv_fromDate').val('');
            $('#hcv_toDate').val('');
            _hcv_selectedDeptCodes = [];

            if (typeof resetCodeSelectDefaults === 'function') {
                resetCodeSelectDefaults('#hcv_searchForm');
            } else {
                $('#hcv_postFamily').val('');
                $('#hcv_empTypeCode').val('');
                $('#hcv_empOffice').val('');
            }

            if (_hcv_table) {
                _hcv_table.ajax.reload();
            }
        };

        window.hcvPrintCard = function () {
            var selectedIds = [];
            $('.hcv-row-check:checked').each(function () {
                selectedIds.push($(this).val());
            });
            if (selectedIds.length === 0) {
                (typeof toastr !== 'undefined' ? toastr.warning : alert)('Vui lòng chọn ít nhất một nhân viên để in thẻ.');
                return;
            }
            hcvOpenCardModal(selectedIds);
        };

        /** Mở modal preview thẻ và load dữ liệu cho danh sách empId */
        function hcvOpenCardModal(empIds) {
            if (!_hcv_previewModal && window.bootstrap && document.getElementById('hcv_previewModal')) {
                _hcv_previewModal = new bootstrap.Modal(document.getElementById('hcv_previewModal'));
            }
            $('#hcv_printArea').empty();

            var promises = empIds.map(function (empId) {
                return $.ajax({ url: '/hrm/empinfo/api/hrCard/detail', data: { empId: empId } });
            });

            $.when.apply($, promises).done(function () {
                var responses = empIds.length === 1
                    ? [arguments[0]]
                    : Array.from(arguments).map(function (a) { return a[0]; });
                responses.forEach(hcvRenderCard);
                if (_hcv_previewModal) _hcv_previewModal.show();
            }).fail(function () {
                (typeof toastr !== 'undefined' ? toastr.error : alert)('Lỗi tải dữ liệu thẻ nhân sự');
            });
        }

        // =============================================
        // CARD RENDER
        // =============================================

        /** Map field-id -> data accessor */
        var HCV_FIELD_MAP = [
            ['hr_localName', function (e, p) { return e.localName; }],
            ['hr_empId', function (e, p) { return e.empId; }],
            ['hr_department', function (e, p) { return e.deptNo; }],
            ['hr_contractStart', function (e, p) { return e.startDate; }],
            ['hr_regPlace', function (e, p) { return p.regPlace; }],
            ['hr_rank', function (e, p) { return e.postGradeNo; }],
            ['hr_contractEnd', function (e, p) { return e.endDate; }],
            ['hr_political', function (e, p) { return p.political; }],
            ['hr_mainBusiness', function (e, p) { return e.mainBusiness; }],
            ['hr_finalEdu', function (e, p) { return p.finalEdu; }],
            ['hr_birthday', function (e, p) { return p.birthday; }],
            ['hr_costCenter', function (e, p) { return e.costCenter; }],
            ['hr_gradSchool', function (e, p) { return p.gradSchool; }],
            ['hr_gender', function (e, p) { return p.gender; }],
            ['hr_stateService', function (e, p) { return e.empOffice; }],
            ['hr_major', function (e, p) { return p.major; }],
            ['hr_homePhone', function (e, p) { return p.homePhone; }],
            ['hr_divisionEntry', function (e, p) { return e.divisionEntry; }],
            ['hr_gradDate', function (e, p) { return p.gradDate; }],
            ['hr_tel', function (e, p) { return p.tel; }],
            ['hr_dateEntry', function (e, p) { return e.dateEntry; }],
            ['hr_national', function (e, p) { return p.national; }],
            ['hr_married', function (e, p) { return p.married; }],
            ['hr_personEmail', function (e, p) { return p.personEmail; }],
            ['hr_cEmail', function (e, p) { return p.cEmail; }],
            ['hr_marryDate', function (e, p) { return p.marryDate; }],
            ['hr_presentAdd', function (e, p) { return p.presentAdd; }],
            ['hr_eagleMId', function (e, p) { return p.eagleMId; }]
        ];

        /** Tạo HTML rows từ danh sách data + array of field keys, số cột trống mặc định */
        function hcvBuildRows(list, fields, emptyRows) {
            if (list && list.length > 0) {
                return list.map(function (item) {
                    return '<tr>' + fields.map(function (f) {
                        return '<td>' + (item[f] || '') + '</td>';
                    }).join('') + '</tr>';
                }).join('');
            }
            var emptyTds = fields.map(function () { return '<td></td>'; }).join('');
            var rows = '';
            for (var i = 0; i < (emptyRows || 2); i++) {
                rows += '<tr><td>&nbsp;</td>' + emptyTds.slice('<td></td>'.length) + '</tr>';
            }
            return rows || '<tr>' + fields.map(function () { return '<td>&nbsp;</td>'; }).join('') + '</tr>';
        }

        function hcvRenderCard(res) {
            var tpl = document.getElementById('hcv_cardTemplate');
            if (!tpl) return;
            var clone = tpl.content.cloneNode(true);
            var emp = res.employee || {};
            var pInfo = res.personalInfo || {};

            // Điền text fields
            HCV_FIELD_MAP.forEach(function (entry) {
                var el = clone.querySelector('#' + entry[0]);
                if (el) { el.innerText = entry[1](emp, pInfo) || ''; el.removeAttribute('id'); }
            });

            // Điền table bodies
            var tableSections = [
                { id: 'hr_educationBody', list: res.educations, fields: ['admissions', 'graduation', 'education', 'institutionName', 'major'] },
                { id: 'hr_familyBody', list: res.families, fields: ['relation', 'famName', 'birthday', 'education', 'tel'] },
                { id: 'hr_experienceBody', list: res.experiences, fields: ['startDate', 'endDate', 'companyName', 'department', 'remarks'] },
                { id: 'hr_qualificationBody', list: res.qualifications, fields: ['qualName', 'grade', 'issuing', 'evidence', 'effective'] }
            ];
            tableSections.forEach(function (sec) {
                var el = clone.querySelector('#' + sec.id);
                if (el) {
                    var html = (sec.list && sec.list.length > 0)
                        ? sec.list.map(function (row) {
                            return '<tr>' + sec.fields.map(function (f) { return '<td>' + (row[f] || '') + '</td>'; }).join('') + '</tr>';
                        }).join('')
                        : Array(3).fill('<tr>' + sec.fields.map(function () { return '<td>&nbsp;</td>'; }).join('') + '</tr>').join('');
                    el.innerHTML = html;
                    el.removeAttribute('id');
                }
            });

            // Xóa các ID phụ không cần bind
            ['hr_mainBusinessBody', 'hr_trainingBody', 'hr_evaluationBody', 'hr_orderBody'].forEach(function (id) {
                var el = clone.querySelector('#' + id);
                if (el) el.removeAttribute('id');
            });

            document.getElementById('hcv_printArea').appendChild(clone);
        }

        // =============================================
        // PRINT
        // =============================================

        var HCV_PRINT_CSS = [
            '* { box-sizing: border-box; margin: 0; padding: 0; }',
            'body { font-family: Arial, sans-serif; font-size: 11px; color: #333; background: #fff; }',
            '.hrcard-container { width: 100%; padding: 10px; page-break-after: always; break-after: page; }',
            '.hrcard-container:last-child { page-break-after: auto; break-after: auto; }',
            '.hrcard-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px dashed #ccc; padding-bottom: 10px; margin-bottom: 10px; }',
            '.hrcard-title { font-size: 18px; font-weight: bold; text-align: center; flex-grow: 1; }',
            '.hrcard-table { width: 100%; border-collapse: collapse; font-size: 10px; margin-bottom: 10px; }',
            '.hrcard-table th, .hrcard-table td { border: 1px solid #000; padding: 3px 4px; text-align: center; vertical-align: middle; word-break: break-word; }',
            '.hrcard-table th { background: #f0f0f0; font-weight: bold; }',
            '.hrcard-photo-cell { width: 100px; text-align: center; vertical-align: middle; border: 1px solid #000; }',
            '.hrcard-photo { width: 80px; height: 100px; margin: 5px auto; background: #0066cc; display: flex; align-items: center; justify-content: center; }',
            '.hrcard-emp-name { font-weight: bold; font-size: 11px; margin-top: 4px; text-align: center; }',
            '.hrcard-emp-id { font-size: 10px; margin-bottom: 4px; text-align: center; }',
            '.hrcard-label { text-align: left; padding-left: 6px; font-weight: bold; }',
            '.hrcard-value { text-align: left; padding-left: 4px; }',
            '.hrcard-info-section { margin-bottom: 10px; }',
            '.hrcard-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }',
            '.hrcard-grid-2 > div { min-width: 0; overflow: hidden; }',
            '.hrcard-section-title { font-weight: bold; font-size: 11px; margin-bottom: 4px; }',
            '@page { size: A4 portrait; margin: 8mm; }'
        ].join('\n');

        window.hcvExecutePrint = function () {
            var html = document.getElementById('hcv_printArea').innerHTML;
            var iframe = document.createElement('iframe');
            iframe.style.cssText = 'position:fixed;width:0;height:0;border:none;visibility:hidden;';
            document.body.appendChild(iframe);
            var doc = iframe.contentWindow.document;
            doc.open();
            doc.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><style>' + HCV_PRINT_CSS + '</style></head><body>' + html + '</body></html>');
            doc.close();
            iframe.contentWindow.onafterprint = function () { document.body.removeChild(iframe); };
            setTimeout(function () { iframe.contentWindow.focus(); iframe.contentWindow.print(); }, 600);
        };

        function hcvBootPage() {
            hcvInitDeptSelector();
            $.when(typeof initCodeSelects === 'function' ? initCodeSelects('#hcv_searchForm') : null).always(function () {
                hcvInitTable();
            });
        }

        $(document).ready(hcvBootPage);
    </script>
</template>
