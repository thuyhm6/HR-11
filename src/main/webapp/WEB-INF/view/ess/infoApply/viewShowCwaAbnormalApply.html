<div th:fragment="content">
    <div class="row">
        <div class="col-12" id="sca_pageWrapper">

            <!-- Thông tin nhân viên -->
            <div th:replace="~{fragments/essEmpInfoCard :: card}"></div>

            <!-- Điều kiện tìm kiếm -->
            <div class="card mb-2">
                <div class="card-body py-2 px-3">
                    <div class="d-flex align-items-center gap-2 flex-wrap">
                        <span class="fw-semibold small" th:text="#{essCwa.startDate}">Ngày bắt đầu</span>
                        <input type="text" class="form-control form-control-sm js-daterangepicker"
                            id="sca_startDate"
                            data-drp-format="DD/MM/YYYY"
                            data-drp-auto-update-input="false"
                            autocomplete="off" style="width:130px;">
                        <span class="fw-semibold small" th:text="#{essCwa.endDate}">Ngày kết thúc</span>
                        <input type="text" class="form-control form-control-sm js-daterangepicker"
                            id="sca_endDate"
                            data-drp-format="DD/MM/YYYY"
                            data-drp-auto-update-input="false"
                            autocomplete="off" style="width:130px;">
                        <button class="btn btn-primary btn-sm" onclick="scaSearch()" th:text="#{essCwa.search}">Tra cứu</button>
                    </div>
                </div>
            </div>

            <!-- Thiết lập thời gian hàng loạt -->
            <div class="card mb-2">
                <div class="card-body py-2 px-3">
                    <div class="d-flex align-items-center gap-2 flex-wrap">
                        <span class="fw-semibold small" th:text="#{essCwa.batchIn}">Vào:</span>
                        <input type="text" class="form-control form-control-sm js-daterangepicker"
                            id="sca_globalInDate"
                            data-drp-format="DD/MM/YYYY"
                            data-drp-auto-update-input="false"
                            autocomplete="off" style="width:130px;">
                        <input type="text" class="form-control form-control-sm" id="sca_globalInHh"
                            list="sca_hourList" value="08" autocomplete="off" style="width:65px;"
                            oninput="scaClampHour(this)" onblur="scaFmtHour(this)">
                        <span>:</span>
                        <input type="text" class="form-control form-control-sm" id="sca_globalInMi"
                            list="sca_minList" value="00" autocomplete="off" style="width:65px;"
                            oninput="scaClampMin(this)" onblur="scaFmtMin(this)">
                        <span class="fw-semibold small ms-2" th:text="#{essCwa.batchOut}">Ra:</span>
                        <input type="text" class="form-control form-control-sm js-daterangepicker"
                            id="sca_globalOutDate"
                            data-drp-format="DD/MM/YYYY"
                            data-drp-auto-update-input="false"
                            autocomplete="off" style="width:130px;">
                        <input type="text" class="form-control form-control-sm" id="sca_globalOutHh"
                            list="sca_hourList" value="17" autocomplete="off" style="width:65px;"
                            oninput="scaClampHour(this)" onblur="scaFmtHour(this)">
                        <span>:</span>
                        <input type="text" class="form-control form-control-sm" id="sca_globalOutMi"
                            list="sca_minList" value="00" autocomplete="off" style="width:65px;"
                            oninput="scaClampMin(this)" onblur="scaFmtMin(this)">
                        <button class="btn btn-secondary btn-sm ms-2" onclick="scaApplyAll()" th:text="#{essCwa.applyAll}">Thực hiện tất cả</button>
                        <button class="btn btn-success btn-sm ms-auto" onclick="scaSubmit()" th:text="#{essCwa.submit}">Xin phép</button>
                    </div>
                </div>
            </div>

            <!-- Toolbar -->
            <div class="d-flex align-items-center gap-2 mb-2">
                <span class="small" th:text="#{essCwa.quickFilter}">Lọc nhanh</span>
                <input type="text" class="form-control form-control-sm" id="sca_filterInput"
                    style="max-width:160px;" oninput="scaQuickFilter(this.value)">
                <div class="ms-auto d-flex align-items-center gap-2">
                    <span class="small" th:text="#{essCwa.perPage}">Mỗi trang</span>
                    <select class="form-select form-select-sm" id="sca_pageSize" style="width:70px;"
                        onchange="scaChangePageSize(this.value)">
                        <option value="25">25</option>
                        <option value="50" selected>50</option>
                        <option value="100">100</option>
                    </select>
                    <span class="small" th:text="#{essCwa.records}">Dữ liệu</span>
                </div>
            </div>

            <!-- Bảng danh sách -->
            <div class="card">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-bordered table-sm align-middle mb-0" id="sca_table">
                            <thead class="table-light">
                                <tr>
                                    <th class="text-center" style="width:36px;">NO</th>
                                    <th class="text-center" style="width:40px;">
                                        <input type="checkbox" id="sca_checkAll" onclick="scaToggleAll(this)">
                                    </th>
                                    <th class="text-center" style="min-width:130px;" th:text="#{essCwa.category}">Phân loại</th>
                                    <th class="text-center" style="min-width:110px;" th:text="#{essCwa.workDate}">Ngày công</th>
                                    <th class="text-center" style="min-width:120px;" th:text="#{essCwa.cardSwipe}">Thời gian quẹt thẻ</th>
                                    <th class="text-center" style="min-width:310px; width:310px;" th:text="#{essCwa.timeInput}">Thời gian</th>
                                    <th class="text-center" style="min-width:160px;" th:text="#{essCwa.reason}">Lý do</th>
                                    <th class="text-center" style="min-width:200px;" th:text="#{essCwa.approver}">Người duyệt</th>
                                </tr>
                            </thead>
                            <tbody id="sca_tableBody">
                                <tr>
                                    <td colspan="8" class="text-center text-muted py-3" th:text="#{essCwa.loadingData}">Đang tải dữ liệu...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <!-- Phân trang -->
                    <div class="d-flex justify-content-between align-items-center px-3 py-2">
                        <span id="sca_pageInfo" class="small text-muted"></span>
                        <div id="sca_pagination" class="d-flex gap-1"></div>
                    </div>
                </div>
            </div>

        </div><!-- /#sca_pageWrapper -->
    </div><!-- /.row -->
</div>

<!-- Datalist dùng chung cho ô giờ/phút trong trang này -->

    <option value="08"><option value="09"><option value="10"><option value="11">
    <option value="12"><option value="13"><option value="14"><option value="15">
    <option value="16"><option value="17"><option value="18"><option value="19">
    <option value="20"><option value="21"><option value="22"><option value="23">
    <option value="24"><option value="25"><option value="26"><option value="27">
    <option value="28"><option value="29"><option value="30"><option value="31">
    <option value="32"><option value="33"><option value="34"><option value="35">
    <option value="36"><option value="37"><option value="38"><option value="39">
    <option value="40"><option value="41"><option value="42"><option value="43">
    <option value="44"><option value="45"><option value="46"><option value="47">
    <option value="48"><option value="49"><option value="50"><option value="51">
    <option value="52"><option value="53"><option value="54"><option value="55">
    <option value="56"><option value="57"><option value="58"><option value="59">
</datalist>

<template id="fragmentScripts">
    <th:block th:replace="~{fragments/essEmpInfoCard :: script}"></th:block>
    <script th:inline="javascript">
        var _sca_data        = [];
        var _sca_filtered    = [];
        var _sca_pageBooted  = false;
        var _sca_pageSize    = 50;
        var _sca_currentPage = 1;
        var _sca_personId    = '';
        var _sca_localName   = '';
        var _sca_approverStr = '';

        /* i18n */
        var _sca_i18n = {
            loading       : /*[[#{essCwa.loading}]]*/ 'Đang tải...',
            loadingData   : /*[[#{essCwa.loadingData}]]*/ 'Đang tải dữ liệu...',
            noData        : /*[[#{essCwa.noData}]]*/ 'Không có dữ liệu',
            loadError     : /*[[#{essCwa.loadError}]]*/ 'Lỗi tải dữ liệu',
            selectRowAlert: /*[[#{essCwa.selectRowAlert}]]*/ 'Vui lòng chọn ít nhất một dòng để xin phép.',
            fillTimeAlert : /*[[#{essCwa.fillTimeAlert}]]*/ 'Vui lòng nhập đầy đủ thời gian vào/ra cho tất cả dòng được chọn.',
            applySuccess  : /*[[#{essCwa.applySuccess}]]*/ 'Xin phép thành công!',
            applyFail     : /*[[#{essCwa.applyFail}]]*/ 'Xin phép thất bại!',
            connectError  : /*[[#{essCwa.connectError}]]*/ 'Lỗi kết nối khi xin phép!',
            showing       : /*[[#{essCwa.showing}]]*/ 'Hiển thị',
            rows          : /*[[#{essCwa.rows}]]*/ 'dòng',
            inLabel       : /*[[#{essCwa.inLabel}]]*/ 'Vào',
            outLabel      : /*[[#{essCwa.outLabel}]]*/ 'Ra'
        };

        function scaEscHtml(s) {
            if (s == null) return '';
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function scaGetDefaultDateRange() {
            var now  = new Date();
            var year = now.getFullYear();
            var mon  = now.getMonth() + 1;
            var mm   = String(mon).padStart(2, '0');
            var last = new Date(year, mon, 0).getDate();
            return {
                from: '01/' + mm + '/' + year,
                to  : String(last).padStart(2, '0') + '/' + mm + '/' + year
            };
        }

        function scaPad2(n) { return String(n).padStart(2, '0'); }

        window.scaClampHour = function(el) {
            var v = parseInt(el.value, 10);
            if (!isNaN(v)) { if (v < 1) el.value = 1; if (v > 23) el.value = 23; }
        };
        window.scaFmtHour = function(el) {
            var v = parseInt(el.value, 10);
            el.value = scaPad2(isNaN(v) ? 1 : Math.min(23, Math.max(1, v)));
        };
        window.scaClampMin = function(el) {
            var v = parseInt(el.value, 10);
            if (!isNaN(v)) { if (v < 0) el.value = 0; if (v > 59) el.value = 59; }
        };
        window.scaFmtMin = function(el) {
            var v = parseInt(el.value, 10);
            el.value = scaPad2(isNaN(v) ? 0 : Math.min(59, Math.max(0, v)));
        };

        function scaParseDmyHm(dmy, hh, mi) {
            if (!dmy) return null;
            var p = dmy.split('/');
            if (p.length !== 3) return null;
            var d = new Date(+p[2], +p[1] - 1, +p[0], +(hh || 0), +(mi || 0));
            return isNaN(d.getTime()) ? null : d;
        }

        function scaCalcWorkHour(inDate, inHh, inMi, outDate, outHh, outMi) {
            var from = scaParseDmyHm(inDate, inHh, inMi);
            var to   = scaParseDmyHm(outDate, outHh, outMi);
            if (!from || !to || to <= from) return '0';
            return ((to - from) / 3600000).toFixed(2);
        }

        // ── Approvers ────────────────────────────────────────────────────────
        function scaLoadApprovers() {
            if (!_sca_personId) return;
            $.post('/ar/attendanceMintenance/api/leaveApply/approvers', {
                applyTypeNo  : '218197',
                personId     : _sca_personId,
                applyTypeCode: '141443',
                applyLength  : '0'
            }, function(data) {
                if (!data || !data.length) return;
                _sca_approverStr = data
                    .filter(function(a) { return String(a.affirmLevel) !== '0'; })
                    .map(function(a) {
                        return a.affirmLevel + '[' + (a.empId || '') + ']' + (a.localName || '');
                    }).join(' ');
                $('.sca_approverCell').text(_sca_approverStr);
            });
        }

        // ── Search ───────────────────────────────────────────────────────────
        window.scaSearch = function() {
            $('#sca_tableBody').html('<tr><td colspan="8" class="text-center text-muted py-3">' + scaEscHtml(_sca_i18n.loading) + '</td></tr>');
            $('#sca_checkAll').prop('checked', false);
            $.ajax({
                url : '/ess/infoApply/api/myCwaAbnormal/list',
                type: 'GET',
                data: {
                    startDate: $('#sca_startDate').val() || '',
                    endDate  : $('#sca_endDate').val()   || ''
                },
                success: function(rows) {
                    _sca_data     = rows || [];
                    _sca_filtered = _sca_data.slice();
                    _sca_currentPage = 1;
                    scaRenderPage();
                    scaLoadApprovers();
                },
                error: function() {
                    $('#sca_tableBody').html('<tr><td colspan="8" class="text-center text-danger py-3">' + scaEscHtml(_sca_i18n.loadError) + '</td></tr>');
                }
            });
        };

        // ── Render bảng ──────────────────────────────────────────────────────
        function scaRenderPage() {
            var rows    = _sca_filtered;
            var total   = rows.length;
            var totalPg = Math.max(1, Math.ceil(total / _sca_pageSize));
            if (_sca_currentPage > totalPg) _sca_currentPage = totalPg;
            var start = (_sca_currentPage - 1) * _sca_pageSize;
            var end   = Math.min(start + _sca_pageSize, total);
            var page  = rows.slice(start, end);

            var $tbody = $('#sca_tableBody');
            if (!page.length) {
                $tbody.html('<tr><td colspan="8" class="text-center text-muted py-3">' + scaEscHtml(_sca_i18n.noData) + '</td></tr>');
            } else {
                var html = '';
                page.forEach(function(r, idx) {
                    var rowNo   = start + idx + 1;
                    var pkNo    = scaEscHtml(r.pkNo    || '');
                    var itemNo  = scaEscHtml(r.itemNo  || '');
                    var dateStr = scaEscHtml(r.arDateStr || '');
                    var inDate  = r.shiftStartYyyy || dateStr;
                    var inHh    = r.shiftStartHh   || '08';
                    var inMi    = r.shiftStartMi   || '00';
                    var outDate = r.shiftEndYyyy   || dateStr;
                    var outHh   = r.shiftEndHh     || '17';
                    var outMi   = r.shiftEndMi     || '00';

                    html += '<tr>'
                        + '<td class="text-center">' + rowNo + '</td>'
                        + '<td class="text-center">'
                        +   '<input type="checkbox" class="sca_rowCheck"'
                        +   ' data-idx="' + idx + '"'
                        +   ' data-pkno="'    + pkNo    + '"'
                        +   ' data-itemno="'  + itemNo  + '"'
                        +   ' data-datestr="' + dateStr + '">'
                        + '</td>'
                        + '<td>' + scaEscHtml(r.itemName || r.itemNo || '') + '</td>'
                        + '<td class="text-center">' + dateStr + '</td>'
                        + '<td class="text-center small">'
                        +   '<div>' + scaEscHtml(_sca_i18n.inLabel) + ': ' + scaEscHtml(r.indoorTime  || '**:**') + '</div>'
                        +   '<div>' + scaEscHtml(_sca_i18n.outLabel) + ':&nbsp; ' + scaEscHtml(r.outdoorTime || '**:**') + '</div>'
                        + '</td>'
                        + '<td>'
                        +   '<div class="d-flex align-items-center gap-1 mb-1">'
                        +     '<span class="small flex-shrink-0" style="width:26px;">' + scaEscHtml(_sca_i18n.inLabel) + '</span>'
                        +     '<input type="text" class="form-control form-control-sm js-daterangepicker sca_inDate"'
                        +       ' id="sca_inDate_' + idx + '"'
                        +       ' data-drp-format="DD/MM/YYYY" data-drp-auto-update-input="false"'
                        +       ' value="' + scaEscHtml(inDate) + '" autocomplete="off" style="flex:1;min-width:0;">'
                        +     '<input type="text" class="form-control form-control-sm flex-shrink-0" id="sca_inHh_' + idx + '"'
                        +       ' list="sca_hourList" autocomplete="off" value="' + scaPad2(parseInt(inHh, 10) || 1) + '" style="width:50px;"'
                        +       ' oninput="scaClampHour(this)" onblur="scaFmtHour(this)">'
                        +     '<span class="flex-shrink-0">:</span>'
                        +     '<input type="text" class="form-control form-control-sm flex-shrink-0" id="sca_inMi_' + idx + '"'
                        +       ' list="sca_minList" autocomplete="off" value="' + scaPad2(parseInt(inMi, 10) || 0) + '" style="width:50px;"'
                        +       ' oninput="scaClampMin(this)" onblur="scaFmtMin(this)">'
                        +   '</div>'
                        +   '<div class="d-flex align-items-center gap-1">'
                        +     '<span class="small flex-shrink-0" style="width:26px;">' + scaEscHtml(_sca_i18n.outLabel) + '</span>'
                        +     '<input type="text" class="form-control form-control-sm js-daterangepicker sca_outDate"'
                        +       ' id="sca_outDate_' + idx + '"'
                        +       ' data-drp-format="DD/MM/YYYY" data-drp-auto-update-input="false"'
                        +       ' value="' + scaEscHtml(outDate) + '" autocomplete="off" style="flex:1;min-width:0;">'
                        +     '<input type="text" class="form-control form-control-sm flex-shrink-0" id="sca_outHh_' + idx + '"'
                        +       ' list="sca_hourList" autocomplete="off" value="' + scaPad2(parseInt(outHh, 10) || 1) + '" style="width:50px;"'
                        +       ' oninput="scaClampHour(this)" onblur="scaFmtHour(this)">'
                        +     '<span class="flex-shrink-0">:</span>'
                        +     '<input type="text" class="form-control form-control-sm flex-shrink-0" id="sca_outMi_' + idx + '"'
                        +       ' list="sca_minList" autocomplete="off" value="' + scaPad2(parseInt(outMi, 10) || 0) + '" style="width:50px;"'
                        +       ' oninput="scaClampMin(this)" onblur="scaFmtMin(this)">'
                        +   '</div>'
                        + '</td>'
                        + '<td><input type="text" class="form-control form-control-sm" id="sca_remark_' + idx + '"></td>'
                        + '<td class="small sca_approverCell">' + scaEscHtml(_sca_approverStr) + '</td>'
                        + '</tr>';
                });
                $tbody.html(html);
                if (typeof initDateRangePickers === 'function') {
                    initDateRangePickers('#sca_tableBody');
                }
            }

            $('#sca_pageInfo').text(_sca_i18n.showing + ' ' + (total ? start + 1 : 0) + ' - ' + end + ' / ' + total + ' ' + _sca_i18n.rows);
            scaRenderPagination(totalPg);
        }

        function scaRenderPagination(totalPg) {
            var cur  = _sca_currentPage;
            var prev = cur > 1 ? cur - 1 : 1;
            var next = cur < totalPg ? cur + 1 : totalPg;
            var html = '<button class="btn btn-outline-secondary btn-sm px-2 py-0" '
                + (cur === 1 ? 'disabled' : '') + ' onclick="scaGoPage(' + prev + ')">‹</button>';
            var s = Math.max(1, cur - 2), e = Math.min(totalPg, s + 4);
            s = Math.max(1, e - 4);
            for (var i = s; i <= e; i++) {
                html += '<button class="btn btn-sm px-2 py-0 '
                    + (i === cur ? 'btn-primary' : 'btn-outline-secondary')
                    + '" onclick="scaGoPage(' + i + ')">' + i + '</button>';
            }
            html += '<button class="btn btn-outline-secondary btn-sm px-2 py-0" '
                + (cur === totalPg ? 'disabled' : '') + ' onclick="scaGoPage(' + next + ')">›</button>';
            $('#sca_pagination').html(html);
        }

        window.scaGoPage = function(p) { _sca_currentPage = p; scaRenderPage(); };

        window.scaChangePageSize = function(val) {
            _sca_pageSize    = parseInt(val, 10) || 50;
            _sca_currentPage = 1;
            scaRenderPage();
        };

        window.scaQuickFilter = function(kw) {
            if (!kw || !kw.trim()) {
                _sca_filtered = _sca_data.slice();
            } else {
                var k = kw.trim().toLowerCase();
                _sca_filtered = _sca_data.filter(function(r) {
                    return [r.itemName, r.itemNo, r.arDateStr, r.indoorTime, r.outdoorTime]
                        .some(function(v) { return v && String(v).toLowerCase().indexOf(k) !== -1; });
                });
            }
            _sca_currentPage = 1;
            scaRenderPage();
        };

        window.scaToggleAll = function(cb) { $('.sca_rowCheck').prop('checked', cb.checked); };

        // ── Thực hiện tất cả ─────────────────────────────────────────────────
        window.scaApplyAll = function() {
            var inDate  = $('#sca_globalInDate').val();
            var inHh    = parseInt($('#sca_globalInHh').val(), 10) || 0;
            var inMi    = parseInt($('#sca_globalInMi').val(), 10) || 0;
            var outDate = $('#sca_globalOutDate').val();
            var outHh   = parseInt($('#sca_globalOutHh').val(), 10) || 0;
            var outMi   = parseInt($('#sca_globalOutMi').val(), 10) || 0;

            var pgStart = (_sca_currentPage - 1) * _sca_pageSize;
            var pgCount = Math.min(_sca_pageSize, _sca_filtered.length - pgStart);
            for (var i = 0; i < pgCount; i++) {
                if (inDate) $('#sca_inDate_'  + i).val(inDate);
                if (inHh)   $('#sca_inHh_'    + i).val(inHh);
                if (inMi !== undefined) $('#sca_inMi_' + i).val(inMi);
                if (outDate) $('#sca_outDate_' + i).val(outDate);
                if (outHh)   $('#sca_outHh_'   + i).val(outHh);
                if (outMi !== undefined) $('#sca_outMi_' + i).val(outMi);
            }
        };

        // ── Xin phép ─────────────────────────────────────────────────────────
        window.scaSubmit = function() {
            var $checked = $('.sca_rowCheck:checked');
            if (!$checked.length) { alert(_sca_i18n.selectRowAlert); return; }

            var payload = [];
            var valid   = true;

            $checked.each(function() {
                if (!valid) return;
                var idx      = parseInt($(this).attr('data-idx'), 10);
                var pkNo     = $(this).attr('data-pkno')     || '';
                var itemNo   = $(this).attr('data-itemno')   || '';
                var dateStr  = $(this).attr('data-datestr')  || '';

                var inDate   = $('#sca_inDate_'  + idx).val();
                var inHh     = scaPad2(parseInt($('#sca_inHh_'  + idx).val(), 10) || 1);
                var inMi     = scaPad2(parseInt($('#sca_inMi_'  + idx).val(), 10) || 0);
                var outDate  = $('#sca_outDate_' + idx).val();
                var outHh    = scaPad2(parseInt($('#sca_outHh_' + idx).val(), 10) || 1);
                var outMi    = scaPad2(parseInt($('#sca_outMi_' + idx).val(), 10) || 0);
                var remark   = $('#sca_remark_'  + idx).val()  || '';

                if (!inDate || !outDate) {
                    alert(_sca_i18n.fillTimeAlert);
                    valid = false;
                    return;
                }

                payload.push({
                    applyNo     : pkNo,
                    personId    : _sca_personId,
                    localName   : _sca_localName,
                    itemNo      : itemNo,
                    arDateStr   : dateStr,
                    fromDateTime: inDate  + ' ' + inHh  + ':' + inMi,
                    toDateTime  : outDate + ' ' + outHh + ':' + outMi,
                    workHour    : scaCalcWorkHour(inDate, inHh, inMi, outDate, outHh, outMi),
                    remark      : remark
                });
            });

            if (!valid || !payload.length) return;

            $.ajax({
                url        : '/ess/infoApplyAttendance/api/attendanceEx/apply',
                type       : 'POST',
                contentType: 'application/json',
                data       : JSON.stringify(payload),
                success    : function(res) {
                    if (res && res.success) {
                        toastr && toastr.success(res.message || _sca_i18n.applySuccess);
                        scaSearch();
                    } else {
                        toastr && toastr.error(res && res.error ? res.error : _sca_i18n.applyFail);
                    }
                },
                error: function() { toastr && toastr.error(_sca_i18n.connectError); }
            });
        };

        // ── Boot ─────────────────────────────────────────────────────────────
        function scaBootPage() {
            if (_sca_pageBooted) return;
            if (!document.getElementById('sca_startDate')) { setTimeout(scaBootPage, 30); return; }
            _sca_pageBooted = true;

            loadEssEmpInfoCard();

            if (typeof initDateRangePickers === 'function') initDateRangePickers('#sca_pageWrapper');

            var dr = scaGetDefaultDateRange();
            $('#sca_startDate').val(dr.from);
            $('#sca_endDate').val(dr.to);

            $.ajax({
                url: '/ess/empinfo/api/personalInfo/myInfo',
                type: 'GET',
                success: function(data) {
                    if (!data) return;
                    _sca_personId  = data.personId  || '';
                    _sca_localName = data.localName  || '';
                    scaSearch();
                }
            });
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', scaBootPage);
        }
        if (typeof $ !== 'undefined') {
            $(document).ready(scaBootPage);
        } else {
            scaBootPage();
        }
    </script>
</template>
