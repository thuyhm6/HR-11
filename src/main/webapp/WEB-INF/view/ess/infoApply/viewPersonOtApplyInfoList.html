<div th:fragment="content">
    <div class="row">
        <div class="col-12" id="poai_pageWrapper">

            <!-- Thông tin nhân viên -->
            <div th:replace="~{fragments/essEmpInfoCard :: card}"></div>

            <!-- Điều kiện tìm kiếm -->
            <div class="card mb-3">
                <div class="card-body">
                    <div class="row gy-3">
                        <div class="col-md-4">
                            <div class="border rounded p-2 h-100">
                                <div class="small text-muted mb-2">Phân loại tăng ca</div>
                                <select class="form-select form-select-sm" id="poai_itemNo">
                                    <option value="">-- Tất cả --</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="border rounded p-2 h-100">
                                <div class="small text-muted mb-2">Thời lượng (>=)</div>
                                <input type="number" class="form-control form-control-sm" id="poai_minQuantity" min="0"
                                    step="0.5" style="max-width:140px;" placeholder="0">
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="border rounded p-2 h-100">
                                <div class="small text-muted mb-2">Thời gian</div>
                                <div class="d-flex flex-wrap align-items-center gap-2">
                                    <input type="text" class="form-control form-control-sm js-daterangepicker"
                                        id="poai_startDate" data-drp-format="DD/MM/YYYY"
                                        data-drp-auto-update-input="false" autocomplete="off" style="width:130px;">
                                    <span>~</span>
                                    <input type="text" class="form-control form-control-sm js-daterangepicker"
                                        id="poai_endDate" data-drp-format="DD/MM/YYYY"
                                        data-drp-auto-update-input="false" autocomplete="off" style="width:130px;">
                                    <button class="btn btn-primary btn-sm" onclick="poaiSearch()">
                                        <i class="bi bi-search"></i> Tra cứu
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Toolbar -->
            <div class="d-flex align-items-center gap-2 mb-2">
                <span class="small">Lọc nhanh</span>
                <input type="text" class="form-control form-control-sm" id="poai_filterInput" style="max-width:200px;"
                    oninput="poaiQuickFilter(this.value)">
                <div class="ms-auto d-flex align-items-center gap-2">
                    <span class="small">Mỗi trang</span>
                    <select class="form-select form-select-sm" id="poai_pageSize" style="width:70px;"
                        onchange="poaiChangePageSize(this.value)">
                        <option value="25">25</option>
                        <option value="50" selected>50</option>
                        <option value="100">100</option>
                    </select>
                    <span class="small">Dữ liệu</span>
                </div>
            </div>

            <!-- Bảng danh sách -->
            <div class="card">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-bordered table-sm align-middle mb-0" id="poai_table">
                            <thead class="table-light">
                                <tr>
                                    <th class="text-center" style="width:36px;">NO</th>
                                    <th class="text-center" style="min-width:100px;">Ngày</th>
                                    <th class="text-center" style="min-width:55px;">Thứ</th>
                                    <th class="text-center" style="min-width:120px;">Tăng ca</th>
                                    <th class="text-center" style="min-width:110px;">Ca</th>
                                    <th class="text-center" style="min-width:130px;">Thời gian làm việc</th>
                                    <th class="text-center" style="min-width:65px;">Vào</th>
                                    <th class="text-center" style="min-width:65px;">Ra</th>
                                    <th class="text-center" style="min-width:160px;">Thời gian bắt đầu tăng ca</th>
                                    <th class="text-center" style="min-width:160px;">Thời gian kết thúc</th>
                                    <th class="text-center" style="min-width:110px;">Thời lượng tăng ca</th>
                                </tr>
                            </thead>
                            <tbody id="poai_tableBody">
                                <tr>
                                    <td colspan="11" class="text-center text-muted py-3">Đang tải dữ liệu...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <!-- Phân trang -->
                    <div class="d-flex justify-content-between align-items-center px-3 py-2">
                        <span id="poai_pageInfo" class="small text-muted"></span>
                        <div id="poai_pagination" class="d-flex gap-1"></div>
                    </div>
                </div>
            </div>

        </div><!-- /#poai_pageWrapper -->
    </div><!-- /.row -->
</div>

<template id="fragmentScripts">
    <th:block th:replace="~{fragments/essEmpInfoCard :: script}"></th:block>
    <script th:inline="javascript">
        var _poai_data = [];
        var _poai_filtered = [];
        var _poai_pageBooted = false;
        var _poai_pageSize = 50;
        var _poai_currentPage = 1;

        var _poai_weekdays = ['CN', 'T2', 'T3', 'T4', 'T5', 'T6', 'T7'];

        function poaiEscHtml(s) {
            if (s == null) return '';
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function poaiGetDefaultDateRange() {
            var now = new Date();
            var year = now.getFullYear();
            var mon = now.getMonth() + 1;
            var mm = String(mon).padStart(2, '0');
            var last = new Date(year, mon, 0).getDate();
            return {
                from: '01/' + mm + '/' + year,
                to: String(last).padStart(2, '0') + '/' + mm + '/' + year
            };
        }

        // Tính thứ từ AR_DATE_STR (YYYY/MM/DD)
        function poaiDayOfWeek(arDateStr) {
            if (!arDateStr) return '';
            var p = arDateStr.split('/');
            if (p.length !== 3) return '';
            var d = new Date(+p[0], +p[1] - 1, +p[2]);
            return isNaN(d.getTime()) ? '' : _poai_weekdays[d.getDay()];
        }

        // ── Search ───────────────────────────────────────────────────────────
        window.poaiSearch = function () {
            $('#poai_tableBody').html('<tr><td colspan="11" class="text-center text-muted py-3">Đang tải...</td></tr>');
            $.ajax({
                url: '/ess/infoApply/api/personOt/list',
                type: 'GET',
                data: {
                    startDate: $('#poai_startDate').val() || '',
                    endDate: $('#poai_endDate').val() || '',
                    itemNoSearch: $('#poai_itemNo').val() || '',
                    minQuantity: $('#poai_minQuantity').val() || ''
                },
                success: function (rows) {
                    _poai_data = rows || [];
                    _poai_filtered = _poai_data.slice();
                    _poai_currentPage = 1;
                    poaiRenderPage();
                },
                error: function () {
                    $('#poai_tableBody').html('<tr><td colspan="11" class="text-center text-danger py-3">Lỗi tải dữ liệu</td></tr>');
                }
            });
        };

        // ── Render bảng ──────────────────────────────────────────────────────
        function poaiRenderPage() {
            var rows = _poai_filtered;
            var total = rows.length;
            var totalPg = Math.max(1, Math.ceil(total / _poai_pageSize));
            if (_poai_currentPage > totalPg) _poai_currentPage = totalPg;
            var start = (_poai_currentPage - 1) * _poai_pageSize;
            var end = Math.min(start + _poai_pageSize, total);
            var page = rows.slice(start, end);

            var $tbody = $('#poai_tableBody');
            if (!page.length) {
                $tbody.html('<tr><td colspan="11" class="text-center text-muted py-3">Không có dữ liệu</td></tr>');
            } else {
                var html = '';
                page.forEach(function (r, idx) {
                    var dow = poaiDayOfWeek(r.arDateStr || '');
                    html += '<tr>'
                        + '<td class="text-center">' + (start + idx + 1) + '</td>'
                        + '<td class="text-center">' + poaiEscHtml(r.arDateStr || '') + '</td>'
                        + '<td class="text-center">' + poaiEscHtml(dow) + '</td>'
                        + '<td>' + poaiEscHtml(r.itemName || r.itemNo || '') + '</td>'
                        + '<td>' + poaiEscHtml(r.shiftName || r.shiftNo || '') + '</td>'
                        + '<td class="text-center">' + poaiEscHtml(r.workTime || '') + '</td>'
                        + '<td class="text-center">' + poaiEscHtml(r.indoorTime || '') + '</td>'
                        + '<td class="text-center">' + poaiEscHtml(r.outdoorTime || '') + '</td>'
                        + '<td class="text-center">' + poaiEscHtml(r.otStartTime || '') + '</td>'
                        + '<td class="text-center">' + poaiEscHtml(r.otEndTime || '') + '</td>'
                        + '<td class="text-center">' + poaiEscHtml(r.workHour || '') + '</td>'
                        + '</tr>';
                });
                $tbody.html(html);
            }

            $('#poai_pageInfo').text('Hiển thị ' + (total ? start + 1 : 0) + ' - ' + end + ' / ' + total + ' dòng');
            poaiRenderPagination(totalPg);
        }

        function poaiRenderPagination(totalPg) {
            var cur = _poai_currentPage;
            var prev = cur > 1 ? cur - 1 : 1;
            var next = cur < totalPg ? cur + 1 : totalPg;
            var html = '<button class="btn btn-outline-secondary btn-sm px-2 py-0" '
                + (cur === 1 ? 'disabled' : '') + ' onclick="poaiGoPage(' + prev + ')">‹</button>';
            var s = Math.max(1, cur - 2), e = Math.min(totalPg, s + 4);
            s = Math.max(1, e - 4);
            for (var i = s; i <= e; i++) {
                html += '<button class="btn btn-sm px-2 py-0 '
                    + (i === cur ? 'btn-primary' : 'btn-outline-secondary')
                    + '" onclick="poaiGoPage(' + i + ')">' + i + '</button>';
            }
            html += '<button class="btn btn-outline-secondary btn-sm px-2 py-0" '
                + (cur === totalPg ? 'disabled' : '') + ' onclick="poaiGoPage(' + next + ')">›</button>';
            $('#poai_pagination').html(html);
        }

        window.poaiGoPage = function (p) { _poai_currentPage = p; poaiRenderPage(); };

        window.poaiChangePageSize = function (val) {
            _poai_pageSize = parseInt(val, 10) || 50;
            _poai_currentPage = 1;
            poaiRenderPage();
        };

        window.poaiQuickFilter = function (kw) {
            if (!kw || !kw.trim()) {
                _poai_filtered = _poai_data.slice();
            } else {
                var k = kw.trim().toLowerCase();
                _poai_filtered = _poai_data.filter(function (r) {
                    return [r.arDateStr, r.itemName, r.shiftName, r.workTime,
                    r.otStartTime, r.otEndTime, r.workHour]
                        .some(function (v) { return v && String(v).toLowerCase().indexOf(k) !== -1; });
                });
            }
            _poai_currentPage = 1;
            poaiRenderPage();
        };

        // ── Load dropdown Phân loại tăng ca ─────────────────────────────────
        function poaiLoadItemList() {
            $.ajax({
                url: '/ess/infoApply/api/personOt/items',
                type: 'GET',
                success: function (items) {
                    var $sel = $('#poai_itemNo');
                    $sel.find('option:not(:first)').remove();
                    if (items && items.length) {
                        items.forEach(function (it) {
                            $sel.append('<option value="' + poaiEscHtml(it.itemNo) + '">'
                                + poaiEscHtml(it.itemName || it.itemNo) + '</option>');
                        });
                    }
                }
            });
        }

        // ── Boot ─────────────────────────────────────────────────────────────
        function poaiBootPage() {
            if (_poai_pageBooted) return;
            if (!document.getElementById('poai_startDate')) { setTimeout(poaiBootPage, 30); return; }
            _poai_pageBooted = true;

            loadEssEmpInfoCard();

            if (typeof initDateRangePickers === 'function') initDateRangePickers('#poai_pageWrapper');

            var dr = poaiGetDefaultDateRange();
            $('#poai_startDate').val(dr.from);
            $('#poai_endDate').val(dr.to);

            poaiLoadItemList();
            poaiSearch();
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', poaiBootPage);
        }
        if (typeof $ !== 'undefined') {
            $(document).ready(poaiBootPage);
        } else {
            poaiBootPage();
        }
    </script>
</template>
