<div th:fragment="content">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-body">
                    <!-- Search Form -->
                    <form id="menuSearchForm" class="row g-3 mb-4">
                        <div class="col-md-4">
                            <label for="menuSearchKeyword" class="form-label">Từ khóa (Mã, Tên)</label>
                            <input type="text" class="form-control" id="menuSearchKeyword"
                                placeholder="Nhập mã hoặc tên menu">
                        </div>
                        <div class="col-md-8 d-flex align-items-end">
                            <button type="button" class="btn btn-primary me-2" onclick="searchMenu()">
                                <i class="bx bx-search"></i> Tìm kiếm
                            </button>
                            <button type="button" class="btn btn-secondary me-2" onclick="clearMenuSearch()">
                                <i class="bx bx-x"></i> Xóa lọc
                            </button>
                            <button type="button" class="btn btn-success me-2" onclick="openMenuModal()">
                                <i class="bx bx-plus"></i> Thêm mới
                            </button>
                            <button type="button" class="btn btn-info" onclick="exportMenuExcel()">
                                <i class="bx bx-download"></i> Xuất Excel
                            </button>
                        </div>
                    </form>

                    <!-- Data Table -->
                    <div class="table-responsive">
                        <table id="menuTable" class="table table-striped table-bordered table-hover" style="width:100%">
                            <thead class="table-light">
                                <tr>
                                    <th>STT</th>
                                    <th>Menu Code</th>
                                    <th>Tên TV</th>
                                    <th>Tên TA</th>
                                    <th>Menu Cha</th>
                                    <th>URL</th>
                                    <th>Thứ tự</th>
                                    <th>Trạng thái</th>
                                    <th>Thao tác</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Data loaded via AJAX -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Add/Edit -->
    <div class="modal fade" id="menuModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="menuModalTitle">Thông tin Menu</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="menuForm">
                        <input type="hidden" id="menuNo" name="menuNo">

                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Mã Menu (Code)</label>
                                <input type="text" class="form-control" id="menuCode" name="menuCode" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Mã Parent Menu</label>
                                <input type="text" class="form-control" id="menuParentNo" name="menuParentNo"
                                    placeholder="Để trống nếu là gốc">
                            </div>

                            <!-- Multilingual Names -->
                            <div class="col-md-6">
                                <label class="form-label">Tên Tiếng Việt <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="menuNameVi" name="nameVi" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Tên Tiếng Anh</label>
                                <input type="text" class="form-control" id="menuNameEn" name="nameEn">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Tên Tiếng Trung</label>
                                <input type="text" class="form-control" id="menuNameZh" name="nameZh">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Tên Tiếng Hàn</label>
                                <input type="text" class="form-control" id="menuNameKo" name="nameKo">
                            </div>

                            <!-- Settings -->
                            <div class="col-md-6">
                                <label class="form-label">URL</label>
                                <input type="text" class="form-control" id="menuUrl" name="menuUrl">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Icon (Class)</label>
                                <input type="text" class="form-control" id="menuImg" name="menuImg">
                            </div>

                            <div class="col-md-4">
                                <label class="form-label">Cấp độ (Depth)</label>
                                <input type="number" class="form-control" id="menuDepth" name="depth" value="0">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Thứ tự</label>
                                <input type="number" class="form-control" id="menuOrderNo" name="orderNo" value="0">
                            </div>

                            <div class="col-md-4">
                                <div class="form-check mt-4">
                                    <input class="form-check-input" type="checkbox" id="menuActivity" name="activity"
                                        checked>
                                    <label class="form-check-label" for="menuActivity">Hoạt động</label>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                    <button type="button" class="btn btn-primary" onclick="saveMenu()">Lưu</button>
                </div>
            </div>
        </div>
    </div>
</div>

<template id="fragmentScripts">
    <script th:inline="none">
        $(document).ready(function () {
            var menuTable = $('#menuTable').DataTable({
                destroy: true,
                scrollY: "calc(100vh - 280px)",
                scrollCollapse: true,
                paging: true,
                searching: false,
                lengthChange: true,
                pageLength: 50,
                processing: true,
                columnDefs: [
                    { "width": "2%", "targets": 0 },   // Cột STT cố định nhỏ
                    { "width": "5%", "targets": -1 },  // Cột Trạng thái cố định
                    { "width": "2%", "targets": -2 },
                    { "width": "2%", "targets": -3 }
                ],
                dom: 'Blfrtip',
                buttons: ['excel', 'pdf', 'print'],
                language: {
                    url: '//cdn.datatables.net/plug-ins/1.10.25/i18n/Vietnamese.json'
                },
                ajax: {
                    url: '/sys/api/menu/list',
                    dataSrc: '',
                    data: function (d) {
                        d.keyword = $('#menuSearchKeyword').val();
                    }
                },
                columns: [
                    {
                        data: null,
                        render: function (data, type, row, meta) {
                            return meta.row + 1;
                        }
                    },
                    { data: 'menuCode' },
                    { data: 'nameVi' },
                    { data: 'nameEn' },
                    { data: 'parentMenuName' },
                    { data: 'menuUrl' },
                    { data: 'orderNo' },
                    {
                        data: 'activity',
                        className: 'text-center',
                        render: function (data) {
                            return data === 1 ? '<span class="badge bg-success">Active</span>' : '<span class="badge bg-secondary">Inactive</span>';
                        }
                    },
                    {
                        data: null,
                        className: "text-center",
                        render: function (data, type, row) {
                            return '<button class="btn btn-warning btn-sm me-1" onclick="editMenu(this)"><i class="bx bx-edit"></i></button>' +
                                '<button class="btn btn-danger btn-sm" onclick="deleteMenu(\'' + row.menuNo + '\')"><i class="bx bx-trash"></i></button>';
                        }
                    }
                ]
            });

            window.searchMenu = function () {
                menuTable.ajax.reload();
            };

            window.clearMenuSearch = function () {
                $('#menuSearchForm')[0].reset();
                menuTable.ajax.reload();
            };

            window.exportMenuExcel = function () {
                window.location.href = '/sys/api/menu/export';
            };

            window.openMenuModal = function () {
                $('#menuForm')[0].reset();
                $('#menuNo').val('');

                $('#menuModalTitle').text('Thêm mới Menu');

                var modal = new bootstrap.Modal(document.getElementById('menuModal'));
                modal.show();
            };

            window.editMenu = function (btn) {
                var row = menuTable.row($(btn).parents('tr')).data();

                $('#menuNo').val(row.menuNo);
                $('#menuParentNo').val(row.menuParentNo);
                $('#menuCode').val(row.menuCode);
                $('#menuImg').val(row.menuImg);
                $('#menuUrl').val(row.menuUrl);
                $('#menuDepth').val(row.depth);

                $('#menuNameVi').val(row.nameVi);
                $('#menuNameEn').val(row.nameEn);
                $('#menuNameZh').val(row.nameZh);
                $('#menuNameKo').val(row.nameKo);

                $('#menuOrderNo').val(row.orderNo);

                $('#menuActivity').prop('checked', row.activity === 1);

                $('#menuModalTitle').text('Cập nhật Menu');

                var modal = new bootstrap.Modal(document.getElementById('menuModal'));
                modal.show();
            };

            window.saveMenu = function () {
                if (!$('#menuForm')[0].checkValidity()) {
                    $('#menuForm')[0].reportValidity();
                    return;
                }

                var data = {
                    menuNo: $('#menuNo').val(),
                    menuParentNo: $('#menuParentNo').val(),
                    menuCode: $('#menuCode').val(),
                    menuImg: $('#menuImg').val(),
                    menuUrl: $('#menuUrl').val(),
                    depth: $('#menuDepth').val(),

                    nameVi: $('#menuNameVi').val(),
                    nameEn: $('#menuNameEn').val(),
                    nameZh: $('#menuNameZh').val(),
                    nameKo: $('#menuNameKo').val(),

                    orderNo: $('#menuOrderNo').val(),
                    activity: $('#menuActivity').is(':checked') ? 1 : 0
                };

                $.ajax({
                    url: '/sys/api/menu/save',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(data),
                    success: function (res) {
                        if (res.success) {
                            if (typeof toastr !== 'undefined') toastr.success(res.message);
                            else alert(res.message);

                            var modalEl = document.getElementById('menuModal');
                            var modal = bootstrap.Modal.getInstance(modalEl);
                            modal.hide();

                            menuTable.ajax.reload();
                        } else {
                            if (typeof toastr !== 'undefined') toastr.error(res.message);
                            else alert(res.message);
                        }
                    },
                    error: function (xhr) {
                        if (typeof toastr !== 'undefined') toastr.error('Lỗi hệ thống');
                        else alert('Lỗi hệ thống');
                    }
                });
            };

            window.deleteMenu = function (id) {
                if (!confirm('Bạn có chắc muốn xóa menu này?')) return;

                $.ajax({
                    url: '/sys/api/menu/delete',
                    type: 'POST',
                    data: { menuNo: id },
                    success: function (res) {
                        if (res.success) {
                            if (typeof toastr !== 'undefined') toastr.success(res.message);
                            else alert(res.message);
                            menuTable.ajax.reload();
                        } else {
                            if (typeof toastr !== 'undefined') toastr.error(res.message);
                            else alert(res.message);
                        }
                    }
                });
            };
        });
    </script>
</template>
