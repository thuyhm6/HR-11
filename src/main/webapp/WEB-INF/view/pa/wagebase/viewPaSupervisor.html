<div th:fragment="content">
    <div class="row">
        <div class="col-12" id="vpas_pageWrapper">

            <!-- Điều kiện tìm kiếm -->
            <div class="card mb-2">
                <div class="card-body py-2">
                    <div class="row g-2 align-items-start">
                        <div class="col-8 d-flex flex-wrap align-items-center gap-2">
                            <label class="form-label small text-muted mb-0 text-nowrap"
                                th:text="#{pa.supervisor.empSearch}">Mã nhân viên /Họ tên</label>
                            <input type="text" class="form-control form-control-sm" id="vpas_empSearch"
                                style="max-width:200px;"
                                onkeydown="if(event.key==='Enter') vpasSearch()">

                            <label class="form-label small text-muted mb-0 text-nowrap"
                                th:text="#{pa.supervisor.dept}">Phòng ban</label>
                            <input type="text" class="form-control form-control-sm" id="vpas_deptSearch"
                                style="max-width:200px;"
                                th:placeholder="#{pa.supervisor.deptPlaceholder}"
                                placeholder="Chọn phòng ban" readonly>

                            <label class="form-label small text-muted mb-0 text-nowrap"
                                th:text="#{pa.supervisor.empOffice}">Trạng thái làm việc</label>
                            <select class="form-select form-select-sm" id="vpas_empOfficeSearch"
                                data-parent-code="15118" style="max-width:180px;"></select>
                        </div>
                        <div class="col-4 d-flex gap-2 align-items-start justify-content-end flex-wrap">
                            <button type="button" class="btn btn-primary btn-sm" onclick="vpasSearch()">
                                <i class="bi bi-search"></i>
                                <span th:text="#{pa.supervisor.search}">Tra cứu</span>
                            </button>
                            <button type="button" class="btn btn-success btn-sm" onclick="vpasOpenAddModal()">
                                <i class="bi bi-plus-circle"></i>
                                <span th:text="#{pa.supervisor.addNew}">Thêm mới</span>
                            </button>
                            <button type="button" class="btn btn-danger btn-sm" onclick="vpasDeleteSelected()">
                                <i class="bi bi-trash"></i>
                                <span th:text="#{pa.supervisor.delete}">Xóa</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Bảng danh sách -->
            <div class="card">
                <div class="card-body p-2">
                    <div class="table-responsive">
                        <table id="vpas_table" class="table table-striped table-bordered table-hover table-sm"
                            style="width:100%">
                            <thead class="table-light">
                                <tr>
                                    <th class="text-center" style="width:36px;">
                                        <input type="checkbox" id="vpas_checkAll">
                                    </th>
                                    <th class="text-center" style="width:40px;" th:text="#{pa.supervisor.no}">STT</th>
                                    <th th:text="#{pa.supervisor.empId}">Mã nhân viên</th>
                                    <th th:text="#{pa.supervisor.localName}">Họ tên</th>
                                    <th th:text="#{pa.supervisor.dept}">Phòng ban</th>
                                    <th class="text-center" th:text="#{pa.supervisor.createDate}">Thời gian tạo</th>
                                    <th class="text-center" th:text="#{pa.supervisor.createdBy}">Người tạo</th>
                                    <th class="text-center" style="width:70px;" th:text="#{pa.supervisor.action}">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div><!-- /#vpas_pageWrapper -->
    </div><!-- /.row -->

    <!-- ── Modal thêm mới / chỉnh sửa ─────────────────────────────────────── -->
    <div class="modal fade" id="vpas_editModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-scrollable" style="max-width:520px;">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="vpas_modalTitle" th:text="#{pa.supervisor.addTitle}">Thêm mới người phụ trách lương</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="vpas_isEdit">
                    <table class="table table-bordered table-sm align-middle mb-0" style="table-layout:fixed;">
                        <colgroup>
                            <col style="width:35%;">
                            <col style="width:65%;">
                        </colgroup>
                        <tbody>
                            <tr>
                                <th class="table-light text-end pe-3">
                                    <span th:text="#{pa.supervisor.supervisor}">Tên người phụ trách</span>
                                    <span class="text-danger">*</span>
                                </th>
                                <td>
                                    <div class="input-group input-group-sm">
                                        <input type="text" class="form-control" id="vpas_empDisplay"
                                            th:placeholder="#{pa.supervisor.empSelectPlaceholder}"
                                            placeholder="Chọn nhân viên..." readonly>
                                        <input type="hidden" id="vpas_personId">
                                        <button class="btn btn-outline-primary" type="button"
                                            id="vpas_empSearchBtn"
                                            onclick="vpasOpenEmpSearch()">
                                            <i class="bi bi-search"></i>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                            <tr>
                                <th class="table-light text-end pe-3">
                                    <span th:text="#{pa.supervisor.activity}">Trạng thái</span>
                                </th>
                                <td>
                                    <select class="form-select form-select-sm" id="vpas_activity" style="max-width:180px;">
                                        <option value="1" th:text="#{pa.supervisor.activity.active}">Hoạt động</option>
                                        <option value="0" th:text="#{pa.supervisor.activity.inactive}">Không hoạt động</option>
                                    </select>
                                </td>
                            </tr>
                            <tr>
                                <th class="table-light text-end pe-3">
                                    <span th:text="#{pa.supervisor.orderNo}">Thứ tự</span>
                                </th>
                                <td>
                                    <input type="number" class="form-control form-control-sm" id="vpas_orderNo"
                                        style="max-width:120px;" min="0" value="0">
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal"
                        th:text="#{common.close}">Đóng</button>
                    <button type="button" class="btn btn-primary btn-sm" onclick="vpasSave()">
                        <i class="bi bi-save"></i>
                        <span th:text="#{pa.supervisor.save}">Lưu</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

</div><!-- /th:fragment="content" -->

<template id="fragmentScripts">
    <script th:inline="javascript">
        var vpas_table = null;
        var vpas_selectedDeptCodes = [];
        var vpas_msgConfirmDelete  = /*[[#{pa.supervisor.confirmDelete}]]*/ 'Bạn có chắc chắn muốn xóa các bản ghi đã chọn?';
        var vpas_msgSelectRequired = /*[[#{pa.supervisor.selectRequired}]]*/ 'Vui lòng chọn ít nhất một bản ghi!';
        var vpas_msgValidate       = /*[[#{pa.supervisor.validateRequired}]]*/ 'Vui lòng chọn người phụ trách!';
        var vpas_titleAdd          = /*[[#{pa.supervisor.addTitle}]]*/ 'Thêm mới người phụ trách lương';
        var vpas_titleEdit         = /*[[#{pa.supervisor.editTitle}]]*/ 'Chỉnh sửa người phụ trách lương';

        $(document).ready(function () {

            // Khởi tạo DeptTree selector
            if (typeof DeptTree !== 'undefined') {
                DeptTree.init('#vpas_pageWrapper #vpas_deptSearch', function (selectedCodes) {
                    vpas_selectedDeptCodes = selectedCodes || [];
                });
            }

            vpas_table = $('#vpas_table').DataTable({
                destroy: true,
                scrollY: 'calc(100vh - 300px)',
                scrollCollapse: true,
                paging: true,
                searching: false,
                lengthChange: true,
                pageLength: 20,
                lengthMenu: [10, 20, 50, 100],
                processing: true,
                serverSide: true,
                columnDefs: [
                    { targets: 0, width: '36px', className: 'text-center', orderable: false },
                    { targets: 1, width: '40px', className: 'text-center', orderable: false },
                    { targets: [5, 6, 7], className: 'text-center' },
                    { targets: 7, orderable: false }
                ],
                ajax: {
                    url: '/pa/wagebase/api/supervisor/list',
                    type: 'GET',
                    data: function (d) {
                        d.empSearch       = $('#vpas_empSearch').val();
                        d.deptNos         = (vpas_selectedDeptCodes || []).join(',');
                        d.empOfficeSearch = $('#vpas_empOfficeSearch').val();
                    }
                },
                columns: [
                    {
                        data: null,
                        render: function (data, type, row) {
                            return '<input type="checkbox" class="vpas_rowCheck"'
                                + ' data-personid="' + (row.personId || '') + '">';
                        }
                    },
                    {
                        data: null,
                        render: function (data, type, row, meta) {
                            return meta.settings._iDisplayStart + meta.row + 1;
                        }
                    },
                    { data: 'empId', defaultContent: '' },
                    { data: 'localName', defaultContent: '' },
                    { data: 'deptName', defaultContent: '' },
                    { data: 'createDate', defaultContent: '' },
                    { data: 'createdBy', defaultContent: '' },
                    {
                        data: null,
                        render: function (data, type, row) {
                            return '<button class="btn btn-warning btn-sm" onclick="vpasOpenEditModal(\'' + row.personId + '\')">'
                                + '<i class="bi bi-pencil"></i></button>';
                        }
                    }
                ],
                drawCallback: function () {
                    $('#vpas_checkAll').off('change').on('change', function () {
                        $('.vpas_rowCheck').prop('checked', $(this).is(':checked'));
                    });
                }
            });

            // ── Tìm kiếm ──────────────────────────────────────────────────────
            window.vpasSearch = function () {
                vpas_table.ajax.reload();
            };

            // ── Mở popup tìm nhân viên ────────────────────────────────────────
            window.vpasOpenEmpSearch = function () {
                if (typeof EmployeeSearchModal !== 'undefined') {
                    EmployeeSearchModal.open(function (employee) {
                        $('#vpas_personId').val(employee.personId);
                        $('#vpas_empDisplay').val(employee.empId + ' - ' + employee.localName);
                    });
                } else {
                    alert('Component tìm kiếm nhân viên chưa được tải!');
                }
            };

            // ── Thêm mới ──────────────────────────────────────────────────────
            window.vpasOpenAddModal = function () {
                $('#vpas_isEdit').val('0');
                $('#vpas_personId').val('');
                $('#vpas_empDisplay').val('');
                $('#vpas_activity').val('1');
                $('#vpas_orderNo').val('0');
                // Mở khóa trường người phụ trách khi thêm mới
                $('#vpas_empDisplay').prop('readonly', true);
                $('#vpas_empSearchBtn').prop('disabled', false).show();
                $('#vpas_modalTitle').text(vpas_titleAdd);
                new bootstrap.Modal(document.getElementById('vpas_editModal')).show();
            };

            // ── Sửa ───────────────────────────────────────────────────────────
            window.vpasOpenEditModal = function (personId) {
                $.ajax({
                    url: '/pa/wagebase/api/supervisor/' + encodeURIComponent(personId),
                    type: 'GET',
                    success: function (dto) {
                        $('#vpas_isEdit').val('1');
                        $('#vpas_personId').val(dto.personId || '');
                        $('#vpas_empDisplay').val((dto.empId || '') + ' - ' + (dto.localName || ''));
                        $('#vpas_activity').val(dto.activity != null ? dto.activity : 1);
                        $('#vpas_orderNo').val(dto.orderNo != null ? dto.orderNo : 0);
                        // Không cho sửa trường người phụ trách khi edit
                        $('#vpas_empDisplay').prop('readonly', true);
                        $('#vpas_empSearchBtn').prop('disabled', true).hide();
                        $('#vpas_modalTitle').text(vpas_titleEdit);
                        new bootstrap.Modal(document.getElementById('vpas_editModal')).show();
                    },
                    error: function (err) {
                        var msg = (err.responseJSON && err.responseJSON.error) ? err.responseJSON.error : 'Lỗi không xác định';
                        toastr ? toastr.error(msg) : alert(msg);
                    }
                });
            };

            // ── Lưu ───────────────────────────────────────────────────────────
            window.vpasSave = function () {
                var personId = $('#vpas_personId').val().trim();
                if (!personId) {
                    toastr ? toastr.warning(vpas_msgValidate) : alert(vpas_msgValidate);
                    return;
                }
                var payload = {
                    personId: personId,
                    activity: parseInt($('#vpas_activity').val()),
                    orderNo:  parseInt($('#vpas_orderNo').val()) || 0
                };
                $.ajax({
                    url: '/pa/wagebase/api/supervisor/save',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(payload),
                    success: function (res) {
                        toastr ? toastr.success(res.message || 'Lưu thành công') : alert(res.message || 'Lưu thành công');
                        var modal = bootstrap.Modal.getInstance(document.getElementById('vpas_editModal'));
                        if (modal) modal.hide();
                        vpas_table.ajax.reload();
                    },
                    error: function (err) {
                        var msg = (err.responseJSON && err.responseJSON.error) ? err.responseJSON.error : (err.responseText || 'Lỗi không xác định');
                        toastr ? toastr.error(msg) : alert(msg);
                    }
                });
            };

            // ── Xóa ───────────────────────────────────────────────────────────
            window.vpasDeleteSelected = function () {
                var selected = [];
                $('.vpas_rowCheck:checked').each(function () {
                    selected.push($(this).data('personid'));
                });
                if (selected.length === 0) {
                    toastr ? toastr.warning(vpas_msgSelectRequired) : alert(vpas_msgSelectRequired);
                    return;
                }
                if (!confirm(vpas_msgConfirmDelete)) return;
                $.ajax({
                    url: '/pa/wagebase/api/supervisor/deleteList',
                    type: 'DELETE',
                    contentType: 'application/json',
                    data: JSON.stringify(selected),
                    success: function (res) {
                        toastr ? toastr.success(res.message || 'Xóa thành công') : alert(res.message || 'Xóa thành công');
                        vpas_table.ajax.reload();
                    },
                    error: function (err) {
                        var msg = (err.responseJSON && err.responseJSON.error) ? err.responseJSON.error : (err.responseText || 'Lỗi không xác định');
                        toastr ? toastr.error(msg) : alert(msg);
                    }
                });
            };
        });
    </script>
</template>
